id: leadership-interview-v1
name: Leadership Interview Guide — Client Operating Context
version: 0.2.0
variant: leadership
description: >
  Structured interview guide for the Managing Partner / CEO / growth lead of a paying
  client. Populates strategic objectives, pursuit preferences, red lines, and leadership's
  view of differentiation in the Client Operating Context schema. AI-led with consultant
  on standby. Target duration 90 minutes, hard stop at 100.
consumes: []

# ─────────────────────────────────────────────────────────────────────────────
# Downstream consumers — cross-product boundary
# ─────────────────────────────────────────────────────────────────────────────
# The Client Operating Context is a platform-level shared entity. Other PWIN
# products READ it; they do not regenerate, fork, or maintain parallel copies
# of its fields. Findings from downstream products may propose updates, but
# writes flow back through a controlled path — not by forking the entity.
#
# Mirrored in bidequity-verdict/docs/BidEquity-Verdict-PRD-v2.md §7.6.

downstreamConsumers:
  - product: Verdict
    dependency: optional-enrichment
    uses:
      - identity.businessModelCategory
      - identity.size
      - pursuitPreferences.avoidArchetypes
      - pursuitPreferences.noGoTriggers
      - riskGuardrails.redLines
      - riskGuardrails.marginFloor
      - deliveryMobilisation
      - bidOperatingModel
      - cultureDecisionStyle
    rule: >
      Verdict operates at the single-lost-opportunity level; this context
      operates at portfolio/company level. They are NOT peers. Verdict MUST
      run to completion without this context — when absent, Verdict scores
      against absolute methodology benchmarks and calls this out as a
      calibration limit. When present and approved for AI use, Verdict reads
      it as ENRICHMENT to (a) calibrate Domain 5.3 (team mobilisation) and
      5.7 (commercial/pricing) against this firm's typical shape, (b) cross-
      check pursuits against declared red lines and avoid-archetypes (highest-
      value finding when triggered), (c) sharpen Pass 2 probe questions, and
      (d) power the Pattern Analysis Engine across multiple Verdicts.
      Verdict MUST NOT re-interview leadership or write parallel capability /
      delivery / commercial-posture fields. Recurring Verdict findings flow
      back via a controlled write path (TBD), not a fork.
      Commercial reality: most clients buy Verdict (£2k gateway) before
      onboarding Agent 0 (Core/Command). Verdict-first is the default flow.
  - product: Win Strategy
    uses: [strategicObjectives, pursuitPreferences, differentiation, riskGuardrails]
    rule: Read-only baseline for capture-phase strategy.
  - product: Bid Execution
    uses: [cultureDecisionStyle.tonePreferences, riskGuardrails.redLines, differentiation]
    rule: Read-only guardrails for drafting and governance.
  - product: Qualify (paid tier)
    uses: [pursuitPreferences, riskGuardrails.noGoTriggers, strategicObjectives.targetContractValueBands]
    rule: Read-only — informs AI assurance layer. Public/free tier MUST NOT consume.

produces:
  schemaId: client-operating-context-v1
  sections:
    - identity.businessModel
    - identity.businessModelCategory
    - identity.size
    - strategicObjectives
    - pursuitPreferences
    - riskGuardrails.redLines
    - differentiation.trueDifferentiators
    - differentiation.tableStakes
    - cultureDecisionStyle.appetiteForChallenge
    - cultureDecisionStyle.tonePreferences
    - cultureDecisionStyle.boldVsSafePositioning

# ─────────────────────────────────────────────────────────────────────────────
# Persona
# ─────────────────────────────────────────────────────────────────────────────

persona:
  name: Morgan
  role: Structured interviewer
  voice: professional, curious, unhurried, precise
  opening: >
    Before we start, a quick orientation. I'll ask you a series of questions about
    the firm's direction, the work you want to win, and the work you'd rather avoid.
    As you answer, structured claims will appear on the right of the screen. You
    confirm or correct each one — that becomes the record we build everything else
    on. If anything's unclear, or if you want to skip a question, just say so.
    There are no right answers. Ready to start?

  principles:
    - Ask one question at a time. Never stack.
    - Short questions. Long answers.
    - Never leap to interpretation in the question. Let the client say it first.
    - Reflect back in the interviewee's language, not consulting jargon.
    - If an answer is vague, probe once for specifics. Don't interrogate.
    - If the interviewee resists a question, move on. Flag the gap, don't force it.
    - Silence is data. Don't fill it.
    - Absolutes ("always", "never", "only") are worth testing once.
    - Watch for frame contradictions. If a later answer conflicts with the
      identity or business-model frame already captured (e.g. "we're a
      boutique consultancy" then "we want to win £50m managed-service deals"),
      surface it on-screen and let the consultant decide whether to resolve
      live or log both as strategicTensions. Never quietly reconcile them.

# ─────────────────────────────────────────────────────────────────────────────
# Sections
# ─────────────────────────────────────────────────────────────────────────────

sections:

  # ───────────────────────────────────────────────────────────────────────────
  - id: orientation
    durationMinutes: 5
    purpose: Establish rapport, confirm role, set interview mechanics.
    questions:
      - id: L0.1
        text: "To set the scene — what's your role in the firm, and how long have you been in it?"
        mapsTo: null
        captureHint: "Context only. No claim generated unless the role affects ownership of later claims."

      - id: L0.2
        text: "Who else in the firm would answer this interview very differently from you, and on what topics?"
        mapsTo: null
        captureHint: >
          Context only. Flag names as potential interviewees for Bid Ops or Commercial variants,
          or as stakeholders to brief before the leadership workshop.

  # ───────────────────────────────────────────────────────────────────────────
  - id: business-model
    durationMinutes: 10
    purpose: Confirm identity and business model before moving to strategy.
    questions:
      - id: L1.1
        text: >
          Before we go further, which of these best describes the firm today —
          management consulting, systems integration, managed services,
          technology reseller, product or platform, or a deliberate blend of
          more than one? Pick the one that fits best, even if it's imperfect.
        mapsTo: identity.businessModelCategory
        claimType: fact
        confidence: high
        captureHint: >
          CRITICAL — categorical anchor for every downstream claim. Do not
          accept a free-text paragraph; force a categorical pick from the
          enum (management_consulting, systems_integration, managed_services,
          reseller, product_platform, blended). If the client resists the
          categories, ask which one they are MOST often mistaken for — that
          is usually the adjacent category that matters.
        followups:
          - if: answer_is("blended")
            text: "Which of those is dominant by revenue, and which is the emerging shift?"
            mapsTo: identity.businessModelCategory
            captureHint: "Capture both the dominant and the emerging — the delta IS the strategic tension."
          - if: answer_is_vague OR client_refuses_category
            text: "If a buyer asked a competitor what kind of firm you are, what single label would they use?"
            captureHint: "Flip to external perception — often unlocks the categorical answer."

      - id: L1.1b
        text: "Now in one or two sentences, describe in your own words how the firm makes money today."
        mapsTo: identity.businessModel
        claimType: fact
        confidence: high
        captureHint: >
          Free-text narrative for the record. If it contradicts the category
          picked in L1.1, flag the contradiction — the category wins as the
          structured claim; the narrative becomes a claim about self-perception.
        followups:
          - if: narrative_contradicts_category
            text: "That sounds broader than the category you picked — is the category where you are today, or where you want to be?"
            captureHint: "Resolves the most common defect: aspirational narrative vs. categorical reality."

      - id: L1.2
        text: "Roughly how big is the firm — headcount and annual revenue?"
        mapsTo: identity.size
        claimType: fact
        confidence: high
        followups:
          - if: answer_is_exact
            claimConfidence: high
          - if: answer_is_approximate
            claimConfidence: medium
            note: "Verify against filed accounts in desk baseline"

      - id: L1.3
        text: "Where does the firm deliver — which geographies, and where do you not operate?"
        mapsTo: identity.deliveryGeographies
        claimType: fact
        confidence: high

  # ───────────────────────────────────────────────────────────────────────────
  - id: identity-checkpoint
    durationMinutes: 3
    purpose: >
      Read back the captured identity frame and lock it before moving into
      aspirational territory. Prevents the most common failure mode: Strategic
      Objectives answers contradicting the business model because the client
      has mentally switched to "what I want us to be" mode.
    questions:
      - id: L1.CP
        text: >
          Quick checkpoint before we move on. Based on what you've said, I've
          captured: [business-model category], [size], [geographies]. Is that
          the firm as it is today — not where you want it to be, but where it
          is? If any of that is off, now's the moment to correct it, because
          everything that follows will be interpreted against this frame.
        mapsTo: null
        claimType: null
        captureHint: >
          No new claim generated — this question confirms or corrects the
          existing identity claims from L1.1–L1.3. If the client corrects
          anything, the avatar re-opens those claims for edit before continuing.
          This is the FRAME. Every answer that follows will be read against it.
        followups:
          - if: client_corrects_identity
            action: "Re-open the affected L1.x claim for edit; do not proceed to L2 until confirmed."
          - if: client_hesitates_or_deflects
            text: "What doesn't quite fit? I'd rather catch it now than build on a shaky picture."
            captureHint: "A hesitation here is usually the first signal of a frame contradiction."

  # ───────────────────────────────────────────────────────────────────────────
  - id: strategic-objectives
    durationMinutes: 20
    purpose: What does successful growth look like, and what's the firm deliberately moving away from.
    questions:
      - id: L2.1
        text: "Looking at the next 12 to 24 months, what does successful growth look like for the firm?"
        mapsTo: strategicObjectives.growthPriorities
        claimType: interpretation
        confidence: medium
        captureHint: >
          Default claimType: interpretation unless the client gives a concrete metric
          ("grow to £80m", "win 3 central gov accounts"). If concrete, upgrade to fact.
        followups:
          - if: answer_mentions("sector" OR "market")
            text: "Which sectors specifically — and which ones are you stepping back from?"
            mapsTo: strategicObjectives.prioritySectors
          - if: answer_mentions("size" OR "scale" OR "bigger" OR "larger")
            text: "What contract value range should pursuits fall into? What's too small, and what's too big for the firm to absorb?"
            mapsTo: strategicObjectives.targetContractValueBands
          - if: answer_is_vague
            text: "Can you give me an example of a deal from the last 12 months that would be 'successful growth' for you? And one that wouldn't?"
            captureHint: "Use the examples to back-populate growthPriorities with specifics."

      - id: L2.2
        text: "What's the firm deliberately moving away from? Anything you used to do that you don't want to do anymore?"
        mapsTo: strategicObjectives.growthPriorities
        claimType: fact
        confidence: high
        captureHint: >
          Creates a negative-space claim — often populates pursuitPreferences.avoidArchetypes
          as well. If client names a specific deal type, mirror-claim into avoidArchetypes.

      - id: L2.3
        text: "What's the tension between where the firm is today and where you want it to be?"
        mapsTo: strategicObjectives.strategicTensions
        claimType: interpretation
        confidence: medium
        captureHint: >
          Critical question. Clients almost never articulate tensions unprompted.
          Accept "I don't know" — flag as assumption for workshop.
        followups:
          - if: answer_mentions("capacity" OR "people" OR "hiring")
            text: "Is that a hiring problem, a retention problem, or a utilisation problem?"
          - if: answer_mentions("leadership" OR "alignment")
            text: "Where does the disagreement sit most sharply?"
            captureHint: "Sensitive — don't push if client deflects."

      - id: L2.4
        text: "If you had to pick two or three opportunity types that represent the firm at its best, what are they?"
        mapsTo: pursuitPreferences.preferredDealArchetypes
        claimType: fact
        confidence: high

  # ───────────────────────────────────────────────────────────────────────────
  - id: strike-zone
    durationMinutes: 15
    purpose: Define the firm's strike zone — buyers, routes, archetypes, no-gos.
    questions:
      - id: L3.1
        text: "Who are the ideal buyers? Which organisations do you most want more work from?"
        mapsTo: pursuitPreferences.preferredBuyers
        claimType: fact
        confidence: high
        followups:
          - if: answer_is_generic ("public sector", "large clients")
            text: "Can you name three or four specific buyers that would be at the top of the list?"
            captureHint: "Upgrade to fact only when named buyers are given."

      - id: L3.2
        text: "How do you prefer to reach buyers — frameworks, open tenders, direct relationships, partner-led?"
        mapsTo: pursuitPreferences.preferredRoutesToMarket
        claimType: fact
        confidence: high

      - id: L3.3
        text: "What kinds of opportunities should the firm not bid for, even if the numbers look good on paper?"
        mapsTo: pursuitPreferences.avoidArchetypes
        claimType: fact
        confidence: high
        captureHint: >
          One of the highest-value claims in the interview. Probe for reason, not just type.
          Map each named avoid archetype with a 'reason' field.
        followups:
          - if: answer_mentions_specific_archetype
            text: "Why — what's gone wrong when the firm has chased that kind of work before?"
            mapsTo: pursuitPreferences.avoidArchetypes.reason

      - id: L3.4
        text: "Are there any hard triggers that should stop a bid from going ahead, no matter what?"
        mapsTo: pursuitPreferences.noGoTriggers
        claimType: fact
        confidence: high
        captureHint: >
          Looking for categorical rules ("no sub-prime roles", "no fixed-price transformation
          over £10m", "no defence without SC-cleared partner"). Each trigger becomes a
          noGoTriggers entry with a severity.

  # ───────────────────────────────────────────────────────────────────────────
  - id: differentiation
    durationMinutes: 15
    purpose: Leadership's view of what makes the firm distinctive. Archive agent will cross-check later.
    questions:
      - id: L4.1
        text: "When a prospective client is choosing between you and a competitor, what's the one thing that tips it in your favour?"
        mapsTo: differentiation.trueDifferentiators
        claimType: interpretation
        confidence: medium
        captureHint: >
          Default to interpretation — leadership views are aspirational by nature. Archive
          agent will test these against actual proposal language and win/loss data.

      - id: L4.2
        text: "And what's table stakes — what every firm in your space has to offer just to be in the room?"
        mapsTo: differentiation.tableStakes
        claimType: fact
        confidence: high

      - id: L4.3
        text: "Where would you say the firm is sometimes seen as stronger than it actually is?"
        mapsTo: differentiation.doNotOverclaim
        claimType: interpretation
        confidence: medium
        captureHint: >
          Very difficult question. Expect deflection OR compression to a generic
          label ("delivery excellence", "innovation", "partnership"). Neither is
          a usable claim. A generic answer MUST be probed — otherwise the claim
          enters the schema too abstract to act on.
        followups:
          - if: answer_is_refused
            captureHint: "Save as claimType: unknown, flagged for Bid Ops follow-up."
          - if: answer_is_short_or_generic
            text: >
              Where does that show up — in bid language, in marketing, or in how
              the firm talks about delivery? Give me the specific place a buyer
              might be mis-led.
            mapsTo: differentiation.doNotOverclaim
            captureHint: >
              Force the client to locate the overclaim concretely. Accept any
              one of: bid_language / marketing / delivery_reality / sales_pitch /
              case_studies. Without this, the claim is not actionable.
          - if: followup_still_generic
            text: "Give me an example — a specific bid, pitch, or moment where you felt the firm was being sold as more than it is."
            captureHint: "Last-resort concreteness probe. If still generic, downgrade to claimType: hypothesis."

      - id: L4.4
        text: "If you think about the last few real wins, what's the pattern — what made those bids succeed?"
        mapsTo: differentiation.trueDifferentiators
        claimType: interpretation
        confidence: medium
        followups:
          - if: client_names_proof_point
            text: "Can that be used externally, or is it client-confidential?"
            mapsTo: differentiation.proofPoints.usableExternally

  # ───────────────────────────────────────────────────────────────────────────
  - id: red-lines
    durationMinutes: 15
    purpose: Absolute prohibitions — commercial, reputational, regulatory, capability.
    questions:
      - id: L5.1
        text: "Are there sectors or clients the firm won't work with, for any reason?"
        mapsTo: riskGuardrails.redLines
        claimType: fact
        confidence: high
        captureHint: >
          Reputational red lines — defence, gambling, tobacco, specific controversial
          clients, etc. Each gets its own redLine entry.

      - id: L5.2
        text: "Are there contract structures the firm won't accept, no matter how big the opportunity?"
        mapsTo: riskGuardrails.redLines
        claimType: fact
        confidence: high
        captureHint: "Commercial red lines — e.g. unlimited liability, fixed-price without scope lock, no cap on LDs."

      - id: L5.3
        text: "If a bid required the firm to stretch beyond current capability — bring in a new skill, new accreditation, new geography — how much stretch is acceptable?"
        mapsTo: riskGuardrails.capabilityStretchTolerance
        claimType: fact
        confidence: medium
        captureHint: "Map to enum: high / medium / low / none."

      - id: L5.4
        text: "How reliant can a pursuit be on a partner before it becomes too risky?"
        mapsTo: riskGuardrails.partnerDependencyTolerance
        claimType: fact
        confidence: medium

  # ───────────────────────────────────────────────────────────────────────────
  - id: culture-decision-style
    durationMinutes: 10
    purpose: >
      Capture leadership's self-view of how the firm makes decisions, tolerates
      challenge, and prefers to be advised. Calibrates how hard downstream
      skills push in recommendations and what tone lands internally.
    questions:
      - id: L5x.1
        text: "When the AI pushes back on a pursuit decision — say it recommends walking away from a deal leadership wants to chase — how hard do you want it to push?"
        mapsTo: cultureDecisionStyle.appetiteForChallenge
        claimType: interpretation
        confidence: medium
        captureHint: >
          Map to enum: direct_and_forceful / reasoned_but_firm / suggestive_only / avoid_conflict.
          Leadership will often over-claim appetite for challenge. If later answers contradict
          (e.g. red lines are vague, no-go triggers are soft), flag as strategicTension.

      - id: L5x.2
        text: "When you write to buyers, does the firm lean bold and distinctive, or safe and credible? Pick the one that's closer to the truth, not the aspiration."
        mapsTo: cultureDecisionStyle.boldVsSafePositioning
        claimType: interpretation
        confidence: medium
        captureHint: "Map to enum: bold / balanced / safe. Archive agent will test against actual proposal language."

      - id: L5x.3
        text: "How fast does the firm typically make big pursuit decisions — same day, same week, or does it take a formal governance round?"
        mapsTo: cultureDecisionStyle.decisionSpeed
        claimType: fact
        confidence: high

      - id: L5x.4
        text: "Any tone or language the AI should avoid? Jargon, corporate phrasing, specific terms that don't sit right?"
        mapsTo: cultureDecisionStyle.tonePreferences
        claimType: fact
        confidence: high
        captureHint: "Captures downstream-skill guardrails for drafting. Short list, concrete terms."

  # ───────────────────────────────────────────────────────────────────────────
  - id: wrap-up
    durationMinutes: 10
    purpose: Reflection, gaps, what the client wants the AI to never do.
    questions:
      - id: L6.1
        text: "Is there anything I haven't asked about that the AI needs to know to give you useful advice on pursuits?"
        mapsTo: null
        captureHint: "Open field. Route answer into whichever schema section best fits."

      - id: L6.2
        text: "If the AI is going to be used across the firm, what's the one thing it must never do?"
        mapsTo: riskGuardrails.redLines
        claimType: fact
        confidence: high
        captureHint: >
          Meta-rule for AI usage. Important — this becomes a hard guardrail in every
          downstream skill. Flag these with materiality: high.

      - id: L6.3
        text: "What would 'success' look like for the work we're doing together?"
        mapsTo: null
        captureHint: >
          Feeds engagementContext.successMeasures in V2 of the schema. For V1, save to
          transcript but don't try to structure — engagement overlay is out of scope.

# ─────────────────────────────────────────────────────────────────────────────
# Global claim-typing rules (apply to every question)
# ─────────────────────────────────────────────────────────────────────────────

claimTypingRules:
  - rule: "Default to the weakest claim type the answer supports."
    rationale: "Better to under-type a claim and have the consultant upgrade it than to over-type and mislead downstream skills."
    order: fact > interpretation > assumption > hypothesis > unknown

  - rule: "Upgrade to 'fact' only when the client gives a concrete, verifiable, or categorical answer."
    examples:
      - "'We target contracts between £2m and £15m' → fact"
      - "'We want to grow into mid-market' → interpretation (no specifics)"
      - "'I think we're probably strongest in digital strategy' → interpretation"

  - rule: "If the client hedges ('I think', 'probably', 'my sense is'), the claim is interpretation at best."

  - rule: "If the client says 'I don't know' or deflects, save as claimType: unknown with a followUpIn field pointing to the variant most likely to answer."

  - rule: "Claims with materiality: high need double confirmation before upgrading to fact — ask the question a second way."
    examples:
      - "No-go triggers"
      - "Red lines"
      - "Margin floors (in Commercial interview)"

# ─────────────────────────────────────────────────────────────────────────────
# Consultant intervention triggers
# ─────────────────────────────────────────────────────────────────────────────

consultantInterventionTriggers:
  - trigger: "AI misreads a claim type two times in a row"
    action: "Consultant takes over claim typing for the next 3 questions"

  - trigger: "Client visibly disengages (answers in one word, looks at watch, says 'let's move on')"
    action: "Skip remaining follow-ups, move to next section"

  - trigger: "Client surfaces a tension the guide doesn't cover"
    action: "Consultant asks 2-3 unstructured questions; AI transcribes but does not auto-claim; consultant drafts claim manually post-session"

  - trigger: "Client contradicts an earlier answer in the same session"
    action: "AI flags the contradiction on screen; consultant decides whether to resolve live or log both claims as strategicTensions"

  - trigger: "Client refuses to answer a question in differentiation or red-lines"
    action: "Skip to next question; flag section in post-session summary for Bid Ops follow-up"

# ─────────────────────────────────────────────────────────────────────────────
# Session output
# ─────────────────────────────────────────────────────────────────────────────

output:
  schemaPartial:
    description: "Subset of client-operating-context.json covering the sections produced by this variant."

  transcript:
    format: markdown
    includes:
      - timestamp
      - speaker (AI / client / consultant)
      - section id
      - question id
      - claim generated (if any)
      - claim approval status

  sessionSummary:
    sections:
      - claimsApproved
      - claimsEdited
      - claimsRejected
      - claimsFlaggedAsAssumption
      - sectionsSkipped
      - tensionsForWorkshop
      - gapsForBidOpsInterview
      - gapsForCommercialInterview

  handoffToBidOps:
    description: "Structured notes the Bid Ops consultant-led interview should probe against."
    includes:
      - leadershipClaimsToVerify (claims flagged as interpretation that need archive/operational verification)
      - unknownsToResolve (questions client couldn't or wouldn't answer)
      - suspectedOverclaims (differentiation claims the consultant wants Bid Ops to test)

# ─────────────────────────────────────────────────────────────────────────────
# Design notes
# ─────────────────────────────────────────────────────────────────────────────

designNotes:
  - >
    This guide is the first draft. The only way to know if it's right is to run it
    against a real (or simulated) managing partner and see where it falls flat.
  - >
    Target: 90 minutes, 6 sections, ~24 primary questions + follow-ups. If early
    dry-runs show the guide regularly exceeds 100 minutes, cut differentiation
    depth first — archive agent will cover that ground later.
  - >
    The hardest questions are L2.3 (strategic tensions), L4.3 (overclaiming), and
    L5.1-L5.2 (red lines). These are the ones a human interviewer would get better
    answers on. If the avatar consistently underperforms here, flip these questions
    to consultant-led and let the AI capture claims in the background.
