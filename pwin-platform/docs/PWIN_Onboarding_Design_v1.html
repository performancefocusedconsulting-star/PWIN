.matrix-cell{text-align:center;font-family:'DM Mono',monospace;font-size:10px;}
.matrix-h{color:var(--red);font-weight:700;}.matrix-m{color:var(--amb);}.matrix-l{color:var(--grn);}
.print-only{display:none;}
@media print{body{background:#fff;color:#1a1a1a;font-size:11px;}.hdr,.nav{display:none;}.ct{display:block!important;padding:10px;break-inside:avoid-page;}.print-only{display:block;}}

<div class="sh2">Phase 1 — Engage</div>

<table class="tb">
  <tr><th>Ref</th><th>Activity</th><th>Done When</th><th>Variant Notes</th></tr>

<div class="sh2">Phase 5 — Prove</div>
<div class="bt">Run the pilot pursuit through the full PWIN process. Demonstrate value. Convert to retainer. Owner: BIP Lead.</div>
<table class="tb">
  <tr><th>Ref</th><th>Activity</th><th>Done When</th><th>Variant Notes</th></tr>
  <tr><td>OB-16</td><td>Content Library / Bid Library Access</td><td>Existing case studies, CVs, past submissions accessible; library quality assessed; gaps documented</td><td>Consulting: often informal. BPO: formal but may be outdated. SI: typically stronger</td></tr>

<div class="sh">Onboarding Complete — Definition</div>

</div>
