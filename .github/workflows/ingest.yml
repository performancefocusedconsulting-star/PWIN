name: Nightly FTS Ingest

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC daily
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  ingest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pwin-competitive-intel
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js (for wrangler)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore database from cache
        uses: actions/cache@v4
        with:
          path: pwin-competitive-intel/db/bid_intel.db
          key: bid-intel-db-${{ github.run_number }}
          restore-keys: |
            bid-intel-db-

      - name: Install Python dependencies for cleaning steps
        # rapidfuzz is needed by fuzzy-match-buyers.py (no other runtime deps)
        run: pip install rapidfuzz

      - name: Run ingest
        run: python agent/ingest.py

      - name: Run CF ingest
        run: python agent/ingest_cf.py
        continue-on-error: true

      - name: Enrich suppliers from Companies House
        if: env.COMPANIES_HOUSE_API_KEY != ''
        env:
          COMPANIES_HOUSE_API_KEY: ${{ secrets.COMPANIES_HOUSE_API_KEY }}
        # --limit 1000 at ~3.5s/supplier ≈ 58 min. CH rate limit: 600 calls / 5 min,
        # 3 calls/supplier ⇒ max 200 suppliers / 5 min. At 1000/night, ~44 nights
        # to catch up the ~43,838 suppliers with CH numbers.
        run: python agent/enrich-ch.py --limit 1000

      - name: Tag new big contracts with service category (procurement codes)
        # Incremental — only contracts where cpv_category IS NULL. Fast (~seconds).
        run: python agent/classify-by-cpv.py --only-untagged
        continue-on-error: true

      - name: Match new buyers to master list (fuzzy, threshold 95)
        # Strict-match writeback. ~8 min on full unmatched set; only safe matches.
        run: python agent/fuzzy-match-buyers.py --threshold 95 --apply
        continue-on-error: true

      - name: Export data for D1
        run: python agent/sync-d1.py

      - name: Sync to Cloudflare D1
        if: env.CLOUDFLARE_API_TOKEN != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: pwin-competitive-intel/workers
        run: npx wrangler d1 execute pwin-competitive-intel --file=../db/d1-sync.sql

      - name: Upload database artifact
        uses: actions/upload-artifact@v4
        with:
          name: bid-intel-db-${{ github.run_id }}
          path: pwin-competitive-intel/db/bid_intel.db
          retention-days: 30
