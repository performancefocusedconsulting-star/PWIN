<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PWIN Architect — Bid Execution Standard Operating Procedures v1</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg0:#080E1A;--bg1:#0F1724;--bg2:#162032;--bg3:#1D2B40;--bg4:#25354E;
  --bdr:#253551;--bdr-s:#1A2844;
  --gold:#C49438;--gold-d:rgba(196,148,56,.12);--gold-g:rgba(196,148,56,.06);
  --t1:#E8ECF1;--t2:#94A3B8;--t3:#64748B;--t4:#475569;
  --grn:#34D399;--grn-d:rgba(52,211,153,.10);
  --red:#F87171;--red-d:rgba(248,113,113,.10);
  --amb:#FBBF24;--amb-d:rgba(251,191,36,.10);
  --blu:#60A5FA;--blu-d:rgba(96,165,250,.10);
  --pur:#A78BFA;--pur-d:rgba(167,139,250,.10);
  --cyn:#22D3EE;--cyn-d:rgba(34,211,238,.10);
  --pink:#F472B6;--pink-d:rgba(244,114,182,.10);
  --lime:#A3E635;--lime-d:rgba(163,230,53,.10);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg0);color:var(--t1);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;}
.hdr{padding:16px 28px;border-bottom:1px solid var(--bdr-s);display:flex;align-items:center;justify-content:space-between;background:var(--bg1);}
.hdr-l{display:flex;align-items:baseline;gap:12px;}
.hdr-brand{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;font-style:italic;color:var(--gold);}
.hdr-sub{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);}
.hdr-v{font-family:'DM Mono',monospace;font-size:10px;color:var(--t4);background:var(--bg2);padding:3px 8px;border:1px solid var(--bdr);}
.nav{display:flex;gap:1px;padding:0 28px;background:var(--bg1);border-bottom:1px solid var(--bdr-s);overflow-x:auto;}
.nav-b{padding:9px 12px;font-family:'DM Mono',monospace;font-size:9.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--t3);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;}
.nav-b:hover{color:var(--t2);}.nav-b.on{color:var(--gold);border-bottom-color:var(--gold);}
.ct{padding:22px 28px;max-width:1440px;margin:0 auto;display:none;}
.ct.active{display:block;animation:fi .2s ease both;}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.sl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:5px;}
.st{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:var(--t1);margin-bottom:5px;line-height:1.2;}
.sd{color:var(--t2);font-size:12.5px;max-width:820px;margin-bottom:22px;line-height:1.7;}
.sh{font-size:15px;font-weight:700;color:var(--t1);margin:20px 0 8px;}
.sh2{font-size:13px;font-weight:600;color:var(--t1);margin:14px 0 6px;}
.sh3{font-size:12px;font-weight:600;color:var(--t2);margin:10px 0 4px;}
.bt{color:var(--t2);font-size:12.5px;line-height:1.7;margin-bottom:8px;max-width:820px;}
.cg{display:grid;gap:10px;margin-bottom:18px;}
.c2{grid-template-columns:repeat(2,1fr);}.c3{grid-template-columns:repeat(3,1fr);}.c4{grid-template-columns:repeat(4,1fr);}.c5{grid-template-columns:repeat(5,1fr);}
@media(max-width:1100px){.c4,.c5{grid-template-columns:1fr 1fr;}}
@media(max-width:700px){.c2,.c3,.c4,.c5{grid-template-columns:1fr;}}
.cd{background:var(--bg2);border:1px solid var(--bdr);padding:14px;position:relative;overflow:hidden;transition:all .15s;}
.cd:hover{background:var(--bg3);border-color:var(--gold);}
.cd::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;}
.cd.a-gold::before{background:var(--gold)}.cd.a-grn::before{background:var(--grn)}.cd.a-blu::before{background:var(--blu)}.cd.a-pur::before{background:var(--pur)}.cd.a-red::before{background:var(--red)}.cd.a-amb::before{background:var(--amb)}.cd.a-cyn::before{background:var(--cyn)}.cd.a-pink::before{background:var(--pink)}.cd.a-lime::before{background:var(--lime)}
.cd-n{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--gold);opacity:.3;position:absolute;top:8px;right:10px;}
.cd-l{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin-bottom:3px;}
.cd-t{font-size:13px;font-weight:700;color:var(--t1);margin-bottom:4px;}
.cd-b{color:var(--t2);font-size:11.5px;line-height:1.6;}
.co{padding:12px 14px;margin:12px 0;border-left:3px solid;background:var(--bg2);}
.co.co-g{border-color:var(--gold)}.co.co-v{border-color:var(--grn)}.co.co-b{border-color:var(--blu)}.co.co-r{border-color:var(--red)}.co.co-a{border-color:var(--amb)}.co.co-p{border-color:var(--pur)}
.co-l{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:3px;}
.co.co-g .co-l{color:var(--gold)}.co.co-v .co-l{color:var(--grn)}.co.co-b .co-l{color:var(--blu)}.co.co-r .co-l{color:var(--red)}.co.co-a .co-l{color:var(--amb)}.co.co-p .co-l{color:var(--pur)}
.co-t{color:var(--t2);font-size:12px;line-height:1.7;}
.tb{width:100%;border-collapse:collapse;margin:6px 0 16px;}
.tb th{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.05em;text-transform:uppercase;color:var(--t3);text-align:left;padding:6px 8px;border-bottom:1px solid var(--bdr);background:var(--bg4);}
.tb td{padding:6px 8px;font-size:11.5px;color:var(--t2);border-bottom:1px solid var(--bdr-s);vertical-align:top;line-height:1.5;}
.tb td:first-child{font-family:'DM Mono',monospace;font-size:11px;color:var(--t1);white-space:nowrap;}
.tb tr:hover td{background:var(--bg3);}
.fe{font-family:'DM Mono',monospace;font-size:9px;padding:1px 5px;border-radius:2px;display:inline-block;margin:1px 1px;}
.fe-g{color:var(--grn);background:var(--grn-d)}.fe-r{color:var(--red);background:var(--red-d)}.fe-a{color:var(--amb);background:var(--amb-d)}.fe-b{color:var(--blu);background:var(--blu-d)}.fe-p{color:var(--pur);background:var(--pur-d)}.fe-c{color:var(--cyn);background:var(--cyn-d)}.fe-pk{color:var(--pink);background:var(--pink-d)}.fe-gl{color:var(--gold);background:var(--gold-d)}.fe-lm{color:var(--lime);background:var(--lime-d)}
.sop-step{display:flex;gap:12px;margin:10px 0;align-items:flex-start;}
.sop-num{min-width:28px;height:28px;background:var(--gold-d);border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:700;color:var(--gold);flex-shrink:0;}
.sop-num.ai{background:var(--blu-d);border-color:var(--blu);color:var(--blu);}
.sop-num.plat{background:var(--grn-d);border-color:var(--grn);color:var(--grn);}
.sop-num.esc{background:var(--red-d);border-color:var(--red);color:var(--red);}
.sop-body{flex:1;}
.sop-title{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:2px;}
.sop-desc{color:var(--t2);font-size:11.5px;line-height:1.6;}
.sop-check{margin-top:4px;padding:6px 10px;background:var(--bg3);border-left:2px solid var(--grn);font-size:11px;color:var(--t2);line-height:1.5;}
.sop-warn{margin-top:4px;padding:6px 10px;background:var(--bg3);border-left:2px solid var(--red);font-size:11px;color:var(--t2);line-height:1.5;}
.leg{display:flex;gap:16px;margin:10px 0;flex-wrap:wrap;}
.leg-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t2);}
.leg-dot{width:10px;height:10px;border-radius:2px;}
.leg-dot.op{background:var(--gold);}.leg-dot.ai{background:var(--blu);}.leg-dot.pl{background:var(--grn);}.leg-dot.es{background:var(--red);}
.act-hdr{background:var(--bg2);border:1px solid var(--bdr);padding:12px 14px;margin:14px 0 0;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:background .15s;}
.act-hdr:hover{background:var(--bg3);}
.act-hdr-l{display:flex;align-items:center;gap:10px;}
.act-code{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;color:var(--gold);}
.act-name{font-size:13px;font-weight:600;color:var(--t1);}
.act-tags{display:flex;gap:4px;flex-wrap:wrap;}
.act-body{background:var(--bg2);border:1px solid var(--bdr);border-top:none;padding:14px;display:none;}
.act-body.open{display:block;}
.tog{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);transition:transform .15s;}.tog.op{transform:rotate(90deg);}
.fl{display:flex;align-items:stretch;gap:0;margin:14px 0;overflow-x:auto;}
.fl-n{flex:1;min-width:110px;background:var(--bg2);border:1px solid var(--bdr);padding:10px 8px;text-align:center;}
.fl-n.fl-on{border-color:var(--gold);background:var(--gold-g);}
.fl-a{display:flex;align-items:center;color:var(--t4);font-size:13px;padding:0 2px;}
.fl-nl{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);margin-bottom:1px;}
.fl-nt{font-size:10px;font-weight:600;color:var(--t1);margin-bottom:1px;}
.fl-nd{font-size:9px;color:var(--t2);line-height:1.2;}
.maturity{display:inline-block;padding:2px 6px;border-radius:2px;font-family:'DM Mono',monospace;font-size:9px;border:1px solid;}
.maturity.m-full{color:var(--grn);border-color:var(--grn);background:var(--grn-d);}
.maturity.m-part{color:var(--amb);border-color:var(--amb);background:var(--amb-d);}
.maturity.m-plan{color:var(--blu);border-color:var(--blu);background:var(--blu-d);}
.maturity.m-none{color:var(--t3);border-color:var(--t4);background:var(--bg3);}
@media print{body{background:#fff;color:#1a1a1a;font-size:11px;}.hdr,.nav{display:none;}.ct{display:block!important;padding:10px;}.act-body{display:block!important;}}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-l">
    <div class="hdr-brand">PWIN Architect</div>
    <div class="hdr-sub">Bid Execution &mdash; Standard Operating Procedures</div>
  </div>
  <div class="hdr-v">v1.0 &mdash; April 2026 &mdash; LIVING DOCUMENT</div>
</div>

<div class="nav" id="nav"></div>
<div id="app"></div>

<script>
const TABS=[
  {id:'purpose',l:'Purpose & Model'},
  {id:'setup',l:'Bid Setup'},
  {id:'develop',l:'Development Phase'},
  {id:'produce',l:'Production Phase'},
  {id:'post',l:'Post-Submission'},
  {id:'daily',l:'Daily Operations'},
  {id:'gates',l:'Gate Management'},
  {id:'escalation',l:'Escalation Rules'},
  {id:'maturity',l:'SOP Maturity'},
  {id:'next',l:'Next Session'}
];

const CONTENT={

/* ═══════════════════════════════════════════════════════════════════
   PURPOSE & MODEL
   ═══════════════════════════════════════════════════════════════════ */
purpose: `
<div class="sl">SOP Foundation</div>
<div class="st">Purpose, Operating Model & How to Use This Document</div>
<div class="sd">
  This SOP enables a Bid Coordinator — a junior or mid-level operator — to manage the full lifecycle of a complex bid using the PWIN platform.
  The methodology prescribes what to do. The platform tracks state and automates calculations. AI handles analysis and drafting. This SOP tells the operator exactly when to do what, and when to escalate.
</div>

<div class="sh">The Staffing Model</div>
<div class="bt">The SOP is designed around a three-tier operating model that replaces the traditional senior-bid-manager-does-everything approach.</div>

<div class="cg c3">
  <div class="cd a-gold">
    <div class="cd-n">1</div>
    <div class="cd-l">Bid Coordinator (Operator)</div>
    <div class="cd-t">Follows This SOP</div>
    <div class="cd-b">
      <strong>Profile:</strong> 1–3 years experience. Organised, process-oriented, comfortable with technology. Does not need deep bid strategy expertise.<br><br>
      <strong>Responsibilities:</strong> Bid setup, status tracking, nudge management, gate preparation, review coordination, progress reporting, deadline management, document management, standup facilitation.<br><br>
      <strong>Does NOT:</strong> Make strategic decisions, set win themes, design solutions, approve pricing, decide go/no-go.
    </div>
  </div>
  <div class="cd a-blu">
    <div class="cd-n">2</div>
    <div class="cd-l">AI Agents (6 Capability Agents)</div>
    <div class="cd-t">Automated by Platform</div>
    <div class="cd-b">
      <strong>Coverage:</strong> 55 skills across document intelligence, market research, strategy analysis, commercial modelling, content drafting, solution design support.<br><br>
      <strong>Responsibilities:</strong> ITT extraction, timeline analysis, compliance tracking, standup prioritisation, response drafting, governance pack assembly, effort forecasting.<br><br>
      <strong>Does NOT:</strong> Make decisions. All AI outputs are recommendations that the operator presents to the relevant workstream lead.
    </div>
  </div>
  <div class="cd a-red">
    <div class="cd-n">3</div>
    <div class="cd-l">Workstream Leads (Senior / SME)</div>
    <div class="cd-t">Escalation Points</div>
    <div class="cd-b">
      <strong>Profile:</strong> Senior bid managers, solution architects, commercial directors, legal counsel, delivery directors. Deep domain expertise.<br><br>
      <strong>Responsibilities:</strong> Strategic decisions, quality assurance, gate decisions, win theme approval, pricing sign-off, risk acceptance, client relationships.<br><br>
      <strong>Engaged:</strong> At defined escalation points. Not involved in day-to-day tracking — that is the operator's job.
    </div>
  </div>
</div>

<div class="co co-g">
  <div class="co-l">Design Principle</div>
  <div class="co-t">
    The operator follows the process. AI does the analysis. Senior people make the decisions.<br>
    This SOP eliminates the need for the senior bid manager to also be the project manager, the document controller, the progress chaser, and the meeting organiser. Those roles are procedural — they can be done by someone following this SOP with the platform's guidance.
  </div>
</div>

<div class="sh">Step Legend</div>
<div class="bt">Every procedure in this SOP uses coloured step markers to indicate who does the work.</div>
<div class="leg">
  <div class="leg-item"><div class="leg-dot op"></div> <strong>Operator</strong> — Bid Coordinator follows this step</div>
  <div class="leg-item"><div class="leg-dot ai"></div> <strong>AI</strong> — Platform AI skill executes this step</div>
  <div class="leg-item"><div class="leg-dot pl"></div> <strong>Platform</strong> — System calculates / automates</div>
  <div class="leg-item"><div class="leg-dot es"></div> <strong>Escalate</strong> — Senior person decides</div>
</div>

<div class="sh">How to Read Activity Procedures</div>
<div class="bt">Each activity in the SOP follows a consistent structure:</div>
<table class="tb">
  <tr><th>Section</th><th>What It Contains</th></tr>
  <tr><td>Purpose</td><td>What this activity achieves and why it matters to the bid</td></tr>
  <tr><td>Entry Conditions</td><td>What must be true before this activity can start. The platform enforces these — the operator confirms.</td></tr>
  <tr><td>Procedure</td><td>Numbered steps. Gold = operator. Blue = AI. Green = platform. Red = escalate to senior.</td></tr>
  <tr><td>Quality Criteria</td><td>How to verify the activity is complete to standard. The operator checks these before marking "draft complete".</td></tr>
  <tr><td>Exit &amp; Handoff</td><td>What happens next. Which downstream activities are unblocked. Who to notify.</td></tr>
  <tr><td>Common Mistakes</td><td>What operators typically get wrong. Read these before your first time running this activity.</td></tr>
</table>

<div class="sh">Reference Documents</div>
<div class="bt">This SOP does not duplicate the architecture or rules. It tells the operator what to do; the architecture says what exists; the rules say how state changes.</div>
<table class="tb">
  <tr><th>Document</th><th>Use When</th></tr>
  <tr><td>bid_execution_architecture_v6.html</td><td>Understanding modules, data model, activity definitions, L2/L3 methodology detail</td></tr>
  <tr><td>bid_execution_rules.html</td><td>Understanding state transitions, scoring formulae, threshold values, validation rules</td></tr>
  <tr><td>pwin_architect_plugin_architecture.md</td><td>Understanding AI agent capabilities, skill definitions, what AI can and cannot do</td></tr>
  <tr><td>This SOP</td><td>Day-to-day operations: what to do, when, in what order, and when to escalate</td></tr>
</table>

<div class="sh">Document Maturity</div>
<div class="co co-a">
  <div class="co-l">Living Document</div>
  <div class="co-t">
    This SOP is being built alongside the platform. Not every procedure is fully detailed yet. The <strong>SOP Maturity</strong> tab tracks which sections are complete, which are in draft, and which are placeholders.
    As each product feature is built, the corresponding SOP section is refined to match actual platform behaviour. The SOP is always one step behind the build — never speculative.
  </div>
</div>
`,

/* ═══════════════════════════════════════════════════════════════════
   BID SETUP
   ═══════════════════════════════════════════════════════════════════ */
setup: `
<div class="sl">Phase 0</div>
<div class="st">Bid Setup — 5-Stage Wizard</div>
<div class="sd">
  Every bid starts with the setup wizard. This creates the bid, selects the archetype, configures governance, assigns the team, and runs a feasibility check.
  Target: 30–45 minutes. The operator completes this with input from the Sales Lead (for strategy context) and the Bid Director (for governance configuration).
</div>

<div class="sh">Pre-Setup Checklist</div>
<div class="bt">Before opening the wizard, the operator must have these inputs ready.</div>
<table class="tb">
  <tr><th>Input</th><th>Source</th><th>Why Needed</th></tr>
  <tr><td>Pursuit name, reference, client, sector</td><td>CRM / Sales Lead</td><td>Basic identification — cannot be changed after setup</td></tr>
  <tr><td>ITT issue date &amp; submission deadline</td><td>ITT document</td><td>Drives the entire backward-planned schedule</td></tr>
  <tr><td>Total Contract Value (TCV) estimate</td><td>Sales Lead</td><td>Determines governance tier (which gates are required)</td></tr>
  <tr><td>Archetype selection</td><td>Sales Lead / Bid Director</td><td>Services, Technology/Digital, or Consulting/Advisory — drives which activities are active</td></tr>
  <tr><td>Complexity level</td><td>Bid Director</td><td>Standard, Complex, or Major — adjusts team sizes and effort estimates</td></tr>
  <tr><td>Team member names and roles</td><td>Resource manager / Bid Director</td><td>Assigns ownership of activities and workstreams</td></tr>
</table>

<div class="sh">Procedure: Wizard Stage 1 — Bid Identity</div>
<div class="sop-step">
  <div class="sop-num">1</div>
  <div class="sop-body">
    <div class="sop-title">Open new bid wizard</div>
    <div class="sop-desc">Navigate to Dashboard &rarr; New Bid. Enter pursuit name, client name, sector, reference number.</div>
  </div>
</div>
<div class="sop-step">
  <div class="sop-num">2</div>
  <div class="sop-body">
    <div class="sop-title">Enter key dates</div>
    <div class="sop-desc">ITT issue date, submission deadline, any known presentation date. These are the hard constraints the scheduler works backward from.</div>
    <div class="sop-warn"><strong>Warning:</strong> Submission deadline drives everything. If this date changes later, the entire schedule recalculates. Get it right.</div>
  </div>
</div>
<div class="sop-step">
  <div class="sop-num">3</div>
  <div class="sop-body">
    <div class="sop-title">Enter TCV and deal type</div>
    <div class="sop-desc">Total Contract Value (£), deal type (new business, rebid, framework call-off, etc.). TCV determines which governance gates are required.</div>
  </div>
</div>

<div class="sh">Procedure: Wizard Stage 2 — Archetype &amp; Complexity</div>
<div class="sop-step">
  <div class="sop-num">4</div>
  <div class="sop-body">
    <div class="sop-title">Select archetype</div>
    <div class="sop-desc">Choose Services, Technology/Digital, or Consulting/Advisory. This deactivates inapplicable activities (e.g. TUPE for Technology) and loads the correct L2/L3 content.</div>
    <div class="sop-check"><strong>Check:</strong> If unsure, ask the Sales Lead: "Is this primarily about people and operations (Services), technology delivery (Technology), or advisory expertise (Consulting)?"</div>
  </div>
</div>
<div class="sop-step">
  <div class="sop-num esc">5</div>
  <div class="sop-body">
    <div class="sop-title">ESCALATE: Confirm complexity level with Bid Director</div>
    <div class="sop-desc">Standard (base team sizes), Complex (2&times; parallelisable), Major (3&times; parallelisable). This is a resourcing decision — the operator does not make it alone.</div>
  </div>
</div>

<div class="sh">Procedure: Wizard Stage 3 — Activity Configuration</div>
<div class="sop-step">
  <div class="sop-num plat">6</div>
  <div class="sop-body">
    <div class="sop-title">PLATFORM: Auto-generates activity set</div>
    <div class="sop-desc">Platform creates 84 activities (minus deactivated by archetype), sets default effort estimates, calculates elapsed days, assigns to workstreams.</div>
  </div>
</div>
<div class="sop-step">
  <div class="sop-num">7</div>
  <div class="sop-body">
    <div class="sop-title">Review and adjust activity set</div>
    <div class="sop-desc">Walk through the activity list. Deactivate any activities not relevant to this specific bid (e.g. SUP workstream if no partners, BM-09 if not competitive dialogue). For each deactivated activity, record the reason.</div>
    <div class="sop-warn"><strong>Warning:</strong> Do NOT deactivate SAL-06 (Win Strategy Lock) or BM-10 (Storyboard Sign-off). These are methodology gates and are non-negotiable.</div>
  </div>
</div>

<div class="sh">Procedure: Wizard Stage 4 — Team Assignment</div>
<div class="sop-step">
  <div class="sop-num">8</div>
  <div class="sop-body">
    <div class="sop-title">Assign core team roles</div>
    <div class="sop-desc">Assign: Bid Manager (yourself or senior BM), Solution Lead, Commercial Lead, Delivery Lead, Legal Lead, Supply Chain Lead. Each must be a named person. One person per core role.</div>
  </div>
</div>

    <div class="sop-desc">Track POST-01 (design, 10 person-days, team of 2), POST-02 (rehearsals), POST-03 (delivery). Schedule rehearsal sessions. Ensure presenters have Q&A preparation packs.</div>
  </div>
</div>

<div class="sh">Procedure: Clarifications (POST-04)</div>
<div class="sop-step">

  <div class="sop-body">
    <div class="sop-title">Manage post-submission clarifications</div>

</div>
<div class="sop-step">
  <div class="sop-num ai">6</div>
  <div class="sop-body">

<div class="sh">Procedure: BAFO (POST-05, 06)</div>
<div class="sop-step">
  <div class="sop-num esc">7</div>

daily: `

</div>

<div class="sh">Daily Procedures (Every Working Day)</div>

<table class="tb">
  <tr><th>Time</th><th>Action</th><th>Duration</th><th>Detail</th></tr>
  <tr>
    <td>Morning</td>

    <td>Overall readiness, health status, new nudges. If health has deteriorated overnight (someone updated a status), investigate.</td>
  </tr>
  <tr>
    <td>Morning</td>
    <td>AI standup priorities</td>
    <td>2 min</td>
    <td>Run UC3. Get top 5 actions. This structures your day.</td>
  </tr>
  <tr>
    <td>Morning</td>
    <td>Process nudges</td>
    <td>10–15 min</td>

  </tr>
  <tr>
    <td>Standing</td>
    <td>Standup meeting (if held)</td>
    <td>15 min</td>

  <tr>
    <td>Afternoon</td>
    <td>Status update sweep</td>
    <td>10 min</td>

  </tr>
  <tr>
    <td>End of day</td>
    <td>Standup action closure</td>
    <td>5 min</td>

<table class="tb">
  <tr><th>Day</th><th>Action</th><th>Duration</th><th>Detail</th></tr>

/* ═══════════════════════════════════════════════════════════════════

gates: `
<div class="sl">Governance</div>
<div class="st">Gate Management — Operator Procedures</div>
<div class="sd">
  Governance gates are the operator's most visible responsibility. The Bid Director and executive panel make the decisions — the operator ensures the process runs flawlessly. A well-prepared gate review demonstrates operational maturity. A poorly prepared one signals a poorly managed bid.
</div>

<div class="sh">Gate Preparation Timeline</div>
<div class="bt">The platform auto-generates prep actions at the configured lead time. The operator executes each one.</div>

<div class="sh2">Functional Review (T-3 Lead Time)</div>
<div class="sop-step">
  <div class="sop-num">T-3</div>
  <div class="sop-body">
    <div class="sop-title">Pre-check entry criteria</div>
    <div class="sop-desc">Run the gate readiness assessment (UC9). Check each entry criterion: which activities have reached the required assurance level? Flag any that cannot be met by T-0. If criteria cannot be met, escalate immediately — do not wait until T-0 to discover the problem.</div>
  </div>
</div>
<div class="sop-step">
  <div class="sop-num">T-2</div>
  <div class="sop-body">
    <div class="sop-title">Assemble review pack</div>
    <div class="sop-desc">Run Governance Pack skill (Agent 5). AI generates: executive summary, entry criteria assessment, readiness dashboard snapshot, risk summary, decisions required. Review the pack for accuracy — AI assembles, you verify.</div>
  </div>
</div>
<div class="sop-step">
  <div class="sop-num">T-1</div>
  <div class="sop-body">
    <div class="sop-title">Circulate pack to review panel</div>
    <div class="sop-desc">Send the pack to the approving body. Confirm attendance. Ensure they have time to read before the session.</div>
  </div>
</div>
<div class="sop-step">
  <div class="sop-num">T-0</div>
  <div class="sop-body">
    <div class="sop-title">Conduct gate review</div>
    <div class="sop-desc">Facilitate the session. Present readiness dashboard. Record the decision: Approve / Approve with conditions / Revise / Reject / Defer. Record any risk premium applied. Record conditions.</div>
  </div>
</div>
<div class="sop-step">
  <div class="sop-num">T+1</div>
  <div class="sop-body">
    <div class="sop-title">Distribute decision and actions</div>
    <div class="sop-desc">Email the team: gate decision, any conditions, action owners, deadlines. Update the gate status in the platform. If approved: linked activities transition to "accepted at gate". If conditions: create standup actions for each condition.</div>
  </div>
</div>

<div class="sh2">Executive Review (T-5 or T-7 Lead Time)</div>
<div class="bt">Same process but with additional steps: T-5 pre-check, T-3 assemble board pack, T-2 circulate, T-1 brief presenters / pre-meeting with chair, T-0 conduct, T+1 distribute.</div>

<div class="sh">Gate Decision Processing</div>
<table class="tb">
  <tr><th>Decision</th><th>Operator Action</th></tr>
  <tr><td>Approved</td><td>Update gate status to "passed". All linked activities transition to "accepted at gate" assurance. Celebrate briefly. Move on.</td></tr>
  <tr><td>Approved with conditions</td><td>Update gate status to "passed". Record conditions as standup actions with owners and deadlines. Record any risk premium (% of TCV). Track condition resolution.</td></tr>
  <tr><td>Revise</td><td>Gate status stays "in_progress". Create actions for required revisions. Schedule re-presentation date. The bid continues but the gate is not cleared.</td></tr>
  <tr><td>Reject</td><td>Update gate status to "failed". Escalate to Bid Director for no-bid decision. This typically ends the bid. Ensure lessons are captured (BM-12).</td></tr>
  <tr><td>Defer</td><td>Update gate status to "deferred". Set new planned date. Revert to "upcoming" when rescheduled. Recalculate downstream impacts.</td></tr>
</table>

<div class="sh">Risk Premium Tracking</div>
<div class="sop-step">
  <div class="sop-num">1</div>
  <div class="sop-body">
    <div class="sop-title">Record risk premium at each gate</div>
    <div class="sop-desc">If the review panel applies a risk premium (additional % on price due to unmitigated risks), record: percentage, value (TCV &times; %), cause (which criteria were weak), approver. Platform aggregates across all gates: total premium = sum of all gate premiums.</div>
  </div>
</div>
<div class="sop-step">
  <div class="sop-num plat">2</div>
  <div class="sop-body">
    <div class="sop-title">PLATFORM: Calculates cumulative premium impact</div>
    <div class="sop-desc">System displays: "{total}% premium on £{TCV} = £{value} added to price". This is visible on the pricing dashboard. If cumulative premium makes the bid uncompetitive, the operator flags to the Commercial Lead.</div>
  </div>
</div>
`,

escalation: `
<div class="sl">Decision Boundaries</div>
<div class="st">Escalation Rules — When the Operator Stops and a Senior Person Decides</div>
<div class="sd">
  The most important section of this SOP. The operator follows process, but there are clear boundaries where a senior person must decide.
  Getting this wrong in either direction is costly: escalating too much wastes senior time; escalating too little risks the bid.
</div>

<div class="sh">Escalation Matrix</div>
<div class="bt">For each situation, who the operator escalates to, what information to provide, and how urgently.</div>

<table class="tb">
  <tr><th>Situation</th><th>Escalate To</th><th>Provide</th><th>Urgency</th></tr>
  <tr>
    <td>Feasibility check returns "infeasible"</td>
    <td>Bid Director</td>
    <td>Deficit days, critical path analysis, system recommendations</td>
    <td><span class="fe fe-r">IMMEDIATE</span></td>
  </tr>
  <tr>
    <td>SAL-06 (win strategy) not assured and production approaching</td>
    <td>Bid Director + Sales Lead</td>
    <td>SAL-06 status, blocking items, days until production must start</td>
    <td><span class="fe fe-r">IMMEDIATE</span></td>
  </tr>
  <tr>
    <td>BM-10 (storyboard) not assured and writers waiting</td>
    <td>Bid Director</td>
    <td>BM-10 status, writer availability, production timeline impact</td>
    <td><span class="fe fe-r">IMMEDIATE</span></td>
  </tr>
  <tr>
    <td>Health status transitions to red</td>
    <td>Bid Director</td>
    <td>Which readiness signal is dragging, root cause, AI timeline analysis</td>
    <td><span class="fe fe-r">IMMEDIATE</span></td>
  </tr>
  <tr>
    <td>Mandatory compliance gap within 10 days of submission</td>
    <td>Bid Director + relevant workstream lead</td>
    <td>Gap details, impact on disqualification risk, AI compliance coverage analysis</td>
    <td><span class="fe fe-r">IMMEDIATE</span></td>
  </tr>
  <tr>
    <td>Gate entry criteria cannot be met by planned date</td>
    <td>Bid Director + gate chair</td>
    <td>AI gate readiness assessment, unmet criteria, remediation options</td>
    <td><span class="fe fe-a">SAME DAY</span></td>
  </tr>
  <tr>
    <td>Response item below review threshold</td>
    <td>Bid Director</td>
    <td>Reviewer feedback, score, threshold, section importance (marks %)</td>
    <td><span class="fe fe-a">SAME DAY</span></td>
  </tr>
  <tr>
    <td>Critical review action overdue (&gt; 2 days)</td>
    <td>Section owner's workstream lead</td>
    <td>Action description, days overdue, impact on review cycle closure</td>
    <td><span class="fe fe-a">SAME DAY</span></td>
  </tr>
  <tr>
    <td>Cost-to-bid exceeds 120% of budget</td>
    <td>Bid Director</td>
    <td>AI bid cost forecast, budget burn rate, projected final cost</td>
    <td><span class="fe fe-a">SAME DAY</span></td>
  </tr>
  <tr>
    <td>ITT amendment received</td>
    <td>Bid Director + Sales Lead</td>
    <td>AI amendment impact analysis, affected sections, timeline impact</td>
    <td><span class="fe fe-a">SAME DAY</span></td>
  </tr>
  <tr>
    <td>Team member unexpectedly unavailable (&ge; 3 days)</td>
    <td>Bid Director</td>
    <td>Impact on owned activities, rescheduling options, replacement candidates</td>
    <td><span class="fe fe-b">NEXT STANDUP</span></td>
  </tr>
  <tr>
    <td>Activity stale for &gt; 5 days (no owner response)</td>
    <td>Workstream lead</td>
    <td>Activity details, days stale, owner contacted (when, how), no response</td>
    <td><span class="fe fe-b">NEXT STANDUP</span></td>
  </tr>
  <tr>
    <td>Governance gate decision = Reject</td>
    <td>Bid Director</td>
    <td>Gate decision record, reasons, whether appeal/re-presentation is possible</td>
    <td><span class="fe fe-r">IMMEDIATE</span></td>
  </tr>
</table>

<div class="sh">What the Operator Does NOT Decide</div>
<div class="co co-r">
  <div class="co-l">Hard Boundaries</div>
  <div class="co-t">
    The operator <strong>never</strong> makes these decisions, regardless of urgency:<br><br>
    &cross; Go / no-go on the bid<br>
    &cross; Win theme selection or modification<br>
    &cross; Solution design choices<br>
    &cross; Pricing levels or commercial terms<br>
    &cross; Risk acceptance (accepting unmitigated risks)<br>
    &cross; Gate approval decisions<br>
    &cross; Deactivating methodology gates (SAL-06, BM-10)<br>
    &cross; Overriding readiness caps (compliance gaps, non-compliance)<br>
    &cross; Accepting a response below review threshold for submission<br><br>
    If pressured to make any of these decisions, the operator's response is: <em>"I need the Bid Director to confirm that decision."</em>
  </div>
</div>

<div class="sh">What the Operator DOES Decide</div>
<div class="co co-v">
  <div class="co-l">Operator Authority</div>
  <div class="co-t">
    The operator has authority to make these decisions without escalation:<br><br>
    &check; Activity status updates (based on workstream lead confirmation)<br>
    &check; Standup action creation and closure<br>
    &check; Nudge processing (dismiss, acknowledge, start activity)<br>
    &check; Meeting scheduling and logistics<br>
    &check; Document management and version control<br>
    &check; Writer assignment to response sections (within agreed resource allocation)<br>
    &check; Review cycle creation and reviewer assignment (within agreed panel)<br>
    &check; Progress report distribution<br>
    &check; AI skill execution (running analysis, generating drafts, producing reports)<br>
    &check; Chasing overdue actions (escalating if no response)
  </div>
</div>
`,
