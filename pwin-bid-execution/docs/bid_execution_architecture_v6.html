<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PWIN Architect — Bid Execution Architecture v6</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg0:#080E1A;--bg1:#0F1724;--bg2:#162032;--bg3:#1D2B40;--bg4:#25354E;
  --bdr:#253551;--bdr-s:#1A2844;
  --gold:#C49438;--gold-d:rgba(196,148,56,.12);--gold-g:rgba(196,148,56,.06);
  --t1:#E8ECF1;--t2:#94A3B8;--t3:#64748B;--t4:#475569;
  --grn:#34D399;--grn-d:rgba(52,211,153,.10);
  --red:#F87171;--red-d:rgba(248,113,113,.10);
  --amb:#FBBF24;--amb-d:rgba(251,191,36,.10);
  --blu:#60A5FA;--blu-d:rgba(96,165,250,.10);
  --pur:#A78BFA;--pur-d:rgba(167,139,250,.10);
  --cyn:#22D3EE;--cyn-d:rgba(34,211,238,.10);
  --pink:#F472B6;--pink-d:rgba(244,114,182,.10);
  --lime:#A3E635;--lime-d:rgba(163,230,53,.10);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg0);color:var(--t1);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;}
.hdr{padding:16px 28px;border-bottom:1px solid var(--bdr-s);display:flex;align-items:center;justify-content:space-between;background:var(--bg1);}
.hdr-l{display:flex;align-items:baseline;gap:12px;}
.hdr-brand{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;font-style:italic;color:var(--gold);}
.hdr-sub{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);}
.hdr-v{font-family:'DM Mono',monospace;font-size:10px;color:var(--t4);background:var(--bg2);padding:3px 8px;border:1px solid var(--bdr);}
.nav{display:flex;gap:1px;padding:0 28px;background:var(--bg1);border-bottom:1px solid var(--bdr-s);overflow-x:auto;}
.nav-b{padding:9px 12px;font-family:'DM Mono',monospace;font-size:9.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--t3);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;}
.nav-b:hover{color:var(--t2);}.nav-b.on{color:var(--gold);border-bottom-color:var(--gold);}
.ct{padding:22px 28px;max-width:1440px;margin:0 auto;animation:fi .2s ease both;}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.sl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:5px;}
.st{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:var(--t1);margin-bottom:5px;line-height:1.2;}
.sd{color:var(--t2);font-size:12.5px;max-width:780px;margin-bottom:22px;line-height:1.7;}
.sh{font-size:15px;font-weight:700;color:var(--t1);margin:20px 0 8px;}
.sh2{font-size:13px;font-weight:600;color:var(--t1);margin:14px 0 6px;}
.bt{color:var(--t2);font-size:12.5px;line-height:1.7;margin-bottom:8px;max-width:820px;}
.cg{display:grid;gap:10px;margin-bottom:18px;}
.c2{grid-template-columns:repeat(2,1fr);}.c3{grid-template-columns:repeat(3,1fr);}.c4{grid-template-columns:repeat(4,1fr);}.c5{grid-template-columns:repeat(5,1fr);}
@media(max-width:1100px){.c4,.c5{grid-template-columns:1fr 1fr;}}
@media(max-width:700px){.c2,.c3,.c4,.c5{grid-template-columns:1fr;}}
.cd{background:var(--bg2);border:1px solid var(--bdr);padding:14px;position:relative;overflow:hidden;transition:all .15s;}
.cd:hover{background:var(--bg3);border-color:var(--gold);}
.cd::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;}
.cd.a-gold::before{background:var(--gold)}.cd.a-grn::before{background:var(--grn)}.cd.a-blu::before{background:var(--blu)}.cd.a-pur::before{background:var(--pur)}.cd.a-red::before{background:var(--red)}.cd.a-amb::before{background:var(--amb)}.cd.a-cyn::before{background:var(--cyn)}.cd.a-pink::before{background:var(--pink)}.cd.a-lime::before{background:var(--lime)}
.cd-n{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--gold);opacity:.3;position:absolute;top:8px;right:10px;}
.cd-l{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin-bottom:3px;}
.cd-t{font-size:13px;font-weight:700;color:var(--t1);margin-bottom:4px;}
.cd-b{color:var(--t2);font-size:11.5px;line-height:1.6;}
.co{padding:12px 14px;margin:12px 0;border-left:3px solid;background:var(--bg2);}
.co.co-g{border-color:var(--gold)}.co.co-v{border-color:var(--grn)}.co.co-b{border-color:var(--blu)}.co.co-r{border-color:var(--red)}
.co-l{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:3px;}
.co.co-g .co-l{color:var(--gold)}.co.co-v .co-l{color:var(--grn)}.co.co-b .co-l{color:var(--blu)}.co.co-r .co-l{color:var(--red)}
.co-t{color:var(--t2);font-size:12px;line-height:1.7;}
.sg{display:grid;grid-template-columns:160px 1fr;gap:0;margin:10px 0;border:1px solid var(--bdr);}
.sg-k{padding:7px 10px;font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);background:var(--bg4);border-bottom:1px solid var(--bdr-s);}
.sg-v{padding:7px 10px;font-size:12px;color:var(--t2);border-bottom:1px solid var(--bdr-s);line-height:1.5;}
.ent{background:var(--bg2);border:1px solid var(--bdr);margin-bottom:7px;overflow:hidden;}
.ent-h{padding:10px 12px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background .15s;}
.ent-h:hover{background:var(--bg3);}
.ent-nm{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:var(--t1);}
.ent-bg{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.1em;text-transform:uppercase;padding:2px 6px;border:1px solid;border-radius:2px;}
.bg-p{color:var(--blu);border-color:var(--blu)}.bg-a{color:var(--grn);border-color:var(--grn)}.bg-pr{color:var(--pur);border-color:var(--pur)}.bg-g{color:var(--gold);border-color:var(--gold)}.bg-s{color:var(--amb);border-color:var(--amb)}.bg-bm{color:var(--lime);border-color:var(--lime)}.bg-ps{color:var(--pink);border-color:var(--pink)}
.ent-bd{padding:0 12px 10px;border-top:1px solid var(--bdr-s);}
.ent-desc{color:var(--t2);font-size:11.5px;padding-top:8px;margin-bottom:6px;line-height:1.6;}
.tog{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);transition:transform .15s;}.tog.op{transform:rotate(90deg);}
.tb{width:100%;border-collapse:collapse;margin:6px 0;}
.tb th{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.05em;text-transform:uppercase;color:var(--t3);text-align:left;padding:5px 7px;border-bottom:1px solid var(--bdr);background:var(--bg4);}
.tb td{padding:5px 7px;font-size:11.5px;color:var(--t2);border-bottom:1px solid var(--bdr-s);vertical-align:top;line-height:1.5;}
.tb td:first-child{font-family:'DM Mono',monospace;font-size:11px;color:var(--t1);white-space:nowrap;}
.ft{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);}
.fe{font-family:'DM Mono',monospace;font-size:9px;padding:1px 5px;border-radius:2px;display:inline-block;margin:1px 1px;}
.fe-g{color:var(--grn);background:var(--grn-d)}.fe-r{color:var(--red);background:var(--red-d)}.fe-a{color:var(--amb);background:var(--amb-d)}.fe-b{color:var(--blu);background:var(--blu-d)}.fe-p{color:var(--pur);background:var(--pur-d)}.fe-c{color:var(--cyn);background:var(--cyn-d)}.fe-pk{color:var(--pink);background:var(--pink-d)}.fe-gl{color:var(--gold);background:var(--gold-d)}.fe-lm{color:var(--lime);background:var(--lime-d)}
.ws-sales{color:var(--gold)}.ws-solution{color:var(--blu)}.ws-commercial{color:var(--grn)}.ws-legal{color:var(--pink)}.ws-delivery{color:var(--amb)}.ws-supply{color:var(--cyn)}.ws-governance{color:var(--pur)}.ws-production{color:var(--red)}.ws-bidmgmt{color:var(--lime)}.ws-postsub{color:var(--pink)}
.ph{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.06em;text-transform:uppercase;padding:2px 5px;border:1px solid;border-radius:2px;display:inline-block;}
.ph-d{color:var(--blu);border-color:var(--blu)}.ph-p{color:var(--red);border-color:var(--red)}.ph-c{color:var(--pur);border-color:var(--pur)}.ph-ps{color:var(--pink);border-color:var(--pink)}
.fl{display:flex;align-items:stretch;gap:0;margin:14px 0;overflow-x:auto;}
.fl-n{flex:1;min-width:90px;background:var(--bg2);border:1px solid var(--bdr);padding:10px 8px;text-align:center;}
.fl-n.fl-on{border-color:var(--gold);background:var(--gold-g);}
.fl-n.fl-grn{border-color:var(--grn);background:var(--grn-d);}
.fl-n.fl-amb{border-color:var(--amb);background:var(--amb-d);}
.fl-n.fl-pk{border-color:var(--pink);background:var(--pink-d);}
.fl-a{display:flex;align-items:center;color:var(--t4);font-size:13px;padding:0 2px;}
.fl-nl{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);margin-bottom:1px;}
.fl-nt{font-size:10px;font-weight:600;color:var(--t1);margin-bottom:1px;}
.fl-nd{font-size:9px;color:var(--t2);line-height:1.2;}
.wiz-step{display:flex;gap:12px;margin:12px 0;align-items:flex-start;}
.wiz-num{min-width:38px;height:38px;background:var(--gold-d);border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--gold);flex-shrink:0;}
.wiz-body{flex:1;}
.wiz-title{font-size:14px;font-weight:700;color:var(--t1);margin-bottom:3px;}
.wiz-desc{color:var(--t2);font-size:12px;line-height:1.6;}
.wiz-fields{margin-top:6px;display:flex;flex-wrap:wrap;gap:4px;}
.wiz-field{font-family:'DM Mono',monospace;font-size:9px;padding:2px 7px;border:1px solid var(--bdr);background:var(--bg3);color:var(--t2);}
.wiz-field.req{border-color:var(--gold);color:var(--gold);}
.wiz-field.opt{border-color:var(--t4);color:var(--t3);border-style:dashed;}
.wiz-output{margin-top:6px;padding:7px 10px;background:var(--bg3);border-left:2px solid var(--grn);font-size:11.5px;color:var(--t2);line-height:1.5;}
.wiz-output strong{color:var(--grn);}
.dm{margin:10px 0;overflow-x:auto;}
.dm table{border-collapse:collapse;width:100%;}
.dm th,.dm td{padding:4px 6px;text-align:center;font-size:10px;border:1px solid var(--bdr-s);}
.dm th{background:var(--bg4);font-family:'DM Mono',monospace;color:var(--t3);}
.dm .dep-mark{color:var(--cyn);font-weight:700;font-size:12px;}
.dm .gate-mark{color:var(--pur);font-weight:700;font-size:12px;}
/* UX wireframe styles */
.ux-frame{background:var(--bg3);border:1px solid var(--bdr);padding:14px;margin:8px 0;}
.ux-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.ux-col{flex:1;min-width:140px;}
.ux-box{background:var(--bg2);border:1px dashed var(--bdr);padding:8px;margin-bottom:6px;min-height:40px;}
.ux-box-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:4px;}
.ux-box-content{font-size:11px;color:var(--t2);line-height:1.5;}
.ux-metric{text-align:center;padding:8px;background:var(--bg2);border:1px solid var(--bdr);}
.ux-metric-val{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;}
.ux-metric-lbl{font-family:'DM Mono',monospace;font-size:8px;color:var(--t3);letter-spacing:.06em;text-transform:uppercase;}
.scroll-h{font-family:'DM Mono',monospace;font-size:9px;color:var(--t4);text-align:right;margin-bottom:2px;}
</style>
</head>
<body>
<div id="app"></div>
<script>
const TABS=[
  {id:'overview',l:'Overview'},
  {id:'setup',l:'Bid Setup'},
  {id:'lifecycle',l:'Lifecycle'},
  {id:'archetype',l:'Archetype'},
  {id:'deps',l:'Dependencies'},
  {id:'modules',l:'Modules'},
  {id:'data',l:'Data Model'},
  {id:'ux',l:'UX Design'},
  {id:'build',l:'Build'},
];
let tab='overview',exp={};
function setTab(t){tab=t;render();}
function tog(id){exp[id]=!exp[id];render();}
function render(){
  document.getElementById('app').innerHTML=`
    <div class="hdr"><div class="hdr-l"><div class="hdr-brand">PWIN Architect</div><div class="hdr-sub">Bid Execution · Architecture v6</div></div><div class="hdr-v">v6.0 · March 2026</div></div>
    <div class="nav">${TABS.map(t=>`<button class="nav-b ${tab===t.id?'on':''}" onclick="setTab('${t.id}')">${t.l}</button>`).join('')}</div>
    <div class="ct" key="${tab}">${R[tab]()}</div>`;
}
const R={};

// ═══════════════════════════════════════
// WORKSTREAM DATA (shared across tabs)
// ═══════════════════════════════════════
// Activity fields: id, n=name, o=output, d=dependencies, dur=effortDays, ts=teamSize(standard), pt=parallelisation(P/S/C), dt=depThreshold override
// pt: P=parallelisable (more people = shorter), S=specialist (always 1), C=coordination (scales with complexity but doesn't shorten)
// dt on a dep: 'ip'=in_progress (soft/early start), default=draft_complete (hard), 'fn'=final (conservative)
// Dependencies marked ★SOFT can begin preparatory work before predecessor completes
const WS=[
  {id:'SAL',name:'Sales & Capture',cls:'sales',ph:'DEV',acts:[
    {id:'SAL-01',n:'Customer engagement & intelligence gathering',o:'Customer intelligence briefing',d:[],dur:10,ts:1,pt:'S'},
    {id:'SAL-02',n:'Incumbent performance review (rebid)',o:'Incumbent performance assessment',d:[],dur:5,ts:1,pt:'S'},
    {id:'SAL-03',n:'Competitor analysis & positioning',o:'Competitive landscape assessment',d:['SAL-01'],dur:5,ts:1,pt:'S'},
    {id:'SAL-04',n:'Win theme development & refinement',o:'Win theme document',d:['SAL-01','SAL-03'],dur:5,ts:1,pt:'S'},
    {id:'SAL-05',n:'Evaluation criteria mapping & scoring strategy',o:'Evaluation criteria matrix with scoring approach',d:['SAL-04'],dur:3,ts:1,pt:'S'},
    {id:'SAL-06',n:'Capture plan finalisation & win strategy lock',o:'Capture plan (locked) — METHODOLOGY GATE',d:['SAL-04','SAL-05'],dur:3,ts:1,pt:'S'},
    {id:'SAL-07',n:'Pre-submission clarification strategy & drafting',o:'Clarification question register (prioritised)',d:['SAL-04','SOL-01'],dur:3,ts:2,pt:'P'},
    {id:'SAL-08',n:'Clarification submission & response management',o:'Clarification response log with impact assessment',d:['SAL-07'],dur:5,ts:1,pt:'C'},
    {id:'SAL-09',n:'Clarification impact analysis & workstream updates',o:'Updated requirements/assumptions across workstreams',d:['SAL-08'],dur:3,ts:2,pt:'P'},
  ]},
  {id:'SOL',name:'Solution Design',cls:'solution',ph:'DEV',acts:[
    {id:'SOL-01',n:'Requirements analysis & interpretation',o:'Requirements interpretation document',d:['SAL-06'],dur:5,ts:2,pt:'P'},
    {id:'SOL-02',n:'Current service model review (rebid)',o:'As-is service model assessment',d:[],dur:5,ts:1,pt:'S'},
    {id:'SOL-03',n:'Target operating model design',o:'Target operating model',d:['SOL-01','SOL-02'],dur:45,ts:3,pt:'P'},
    {id:'SOL-04',n:'Service delivery model design',o:'Service delivery model',d:['SOL-03'],dur:30,ts:3,pt:'P'},
    {id:'SOL-05',n:'Technology & digital approach',o:'Technology solution design',d:['SOL-03','SUP-02'],dur:20,ts:2,pt:'P'},
    {id:'SOL-06',n:'Staffing model & TUPE analysis',o:'Staffing model with TUPE schedule',d:['SOL-04'],dur:8,ts:1,pt:'S'},
    {id:'SOL-07',n:'Transition & mobilisation approach',o:'Transition plan',d:['SOL-04','SOL-05','SOL-06'],dur:16,ts:2,pt:'P'},
    {id:'SOL-08',n:'Innovation & continuous improvement',o:'Innovation roadmap',d:['SOL-03'],dur:5,ts:1,pt:'S'},
    {id:'SOL-09',n:'Social value proposition',o:'Social value plan',d:['SOL-04'],dur:5,ts:1,pt:'S'},
    {id:'SOL-10',n:'Evidence strategy & case study identification',o:'Evidence requirements matrix',d:['SOL-04','SAL-05'],dur:3,ts:1,pt:'S'},
    {id:'SOL-11',n:'Solution design lock',o:'Solution design pack (locked & assured)',d:['SOL-03','SOL-04','SOL-05','SOL-06','SOL-07','SOL-08','SOL-09','SOL-10'],dur:3,ts:1,pt:'C'},
  ]},
  {id:'COM',name:'Commercial & Pricing',cls:'commercial',ph:'DEV',acts:[
    {id:'COM-01',n:'Should-cost model development',o:'Should-cost model',d:['SOL-04','SOL-06'],dur:8,ts:1,pt:'S'},
    {id:'COM-02',n:'Price-to-win analysis',o:'Price-to-win assessment',d:['SAL-03','COM-01'],dur:3,ts:1,pt:'S'},
    {id:'COM-03',n:'Subcontractor & supply chain pricing',o:'Partner pricing schedule',d:['SUP-04'],dur:5,ts:1,pt:'S'},
    {id:'COM-04',n:'Commercial model & payment mechanisms',o:'Commercial model document',d:['SOL-04','LEG-02'],dur:5,ts:1,pt:'S'},
    {id:'COM-05',n:'Margin structure & sensitivity analysis',o:'Margin model with sensitivities',d:['COM-01','COM-03'],dur:3,ts:1,pt:'S'},
    {id:'COM-06',n:'Pricing model finalisation',o:'Pricing model (locked & assured)',d:['COM-01','COM-02','COM-03','COM-04','COM-05','DEL-01'],dur:5,ts:1,pt:'S'},
  ]},
  {id:'LEG',name:'Legal & Contractual',cls:'legal',ph:'DEV',acts:[
    {id:'LEG-01',n:'Contract review & markup',o:'Contract markup with positions log',d:[],dur:8,ts:1,pt:'S'},
    {id:'LEG-02',n:'Risk allocation analysis',o:'Risk allocation matrix',d:['LEG-01'],dur:3,ts:1,pt:'S'},
    {id:'LEG-03',n:'Insurance & liability review',o:'Insurance requirements assessment',d:[],dur:3,ts:1,pt:'S'},
    {id:'LEG-04',n:'TUPE obligations assessment',o:'TUPE compliance assessment',d:['SOL-06'],dur:5,ts:1,pt:'S'},
    {id:'LEG-05',n:'Data protection & security review',o:'DPIA / security assessment',d:['SOL-05'],dur:5,ts:1,pt:'S'},
    {id:'LEG-06',n:'Subcontractor terms review',o:'Subcontract terms summary',d:['SUP-03','LEG-01'],dur:5,ts:1,pt:'S'},
  ]},
  {id:'DEL',name:'Programme & Delivery',cls:'delivery',ph:'DEV',acts:[
    {id:'DEL-01',n:'Delivery risk & assumptions register',o:'Delivery risk & assumptions register (living document)',d:['SOL-03','SOL-04'],dur:8,ts:1,pt:'S'},
    {id:'DEL-02',n:'Mobilisation & implementation planning',o:'Mobilisation plan',d:['SOL-07'],dur:5,ts:1,pt:'S'},
    {id:'DEL-03',n:'Performance framework & KPIs/SLAs',o:'KPI/SLA framework',d:[],dur:5,ts:1,pt:'S'},
    {id:'DEL-04',n:'Resource & capacity plan',o:'Resource plan',d:['SOL-06'],dur:3,ts:1,pt:'S'},
    {id:'DEL-05',n:'Business continuity & exit planning',o:'BC/exit plan',d:[],dur:3,ts:1,pt:'S'},
    {id:'DEL-06',n:'Risk mitigation & residual acceptance',o:'Mitigated risk register (assured)',d:['DEL-01','COM-06'],dur:5,ts:1,pt:'S'},
  ]},
  {id:'SUP',name:'Supply Chain & Partners',cls:'supply',ph:'DEV',acts:[
    {id:'SUP-01',n:'Partner identification & selection',o:'Partner shortlist with rationale',d:['SOL-01'],dur:5,ts:1,pt:'S'},
    {id:'SUP-02',n:'Partner solution inputs & design contribution',o:'Partner solution inputs pack',d:['SUP-01','SOL-03'],dur:10,ts:2,pt:'P'},
    {id:'SUP-03',n:'Teaming agreement negotiation',o:'Signed teaming agreements',d:['SUP-01'],dur:15,ts:1,pt:'S'},
    {id:'SUP-04',n:'Partner pricing',o:'Partner pricing schedules',d:['SUP-02','SOL-04'],dur:8,ts:1,pt:'S'},
    {id:'SUP-05',n:'Partner credentials & references',o:'Partner case studies & CVs',d:['SUP-01'],dur:5,ts:2,pt:'P'},
    {id:'SUP-06',n:'Back-to-back commercial terms',o:'Back-to-back terms agreed',d:['SUP-03','LEG-06','COM-04'],dur:5,ts:1,pt:'S'},
  ]},
  {id:'BM',name:'Bid Management & Programme Control',cls:'bidmgmt',ph:'CONT',acts:[
    {id:'BM-01',n:'Kickoff planning & execution',o:'Kickoff pack: strategy summary, RACI, timeline, comms plan',d:['SAL-06'],dur:3,ts:1,pt:'C'},
    {id:'BM-02',n:'Bid management plan production',o:'Bid management plan (BMP)',d:['BM-01'],dur:2,ts:1,pt:'C'},
    {id:'BM-03',n:'Document management & version control setup',o:'Repository structure, naming conventions, collaboration platform',d:['BM-01'],dur:1,ts:1,pt:'C'},
    {id:'BM-04',n:'Resource management & tracking',o:'Resource tracker, security clearance log, availability register',d:['BM-01'],dur:0,ts:1,pt:'C'},

      <tr><td><span class="fe fe-gl">Win Strategy Lock</span></td><td>SAL-06 must reach "assured"</td><td>Solution design (SOL-03+) proceeding without a confirmed win strategy. Solution that drifts because there's no agreed strategic direction.</td></tr>
      <tr><td><span class="fe fe-gl">Storyboard Sign-off</span></td><td>BM-10 must reach "assured"</td><td>Section drafting (PRD-02) starting before the response structure is approved. Writing that will need rewriting because the storyboard changed.</td></tr>
    </tbody>
  </table>

  <div class="sh">Activity Status vs Output Assurance</div>
  <div class="cg c2">
    <div class="cd a-blu"><div class="cd-t">Activity Status (is it done?)</div><div class="cd-b"><span class="fe fe-b">not started</span> <span class="fe fe-b">in progress</span> <span class="fe fe-a">draft complete</span> <span class="fe fe-g">final</span> <span class="fe fe-p">deactivated</span></div></div>
    <div class="cd a-grn"><div class="cd-t">Output Assurance (is it any good?)</div><div class="cd-b"><span class="fe fe-r">unassured</span> <span class="fe fe-a">under review</span> <span class="fe fe-g">assured</span> <span class="fe fe-p">accepted at gate</span></div></div>
  </div>

  <div class="sh">Post-Submission Phase</div>
  <div class="bt">The system tracks post-submission activities because your fee exposure continues until award. Not all post-submission activities apply to every bid — presentation, BAFO, and negotiation stages are activated during setup based on procurement type. The system monitors post-submission health on the practice portfolio the same way it monitors pre-submission readiness.</div>

  <div class="sh">Risk & Assumptions Register</div>
  <div class="bt">DEL-01 is the home for both risks and assumptions. It is a living activity maintained throughout the bid. Each entry has: description, type (risk or assumption), probability, impact, mitigation/validation status, owner, source activity, and impact if wrong. Unmitigated high risks or unvalidated assumptions at governance gates trigger contingency loading — the risk premium mechanism. The register's assurance status is a gate entry criterion.</div>
`;

R.archetype=()=>`
  <div class="sl">Services Bid Archetype</div>
  <div class="st">Standard Operating Model — Services (New Business / Rebid)</div>
  <div class="sd">Every activity carries effortDays (person-days), teamSize (standard default), and parallelisation type. Effort for parallelisable activities reflects total person-days. Elapsed = effort ÷ team + 20% overhead. BM-13 (bid risk register) added. LEG-03, DEL-03, DEL-05 dependencies relaxed to zero (can start day one).</div>

  <div class="co co-g"><div class="co-l">Effort vs Elapsed</div><div class="co-t">The 'Effort' column shows person-days of work. 'Team' shows concurrent workers (standard complexity). 'Elapsed' is calculated: CEIL((effort/team) × (1 + (team-1) × 0.20)). Example: SOL-03 = 45 person-days ÷ 3 people × 1.40 overhead = 21 elapsed days. The bid complexity selector in setup adjusts team sizes: complex ≈ 2× parallelisable activities, major ≈ 3×.</div></div>

  <div class="sh">Bid Complexity Defaults (Setup Stage 2)</div>
  <table class="tb">
    <thead><tr><th>Complexity</th><th>Total Team</th><th>P-Type Multiplier</th><th>SOL-03 Team</th><th>SOL-03 Elapsed</th><th>PRD-02 Team</th><th>PRD-02 Elapsed</th></tr></thead>
    <tbody>
      <tr><td>Standard</td><td>8–12</td><td>1× (template)</td><td>3</td><td>21 days</td><td>4</td><td>22 days</td></tr>
      <tr><td>Complex</td><td>15–25</td><td>~2×</td><td>5</td><td>17 days</td><td>6</td><td>16 days</td></tr>
      <tr><td>Major</td><td>25–40</td><td>~3×</td><td>7</td><td>14 days</td><td>8</td><td>14 days</td></tr>
    </tbody>
  </table>

  <div class="sh">Zero-Dependency Activities (Start Day One)</div>
  <div class="cg c4">
    ${['SAL-01: Customer intel','SAL-02: Incumbent review','SOL-02: Current service model','LEG-01: Contract review','LEG-03: Insurance review','DEL-03: KPI/SLA framework','DEL-05: BC/exit planning','BM-13: Bid risk register'].map(a=>`<div class="cd a-grn" style="padding:8px;"><div class="cd-b" style="font-family:'DM Mono',monospace;font-size:10px;">${a}</div></div>`).join('')}
  </div>

  <div class="sh">Activity Parallelisation Types</div>
  <div class="cg c3">
    <div class="cd a-blu"><div class="cd-t"><span class="fe fe-b">P</span> Parallelisable</div><div class="cd-b">More people = shorter elapsed time. Solution design, evidence assembly, drafting, partner inputs. Team size scales with bid complexity.</div></div>
    <div class="cd a-gold"><div class="cd-t"><span class="fe fe-gl">S</span> Specialist</div><div class="cd-b">Always team size 1. Legal review, pricing model, TUPE analysis, data protection. Adding people doesn't help — one expert does the work.</div></div>
    <div class="cd a-pur"><div class="cd-t"><span class="fe fe-p">C</span> Coordination</div><div class="cd-b">Effort increases with bid complexity but doesn't parallelise. Kickoff, governance, reviews, progress reporting. Bid manager's operational overhead.</div></div>
  </div>

  <div class="cg c5" style="margin-bottom:10px;">
    <div class="cd a-gold" style="text-align:center;padding:8px;"><div class="cd-t" style="font-family:'Cormorant Garamond',serif;font-size:22px;">10</div><div class="cd-b">Workstreams</div></div>
    <div class="cd a-blu" style="text-align:center;padding:8px;"><div class="cd-t" style="font-family:'Cormorant Garamond',serif;font-size:22px;">${totalActs}</div><div class="cd-b">Activities</div></div>
    <div class="cd a-grn" style="text-align:center;padding:8px;"><div class="cd-t" style="font-family:'Cormorant Garamond',serif;font-size:22px;">${totalDeps}</div><div class="cd-b">Dependencies</div></div>
    <div class="cd a-amb" style="text-align:center;padding:8px;"><div class="cd-t" style="font-family:'Cormorant Garamond',serif;font-size:22px;">${totalDays}</div><div class="cd-b">Effort (person-days)</div></div>
    <div class="cd a-cyn" style="text-align:center;padding:8px;"><div class="cd-t" style="font-family:'Cormorant Garamond',serif;font-size:22px;">~55</div><div class="cd-b">Critical path (elapsed)</div></div>
  </div>

  ${WS.map(w=>`
    <div class="ent">
      <div class="ent-h" onclick="tog('ws-${w.id}')">
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="tog ${exp['ws-'+w.id]?'op':''}">▸</span>
          <span class="ent-nm"><span class="ws-${w.cls}">${w.id}</span> — ${w.name}</span>
          <span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--t3);">${w.acts.length} acts · ${w.acts.reduce((s,a)=>s+a.dur,0)} person-days</span>
        </div>
        <span class="ph ${w.ph==='DEV'?'ph-d':w.ph==='PRD'?'ph-p':w.ph==='POST'?'ph-ps':'ph-c'}">${w.ph==='DEV'?'Development':w.ph==='PRD'?'Production':w.ph==='POST'?'Post-Submission':'Continuous'}</span>
      </div>
      ${exp['ws-'+w.id]?`
        <div class="ent-bd"><div class="scroll-h">← scroll →</div><div style="overflow-x:auto;">
        <table class="tb" style="min-width:850px;">
          <thead><tr><th style="width:55px;">ID</th><th>Activity</th><th>Output</th><th style="width:45px;">Effort</th><th style="width:35px;">Team</th><th style="width:30px;">Type</th><th style="width:170px;">Dependencies</th></tr></thead>
          <tbody>${w.acts.map(a=>{
            const elapsed=a.ts<=1?a.dur:Math.ceil((a.dur/a.ts)*(1+(a.ts-1)*0.2));
            return `<tr><td><span class="ws-${w.cls}">${a.id}</span></td><td style="color:var(--t1);">${a.n}</td><td style="font-style:italic;font-size:11px;">${a.o}</td><td style="text-align:center;">${a.dur||'—'}</td><td style="text-align:center;">${a.ts}</td><td style="text-align:center;"><span class="fe ${a.pt==='P'?'fe-b':a.pt==='S'?'fe-gl':'fe-p'}">${a.pt}</span></td><td>${a.d.length?a.d.map(d=>`<span class="fe fe-c">${d}</span>`).join(' '):'<span style="color:var(--grn);">DAY ONE</span>'}</td></tr>`;
          }).join('')}</tbody>
        </table></div></div>
      `:''}
    </div>
  `).join('')}

  <div class="co co-b"><div class="co-l">Dependency Notes</div><div class="co-t">LEG-03 (insurance review) — dependency on LEG-01 removed; can begin from tender requirements independently. DEL-03 (KPI/SLA framework) — dependency on SOL-04 removed; draft framework can be built from tender-specified KPIs, refined when solution locks. DEL-05 (BC/exit planning) — dependency on SOL-04 removed; standard structure can be drafted early, populated with solution specifics later. All dependency thresholds default to 'draft_complete' but can be overridden to 'in_progress' (early start) or 'final' (conservative) per dependency in setup.</div></div>
`;

    <div class="ent"><div class="ent-h" onclick="tog('e-${e.id}')"><div style="display:flex;align-items:center;gap:8px;"><span class="tog ${exp['e-'+e.id]?'op':''}">▸</span><span class="ent-nm">${e.id}</span></div><span class="ent-bg ${e.bg}">${e.bg.replace('bg-','')}</span></div>
    ${exp['e-'+e.id]?`<div class="ent-bd"><div class="ent-desc">${e.d}</div><table class="tb"><thead><tr><th>Field</th><th>Type</th></tr></thead><tbody>${e.f.map(([n,t])=>`<tr><td>${n}</td><td><span class="ft">${t}</span></td></tr>`).join('')}</tbody></table></div>`:''}
    </div>
  `).join('')}
`;

// UX DESIGN
// ═══════════════════════════════════════
R.ux=()=>`
  <div class="sl">UX Specifications</div>
  <div class="st">Screen Design for All Nine Modules</div>
  <div class="sd">Complete screen-by-screen specification for every module. Layout, primary and secondary views, key interactions, data displayed, and print/export formats. Click each module to expand.</div>

  ${[
    {id:'ux-setup',t:'M1: Bid Setup Wizard',bg:'bg-s',content:`
      <div class="sh2">Screen Flow</div>
      <div class="bt">Linear wizard with 5 steps + feasibility check. Progress indicator at top shows current step. Back/next navigation. Cannot skip steps (each depends on previous). Final step shows feasibility verdict before confirmation.</div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">Progress Bar</div><div class="ux-box-content">Step 1 ● — Step 2 ○ — Step 3 ○ — Step 4 ○ — Step 5 ○ — Feasibility ○</div></div>
        <div class="ux-box"><div class="ux-box-label">Step Content Area</div><div class="ux-box-content">Form fields for current step. Required fields marked with gold border. Optional fields dashed border. Inline validation. Contextual help tooltips on hover.</div></div>
        <div class="ux-box"><div class="ux-box-label">Step 2: Activity Configuration</div><div class="ux-box-content">Expandable workstream panels. Each activity shown as a row: checkbox (active/deactivated), name, output, effort input (editable, shows template default). Deactivated activities greyed out. "Add custom activity" button per workstream. Governance gate checklist below activities.</div></div>
        <div class="ux-box"><div class="ux-box-label">Step 3: Calendar</div><div class="ux-box-content">Visual calendar showing bid period. Public holidays pre-marked (UK default). Click dates to toggle working/non-working. Team unavailability as named date ranges. Sidebar shows net working days recalculation in real-time.</div></div>
        <div class="ux-box"><div class="ux-box-label">Feasibility Check Screen</div><div class="ux-box-content">Large verdict badge (green/amber/red). Timeline bar showing bid period with activities mapped. Critical path highlighted. Per-workstream feasibility: name, required days, available days, surplus/deficit. Compression points listed. "Adjust & Recheck" button returns to activity configuration.</div></div>
        <div class="ux-row">
          <div class="ux-col"><div class="ux-box"><div class="ux-box-label">Navigation</div><div class="ux-box-content">← Back | Next → | Save Draft</div></div></div>
          <div class="ux-col"><div class="ux-box"><div class="ux-box-label">Confirmation</div><div class="ux-box-content">Confirm & Create Bid (only enabled after feasibility check)</div></div></div>
        </div>
      </div>
    `},
    {id:'ux-portfolio',t:'M2: Practice Portfolio',bg:'bg-pr',content:`
      <div class="sh2">Primary View: Bid Table</div>
      <div class="bt">Entry point of the application. All active bids in a sortable table, ranked by default on fee-weighted risk (highest risk/highest value first). Clicking a row enters the bid workspace.</div>
      <div class="ux-frame">
        <div class="ux-row">
          ${['Active Bids','Total Fee Exposure','Bids at Risk','Team Deployed'].map(m=>`<div class="ux-col"><div class="ux-metric"><div class="ux-metric-val" style="color:var(--gold);">—</div><div class="ux-metric-lbl">${m}</div></div></div>`).join('')}
        </div>
        <div class="ux-box"><div class="ux-box-label">Bid Table Columns</div><div class="ux-box-content">Health (●/●/●) | Client | Bid Name | Deadline | Days Left | Phase (dev/prod/post-sub) | Dev Readiness % | Prod Readiness % | Win Fee (£) | Monthly Fee (£) | Fee-Weighted Risk | Trend (↑/→/↓) | Key Risk (text) | Bid Manager</div></div>
        <div class="ux-box"><div class="ux-box-label">Row Interactions</div><div class="ux-box-content">Click row → enter bid workspace. Hover → show quick summary tooltip. Sort by any column. Filter by: health status, phase, client, bid manager. Colour-code rows by health: green bg tint / amber bg tint / red bg tint.</div></div>
      </div>
      <div class="sh2">Secondary Views</div>
      <div class="ux-frame">
        <div class="ux-row">
          <div class="ux-col"><div class="ux-box"><div class="ux-box-label">Team Utilisation</div><div class="ux-box-content">Grid: team members as rows, active bids as columns. Cell shows role and time allocation. Highlight overloaded individuals (assigned to 3+ concurrent bids). Total allocation % per person.</div></div></div>
          <div class="ux-col"><div class="ux-box"><div class="ux-box-label">Intervention Log</div><div class="ux-box-content">Chronological log of all interventions across bids. Date, bid, trigger, action, outcome. Filterable by bid, date range. Exportable for practice learning reviews.</div></div></div>
        </div>
      </div>
      <div class="sh2">Actions</div>
      <div class="bt">New Bid (launches setup wizard) | Import Bid (JSON) | Export All (full backup) | Archive Bid (move completed to archive)</div>
    `},
    {id:'ux-workspace',t:'M3: Bid Workspace',bg:'bg-p',content:`
      <div class="sh2">Layout: Single-Screen Dashboard</div>
      <div class="bt">Must fit on a single screen for primary metrics. No scrolling for the headline view. Detail accessible through click-through to sub-modules. Back-to-portfolio link always visible in header.</div>
      <div class="ux-frame">
        <div class="ux-row">
          ${[{l:'Readiness Score',v:'67%',c:'var(--amb)'},{l:'Days to Submission',v:'34',c:'var(--t1)'},{l:'Phase',v:'DEVELOP',c:'var(--blu)'},{l:'Health',v:'AMBER',c:'var(--amb)'},{l:'Dev Complete',v:'45%',c:'var(--blu)'},{l:'Prod Complete',v:'12%',c:'var(--red)'}].map(m=>`<div class="ux-col"><div class="ux-metric"><div class="ux-metric-val" style="color:${m.c};">${m.v}</div><div class="ux-metric-lbl">${m.l}</div></div></div>`).join('')}
        </div>
        <div class="ux-box"><div class="ux-box-label">Workstream Health (10 rows)</div><div class="ux-box-content">Each workstream: name | progress bar (% complete, colour-coded) | timing health indicator (green/amber/red) | compression alert icon if applicable | click-through to filtered activity view. Critical: solution/commercial/delivery timing relationships shown with connecting indicators when compression detected.</div></div>
        <div class="ux-row">
          <div class="ux-col"><div class="ux-box"><div class="ux-box-label">Methodology Gates</div><div class="ux-box-content">Win Strategy Lock: ● assured / ○ not yet<br>Storyboard Sign-off: ● assured / ○ not yet<br>Visual indicators — green tick or amber pending</div></div></div>
          <div class="ux-col"><div class="ux-box"><div class="ux-box-label">Governance Gates</div><div class="ux-box-content">List of configured gates with status badges: upcoming / ready / passed / failed. Next upcoming gate highlighted with days until scheduled.</div></div></div>
        </div>
        <div class="ux-box"><div class="ux-box-label">Today's Actions (Bottom Panel)</div><div class="ux-box-content">Three columns: OVERDUE (red) — items past due date | DUE THIS WEEK (amber) — approaching deadlines | REVIEW ACTIONS (blue) — unresolved critical/major review actions. Each item: activity code, name, owner, days overdue/until due. Click → opens activity detail.</div></div>
        <div class="ux-box"><div class="ux-box-label">Smart Nudge Summary (NEW in v5)</div><div class="ux-box-content">Dismissable panel above Today's Actions. Shows count and preview of smart nudges: "3 stale activities · 2 newly unblocked · 1 gate approaching with unmet criteria." Click → opens full nudge panel in Activity Tracker standup view. Dismissed nudges don't reappear until next trigger event.</div></div>
        <div class="ux-box"><div class="ux-box-label">Standup Actions Summary (NEW in v5)</div><div class="ux-box-content">Compact bar showing: X overdue standup actions (red) | Y due today (amber) | Z open total. Click → opens Standup View in Activity Tracker. If overdue > 0, bar pulses amber. Gives the bid manager an instant read on whether the daily tactical layer is under control.</div></div>
        <div class="ux-box"><div class="ux-box-label">Milestone Timeline (Right Sidebar or Bottom)</div><div class="ux-box-content">Vertical timeline showing all milestones from kickoff to award. Each: name, date, status (complete ✓ / on track ● / at risk ▲ / overdue ✗). Current date marker. Governance gates shown inline.</div></div>
      </div>
    `},
    {id:'ux-tracker',t:'M4: Activity Tracker',bg:'bg-g',content:`
      <div class="sh2">Six Views (Tab Toggle)</div>
      <div class="bt">View toggle at top: Workstream | Kanban | List | Dependencies | Standup | Gantt. Filter bar persistent across all views. Search box for activity name/code. Smart nudge indicator shows count of items requiring attention.</div>

      <div class="sh2">Workstream View</div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">Layout</div><div class="ux-box-content">10 expandable workstream panels. Each shows: workstream name with colour, progress bar, timing health badge, activity count (complete/total). Expand → list of activities: code, name, output, effort, status badge, assurance badge, owner, due date. Deactivated activities greyed. Stale items (not updated in X days) shown with amber pulse indicator.</div></div>
      </div>

      <div class="sh2">Kanban View</div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">Layout</div><div class="ux-box-content">Columns = workflow states. Cards: activity code (workstream colour), title, owner, due date, priority, assurance badge. Drag-and-drop between columns. Overdue cards red border. Stale cards amber pulse. Filter by workstream.</div></div>
      </div>

      <div class="sh2">List View</div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">Layout</div><div class="ux-box-content">Full sortable table. Columns: Code | Activity | Workstream | Phase | Owner | Status | Assurance | Priority | Effort | Planned Start | Planned End | Last Updated | Dependencies | Blocked By. Multi-select for bulk update. Inline editing. Export CSV.</div></div>
      </div>

      <div class="sh2">Dependency View</div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">Layout</div><div class="ux-box-content">Activities left-to-right by dependency chain. Connected by arrows. Critical path in gold. Buffer indicators on connections. Compression alerts as red lines with "−X days" label. Click node → detail panel. Filter by critical path.</div></div>
      </div>

      <div class="sh2">Standup View (NEW in v5)</div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">Layout — The Bid Manager's Daily Operating Screen</div><div class="ux-box-content">Three panels stacked vertically, designed for rapid processing during a 15-minute morning standup or daily check-in.</div></div>
        <div class="ux-row">
          <div class="ux-col"><div class="ux-metric"><div class="ux-metric-val" style="color:var(--red);">4</div><div class="ux-metric-lbl">Overdue Actions</div></div></div>
          <div class="ux-col"><div class="ux-metric"><div class="ux-metric-val" style="color:var(--amb);">7</div><div class="ux-metric-lbl">Due Today</div></div></div>
          <div class="ux-col"><div class="ux-metric"><div class="ux-metric-val" style="color:var(--blu);">12</div><div class="ux-metric-lbl">Open Actions</div></div></div>
          <div class="ux-col"><div class="ux-metric"><div class="ux-metric-val" style="color:var(--grn);">5</div><div class="ux-metric-lbl">Completed Yesterday</div></div></div>
        </div>
        <div class="ux-box"><div class="ux-box-label">Panel 1: Overdue & Carry-Forward (Red)</div><div class="ux-box-content">Actions from previous standups that were not completed. Each row: description, owner, original due date, days overdue, parent activity, source (manual/gate-prep/nudge). Actions: ✓ Done | → Carry forward (new date) | ⚡ Escalate (converts to risk/blocker on parent activity) | ✗ Cancel.</div></div>
        <div class="ux-box"><div class="ux-box-label">Panel 2: Today's Actions (Amber/Blue)</div><div class="ux-box-content">Actions due today and upcoming (next 2 days). Grouped by workstream. Each row: description, owner, due date, parent activity/gate. Gate preparation actions shown with gate badge and countdown. Quick ✓ Done button on each row.</div></div>
        <div class="ux-box"><div class="ux-box-label">Panel 3: Quick Add Bar</div><div class="ux-box-content">Single-line input: Description | Owner (dropdown) | Due date (default: today) | Parent activity (optional dropdown) | + Add. Designed for rapid capture during standup — bid manager types commitment, assigns owner, hits enter. Action appears immediately in Panel 2.</div></div>
        <div class="ux-box"><div class="ux-box-label">Panel 4: Completed Yesterday (Collapsed by Default)</div><div class="ux-box-content">Actions completed since last standup. Provides context: what was achieved yesterday. Expandable for review. Auto-archived after 48 hours.</div></div>
      </div>

      <div class="sh2">Gantt View (NEW in v6)</div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">Layout — Visual Timeline</div><div class="ux-box-content">Horizontal timeline with activities as bars, grouped by workstream. X-axis: calendar dates (working days). Y-axis: activities grouped under workstream headers. Each bar: length = elapsed duration (effort ÷ teamSize + overhead), colour = workstream colour, position = scheduled start to end. Bar fill shows progress (% complete based on status: not_started=0%, in_progress=25%, draft_complete=60%, final=100%).</div></div>
        <div class="ux-box"><div class="ux-box-label">Dependency Lines</div><div class="ux-box-content">Arrows connecting dependent activities. Arrow starts at predecessor bar end, points to dependent bar start. Critical path highlighted in gold with thicker lines. Non-critical dependencies shown as thin grey lines. Compression shown as red arrows with negative buffer label ("−3 days").</div></div>
        <div class="ux-box"><div class="ux-box-label">Markers</div><div class="ux-box-content">Today line: vertical dashed gold line at current date. Milestone markers: diamonds on timeline at milestone dates. Governance gates: purple diamonds with gate name. Methodology gates: gold diamonds. Submission deadline: red vertical line.</div></div>
        <div class="ux-box"><div class="ux-box-label">Interactions</div><div class="ux-box-content">Hover bar → tooltip with activity details (code, name, effort, team, elapsed, status, owner, buffer to next dependent). Click bar → opens activity detail panel. Zoom: mouse wheel or pinch to zoom in/out on timeline. Pan: drag to scroll horizontally. Filter by workstream, phase, or critical-path-only. Toggle dependency lines on/off. Toggle team member view (bars coloured by owner instead of workstream).</div></div>
        <div class="ux-box"><div class="ux-box-label">Print</div><div class="ux-box-content">Export to A3 landscape PDF. All activities visible with dependency lines and critical path. Suitable for wall display in bid war room or inclusion in governance pack.</div></div>
      </div>

      <div class="sh2">Smart Nudging Engine (NEW in v5)</div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">Daily Check-In — Triggered on Workspace Load</div><div class="ux-box-content">When the bid manager opens the workspace or activity tracker, the system generates nudges from four sources. Nudges appear as a dismissable panel at the top of the workspace and as items in the standup view.</div></div>
        <table class="tb">
          <thead><tr><th>Nudge Type</th><th>Trigger Logic</th><th>Presentation</th><th>Bid Manager Action</th></tr></thead>
          <tbody>
            <tr><td><span class="fe fe-a">Stale Activity</span></td><td>Activity status not updated in X days (default: 3 working days for development and production activities, 2 for post-submission). lastUpdated timestamp compared to current date.</td><td>Amber pulse on activity card/row. "SOL-03 not updated in 5 days — still in progress?"</td><td>Update status, or dismiss (resets timer)</td></tr>
            <tr><td><span class="fe fe-g">Unblocked</span></td><td>All predecessor activities have reached "draft complete" or "final" status. Dependent activity is still "not started".</td><td>Green highlight. "SOL-04 is now unblocked — SOL-03 reached draft complete. Ready to start?"</td><td>Confirm start (sets status to "in progress" and actualStart to today), or defer</td></tr>
            <tr><td><span class="fe fe-r">Approaching Deadline</span></td><td>Activity due within 5 working days and status is not "final" or "draft complete".</td><td>Red highlight. "COM-06 due in 3 days — currently in progress. On track?"</td><td>Confirm on track (dismiss), flag at risk, or adjust due date</td></tr>
            <tr><td><span class="fe fe-p">Gate Approaching</span></td><td>Governance gate scheduled within prep lead time and not all entry criteria met.</td><td>Purple highlight. "G3 Pricing Review in 5 days — 2 of 6 entry criteria not yet met: COM-06, DEL-06."</td><td>Acknowledge, escalate, or request gate deferral</td></tr>
          </tbody>
        </table>
        <div class="co co-v"><div class="co-l">Design Principle</div><div class="co-t">Nudges are prompts, not autonomous updates. The system never changes activity status without human confirmation. The bid manager's morning routine becomes: open system → review 5–10 nudges → confirm, dismiss, or act on each → review standup actions → capture new commitments. Total time: 10–15 minutes. The system does the scanning; the human retains the judgment.</div></div>
      </div>

      <div class="sh2">Activity Detail Panel (Slide-out)</div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">Fields</div><div class="ux-box-content">All activity fields editable. Status dropdown. Assurance dropdown. Owner selector. Due date picker. Effort adjustment. Notes textarea. Dependency list (upstream and downstream). Linked requirements. Linked review actions. Linked standup actions (child actions for this activity). Output upload/link field. AI generation button. Methodology guidance panel (collapsible — shows what good looks like for this activity type).</div></div>
      </div>
    `},
    {id:'ux-compliance',t:'M5: Compliance Engine',bg:'bg-a',content:`
      <div class="sh2">Primary View: Requirement Register</div>
      <div class="ux-frame">
        <div class="ux-row">
          ${[{l:'Total Requirements',v:'87'},{l:'Mapped',v:'54'},{l:'Gaps',v:'12'},{l:'Mandatory Coverage',v:'78%'}].map(m=>`<div class="ux-col"><div class="ux-metric"><div class="ux-metric-val" style="color:var(--grn);">${m.v}</div><div class="ux-metric-lbl">${m.l}</div></div></div>`).join('')}
        </div>
        <div class="ux-box"><div class="ux-box-label">Register Table</div><div class="ux-box-content">Columns: Ref | Requirement Text (truncated, expand on click) | Classification (badge: mandatory/scored/pass-fail/evidential/contractual) | Category | Response Section | Owner | Coverage Status (badge) | Impacted by Clarification (flag). Sort by any column. Filter by classification, status, category, owner. Inline editing for mapping fields. Bulk import button. Add requirement button.</div></div>
      </div>

      <div class="sh2">Secondary Views</div>
      <div class="ux-frame">
        <div class="ux-row">
          <div class="ux-col"><div class="ux-box"><div class="ux-box-label">Coverage Dashboard</div><div class="ux-box-content">Donut chart: coverage status distribution. Bar chart: coverage by classification type. Mandatory coverage prominently displayed. Gap count with alert if >0 mandatory gaps. Trend: coverage % over time (if data available from multiple updates).</div></div></div>
          <div class="ux-col"><div class="ux-box"><div class="ux-box-label">Gap Report</div><div class="ux-box-content">Filtered view showing only: unmapped requirements and requirements at "gap" status. Sorted by classification (mandatory first). Each row shows: requirement, classification, reason for gap, suggested owner. Printable as an action list for the bid team.</div></div></div>
        </div>
        <div class="ux-box"><div class="ux-box-label">Compliance Matrix (Print/Export)</div><div class="ux-box-content">Formal compliance matrix suitable for gate reviews and inclusion in submission. Columns: Ref | Requirement | Compliant (Y/N/Partial) | Response Location | Evidence. A4 landscape format. PDF export. This is the output the governance board reviews.</div></div>
      </div>

      <div class="sh2">Clarification Impact</div>
      <div class="bt">When SAL-09 (clarification impact analysis) flags affected requirements, those rows are marked with a clarification impact indicator. The bid manager reviews each flagged requirement and updates the mapping, classification, or coverage status as needed. System highlights flagged-but-unreviewed items as an action.</div>
    `},
    {id:'ux-review',t:'M6: Review Governance',bg:'bg-a',content:`
      <div class="sh2">Primary View: Review Timeline</div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">Timeline</div><div class="ux-box-content">Horizontal timeline showing all review cycles: solution review | pricing review | risk review | pink | red | gold. Each cycle: name, date, status badge (scheduled/in progress/actions open/closed). Colour-coded by type (development reviews = blue, production reviews = green/amber/red). Click cycle → opens cycle detail.</div></div>
        <div class="ux-row">
          ${[{l:'Cycles Total',v:'6'},{l:'Actions Open',v:'14'},{l:'Critical Open',v:'3'},{l:'Resolution Rate',v:'72%'}].map(m=>`<div class="ux-col"><div class="ux-metric"><div class="ux-metric-val" style="color:var(--grn);">${m.v}</div><div class="ux-metric-lbl">${m.l}</div></div></div>`).join('')}
        </div>
      </div>

      <div class="sh2">Cycle Detail View</div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">Scorecard Summary</div><div class="ux-box-content">Radar chart or bar chart showing average scores by criterion: compliance, responsiveness, evidence, differentiation, readability, feasibility, risk. Overall score. Comparison with previous review cycle scores if available (e.g. pink vs red improvement).</div></div>
        <div class="ux-box"><div class="ux-box-label">Action Table</div><div class="ux-box-content">Columns: # | Section | Comment (expandable) | Severity (badge: critical/major/minor) | Criterion | Owner | Deadline | Status (badge) | Resolution (expandable). Filter by severity, section, owner, status. Sort by severity (critical first) or deadline. Inline status update. Add action button for ad-hoc items. Resolution text field appears when status set to "resolved".</div></div>
        <div class="ux-box"><div class="ux-box-label">Gate Logic Panel</div><div class="ux-box-content">Shows: total critical actions, resolved critical actions, gate status (locked/unlocked). If any critical action is open: gate shows as LOCKED with red indicator and message "X critical actions must be resolved before this review can close." When all critical resolved: gate shows UNLOCKED with green indicator and "Close review" button.</div></div>
      </div>

      <div class="sh2">Cross-Review Dashboard</div>
      <div class="bt">Aggregated view across all review cycles: total actions by severity, resolution rate trend, sections with most actions (quality hotspots), reviewers by volume. Identifies patterns — e.g. "technical sections consistently score low on evidence."</div>
    `},
    {id:'ux-gov',t:'M7: Governance Manager',bg:'bg-pr',content:`
      <div class="sh2">Primary View: Gate Pipeline</div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">Gate Pipeline</div><div class="ux-box-content">Vertical list of configured gates in sequence. Each gate card shows: gate name, type badge (functional/executive tier/methodology), approving body, scheduled date, status (upcoming/ready/in progress/passed/failed/deferred). Entry criteria checklist: each criterion shows linked activity, required assurance level, current assurance level, met (✓/✗). Overall readiness: X of Y criteria met. Progress bar. Preparation status indicator: prep actions generated/in progress/complete.</div></div>
        <div class="ux-box"><div class="ux-box-label">Gate Detail (expanded)</div><div class="ux-box-content">Entry criteria table with live status from activity data. Decision section: dropdown (approve/approve with conditions/revise/reject/defer). Conditions text field. Risk premium input (% — records contingency applied). Decision record text area. Attendees list. Date completed. Read-only after gate passed.</div></div>
      </div>

      <div class="sh2">Gate Preparation Tracker (NEW in v5)</div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">Layout</div><div class="ux-box-content">When a gate is within its preparation lead time, a preparation panel expands showing the auto-generated standup actions with their status. Each preparation step: offset label (T-5, T-3, T-2, T-1, T-0, T+1), action description, owner (defaults to bid manager, reassignable), status (pending/in progress/done/overdue), due date. Actions flow automatically into the Standup View in the Activity Tracker. Overdue preparation steps escalate to workspace alerts.</div></div>
        <div class="ux-box"><div class="ux-box-label">Preparation Timeline</div><div class="ux-box-content">Visual horizontal timeline for the gate showing: today marker, each preparation step as a node on the timeline, entry criteria readiness at each checkpoint. At T-5 the system pre-checks criteria and flags gaps — giving 5 days to resolve before the gate. If criteria cannot be met, the bid manager can request deferral directly from this view.</div></div>
      </div>

      <div class="sh2">Risk Premium Tracker</div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">Layout</div><div class="ux-box-content">Total risk premium across all gates, broken down by gate. Each entry: gate name, premium %, linked cause (unmet criteria), approver. Calculates TCV impact: "X% on £Ym = £Zm added to price." Makes the cost of poor preparation visible and auditable.</div></div>
      </div>

      <div class="sh2">Print: Gate Pack</div>
      <div class="bt">Each gate produces a printable pack: entry criteria status, readiness summary, key risks, recommendation. A4 format. PDF export. Assembled automatically from system data — the T-3 preparation action "assemble review pack" links directly to generating this output.</div>
    `},
    {id:'ux-readiness',t:'M8: Readiness Dashboard',bg:'bg-a',content:`
      <div class="sh2">Primary View: Dual-Track Readiness</div>
      <div class="ux-frame">
        <div class="ux-row">
          <div class="ux-col"><div class="ux-metric"><div class="ux-metric-val" style="color:var(--amb);font-size:36px;">67%</div><div class="ux-metric-lbl">Overall Readiness</div></div></div>
          <div class="ux-col"><div class="ux-metric"><div class="ux-metric-val" style="color:var(--blu);">78%</div><div class="ux-metric-lbl">Development Track</div></div></div>
          <div class="ux-col"><div class="ux-metric"><div class="ux-metric-val" style="color:var(--red);">42%</div><div class="ux-metric-lbl">Production Track</div></div></div>
        </div>
        <div class="ux-box"><div class="ux-box-label">Development Readiness Signals</div><div class="ux-box-content">Each signal as a row: Signal Name | Current Value | Target | Status (green/amber/red) | Source.<br><br>Signals: Win strategy locked & assured | Solution design locked & assured | Pricing model locked & assured | Risk register mitigated & assured | Partner agreements signed | Governance gates passed (X of Y) | Methodology gates passed (X of 2)</div></div>
        <div class="ux-box"><div class="ux-box-label">Production Readiness Signals</div><div class="ux-box-content">Signals: Question/section completion % | Compliance coverage % (mandatory) | Review actions resolved % (critical) | Approvals obtained (X of Y) | Artefact checklist % | Final QA sign-off | Workstream timing health</div></div>
        <div class="ux-box"><div class="ux-box-label">Compression Alerts</div><div class="ux-box-content">Active compression warnings listed with: affected dependency chain, buffer remaining, impact description, suggested action. Red alerts force overall readiness to amber maximum regardless of other signals.</div></div>
      </div>

      <div class="sh2">Post-Submission Readiness (when applicable)</div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">Signals</div><div class="ux-box-content">Presentation prepared & rehearsed | Post-submission clarifications responded | BAFO prepared & approved | Contract negotiations progressing | Award processing ready. Only shown when post-submission activities are active.</div></div>
      </div>

      <div class="sh2">Readiness Trend</div>
      <div class="bt">Line chart showing overall readiness % over time (captured at each status update). Shows trajectory: converging toward 100% (healthy) or plateauing/declining (concerning). Overlaid with milestone dates.</div>

      <div class="sh2">Executive Print View</div>
      <div class="bt">Single A4 page. Top: overall score with verdict (ready/conditional/not ready). Middle: signal breakdown table. Bottom: key risks, milestone status, compression alerts. Suitable for gate review presentations. PDF export.</div>
    `},
    {id:'ux-submission',t:'M9: Submission Manager',bg:'bg-p',content:`
      <div class="sh2">Primary View: Submission Checklist</div>
      <div class="ux-frame">
        <div class="ux-row">
          ${[{l:'Artefacts Ready',v:'8/12'},{l:'Approvals Complete',v:'3/5'},{l:'QA Items Clear',v:'14/18'},{l:'Hours to Deadline',v:'47'}].map(m=>`<div class="ux-col"><div class="ux-metric"><div class="ux-metric-val" style="color:var(--amb);">${m.v}</div><div class="ux-metric-lbl">${m.l}</div></div></div>`).join('')}
        </div>
        <div class="ux-box"><div class="ux-box-label">Artefact Register</div><div class="ux-box-content">Table: Document Name | Type (badge) | Owner | Status (not started/draft/final/uploaded/confirmed) | File Name (per submission requirements) | Page Limit | Actual Pages | Notes. Status colour-coded. Items not at "final" or above highlighted amber. Items not at "uploaded" with <24h to deadline highlighted red.</div></div>
        <div class="ux-box"><div class="ux-box-label">Final QA Checklist</div><div class="ux-box-content">Checklist items: Cross-references correct ✓/✗ | Pagination continuous ✓/✗ | Headers/footers correct ✓/✗ | Branding applied ✓/✗ | Page limits met ✓/✗ | File naming conventions ✓/✗ | Redaction complete ✓/✗ | Word/character counts within limits ✓/✗ | Attachments present ✓/✗ | Signatures obtained ✓/✗. Each item checkable. Incomplete items block submission readiness.</div></div>
        <div class="ux-box"><div class="ux-box-label">Approval Tracker</div><div class="ux-box-content">List of required final approvals: Pricing sign-off, Legal sign-off, Executive sign-off, Final submission authority. Each: approver name, status (pending/approved/rejected), date. All must be "approved" before submission can proceed.</div></div>
      </div>

      <div class="sh2">Portal Upload Tracker</div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">Layout</div><div class="ux-box-content">For each artefact: upload status (not uploaded/uploading/uploaded/confirmed), timestamp, confirmation receipt reference. Portal name and URL. Total upload progress bar. Submission confirmation screenshot/reference field. Final submission log: who submitted, when, via which channel, confirmation reference.</div></div>
      </div>

      <div class="sh2">Post-Submission Trigger</div>
      <div class="bt">When submission is confirmed, the system: marks all PRD activities as "submitted", triggers BM-11 (hot debrief) as an active action item, transitions the bid to "post_submission" phase if post-submission activities are configured, and updates the practice portfolio with submission confirmation.</div>
    `},
  ].map(m=>`
    <div class="ent"><div class="ent-h" onclick="tog('${m.id}')"><div style="display:flex;align-items:center;gap:8px;"><span class="tog ${exp[m.id]?'op':''}">▸</span><span class="ent-nm">${m.t}</span></div><span class="ent-bg ${m.bg}">${m.bg.replace('bg-','')}</span></div>
    ${exp[m.id]?`<div class="ent-bd">${m.content}</div>`:''}
    </div>
  `).join('')}

  <div class="co co-g"><div class="co-l">UX Principles Across All Modules</div><div class="co-t">Midnight Executive palette throughout. Cormorant Garamond for display numbers, DM Mono for labels and data, DM Sans for body text. All key views designed for A4 print-to-PDF. Single-operator model: no login, no multi-user. All interactions through click, inline edit, or drag-and-drop. Keyboard shortcuts for power users: Ctrl+N (new item), Ctrl+F (filter), Ctrl+P (print view). Every table sortable and filterable. Status badges colour-coded consistently: green=good, amber=attention, red=action required.</div></div>

  <div class="sh">Embedded Methodology Guidance Layer (NEW in v5)</div>
  <div class="bt">Every module has a collapsible guidance panel that shows contextual methodology notes. The content adapts to the current bid phase and the state of the activities. The bid manager can collapse the panel once experienced — a toggle in settings controls default visibility.</div>

  <div class="ux-frame">
    <div class="ux-box"><div class="ux-box-label">Guidance Panel — Position & Behaviour</div><div class="ux-box-content">Right-hand collapsible sidebar or top-of-module collapsible strip (configurable in settings). Width: ~280px when expanded. Collapses to a small "?" icon. Expands on click. Colour: subtle gold-tinted background to distinguish from operational content.</div></div>
    <div class="ux-box"><div class="ux-box-label">Content Structure Per Module</div><div class="ux-box-content">Each module's guidance has three layers:<br><br><strong>What to do now:</strong> Phase-specific instruction. E.g. in the Compliance Engine during early development: "Focus on importing all mandatory requirements first. Map scored requirements once the response structure is confirmed at storyboard sign-off."<br><br><strong>What good looks like:</strong> Quality criteria for this module's outputs. E.g. in Review Governance: "A well-run red review has: all sections scored against all criteria, critical actions assigned with 48-hour resolution deadlines, no section with a compliance score below 3/5."<br><br><strong>Common mistakes:</strong> Anti-patterns to watch for. E.g. in the Activity Tracker: "If solution design (SOL-03) is still 'in progress' while production drafting (PRD-02) has started, you have a structural problem — production is writing to assumptions, not decisions."</div></div>
  </div>

  <div class="bt">Guidance content is stored as structured JSON in the template data — one set of notes per module per bid phase (development, production, post-submission). This means the guidance evolves as the bid progresses. When the bid transitions from development to production phase, the guidance on each module updates to reflect the new priorities.</div>

  <table class="tb">
    <thead><tr><th>Module</th><th>Example Guidance (Development Phase)</th><th>Example Guidance (Production Phase)</th></tr></thead>
    <tbody>
      <tr><td>Workspace</td><td>"Your priority is workstream timing health. Watch for solution compressing commercial. If SOL progress is &lt;50% with &lt;40% of timeline remaining, escalate."</td><td>"Your priority is review action closure and compliance coverage. Every open critical action is a risk to submission quality."</td></tr>
      <tr><td>Activity Tracker</td><td>"Focus on development workstreams. Production activities should be 'not started' except PRD-01 (compliance matrix) which can begin at SOL-01."</td><td>"All development activities should be 'final' with outputs 'assured'. Any still in progress are blocking production quality."</td></tr>
      <tr><td>Compliance</td><td>"Import all requirements. Classify each as mandatory/scored/pass-fail. Don't map responses yet — wait for storyboard sign-off."</td><td>"Map every requirement to a response section and owner. Zero mandatory gaps at red review. Compliance matrix must be print-ready for gold review."</td></tr>
      <tr><td>Governance</td><td>"Prepare for G2 (solution review) and G3 (pricing review). Pre-check entry criteria at T-5. Address gaps before the gate, not at the gate."</td><td>"G4 (executive approval) is your final gate. If any development output is still 'unassured', the board will load contingency."</td></tr>
    </tbody>
  </table>
`;
