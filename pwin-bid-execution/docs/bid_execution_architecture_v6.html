R.ux=()=>`
  <div class="sl">UX Specifications</div>
  <div class="st">Screen Design for All Ten Modules</div>
  <div class="sd">Complete screen-by-screen specification for every module. Layout, primary and secondary views, key interactions, data displayed, and print/export formats. Click each module to expand.</div>

  ${[
    {id:'ux-setup',t:'M1: Bid Setup Wizard',bg:'bg-s',content:`
      <div class="sh2">Screen Flow</div>
      <div class="bt">Linear wizard with 6 steps + feasibility check. Progress indicator at top shows current step. Back/next navigation. Cannot skip steps (each depends on previous). Final step shows feasibility verdict before confirmation.</div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">Progress Bar</div><div class="ux-box-content">Step 1 ● — Step 2 ○ — Step 3 ○ — Step 4 ○ — Step 5 ○ — Step 6 ○ — Feasibility ○</div></div>
        <div class="ux-box"><div class="ux-box-label">Step Content Area</div><div class="ux-box-content">Form fields for current step. Required fields marked with gold border. Optional fields dashed border. Inline validation. Contextual help tooltips on hover.</div></div>
        <div class="ux-box"><div class="ux-box-label">Step 1: Bid Identity & Procurement Context</div><div class="ux-box-content">Core identity fields (name, client, sector, procurement type, TCV, ACV) plus extended procurement context: procurement route (open/restricted/competitive_dialogue/etc.), portal platform (Jaggaer/Oracle/Proactis/etc.), portal reference, contract duration, extension options, estimated total value, TUPE applicable + staff count, security clearance tier, rebid flag + incumbent name. Procurement context fields are optional at setup — can be populated later by the bid manager or by future AI ingestion skill. Procurement timeline with milestones.</div></div>
        <div class="ux-box"><div class="ux-box-label">Step 2: Activity Configuration</div><div class="ux-box-content">Expandable workstream panels. Each activity shown as a row: checkbox (active/deactivated), name, output, effort input (editable, shows template default). Deactivated activities greyed out. "Add custom activity" button per workstream. Governance gate checklist below activities.</div></div>
        <div class="ux-box"><div class="ux-box-label">Step 3: Calendar</div><div class="ux-box-content">Visual calendar showing bid period. Public holidays pre-marked (UK default). Click dates to toggle working/non-working. Team unavailability as named date ranges. Sidebar shows net working days recalculation in real-time.</div></div>
        <div class="ux-box"><div class="ux-box-label">Feasibility Check Screen</div><div class="ux-box-content">Large verdict badge (green/amber/red). Timeline bar showing bid period with activities mapped. Critical path highlighted. Per-workstream feasibility: name, required days, available days, surplus/deficit. Compression points listed. "Adjust & Recheck" button returns to activity configuration.</div></div>
        <div class="ux-row">
          <div class="ux-col"><div class="ux-box"><div class="ux-box-label">Navigation</div><div class="ux-box-content">← Back | Next → | Save Draft</div></div></div>
          <div class="ux-col"><div class="ux-box"><div class="ux-box-label">Confirmation</div><div class="ux-box-content">Confirm & Create Bid (only enabled after feasibility check)</div></div></div>
        </div>
      </div>
    `},
    {id:'ux-portfolio',t:'M2: Practice Portfolio',bg:'bg-pr',content:`
      <div class="sh2">Primary View: Bid Table</div>
      <div class="bt">Entry point of the application. All active bids in a sortable table, ranked by default on fee-weighted risk (highest risk/highest value first). Clicking a row enters the bid workspace.</div>
      <div class="ux-frame">
        <div class="ux-row">
          ${['Active Bids','Total Fee Exposure','Bids at Risk','Team Deployed'].map(m=>`<div class="ux-col"><div class="ux-metric"><div class="ux-metric-val" style="color:var(--gold);">—</div><div class="ux-metric-lbl">${m}</div></div></div>`).join('')}
        </div>
        <div class="ux-box"><div class="ux-box-label">Bid Table Columns</div><div class="ux-box-content">Health (●/●/●) | Client | Bid Name | Deadline | Days Left | Phase (dev/prod/post-sub) | Dev Readiness % | Prod Readiness % | Win Fee (£) | Monthly Fee (£) | Fee-Weighted Risk | Trend (↑/→/↓) | Key Risk (text) | Bid Manager</div></div>
        <div class="ux-box"><div class="ux-box-label">Row Interactions</div><div class="ux-box-content">Click row → enter bid workspace. Hover → show quick summary tooltip. Sort by any column. Filter by: health status, phase, client, bid manager. Colour-code rows by health: green bg tint / amber bg tint / red bg tint.</div></div>
      </div>
      <div class="sh2">Secondary Views</div>
      <div class="ux-frame">
        <div class="ux-row">
          <div class="ux-col"><div class="ux-box"><div class="ux-box-label">Team Utilisation</div><div class="ux-box-content">Grid: team members as rows, active bids as columns. Cell shows role and time allocation. Highlight overloaded individuals (assigned to 3+ concurrent bids). Total allocation % per person.</div></div></div>
          <div class="ux-col"><div class="ux-box"><div class="ux-box-label">Intervention Log</div><div class="ux-box-content">Chronological log of all interventions across bids. Date, bid, trigger, action, outcome. Filterable by bid, date range. Exportable for practice learning reviews.</div></div></div>
        </div>
      </div>
      <div class="sh2">Actions</div>
      <div class="bt">New Bid (launches setup wizard) | Import Bid (JSON) | Export All (full backup) | Archive Bid (move completed to archive)</div>
    `},
    {id:'ux-workspace',t:'M3: Bid Workspace',bg:'bg-p',content:`
      <div class="sh2">Layout: Single-Screen Dashboard</div>
      <div class="bt">Must fit on a single screen for primary metrics. No scrolling for the headline view. Detail accessible through click-through to sub-modules. Back-to-portfolio link always visible in header.</div>
      <div class="ux-frame">
        <div class="ux-row">
          ${[{l:'Readiness Score',v:'67%',c:'var(--amb)'},{l:'Days to Submission',v:'34',c:'var(--t1)'},{l:'Phase',v:'DEVELOP',c:'var(--blu)'},{l:'Health',v:'AMBER',c:'var(--amb)'},{l:'Dev Complete',v:'45%',c:'var(--blu)'},{l:'Prod Complete',v:'12%',c:'var(--red)'}].map(m=>`<div class="ux-col"><div class="ux-metric"><div class="ux-metric-val" style="color:${m.c};">${m.v}</div><div class="ux-metric-lbl">${m.l}</div></div></div>`).join('')}
        </div>
        <div class="ux-box"><div class="ux-box-label">Workstream Health (10 rows)</div><div class="ux-box-content">Each workstream: name | progress bar (% complete, colour-coded) | timing health indicator (green/amber/red) | compression alert icon if applicable | click-through to filtered activity view. Critical: solution/commercial/delivery timing relationships shown with connecting indicators when compression detected.</div></div>
        <div class="ux-row">
          <div class="ux-col"><div class="ux-box"><div class="ux-box-label">Methodology Gates</div><div class="ux-box-content">Win Strategy Lock: ● assured / ○ not yet<br>Storyboard Sign-off: ● assured / ○ not yet<br>Visual indicators — green tick or amber pending</div></div></div>
          <div class="ux-col"><div class="ux-box"><div class="ux-box-label">Governance Gates</div><div class="ux-box-content">List of configured gates with status badges: upcoming / ready / passed / failed. Next upcoming gate highlighted with days until scheduled.</div></div></div>
        </div>
        <div class="ux-box"><div class="ux-box-label">Today's Actions (Bottom Panel)</div><div class="ux-box-content">Three columns: OVERDUE (red) — items past due date | DUE THIS WEEK (amber) — approaching deadlines | REVIEW ACTIONS (blue) — unresolved critical/major review actions. Each item: activity code, name, owner, days overdue/until due. Click → opens activity detail.</div></div>
        <div class="ux-box"><div class="ux-box-label">Smart Nudge Summary (NEW in v5)</div><div class="ux-box-content">Dismissable panel above Today's Actions. Shows count and preview of smart nudges: "3 stale activities · 2 newly unblocked · 1 gate approaching with unmet criteria." Click → opens full nudge panel in Activity Tracker standup view. Dismissed nudges don't reappear until next trigger event.</div></div>
        <div class="ux-box"><div class="ux-box-label">Standup Actions Summary (NEW in v5)</div><div class="ux-box-content">Compact bar showing: X overdue standup actions (red) | Y due today (amber) | Z open total. Click → opens Standup View in Activity Tracker. If overdue > 0, bar pulses amber. Gives the bid manager an instant read on whether the daily tactical layer is under control.</div></div>
        <div class="ux-box"><div class="ux-box-label">Milestone Timeline (Right Sidebar or Bottom)</div><div class="ux-box-content">Vertical timeline showing all milestones from kickoff to award. Each: name, date, status (complete ✓ / on track ● / at risk ▲ / overdue ✗). Current date marker. Governance gates shown inline.</div></div>
      </div>
    `},
    {id:'ux-tracker',t:'M4: Activity Tracker',bg:'bg-g',content:`
      <div class="sh2">Six Views (Tab Toggle)</div>
      <div class="bt">View toggle at top: Workstream | Kanban | List | Dependencies | Standup | Gantt. Filter bar persistent across all views. Search box for activity name/code. Smart nudge indicator shows count of items requiring attention.</div>

      <div class="sh2">Workstream View</div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">Layout</div><div class="ux-box-content">10 expandable workstream panels. Each shows: workstream name with colour, progress bar, timing health badge, activity count (complete/total). Expand → list of activities: code, name, output, effort, status badge, assurance badge, owner, due date. Deactivated activities greyed. Stale items (not updated in X days) shown with amber pulse indicator.</div></div>
      </div>

      <div class="sh2">Kanban View</div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">Layout</div><div class="ux-box-content">Columns = workflow states. Cards: activity code (workstream colour), title, owner, due date, priority, assurance badge. Drag-and-drop between columns. Overdue cards red border. Stale cards amber pulse. Filter by workstream.</div></div>
      </div>

      <div class="sh2">List View</div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">Layout</div><div class="ux-box-content">Full sortable table. Columns: Code | Activity | Workstream | Phase | Owner | Status | Assurance | Priority | Effort | Planned Start | Planned End | Last Updated | Dependencies | Blocked By. Multi-select for bulk update. Inline editing. Export CSV.</div></div>
      </div>

      <div class="sh2">Dependency View</div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">Layout</div><div class="ux-box-content">Activities left-to-right by dependency chain. Connected by arrows. Critical path in gold. Buffer indicators on connections. Compression alerts as red lines with "−X days" label. Click node → detail panel. Filter by critical path.</div></div>
      </div>

      <div class="sh2">Standup View (NEW in v5)</div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">Layout — The Bid Manager's Daily Operating Screen</div><div class="ux-box-content">Three panels stacked vertically, designed for rapid processing during a 15-minute morning standup or daily check-in.</div></div>
        <div class="ux-row">
          <div class="ux-col"><div class="ux-metric"><div class="ux-metric-val" style="color:var(--red);">4</div><div class="ux-metric-lbl">Overdue Actions</div></div></div>
          <div class="ux-col"><div class="ux-metric"><div class="ux-metric-val" style="color:var(--amb);">7</div><div class="ux-metric-lbl">Due Today</div></div></div>
          <div class="ux-col"><div class="ux-metric"><div class="ux-metric-val" style="color:var(--blu);">12</div><div class="ux-metric-lbl">Open Actions</div></div></div>
          <div class="ux-col"><div class="ux-metric"><div class="ux-metric-val" style="color:var(--grn);">5</div><div class="ux-metric-lbl">Completed Yesterday</div></div></div>
        </div>
        <div class="ux-box"><div class="ux-box-label">Panel 1: Overdue & Carry-Forward (Red)</div><div class="ux-box-content">Actions from previous standups that were not completed. Each row: description, owner, original due date, days overdue, parent activity, source (manual/gate-prep/nudge). Actions: ✓ Done | → Carry forward (new date) | ⚡ Escalate (converts to risk/blocker on parent activity) | ✗ Cancel.</div></div>
        <div class="ux-box"><div class="ux-box-label">Panel 2: Today's Actions (Amber/Blue)</div><div class="ux-box-content">Actions due today and upcoming (next 2 days). Grouped by workstream. Each row: description, owner, due date, parent activity/gate. Gate preparation actions shown with gate badge and countdown. Quick ✓ Done button on each row.</div></div>
        <div class="ux-box"><div class="ux-box-label">Panel 3: Quick Add Bar</div><div class="ux-box-content">Single-line input: Description | Owner (dropdown) | Due date (default: today) | Parent activity (optional dropdown) | + Add. Designed for rapid capture during standup — bid manager types commitment, assigns owner, hits enter. Action appears immediately in Panel 2.</div></div>
        <div class="ux-box"><div class="ux-box-label">Panel 4: Completed Yesterday (Collapsed by Default)</div><div class="ux-box-content">Actions completed since last standup. Provides context: what was achieved yesterday. Expandable for review. Auto-archived after 48 hours.</div></div>
      </div>

      <div class="sh2">Gantt View (NEW in v6)</div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">Layout — Visual Timeline</div><div class="ux-box-content">Horizontal timeline with activities as bars, grouped by workstream. X-axis: calendar dates (working days). Y-axis: activities grouped under workstream headers. Each bar: length = elapsed duration (effort ÷ teamSize + overhead), colour = workstream colour, position = scheduled start to end. Bar fill shows progress (% complete based on status: not_started=0%, in_progress=25%, draft_complete=60%, final=100%).</div></div>
        <div class="ux-box"><div class="ux-box-label">Dependency Lines</div><div class="ux-box-content">Arrows connecting dependent activities. Arrow starts at predecessor bar end, points to dependent bar start. Critical path highlighted in gold with thicker lines. Non-critical dependencies shown as thin grey lines. Compression shown as red arrows with negative buffer label ("−3 days").</div></div>
        <div class="ux-box"><div class="ux-box-label">Markers</div><div class="ux-box-content">Today line: vertical dashed gold line at current date. Milestone markers: diamonds on timeline at milestone dates. Governance gates: purple diamonds with gate name. Methodology gates: gold diamonds. Submission deadline: red vertical line.</div></div>
        <div class="ux-box"><div class="ux-box-label">Interactions</div><div class="ux-box-content">Hover bar → tooltip with activity details (code, name, effort, team, elapsed, status, owner, buffer to next dependent). Click bar → opens activity detail panel. Zoom: mouse wheel or pinch to zoom in/out on timeline. Pan: drag to scroll horizontally. Filter by workstream, phase, or critical-path-only. Toggle dependency lines on/off. Toggle team member view (bars coloured by owner instead of workstream).</div></div>
        <div class="ux-box"><div class="ux-box-label">Print</div><div class="ux-box-content">Export to A3 landscape PDF. All activities visible with dependency lines and critical path. Suitable for wall display in bid war room or inclusion in governance pack.</div></div>
      </div>

      <div class="sh2">Smart Nudging Engine (NEW in v5)</div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">Daily Check-In — Triggered on Workspace Load</div><div class="ux-box-content">When the bid manager opens the workspace or activity tracker, the system generates nudges from four sources. Nudges appear as a dismissable panel at the top of the workspace and as items in the standup view.</div></div>
        <table class="tb">
          <thead><tr><th>Nudge Type</th><th>Trigger Logic</th><th>Presentation</th><th>Bid Manager Action</th></tr></thead>
          <tbody>
            <tr><td><span class="fe fe-a">Stale Activity</span></td><td>Activity status not updated in X days (default: 3 working days for development and production activities, 2 for post-submission). lastUpdated timestamp compared to current date.</td><td>Amber pulse on activity card/row. "SOL-03 not updated in 5 days — still in progress?"</td><td>Update status, or dismiss (resets timer)</td></tr>
            <tr><td><span class="fe fe-g">Unblocked</span></td><td>All predecessor activities have reached "draft complete" or "final" status. Dependent activity is still "not started".</td><td>Green highlight. "SOL-04 is now unblocked — SOL-03 reached draft complete. Ready to start?"</td><td>Confirm start (sets status to "in progress" and actualStart to today), or defer</td></tr>
            <tr><td><span class="fe fe-r">Approaching Deadline</span></td><td>Activity due within 5 working days and status is not "final" or "draft complete".</td><td>Red highlight. "COM-06 due in 3 days — currently in progress. On track?"</td><td>Confirm on track (dismiss), flag at risk, or adjust due date</td></tr>
            <tr><td><span class="fe fe-p">Gate Approaching</span></td><td>Governance gate scheduled within prep lead time and not all entry criteria met.</td><td>Purple highlight. "G3 Pricing Review in 5 days — 2 of 6 entry criteria not yet met: COM-06, DEL-06."</td><td>Acknowledge, escalate, or request gate deferral</td></tr>
          </tbody>
        </table>
        <div class="co co-v"><div class="co-l">Design Principle</div><div class="co-t">Nudges are prompts, not autonomous updates. The system never changes activity status without human confirmation. The bid manager's morning routine becomes: open system → review 5–10 nudges → confirm, dismiss, or act on each → review standup actions → capture new commitments. Total time: 10–15 minutes. The system does the scanning; the human retains the judgment.</div></div>
      </div>

      <div class="sh2">Activity Detail Panel (Slide-out)</div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">Fields</div><div class="ux-box-content">All activity fields editable. Status dropdown. Assurance dropdown. Owner selector. Due date picker. Effort adjustment. Notes textarea. Dependency list (upstream and downstream). Linked response items (which ITT deliverables are authored under this activity). Linked compliance requirements (which prescriptive requirements this activity addresses). Linked review actions. Linked standup actions (child actions for this activity). Output upload/link field. AI generation button. Methodology guidance panel (collapsible — shows what good looks like for this activity type).</div></div>
      </div>
    `},
    {id:'ux-submissions',t:'M5: Submissions',bg:'bg-g',content:`
      <div class="co co-g"><div class="co-l">Design Principle</div><div class="co-t">Two-panel workflow driven by the ResponseSection / ResponseItem split. <strong>The exam paper (ResponseSection)</strong> captures what the client is asking — question text, evaluation weighting, word limits, scoring criteria. Populated at ITT commencement via CSV import, manual entry, or future AI ingestion, before any response work begins. <strong>The answer sheet (ResponseItem)</strong> tracks the team's production — status through the 10-stage lifecycle, word count, quality dimensions. Created when response work begins, linked 1:1 to its ResponseSection. The Response Register displays both as a single joined view: each row shows the question (from ResponseSection) alongside production status (from ResponseItem), with blank/not-started rows for questions where no ResponseItem exists yet. <strong>Compliance matrix</strong> (PRD-01) remains a required methodology activity but is managed externally in V1 (AI + Excel). The data model retains ComplianceRequirement for V2 in-product tracking. The Coverage Dashboard now has a proper denominator: ResponseSection count = total exam paper size, ResponseItem status distribution = production progress, giving true coverage percentage.</div></div>

      <div class="sh2">View 1: Client Response Requirements (Reference View)</div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">Reference Ribbon</div><div class="ux-box-content">Three-panel summary ribbon shown only on the Response Requirements tab. Gives any reader an immediate understanding of what needs to be assembled.
        <br/><br/><strong>Panel 1 — Evaluation Split Bar:</strong> Proportional stacked bar showing category weights from EvaluationFramework (e.g. Quality 60%, Price 30%, Social Value 10%). Each segment colour-coded (gold=quality, blue=price, cyan=social value). Labels below. Visually communicates whether the bid is quality-led or price-led at a glance. Section weights are inline-editable (click the percentage on the section header below to amend).
        <br/><br/><strong>Panel 2 — Headline Stats:</strong> Two large numbers: Total Pages (sum of pageLimit across all sections, or word limits converted at ~500 words/page) and Estimated Effort in person-days (derived from qualitative page count × 2 days/page baseline). Cormorant Garamond oversized gold numbers.
        <br/><br/><strong>Panel 3 — Submission Inventory:</strong> Card grid showing every deliverable type that exists in the bid. One card per responseType: Written Responses (count + total pages), Pricing Schedules, Documents, Certificates, CVs, Case Studies, etc. Non-written types list individual item names below the count (e.g. "Carbon Reduction Plan", "Employers Liability Insurance"). Cards only appear if that type has items. This is the manifest of everything the bid team must assemble.</div></div>
        <div class="ux-box"><div class="ux-box-label">Response Requirements Register</div><div class="ux-box-content">Pure reference view — what the client has released for submission. Replicates the structure the client has presented. No production tracking data.
        <br/><br/><strong>Grouped by evaluationCategory</strong> — collapsible section headers (e.g. Quality 60%, Price 30%, Social Value 10%). Section weight % pulled from EvaluationFramework category-level weights. <strong>Inline editable:</strong> clicking the weight percentage on a section header allows direct edit — updates EvaluationFramework immediately. Handles mid-bid ITT amendments where the client changes section weightings via clarification. Sections are collapsible/expandable so the bid manager can focus on the area of interest. Sort order within and across sections follows the client's prescribed document structure (ResponseSection.sortOrder), not evaluation marks.
        <br/><br/><strong>Columns per question row:</strong> Ref (from ResponseSection.reference — traceable back to source document section/paragraph) | Title (from ResponseSection.title) | Response Type (badge: written_question, document_upload, pricing_schedule, etc.) | Word/Page Limit (from ResponseSection — indicates output volume) | Raw Marks (from ResponseSection.evaluationMaxScore — marks available for this question, adds up to 100 within each section) | Hurdle Flag (visible icon/badge when ResponseSection.hurdleScore is set — surfaces hurdle questions immediately).
        <br/><br/>Clicking a question row opens the detail panel. No status columns, no owner, no effort, no production controls. This is a depository of what the client is asking for.</div></div>
        <div class="ux-box"><div class="ux-box-label">Question Detail Panel (large overlay)</div><div class="ux-box-content">Full-width overlay panel with depth — questions can be hundreds of words so the panel must accommodate substantial text. Reference data only, no production fields.
        <br/><br/><strong>Content:</strong> Full question text (from ResponseSection.questionText — may be several hundred words). Evaluation criteria (what the evaluator is looking for). Hurdle callout (if hurdleScore defined — prominently flagged with minimum score and consequences). Response type and format instructions. ITT source reference (volume, section number — traceable to source document). Word limit and page limit. Raw marks available (evaluationMaxScore).
        <br/><br/><strong>Edit mode:</strong> Edit button toggles the panel into edit mode. Editable fields: evaluationMaxScore (marks changed), wordLimit / pageLimit (output constraints changed), hurdleScore (hurdle added, removed, or adjusted), evaluationCriteria (scoring criteria amended), questionText (question itself amended). Save updates the ResponseSection and sets lastAmended to the current date — flagging that this question was modified post-import (e.g. via client clarification). Cancel discards changes. The lastAmended date is visible in the panel when set, providing a clear signal that the original ITT requirements were amended.
        <br/><br/>No production status, no owner, no word count progress, no quality dimensions, no status transitions. Those belong on the Production Pipeline view. This panel is the bid manager's reference for understanding exactly what the client is asking and how it will be scored. Designed for future AI enrichment (e.g. AI analysis of question intent, suggested approach, similar past questions).</div></div>
        <div class="ux-box"><div class="ux-box-label">CSV Import — Response Sections</div><div class="ux-box-content">Import the exam paper from CSV. Template download button shows required columns and structure. Sort order is implicit — row order in the CSV determines display order (matching the client's document structure).
        <br/><br/><strong>Required columns (9):</strong>
        <br/>1. <strong>reference</strong> — question/section number from ITT (e.g. Q1.1, 4.2.1)
        <br/>2. <strong>title</strong> — short question title
        <br/>3. <strong>questionText</strong> — full question text including any sub-questions (may be hundreds of words)
        <br/>4. <strong>responseType</strong> — written_question | document_upload | certificate | cv | pricing_schedule | case_study | other
        <br/>5. <strong>evaluationCategory</strong> — quality | price | social_value | pass_fail | unscored (drives the grouped section view)
        <br/>6. <strong>evaluationMaxScore</strong> — per-question raw marks within the section (e.g. 40 out of 100). Marks within a section add up to 100.
        <br/>7. <strong>evaluationCriteria</strong> — what the evaluator is looking for (the scoring mechanism)
        <br/>8. <strong>sectionNumber</strong> — ITT document section/paragraph reference for traceability (e.g. Section 4.2, Volume 5 para 3.1)
        <br/><br/><strong>Optional columns (3):</strong>
        <br/>9. <strong>hurdleScore</strong> — minimum score required to qualify, if applicable (not every question has a hurdle)
        <br/>10. <strong>wordLimit</strong> — maximum words if specified (not applicable to certificates, CVs, pricing schedules)
        <br/>11. <strong>pageLimit</strong> — maximum pages if specified (not applicable to all deliverable types)
        <br/><br/><strong>Dropped from CSV:</strong> evaluationWeightPct (section-level weight lives on EvaluationFramework, not per-question). sortOrder (implicit from row position in CSV).
        <br/><br/><strong>Validation:</strong> reference must be unique within bid, responseType and evaluationCategory must match enum values. All 9 required columns must be populated. Duplicate detection: warn on duplicate reference (bid manager may be updating). Import creates ResponseSection records only — ResponseItems are created separately when production begins. Re-importable at any point during bid lifecycle (amended ITT documents).</div></div>
      </div>

      <div class="sh2">View 1a: Production Pipeline</div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">10-Stage Lifecycle Flow</div><div class="ux-box-content">Horizontal flow diagram showing all 10 production stages as a numbered, labelled sequence with chevron connectors: (1) Not Started → (2) Storyboard → (3) Storyboard Approved → (4) First Draft → (5) Pink Ready → (6) Pink Reviewed → (7) Red Ready → (8) Red Reviewed → (9) Gold Ready → (10) Final. Each stage shows its count and a colour-coded pip. The flow makes the methodology visible — any viewer immediately understands the lifecycle and where deliverables sit.</div></div>
        <div class="ux-box"><div class="ux-box-label">Collapsible Stage Groups</div><div class="ux-box-content">Below the flow diagram, deliverables are grouped by their current production stage. Each group has a collapsible header showing stage name, colour pip, and item count. Expand to see the items at that stage. Column header row: Ref | Deliverable | Type | Marks | Owner | Status | Schedule.
        <br/><br/><strong>Row columns (display only — no inline editing):</strong> Ref (from ResponseSection), Deliverable title, Response Type (written question, document upload, etc.), Raw Marks (evaluationMaxScore for prioritisation context), Owner name, Current Status badge, Schedule indicator (days ahead/behind based on stage deadline — green if on track, amber if ≤3 days, red with "Xd behind" if overdue, dash if no deadline set).
        <br/><br/>Clicking any row opens the production slideout. Unstarted sections appear muted with a "Start" button. "Not started" uses neutral grey styling — not alarming, as some deliverables legitimately cannot start until upstream work completes. No action buttons in the pipeline tab footer.</div></div>
        <div class="ux-box"><div class="ux-box-label">Production Detail Panel</div><div class="ux-box-content">Clicking a deliverable from the pipeline opens a wide (780px) production slideout — distinct from the reference slideout on the Response Requirements tab. This is the bid manager's daily operating panel for tracking individual response production.
        <br/><br/><strong>Content:</strong> Full question text (large, same treatment as reference panel). Status with transition buttons. Owner as dropdown populated from team organisational chart (TeamMember entities). Word Limit (read-only from ResponseSection). Effort in days (editable — set by bid manager after discussion with owner, not auto-derived). Stage Deadline (date picker — "date to complete this stage and move to next", drives the schedule indicator in the pipeline rows). Stage deadlines will be auto-populated from the backward scheduling engine in the next build phase (see Production Scheduling Integration below).
        <br/><br/><strong>Production Log (4 structured sections):</strong>
        <br/>• Next Steps — what needs to happen to progress to the next stage
        <br/>• Issues &amp; Blockers — what is preventing progress right now
        <br/>• Risks — what could derail quality or timeline
        <br/>• Conversation Log — record of discussions, decisions, and agreements with the author/owner
        <br/><br/>Quality dimensions removed from production slideout — they belong on the Quality Overview tab. Complexity selector removed — effort is directly editable.</div></div>
        <div class="ux-box"><div class="ux-box-label">Production Ribbon</div><div class="ux-box-content">Six-metric summary ribbon shown on the Production Pipeline tab. Gives the bid manager an immediate read on production health.
        <br/><br/><strong>Panel 1 — Progress:</strong> Weighted progress % colour-coded against time elapsed. Compares production stage completion (weighted 0-100 across 10 stages) against % of time elapsed between ITT issue date and submission deadline. Green = on track (progress ahead of or within 5% of time). Amber = at risk (5-20% behind). Red = behind (>20% behind). Shows time elapsed % underneath for context.
        <br/><br/><strong>Panel 2 — Coverage:</strong> How many response sections have active production started (X/Y). Colour-coded: green ≥80%, amber ≥50%, red below.
        <br/><br/><strong>Panel 3 — Overdue:</strong> Count of deliverables past their stage deadline. Red if any, green if zero. Drives immediate action.
        <br/><br/><strong>Panel 4 — Effort Left:</strong> Total person-days remaining across all non-final items (from editable effortDays field). Tells the bid manager whether resource capacity matches remaining work.
        <br/><br/><strong>Panel 5 — Unassigned:</strong> Count of items with no owner plus unstarted sections. Red if >0. Production without ownership doesn't happen.
        <br/><br/><strong>Stage Distribution Bar:</strong> Proportional stacked bar showing how items are distributed across the 10 stages, with colour-coded segments and a labelled legend. At a glance: is work flowing through or bunched at early stages?</div></div>
      </div>

      <div class="sh2">View 2: Client Compliance Matrix — Deferred to V2</div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">V1 Scope</div><div class="ux-box-content">Compliance matrix (PRD-01) is a required methodology activity managed externally in V1 using AI and Excel. The ComplianceRequirement data model is retained for V2 in-product tracking. Governance hard gates for mandatory compliance gaps still apply — the bid manager declares compliance status at gate reviews, and readiness caps are enforced regardless of where tracking lives.</div></div>
      </div>

      <div class="sh2">View 3: Coverage Dashboard</div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">Response Completion</div><div class="ux-box-content">Donut chart: production status distribution with ResponseSection count as denominator (the full exam paper). Sections without a linked ResponseItem shown as "Not Started". Bar chart: completion by response type. Word count progress: total words written vs total word limits (from ResponseSection). Evaluation weight coverage: % of available marks (from ResponseSection.evaluationWeightPct) with responses at first_draft or beyond. Quality coverage: % of responses with all quality dimensions assessed. Coverage metric: "X of Y response sections have active production (Z%)".</div></div>
      </div>

      <div class="sh2">View 4: Quality Overview</div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">Quality Dimensions Summary</div><div class="ux-box-content">Aggregated view across all response items: % answering the question (Y/Partial/N) | % following structure | Average self-assessed score vs max available | % with credentials incorporated | Win theme integration heatmap (which themes are well-covered, which have gaps). Identifies quality hotspots — e.g. "8 responses missing credentials references, 3 responses below 60% of max score". Click any metric to filter the register to those items. Sortable by quality gap (biggest gap first) to prioritise improvement effort.</div></div>
      </div>

      <div class="sh2">View 5: Gap Report — Deferred to V2</div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">V1 Scope</div><div class="ux-box-content">Gap report depends on in-product compliance tracking. Deferred to V2 alongside compliance matrix UX. Response gaps and quality gaps are visible through the Quality Overview (View 4) and the Response Register filter/sort capabilities.</div></div>
      </div>

      <div class="sh2">Compliance Matrix (Print/Export) — Deferred to V2</div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">V1 Scope</div><div class="ux-box-content">Formal compliance matrix print/export deferred to V2. In V1, the compliance matrix for gate reviews is produced externally (AI + Excel) and presented as a separate document.</div></div>
      </div>

      <div class="sh2">Win Themes Panel <span style="color:var(--amb);font-size:12px;">[SESSION 12: Moving to new Evaluation &amp; Win Strategy module]</span></div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">Win Themes Register</div><div class="ux-box-content">Collapsible panel at the top of the Submissions view. Lists all WinTheme entities for this bid. Each theme: reference (WT-01), statement, rationale, status (draft/confirmed/revised), source activity (SAL-04/05/06). Inline editing. Add theme button. Themes developed during capture by sales lead; refined at ITT receipt.
        <br/><br/><strong>Integration Heatmap:</strong> Matrix showing theme × response item coverage. Rows = win themes, columns = response items (grouped by section). Cells show: green (integrated), amber (partial), red (not integrated), grey (not applicable — this theme not linked to this response). Summary row: "WT-01 integrated in 12/18 responses (67%)" — identifies themes that are under-represented across the bid. Summary column: "Q3.2.1 has 4/5 themes integrated — WT-03 missing."
        <br/><br/>Win theme statements provide direct framing context for future AI-assisted drafting — the AI uses these to shape how each response is written.</div></div>
      </div>

      <div class="sh2">Client Scoring Scheme (Optional) <span style="color:var(--amb);font-size:12px;">[SESSION 12: Moving to new Evaluation &amp; Win Strategy module]</span></div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">Scoring Scheme Configuration</div><div class="ux-box-content">Optional — not all procurements have a client-disclosed marking scheme. Low-value or commodity purchases rarely do. When present: capture during setup or when ITT evaluation criteria become available.
        <br/><br/><strong>Scheme Definition:</strong> Max score (e.g. 10). Grade bands with labels, score ranges, and descriptors. For example:
        <br/>• 9-10 Excellent — "Demonstrates comprehensive understanding with quantified evidence, innovative approach exceeding requirements"
        <br/>• 7-8 Good — "Demonstrates sound understanding with evidence, meets all requirements"
        <br/>• 5-6 Acceptable — "Demonstrates adequate understanding, meets most requirements"
        <br/>• 3-4 Poor — "Limited understanding, gaps in requirements coverage"
        <br/>• 0-2 Unacceptable — "Fails to demonstrate understanding or meet requirements"
        <br/><br/><strong>Per-Question Hurdle Marks:</strong> Some high-priority questions have a minimum acceptable score (e.g. "must score 6 or more"). Set on the ResponseItem. When present, the system flags any response where self-assessed or reviewer-predicted score is below the hurdle: "Q3.2 hurdle: 6 — current self-assessment: 5 — ACTION REQUIRED."
        <br/><br/>Grade band descriptors are displayed alongside the quality self-assessment in the Response Item Detail panel, so the bid manager assesses against the client's own language. Also displayed to reviewers during formal reviews for predicted client score.</div></div>
      </div>

      <div class="sh2">Clarification Impact</div>
      <div class="bt">When BM-15 (clarification impact analysis) flags affected items, both compliance requirements and response items can be marked with a clarification impact indicator. The bid manager reviews each flagged item and updates the compliance status, response content, or mapping as needed. System highlights flagged-but-unreviewed items as an action. Count of unreviewed clarification impacts shown on workspace.</div>
    `},
    {id:'ux-review',t:'M6: Reviews',bg:'bg-a',content:`
      <div class="co co-g"><div class="co-l">Design Principle</div><div class="co-t">This module manages <strong>formal peer and external SME review of written responses</strong> at the pink, red, and gold stages. It is distinct from self-assessment quality tracking in Submissions (which the bid manager maintains as responses are authored) and from organisational assurance in Governance (which covers solution, commercial, and executive decision-making). Reviews are triggered when response items reach pink_ready, red_ready, or gold_ready status. Review closure advances the production status of reviewed items (e.g. pink_ready → pink_reviewed). The same quality dimensions used in self-assessment reappear here — but now scored by independent reviewers.</div></div>

      <div class="sh2">Primary View: Review Timeline</div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">Timeline</div><div class="ux-box-content">Horizontal timeline showing all review cycles: pink | red | gold (plus ad-hoc if any). Each cycle: name, date, status badge (scheduled/in progress/actions open/closed). Colour-coded by stage: pink = amber, red = red, gold = gold. Click cycle → opens cycle detail. Shows which response items are included in each review.</div></div>
        <div class="ux-row">
          ${[{l:'Review Cycles',v:'3'},{l:'Actions Open',v:'14'},{l:'Critical Open',v:'3'},{l:'Resolution Rate',v:'72%'}].map(m=>`<div class="ux-col"><div class="ux-metric"><div class="ux-metric-val" style="color:var(--grn);">${m.v}</div><div class="ux-metric-lbl">${m.l}</div></div></div>`).join('')}
        </div>
      </div>

      <div class="sh2">Cycle Detail View</div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">Scorecard Summary — Dual Scoring</div><div class="ux-box-content"><strong>Internal Quality Score (diagnostic — what to fix):</strong> Per-response scoring by each reviewer against 8 quality criteria on a 1-5 scale: answers the question | follows question structure | responsiveness to evaluation criteria | evidence (case studies, data, proof) | credentials (past success, delivery track record) | win themes (agreed themes integrated) | readability (clear, concise, well-structured) | differentiation (stands out from competitors). Radar chart or bar chart showing average scores by criterion. Overall score per response. Comparison with previous review cycle scores (e.g. pink vs red improvement). Threshold indicators: pink >= 2.0, red >= 3.0, gold >= 3.5.
        <br/><br/><strong>Predicted Client Score (predictive — where you will land):</strong> Optional — only shown when ClientScoringScheme exists for this bid. Each reviewer predicts what this response would score on the client's marking scheme. Displayed alongside the client's grade band descriptors so reviewers assess against the client's own language. Auto-computes which grade band the prediction falls into. If the response has a hurdle mark, flags whether the predicted score meets it: "Predicted: 5 / Hurdle: 6 — BELOW HURDLE." Averaged across reviewers. Comparison with bid manager's self-assessment from Submissions.
        <br/><br/>The internal score tells you what is weak; the predicted client score tells you whether it matters enough to fix before the next review stage.</div></div>
        <div class="ux-box"><div class="ux-box-label">Action Table</div><div class="ux-box-content">Columns: # | Response Ref | Response Title | Comment (expandable) | Severity (badge: critical/major/minor) | Criterion | Owner | Deadline | Status (badge: open/in_progress/resolved/accepted/disputed) | Resolution Notes (expandable). Filter by severity, response item, owner, status. Sort by severity (critical first) or deadline. Inline status update. Add action button for ad-hoc items. Resolution notes field appears when status set to "resolved". Each action has a clear resolution path: what needs to change, who does it, by when.</div></div>
        <div class="ux-box"><div class="ux-box-label">Gate Logic Panel</div><div class="ux-box-content">Shows: total critical actions, resolved critical actions, gate status (locked/unlocked). If any critical action is open: gate shows as LOCKED with red indicator and message "X critical action(s) must be resolved before this review can close." When all critical resolved: gate shows UNLOCKED with green indicator and "Close review" button. On closure: linked response items advance production status (pink_ready → pink_reviewed, red_ready → red_reviewed, gold_ready → final).</div></div>
      </div>

      <div class="sh2">Cross-Review Dashboard</div>
      <div class="bt">Aggregated view across all review cycles: total actions by severity, resolution rate trend, responses with most actions (quality hotspots), score improvement tracking across cycles (did the pink feedback actually improve the red score?), reviewers by volume. Identifies patterns — e.g. "technical responses consistently score low on evidence" or "win theme integration improves between pink and red but credentials remain weak."</div>
    `},
    {id:'ux-gov',t:'M7: Governance',bg:'bg-pr',content:`
      <div class="co co-g"><div class="co-l">Design Principle</div><div class="co-t">Governance provides <strong>organisational assurance</strong> — it is about whether the bid's strategic, commercial, and financial position is sound, not about the quality of individual written responses (that is Reviews). This module covers: solution assurance (is the technical approach viable?), commercial/financial assurance (is the pricing defensible, are margins acceptable?), and executive governance (formal decision authority to agree price, risk, and margin). Development reviews (solution review, commercial review, risk review) sit here because they are assurance decisions made by senior stakeholders, not peer review of authored content. Executive gates escalate by TCV (BU → ExCo → Board).</div></div>

      <div class="sh2">Primary View: Gate Pipeline</div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">Gate Pipeline</div><div class="ux-box-content">Vertical list of configured gates in sequence. Each gate card shows: gate name, type badge (solution_review/commercial_review/risk_review/executive tier/methodology/submission authority/BAFO authority), approving body, scheduled date, status (upcoming/ready/in progress/passed/failed/deferred). Entry criteria checklist: each criterion shows linked activity, required assurance level, current assurance level, met (✓/✗). Overall readiness: X of Y criteria met. Progress bar. Preparation status indicator: prep actions generated/in progress/complete.</div></div>
        <div class="ux-box"><div class="ux-box-label">Gate Detail (expanded)</div><div class="ux-box-content">Entry criteria table with live status from activity data. Decision section: dropdown (approve/approve with conditions/revise/reject/defer). Conditions text field. Risk premium input (% — records contingency applied). Decision record text area. Attendees list. Date completed. Read-only after gate passed.</div></div>
      </div>

      <div class="sh2">Gate Preparation Tracker (NEW in v5)</div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">Layout</div><div class="ux-box-content">When a gate is within its preparation lead time, a preparation panel expands showing the auto-generated standup actions with their status. Each preparation step: offset label (T-5, T-3, T-2, T-1, T-0, T+1), action description, owner (defaults to bid manager, reassignable), status (pending/in progress/done/overdue), due date. Actions flow automatically into the Standup View in the Activity Tracker. Overdue preparation steps escalate to workspace alerts.</div></div>
        <div class="ux-box"><div class="ux-box-label">Preparation Timeline</div><div class="ux-box-content">Visual horizontal timeline for the gate showing: today marker, each preparation step as a node on the timeline, entry criteria readiness at each checkpoint. At T-5 the system pre-checks criteria and flags gaps — giving 5 days to resolve before the gate. If criteria cannot be met, the bid manager can request deferral directly from this view.</div></div>
      </div>

      <div class="sh2">Risk Premium Tracker</div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">Layout</div><div class="ux-box-content">Total risk premium across all gates, broken down by gate. Each entry: gate name, premium %, linked cause (unmet criteria), approver. Calculates TCV impact: "X% on £Ym = £Zm added to price." Makes the cost of poor preparation visible and auditable.</div></div>
      </div>

      <div class="sh2">Print: Gate Pack</div>
      <div class="bt">Each gate produces a printable pack: entry criteria status, readiness summary, key risks, recommendation. A4 format. PDF export. Assembled automatically from system data — the T-3 preparation action "assemble review pack" links directly to generating this output.</div>
    `},
    {id:'ux-readiness',t:'M8: Readiness Dashboard',bg:'bg-a',content:`
      <div class="sh2">Primary View: Dual-Track Readiness</div>
      <div class="ux-frame">
        <div class="ux-row">
          <div class="ux-col"><div class="ux-metric"><div class="ux-metric-val" style="color:var(--amb);font-size:36px;">67%</div><div class="ux-metric-lbl">Overall Readiness</div></div></div>
          <div class="ux-col"><div class="ux-metric"><div class="ux-metric-val" style="color:var(--blu);">78%</div><div class="ux-metric-lbl">Development Track</div></div></div>
          <div class="ux-col"><div class="ux-metric"><div class="ux-metric-val" style="color:var(--red);">42%</div><div class="ux-metric-lbl">Production Track</div></div></div>
        </div>
        <div class="ux-box"><div class="ux-box-label">Development Readiness Signals</div><div class="ux-box-content">Each signal as a row: Signal Name | Current Value | Target | Status (green/amber/red) | Source.<br><br>Signals: Win strategy locked & assured | Solution design locked & assured | Pricing model locked & assured | Risk register mitigated & assured | Partner agreements signed | Governance gates passed (X of Y) | Methodology gates passed (X of 2)</div></div>
        <div class="ux-box"><div class="ux-box-label">Production Readiness Signals</div><div class="ux-box-content">Signals: Response item completion % (ResponseItems at final or draft_complete / total ResponseItems — NOT PRD activities) | Compliance declarations complete % (ComplianceRequirements with complianceStatus assessed / total — NOT coverage status) | Review actions resolved % (critical) | Approvals obtained (X of Y) | Artefact checklist % (auto-seeded from document-type ResponseItems) | Workstream timing health.<br><br><strong>Hollow-score guard:</strong> if any signal scores 100% because its denominator is zero (no items exist), display warning icon: "No data — import ITT structure to get a meaningful score." Zero items = 0% score, not 100%.</div></div>
        <div class="ux-box"><div class="ux-box-label">Compression Alerts</div><div class="ux-box-content">Active compression warnings listed with: affected dependency chain, buffer remaining, impact description, suggested action. Red alerts force overall readiness to amber maximum regardless of other signals.</div></div>
      </div>

      <div class="sh2">Post-Submission Readiness (when applicable)</div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">Signals</div><div class="ux-box-content">Presentation prepared & rehearsed | Post-submission clarifications responded | BAFO prepared & approved | Contract negotiations progressing | Award processing ready. Only shown when post-submission activities are active.</div></div>
      </div>

      <div class="sh2">Readiness Trend</div>
      <div class="bt">Line chart showing overall readiness % over time (captured at each status update). Shows trajectory: converging toward 100% (healthy) or plateauing/declining (concerning). Overlaid with milestone dates.</div>

      <div class="sh2">Executive Print View</div>
      <div class="bt">Single A4 page. Top: overall score with verdict (ready/conditional/not ready). Middle: signal breakdown table. Bottom: key risks, milestone status, compression alerts. Suitable for gate review presentations. PDF export.</div>
    `},
    {id:'ux-submission',t:'M9: Submission Manager',bg:'bg-p',content:`
      <div class="sh2">Primary View: Submission Checklist</div>
      <div class="ux-frame">
        <div class="ux-row">
          ${[{l:'Artefacts Ready',v:'8/12'},{l:'Approvals Complete',v:'3/5'},{l:'QA Items Clear',v:'14/18'},{l:'Hours to Deadline',v:'47'}].map(m=>`<div class="ux-col"><div class="ux-metric"><div class="ux-metric-val" style="color:var(--amb);">${m.v}</div><div class="ux-metric-lbl">${m.l}</div></div></div>`).join('')}
        </div>
        <div class="ux-box"><div class="ux-box-label">Artefact Register</div><div class="ux-box-content">Table: Document Name | Type (badge) | Owner | Status (not started/draft/final/uploaded/confirmed) | Submission File Name (per ITT requirements) | Page Limit | Actual Pages | Linked Response Items (count + status summary) | Notes. Status colour-coded. Items not at "final" or above highlighted amber. Items not at "uploaded" with <24h to deadline highlighted red. Artefacts auto-seeded from document-type ResponseItems during setup (certificates, CVs, case studies, pricing schedules, presentations). Additional artefacts added manually. Each artefact row shows linked ResponseItem production status.</div></div>
        <div class="ux-box"><div class="ux-box-label">Final QA Checklist</div><div class="ux-box-content">Checklist items: Cross-references correct ✓/✗ | Pagination continuous ✓/✗ | Headers/footers correct ✓/✗ | Branding applied ✓/✗ | Page limits met ✓/✗ | File naming conventions ✓/✗ | Redaction complete ✓/✗ | Word/character counts within limits ✓/✗ | Attachments present ✓/✗ | Signatures obtained ✓/✗. Each item checkable. Incomplete items block submission readiness.</div></div>
        <div class="ux-box"><div class="ux-box-label">Approval Tracker</div><div class="ux-box-content">List of required final approvals: Pricing sign-off, Legal sign-off, Executive sign-off, Final submission authority. Each: approver name, status (pending/approved/rejected), date. All must be "approved" before submission can proceed.</div></div>
      </div>

      <div class="sh2">Portal Upload Tracker</div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">Layout</div><div class="ux-box-content">For each artefact: upload status (not uploaded/uploading/uploaded/confirmed), timestamp, confirmation receipt reference. Portal name and URL. Total upload progress bar. Submission confirmation screenshot/reference field. Final submission log: who submitted, when, via which channel, confirmation reference.</div></div>
      </div>

      <div class="sh2">Post-Submission Trigger</div>
      <div class="bt">When submission is confirmed, the system: marks all PRD activities as "submitted", triggers BM-11 (hot debrief) as an active action item, transitions the bid to "post_submission" phase if post-submission activities are configured, and updates the practice portfolio with submission confirmation.</div>
    `},
    {id:'ux-team',t:'M10: Team Manager',bg:'bg-bm',content:`
      <div class="co co-g"><div class="co-l">Design Principle</div><div class="co-t">Bid teams are fluid — people join, leave, and change roles throughout the bid lifecycle. The Team Manager is the single source of truth for who is on the team, what they cost, when they are available, and who the key stakeholders are. All views are fully editable with add/edit/remove capability. Data seeded from the setup wizard but expected to evolve continuously. Rate data feeds the spend forecast, giving the bid manager visibility of cost-to-bid in real time.</div></div>

      <div class="sh2">Tab 1: Team Directory</div>
      <div class="bt">Two views of the same data: an organisational chart and a sortable list. Both are editable. Data seeded from wizard Stage 4 (core roles + extended team). Contact details (email, phone) are optional and can be added here or during wizard setup.</div>
      <div class="ux-frame">
        <div class="ux-row">
          \${[{l:'Team Size',v:'14',c:'var(--t1)'},{l:'Core Roles Filled',v:'6/6',c:'var(--grn)'},{l:'Clearance Held',v:'9/14',c:'var(--amb)'},{l:'Contractors',v:'4',c:'var(--cyn)'}].map(m=>\`<div class="ux-col"><div class="ux-metric"><div class="ux-metric-val" style="color:\${m.c};">\${m.v}</div><div class="ux-metric-lbl">\${m.l}</div></div></div>\`).join('')}
        </div>
        <div class="ux-box"><div class="ux-box-label">Org Chart View</div><div class="ux-box-content">Simple hierarchical tree. Bid Manager at top. Six core leads (Solution, Commercial, Delivery, Legal, Supply Chain) as direct reports. Extended team members grouped under their workstream lead via the reportsTo field. Each node shows: name, role, organisation, clearance badge (colour-coded: green=held, amber=in progress, grey=not required). Contractor indicator (dashed border). Click node → opens inline edit panel. Drag node to reassign reporting line.</div></div>
        <div class="ux-box"><div class="ux-box-label">List View</div><div class="ux-box-content">Sortable table. Columns: Name | Role | Core Role (badge if lead) | Organisation | Workstreams | Email | Phone | Clearance (badge) | Clearance Status | Contractor (Y/N) | Individual Day Rate (£) | Start Date | End Date | Active (Y/N). Filter by: workstream, clearance level, contractor status, active/inactive. Inline editing on all fields. Inactive members shown greyed with strikethrough. Sort by any column.</div></div>
        <div class="ux-box"><div class="ux-box-label">Actions</div><div class="ux-box-content">+ Add Team Member (opens form with all fields). Edit (inline or detail panel). Remove (soft-delete — sets isActive=false, preserves history). CSV Import (columns: name, role, organisation, workstreams, email, phone, clearance, clearanceStatus, isContractor, individualDayRate). CSV Export.</div></div>
      </div>

      <div class="sh2">Tab 2: Unavailability</div>
      <div class="bt">Calendar view of all team member unavailability. Seeded from wizard Stage 3. Fully editable — add, modify, or remove entries as plans change throughout the bid.</div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">Calendar View</div><div class="ux-box-content">Horizontal timeline (Gantt-style). Y-axis: team member names (sorted by core role then alphabetical). X-axis: calendar dates across the bid period. Unavailability blocks shown as coloured bars per person. Public holidays shown as vertical shaded columns. Today marker as vertical gold line. Hover bar → tooltip with dates and notes. Click bar → inline edit (change dates, notes, or delete). Click empty space → add new unavailability entry for that person/date.</div></div>
        <div class="ux-box"><div class="ux-box-label">List View</div><div class="ux-box-content">Sortable table. Columns: Name | From | To | Duration (working days) | Notes. Filter by person, date range. Sort by any column. Inline editing. Highlight entries that overlap with critical path activities (amber warning icon).</div></div>
        <div class="ux-box"><div class="ux-box-label">Actions</div><div class="ux-box-content">+ Add Unavailability (person dropdown, from date, to date, notes). Edit (inline). Delete. CSV Import (columns: name, from, to, notes). CSV Export. Bulk add (select multiple people for same date range — e.g. bank holiday team shutdown).</div></div>
        <div class="ux-box"><div class="ux-box-label">Impact Indicator</div><div class="ux-box-content">When unavailability overlaps with activities owned by that person, show amber warning: "J. Smith unavailable 15–19 Mar — 3 activities affected: SOL-03, SOL-04, COM-02." Links to affected activities in Activity Tracker.</div></div>
      </div>

      <div class="sh2">Tab 3: Rate Card</div>
      <div class="bt">Two-layer rate structure: standard company rates per role (the benchmark) and individual rates per team member. Contractors typically have higher individual rates than the standard card. This data feeds the spend forecast.</div>
      <div class="ux-frame">
        <div class="ux-box"><div class="ux-box-label">Standard Rate Card Table</div><div class="ux-box-content">Editable table of company standard day rates. Columns: Role Name | Standard Day Rate (£). Pre-seeded with common roles (Bid Manager, Solution Architect, Commercial Manager, Delivery Manager, Legal Counsel, Supply Chain Manager, SME, Author, Reviewer). Add custom roles. Inline editing. These rates are the baseline — used when a team member has no individual rate set.</div></div>
        <div class="ux-box"><div class="ux-box-label">Individual Rate Comparison</div><div class="ux-box-content">Table showing each active team member alongside their rate. Columns: Name | Role | Organisation | Contractor (Y/N) | Individual Day Rate (£) | Standard Rate (£) | Variance (£ and %). Highlights: contractors shown with cyan accent, variance > 20% above standard shown amber, variance > 50% above shown red. Inline editing of individual day rate. If no individual rate set, falls back to standard rate for their role.</div></div>
        <div class="ux-box"><div class="ux-box-label">Actions</div><div class="ux-box-content">+ Add Standard Role (role name, day rate). Edit rates (inline). Delete role. CSV Import for standard rates (columns: roleName, standardDayRate). CSV Export.</div></div>
      </div>

      <div class="sh2">Tab 4: Stakeholders</div>
      <div class="bt">Key stakeholders engaged in the governance process — decision-makers, approvers, reviewers, and influencers. Separate from the bid team. These are the people who attend gates, sign off deliverables, and shape key decisions.</div>
      <div class="ux-frame">
        <div class="ux-row">
          \${[{l:'Total Stakeholders',v:'8'},{l:'Sponsors',v:'2'},{l:'Approvers',v:'3'},{l:'Reviewers',v:'3'}].map(m=>\`<div class="ux-col"><div class="ux-metric"><div class="ux-metric-val" style="color:var(--pur);">\${m.v}</div><div class="ux-metric-lbl">\${m.l}</div></div></div>\`).join('')}
        </div>
        <div class="ux-box"><div class="ux-box-label">Stakeholder Register</div><div class="ux-box-content">Sortable table. Columns: Name | Role | Organisation | Type (badge: sponsor/approver/reviewer/influencer/SME) | Email | Phone | Linked Gates (badges showing gate names) | Notes. Filter by type, organisation. Sort by any column. Inline editing. Click stakeholder → detail panel showing all linked gates with their status.</div></div>
        <div class="ux-box"><div class="ux-box-label">Gate Participation Matrix</div><div class="ux-box-content">Matrix view. Rows = stakeholders, columns = governance gates. Cells show participation (filled dot = participating, empty = not). Gives the bid manager an at-a-glance view of who is needed at each gate. Click cell to toggle participation. Identifies gaps — gates with no approver linked shown with red warning.</div></div>
        <div class="ux-box"><div class="ux-box-label">Actions</div><div class="ux-box-content">+ Add Stakeholder (name, role, organisation, type, email, phone, linked gates, notes). Edit (inline). Remove (soft-delete — sets isActive=false). CSV Import (columns: name, role, organisation, stakeholderType, email, phone, notes). CSV Export.</div></div>
      </div>

      <div class="sh2">Tab 5: Spend Forecast</div>
      <div class="bt">Calculates forecast bid cost based on team rates and planned activity effort. Gives the bid manager real-time visibility of cost-to-bid and helps identify where contractor spend is driving cost above standard rates.</div>
      <div class="ux-frame">
        <div class="ux-row">
          \${[{l:'Forecast Spend (£)',v:'142,500',c:'var(--gold)'},{l:'At Standard Rates (£)',v:'118,200',c:'var(--grn)'},{l:'Contractor Premium (£)',v:'24,300',c:'var(--amb)'},{l:'Total Effort (days)',v:'285',c:'var(--t1)'}].map(m=>\`<div class="ux-col"><div class="ux-metric"><div class="ux-metric-val" style="color:\${m.c};">\${m.v}</div><div class="ux-metric-lbl">\${m.l}</div></div></div>\`).join('')}
        </div>
        <div class="ux-box"><div class="ux-box-label">Spend by Person</div><div class="ux-box-content">Table. Columns: Name | Role | Day Rate (£) | Planned Effort (days — sum of effortDays from activities where they are owner) | Forecast Cost (rate × effort) | % of Total Spend. Sorted by forecast cost descending. Contractor rows highlighted with cyan accent. Totals row at bottom. Bar chart alongside showing proportional spend per person.</div></div>
        <div class="ux-box"><div class="ux-box-label">Spend by Workstream</div><div class="ux-box-content">Table. Columns: Workstream | Total Effort (days) | Forecast Cost (£) | % of Total. Stacked bar chart showing workstream cost breakdown. Colour-coded by workstream colours. Helps identify which areas of the bid are consuming the most resource cost.</div></div>
        <div class="ux-box"><div class="ux-box-label">Rate Variance Analysis</div><div class="ux-box-content">Comparison: what the bid would cost at standard rates vs actual rates. Shows total premium paid for contractors or specialist resources. Per-person breakdown: name, standard rate, actual rate, effort, cost at standard, cost at actual, variance. Highlights where individual rates significantly exceed the standard card.</div></div>
        <div class="ux-box"><div class="ux-box-label">Spend Over Time</div><div class="ux-box-content">Line chart showing cumulative forecast spend over the bid timeline (based on activity planned dates and assigned effort). X-axis: bid timeline weeks. Y-axis: cumulative £. Two lines: forecast at actual rates, forecast at standard rates. Shaded area between shows contractor premium over time. Useful for cash flow planning and identifying spend peaks.</div></div>
      </div>

      <div class="sh2">Wizard Integration</div>
      <div class="bt">Wizard Stage 4 captures initial team data (core roles, extended team with optional email/phone, clearance). Wizard Stage 3 captures unavailability. All wizard data seeds the Team Manager entities on bid creation. The Team Manager then becomes the live, editable register for the duration of the bid.</div>
    `},
  ].map(m=>`

  <br/>3. Claude writes only to AI-owned fields. The MCP server rejects any write to bid manager-owned fields at the API layer. AIInsight records are always append-only — never updated or deleted. Each analysis run creates a new record with a generated_at timestamp. Field-level permission model: every field in the data model tagged as owner: bid_manager or owner: ai, enforced at MCP schema level.

  <br/><br/><strong>Three-layer product architecture</strong>
  <br/>4. The AI use cases revealed a clear three-layer architecture that separates concerns:

  <br/><br/><strong>Implementation challenges identified</strong>
  <br/>6. Five challenges to resolve during MCP server design:
  <br/><br/>(a) <strong>Single-file vs plugin boundary:</strong> The bid execution HTML app is the data layer and UI. The AI use cases run in a separate plugin/service that reads and writes to that data via MCP. These are different products sharing a data model. The HTML app must expose its localStorage data to the MCP server — this requires either a bridge API or a shared persistence layer.
  <br/><br/>(b) <strong>MCP query granularity:</strong> UC1 specifies &quot;never load all 79 activities at once.&quot; The MCP server needs filtered queries: per-workstream, per-gate, per-cycle, per-response-section. Query design determines context window efficiency. Each use case needs a defined query contract — which entities, which filters, which fields.
  <br/><br/>(c) <strong>Scheduled triggers require a runtime:</strong> UC1 (weekly), UC3 (daily 08:00), UC8 (48 hours before review), UC12 (10 days before gate). A single HTML file in a browser has no scheduler. Options: desktop agent, server-side scheduler, or user-triggered with recommended cadence. Scheduled execution is a V2 capability — V1 launches all use cases as on-demand only.
  <br/><br/>(d) <strong>Context window management:</strong> Several use cases need portfolio-level reasoning (UC4 needs all ResponseSections + EvaluationFramework + ComplianceRequirements simultaneously; UC6 needs all sections + effort data). With 30-40 response sections plus evaluation criteria, the context is substantial but feasible with current models. MCP query design must minimise payload while preserving reasoning completeness.

  <br/><br/><strong>Four-layer AI value proposition</strong>
  <br/>10. The AI value case has four distinct layers, each with different economics. Full positioning document saved as <strong>ai_value_proposition.md</strong> in the docs folder.
  <br/><br/><em>Layer 1 — Task Efficiency:</em> 34% less person-day effort per bid. 172 of 505 days saved. Computed bottom-up from 295 L3 task assessments against activity effort allocations. This is the weakest layer commercially — it understates real economics because it measures productive task time, not bid cost.
  <br/><br/><em>Layer 2 — Timeline Compression:</em> AI compresses the critical path, releasing the reserved bid team earlier. Real bid cost is team size × duration × day rates, not sum of task effort. If AI compresses a 10-week bid by 2-3 weeks, that eliminates 150-225 person-days of reservation cost per bid (£90k-180k). This is the correct unit of measurement for bid economics.
  <br/><br/><em>Layer 3 — Team Fungibility:</em> AI as institutional memory reduces key-person dependency. New team members onboard in days not weeks. Specialists can work across 2-3 concurrent bids because AI maintains context between sessions. Mid-bid team changes become managed transitions, not crises. For firms with large pursuit portfolios, the same pool of specialists covers 30% more concurrent bids.
  <br/><br/><em>Layer 4 — Decision Velocity (highest value):</em> AI brings informed pursuit decisions from month 3 to week 1. Today, go/no-go gates happen with incomplete information — the team hasn&apos;t yet analysed requirements, contract terms, competitive positioning, or solution feasibility. Everything passes because &quot;we need to get up to speed first.&quot; With AI, Gate 1 has: full ITT analysis, compliance matrix, contract review, competitive landscape, win strategy draft, cost envelope, and solution feasibility signals. Bad pursuits are killed in week 1, not month 3. Cost avoidance: 400-600 person-days per early kill (£240k-480k). A firm killing 3-5 pursuits early per year saves £720k-2.4m annually. <strong>This dwarfs all other value layers.</strong>
