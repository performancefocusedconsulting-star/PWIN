<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PWIN Architect — Bid Execution Architecture v6</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg0:#080E1A;--bg1:#0F1724;--bg2:#162032;--bg3:#1D2B40;--bg4:#25354E;
  --bdr:#253551;--bdr-s:#1A2844;
  --gold:#C49438;--gold-d:rgba(196,148,56,.12);--gold-g:rgba(196,148,56,.06);
  --t1:#E8ECF1;--t2:#94A3B8;--t3:#64748B;--t4:#475569;
  --grn:#34D399;--grn-d:rgba(52,211,153,.10);
  --red:#F87171;--red-d:rgba(248,113,113,.10);
  --amb:#FBBF24;--amb-d:rgba(251,191,36,.10);
  --blu:#60A5FA;--blu-d:rgba(96,165,250,.10);
  --pur:#A78BFA;--pur-d:rgba(167,139,250,.10);
  --cyn:#22D3EE;--cyn-d:rgba(34,211,238,.10);
  --pink:#F472B6;--pink-d:rgba(244,114,182,.10);
  --lime:#A3E635;--lime-d:rgba(163,230,53,.10);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg0);color:var(--t1);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;}
.hdr{padding:16px 28px;border-bottom:1px solid var(--bdr-s);display:flex;align-items:center;justify-content:space-between;background:var(--bg1);}
.hdr-l{display:flex;align-items:baseline;gap:12px;}
.hdr-brand{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;font-style:italic;color:var(--gold);}
.hdr-sub{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);}
.hdr-v{font-family:'DM Mono',monospace;font-size:10px;color:var(--t4);background:var(--bg2);padding:3px 8px;border:1px solid var(--bdr);}
.nav{display:flex;gap:1px;padding:0 28px;background:var(--bg1);border-bottom:1px solid var(--bdr-s);overflow-x:auto;}
.nav-b{padding:9px 12px;font-family:'DM Mono',monospace;font-size:9.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--t3);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;}
.nav-b:hover{color:var(--t2);}.nav-b.on{color:var(--gold);border-bottom-color:var(--gold);}
.ct{padding:22px 28px;max-width:1440px;margin:0 auto;animation:fi .2s ease both;}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.sl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:5px;}
.st{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:var(--t1);margin-bottom:5px;line-height:1.2;}
.sd{color:var(--t2);font-size:12.5px;max-width:780px;margin-bottom:22px;line-height:1.7;}
.sh{font-size:15px;font-weight:700;color:var(--t1);margin:20px 0 8px;}
.sh2{font-size:13px;font-weight:600;color:var(--t1);margin:14px 0 6px;}
.bt{color:var(--t2);font-size:12.5px;line-height:1.7;margin-bottom:8px;max-width:820px;}
.cg{display:grid;gap:10px;margin-bottom:18px;}
.c2{grid-template-columns:repeat(2,1fr);}.c3{grid-template-columns:repeat(3,1fr);}.c4{grid-template-columns:repeat(4,1fr);}.c5{grid-template-columns:repeat(5,1fr);}
@media(max-width:1100px){.c4,.c5{grid-template-columns:1fr 1fr;}}
@media(max-width:700px){.c2,.c3,.c4,.c5{grid-template-columns:1fr;}}
.cd{background:var(--bg2);border:1px solid var(--bdr);padding:14px;position:relative;overflow:hidden;transition:all .15s;}
.cd:hover{background:var(--bg3);border-color:var(--gold);}
.cd::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;}
.cd.a-gold::before{background:var(--gold)}.cd.a-grn::before{background:var(--grn)}.cd.a-blu::before{background:var(--blu)}.cd.a-pur::before{background:var(--pur)}.cd.a-red::before{background:var(--red)}.cd.a-amb::before{background:var(--amb)}.cd.a-cyn::before{background:var(--cyn)}.cd.a-pink::before{background:var(--pink)}.cd.a-lime::before{background:var(--lime)}
.cd-n{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--gold);opacity:.3;position:absolute;top:8px;right:10px;}
.cd-l{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin-bottom:3px;}
.cd-t{font-size:13px;font-weight:700;color:var(--t1);margin-bottom:4px;}
.cd-b{color:var(--t2);font-size:11.5px;line-height:1.6;}
.co{padding:12px 14px;margin:12px 0;border-left:3px solid;background:var(--bg2);}
.co.co-g{border-color:var(--gold)}.co.co-v{border-color:var(--grn)}.co.co-b{border-color:var(--blu)}.co.co-r{border-color:var(--red)}
.co-l{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:3px;}
.co.co-g .co-l{color:var(--gold)}.co.co-v .co-l{color:var(--grn)}.co.co-b .co-l{color:var(--blu)}.co.co-r .co-l{color:var(--red)}
.co-t{color:var(--t2);font-size:12px;line-height:1.7;}
.sg{display:grid;grid-template-columns:160px 1fr;gap:0;margin:10px 0;border:1px solid var(--bdr);}
.sg-k{padding:7px 10px;font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);background:var(--bg4);border-bottom:1px solid var(--bdr-s);}
.sg-v{padding:7px 10px;font-size:12px;color:var(--t2);border-bottom:1px solid var(--bdr-s);line-height:1.5;}
.ent{background:var(--bg2);border:1px solid var(--bdr);margin-bottom:7px;overflow:hidden;}
.ent-h{padding:10px 12px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background .15s;}
.ent-h:hover{background:var(--bg3);}
.ent-nm{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:var(--t1);}
.ent-bg{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.1em;text-transform:uppercase;padding:2px 6px;border:1px solid;border-radius:2px;}
.bg-p{color:var(--blu);border-color:var(--blu)}.bg-a{color:var(--grn);border-color:var(--grn)}.bg-pr{color:var(--pur);border-color:var(--pur)}.bg-g{color:var(--gold);border-color:var(--gold)}.bg-s{color:var(--amb);border-color:var(--amb)}.bg-bm{color:var(--lime);border-color:var(--lime)}.bg-ps{color:var(--pink);border-color:var(--pink)}
.ent-bd{padding:0 12px 10px;border-top:1px solid var(--bdr-s);}
.ent-desc{color:var(--t2);font-size:11.5px;padding-top:8px;margin-bottom:6px;line-height:1.6;}
.tog{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);transition:transform .15s;}.tog.op{transform:rotate(90deg);}
.tb{width:100%;border-collapse:collapse;margin:6px 0;}
.tb th{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.05em;text-transform:uppercase;color:var(--t3);text-align:left;padding:5px 7px;border-bottom:1px solid var(--bdr);background:var(--bg4);}
.tb td{padding:5px 7px;font-size:11.5px;color:var(--t2);border-bottom:1px solid var(--bdr-s);vertical-align:top;line-height:1.5;}
.tb td:first-child{font-family:'DM Mono',monospace;font-size:11px;color:var(--t1);white-space:nowrap;}
.ft{font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);}
.fe{font-family:'DM Mono',monospace;font-size:9px;padding:1px 5px;border-radius:2px;display:inline-block;margin:1px 1px;}
.fe-g{color:var(--grn);background:var(--grn-d)}.fe-r{color:var(--red);background:var(--red-d)}.fe-a{color:var(--amb);background:var(--amb-d)}.fe-b{color:var(--blu);background:var(--blu-d)}.fe-p{color:var(--pur);background:var(--pur-d)}.fe-c{color:var(--cyn);background:var(--cyn-d)}.fe-pk{color:var(--pink);background:var(--pink-d)}.fe-gl{color:var(--gold);background:var(--gold-d)}.fe-lm{color:var(--lime);background:var(--lime-d)}
.ws-sales{color:var(--gold)}.ws-solution{color:var(--blu)}.ws-commercial{color:var(--grn)}.ws-legal{color:var(--pink)}.ws-delivery{color:var(--amb)}.ws-supply{color:var(--cyn)}.ws-governance{color:var(--pur)}.ws-production{color:var(--red)}.ws-bidmgmt{color:var(--lime)}.ws-postsub{color:var(--pink)}
.ph{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.06em;text-transform:uppercase;padding:2px 5px;border:1px solid;border-radius:2px;display:inline-block;}
.ph-d{color:var(--blu);border-color:var(--blu)}.ph-p{color:var(--red);border-color:var(--red)}.ph-c{color:var(--pur);border-color:var(--pur)}.ph-ps{color:var(--pink);border-color:var(--pink)}
.fl{display:flex;align-items:stretch;gap:0;margin:14px 0;overflow-x:auto;}
.fl-n{flex:1;min-width:90px;background:var(--bg2);border:1px solid var(--bdr);padding:10px 8px;text-align:center;}
.fl-n.fl-on{border-color:var(--gold);background:var(--gold-g);}
.fl-n.fl-grn{border-color:var(--grn);background:var(--grn-d);}
.fl-n.fl-amb{border-color:var(--amb);background:var(--amb-d);}
.fl-n.fl-pk{border-color:var(--pink);background:var(--pink-d);}
.fl-a{display:flex;align-items:center;color:var(--t4);font-size:13px;padding:0 2px;}
.fl-nl{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);margin-bottom:1px;}
.fl-nt{font-size:10px;font-weight:600;color:var(--t1);margin-bottom:1px;}
.fl-nd{font-size:9px;color:var(--t2);line-height:1.2;}
.wiz-step{display:flex;gap:12px;margin:12px 0;align-items:flex-start;}
.wiz-num{min-width:38px;height:38px;background:var(--gold-d);border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--gold);flex-shrink:0;}
.wiz-body{flex:1;}
.wiz-title{font-size:14px;font-weight:700;color:var(--t1);margin-bottom:3px;}
.wiz-desc{color:var(--t2);font-size:12px;line-height:1.6;}
.wiz-fields{margin-top:6px;display:flex;flex-wrap:wrap;gap:4px;}
.wiz-field{font-family:'DM Mono',monospace;font-size:9px;padding:2px 7px;border:1px solid var(--bdr);background:var(--bg3);color:var(--t2);}
.wiz-field.req{border-color:var(--gold);color:var(--gold);}
.wiz-field.opt{border-color:var(--t4);color:var(--t3);border-style:dashed;}
.wiz-output{margin-top:6px;padding:7px 10px;background:var(--bg3);border-left:2px solid var(--grn);font-size:11.5px;color:var(--t2);line-height:1.5;}
.wiz-output strong{color:var(--grn);}
.dm{margin:10px 0;overflow-x:auto;}
.dm table{border-collapse:collapse;width:100%;}
.dm th,.dm td{padding:4px 6px;text-align:center;font-size:10px;border:1px solid var(--bdr-s);}
.dm th{background:var(--bg4);font-family:'DM Mono',monospace;color:var(--t3);}
.dm .dep-mark{color:var(--cyn);font-weight:700;font-size:12px;}
.dm .gate-mark{color:var(--pur);font-weight:700;font-size:12px;}
/* UX wireframe styles */
.ux-frame{background:var(--bg3);border:1px solid var(--bdr);padding:14px;margin:8px 0;}
.ux-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.ux-col{flex:1;min-width:140px;}
.ux-box{background:var(--bg2);border:1px dashed var(--bdr);padding:8px;margin-bottom:6px;min-height:40px;}
.ux-box-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:4px;}
.ux-box-content{font-size:11px;color:var(--t2);line-height:1.5;}
.ux-metric{text-align:center;padding:8px;background:var(--bg2);border:1px solid var(--bdr);}
.ux-metric-val{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;}
.ux-metric-lbl{font-family:'DM Mono',monospace;font-size:8px;color:var(--t3);letter-spacing:.06em;text-transform:uppercase;}
.scroll-h{font-family:'DM Mono',monospace;font-size:9px;color:var(--t4);text-align:right;margin-bottom:2px;}
</style>
</head>
<body>
<div id="app"></div>
<script>
const TABS=[
  {id:'overview',l:'Overview'},
  {id:'setup',l:'Bid Setup'},
  {id:'lifecycle',l:'Lifecycle'},
  {id:'archetype',l:'Archetype'},
  {id:'deps',l:'Dependencies'},
  {id:'modules',l:'Modules'},
  {id:'data',l:'Data Model'},
  {id:'ux',l:'UX Design'},
  {id:'build',l:'Build'},
];
let tab='overview',exp={};
function setTab(t){tab=t;render();}
function tog(id){exp[id]=!exp[id];render();}
function render(){
  document.getElementById('app').innerHTML=`
    <div class="hdr"><div class="hdr-l"><div class="hdr-brand">PWIN Architect</div><div class="hdr-sub">Bid Execution · Architecture v6</div></div><div class="hdr-v">v6.0 · March 2026</div></div>
    <div class="nav">${TABS.map(t=>`<button class="nav-b ${tab===t.id?'on':''}" onclick="setTab('${t.id}')">${t.l}</button>`).join('')}</div>
    <div class="ct" key="${tab}">${R[tab]()}</div>`;
}
const R={};

// ═══════════════════════════════════════
// WORKSTREAM DATA (shared across tabs)
// ═══════════════════════════════════════
// Activity fields: id, n=name, o=output, d=dependencies, dur=effortDays, ts=teamSize(standard), pt=parallelisation(P/S/C), dt=depThreshold override
// pt: P=parallelisable (more people = shorter), S=specialist (always 1), C=coordination (scales with complexity but doesn't shorten)
// dt on a dep: 'ip'=in_progress (soft/early start), default=draft_complete (hard), 'fn'=final (conservative)
// Dependencies marked ★SOFT can begin preparatory work before predecessor completes
const WS=[
  {id:'SAL',name:'Sales & Capture',cls:'sales',ph:'DEV',acts:[
    {id:'SAL-01',n:'Customer engagement & intelligence gathering',o:'Customer intelligence briefing',d:[],dur:10,ts:1,pt:'S'},
    {id:'SAL-02',n:'Incumbent performance review (rebid)',o:'Incumbent performance assessment',d:[],dur:5,ts:1,pt:'S'},
    {id:'SAL-03',n:'Competitor analysis & positioning',o:'Competitive landscape assessment',d:['SAL-01'],dur:5,ts:1,pt:'S'},
    {id:'SAL-04',n:'Win theme development & refinement',o:'Win theme document',d:['SAL-01','SAL-03'],dur:5,ts:1,pt:'S'},
    {id:'SAL-05',n:'Evaluation criteria mapping & scoring strategy',o:'Evaluation criteria matrix with scoring approach',d:['SAL-04'],dur:3,ts:1,pt:'S'},
    {id:'SAL-06',n:'Capture plan finalisation & win strategy lock',o:'Capture plan (locked) — METHODOLOGY GATE',d:['SAL-04','SAL-05','SAL-10'],dur:3,ts:1,pt:'S'},
    {id:'SAL-07',n:'Pre-submission clarification strategy & drafting',o:'Clarification question register (prioritised)',d:['SAL-04','SOL-01'],dur:3,ts:2,pt:'P'},
    {id:'SAL-10',n:'Stakeholder relationship mapping & engagement',o:'Stakeholder relationship map & engagement plan',d:['SAL-01'],dur:5,ts:1,pt:'S'},
  ]},
  {id:'SOL',name:'Solution Design',cls:'solution',ph:'DEV',acts:[
    {id:'SOL-01',n:'Requirements analysis & interpretation',o:'Requirements interpretation document',d:['SAL-06'],dur:5,ts:2,pt:'P'},
    {id:'SOL-02',n:'Current operating model assessment',o:'As-is operating model assessment',d:[],dur:5,ts:1,pt:'S'},
    {id:'SOL-03',n:'Target operating model design',o:'Target operating model',d:['SOL-01','SOL-02'],dur:45,ts:3,pt:'P'},
    {id:'SOL-04',n:'Service delivery model design',o:'Service delivery model',d:['SOL-03'],dur:30,ts:3,pt:'P'},
    {id:'SOL-05',n:'Technology & digital approach',o:'Technology solution design',d:['SOL-03','SUP-02'],dur:20,ts:2,pt:'P'},
    {id:'SOL-06',n:'Staffing model & TUPE analysis',o:'Staffing model with TUPE schedule',d:['SOL-04'],dur:8,ts:1,pt:'S'},
    {id:'SOL-07',n:'Transition & mobilisation approach',o:'Transition plan',d:['SOL-04','SOL-05','SOL-06'],dur:16,ts:2,pt:'P'},
    {id:'SOL-08',n:'Innovation & continuous improvement',o:'Innovation roadmap',d:['SOL-03'],dur:5,ts:1,pt:'S'},
    {id:'SOL-09',n:'Social value proposition',o:'Social value plan',d:['SOL-04'],dur:5,ts:1,pt:'S'},
    {id:'SOL-10',n:'Evidence strategy & case study identification',o:'Evidence requirements matrix',d:['SOL-04','SAL-05'],dur:3,ts:1,pt:'S'},
    {id:'SOL-12',n:'Solution risk identification & analysis',o:'Solution risk register',d:['SOL-03','SOL-04'],dur:3,ts:1,pt:'S'},
    {id:'SOL-11',n:'Solution design lock',o:'Solution design pack (locked & assured)',d:['SOL-03','SOL-04','SOL-05','SOL-06','SOL-07','SOL-08','SOL-09','SOL-10','SOL-12'],dur:3,ts:1,pt:'C'},
  ]},
  {id:'COM',name:'Commercial & Pricing',cls:'commercial',ph:'DEV',acts:[
    {id:'COM-01',n:'Should-cost model development',o:'Should-cost model',d:['SOL-04','SOL-06'],dur:8,ts:1,pt:'S'},
    {id:'COM-02',n:'Price-to-win analysis',o:'Price-to-win assessment',d:['SAL-03','COM-01'],dur:3,ts:1,pt:'S'},
    {id:'COM-03',n:'Subcontractor & supply chain pricing',o:'Partner pricing schedule',d:['SUP-04'],dur:5,ts:1,pt:'S'},
    {id:'COM-04',n:'Commercial model & payment mechanisms',o:'Commercial model document',d:['SOL-04','LEG-02'],dur:5,ts:1,pt:'S'},
    {id:'COM-05',n:'Margin structure & sensitivity analysis',o:'Margin model with sensitivities',d:['COM-01','COM-03'],dur:3,ts:1,pt:'S'},
    {id:'COM-07',n:'Commercial risk identification & analysis',o:'Commercial risk register',d:['COM-01','COM-04','LEG-02'],dur:3,ts:1,pt:'S'},
    {id:'COM-06',n:'Pricing model finalisation',o:'Pricing model (locked & assured)',d:['COM-01','COM-02','COM-03','COM-04','COM-05','COM-07','DEL-01'],dur:5,ts:1,pt:'S'},
  ]},
  {id:'LEG',name:'Legal & Contractual',cls:'legal',ph:'DEV',acts:[
    {id:'LEG-01',n:'Contract review & markup',o:'Contract markup with positions log',d:[],dur:8,ts:1,pt:'S'},
    {id:'LEG-02',n:'Risk allocation analysis',o:'Risk allocation matrix',d:['LEG-01'],dur:3,ts:1,pt:'S'},
    {id:'LEG-03',n:'Insurance & liability review',o:'Insurance requirements assessment',d:[],dur:3,ts:1,pt:'S'},
    {id:'LEG-04',n:'TUPE obligations assessment',o:'TUPE compliance assessment',d:['SOL-06'],dur:5,ts:1,pt:'S'},
    {id:'LEG-05',n:'Data protection & security review',o:'DPIA / security assessment',d:['SOL-05'],dur:5,ts:1,pt:'S'},
    {id:'LEG-06',n:'Subcontractor terms review',o:'Subcontract terms summary',d:['SUP-03','LEG-01'],dur:5,ts:1,pt:'S'},
  ]},
  {id:'DEL',name:'Programme & Delivery',cls:'delivery',ph:'DEV',acts:[
    {id:'DEL-01',n:'Delivery risk & assumptions register',o:'Delivery risk & assumptions register (living document)',d:['SOL-03','SOL-04'],dur:8,ts:1,pt:'S'},
    {id:'DEL-02',n:'Mobilisation & implementation planning',o:'Mobilisation plan',d:['SOL-07'],dur:5,ts:1,pt:'S'},
    {id:'DEL-03',n:'Performance framework & KPIs/SLAs',o:'KPI/SLA framework',d:[],dur:5,ts:1,pt:'S'},
    {id:'DEL-04',n:'Resource & capacity plan',o:'Resource plan',d:['SOL-06'],dur:3,ts:1,pt:'S'},
    {id:'DEL-05',n:'Business continuity & exit planning',o:'BC/exit plan',d:[],dur:3,ts:1,pt:'S'},
    {id:'DEL-06',n:'Risk mitigation & residual acceptance',o:'Mitigated risk register (assured)',d:['DEL-01','COM-06'],dur:5,ts:1,pt:'S'},
  ]},
  {id:'SUP',name:'Supply Chain & Partners',cls:'supply',ph:'DEV',acts:[
    {id:'SUP-01',n:'Partner identification & selection',o:'Partner shortlist with rationale',d:['SOL-01'],dur:5,ts:1,pt:'S'},
    {id:'SUP-02',n:'Partner solution inputs & design contribution',o:'Partner solution inputs pack',d:['SUP-01','SOL-03'],dur:10,ts:2,pt:'P'},
    {id:'SUP-03',n:'Teaming agreement negotiation',o:'Signed teaming agreements',d:['SUP-01'],dur:15,ts:1,pt:'S'},
    {id:'SUP-04',n:'Partner pricing',o:'Partner pricing schedules',d:['SUP-02','SOL-04'],dur:8,ts:1,pt:'S'},
    {id:'SUP-05',n:'Partner credentials & references',o:'Partner case studies & CVs',d:['SUP-01'],dur:5,ts:2,pt:'P'},
    {id:'SUP-06',n:'Back-to-back commercial terms',o:'Back-to-back terms agreed',d:['SUP-03','LEG-06','COM-04'],dur:5,ts:1,pt:'S'},
  ]},
  {id:'BM',name:'Bid Management & Programme Control',cls:'bidmgmt',ph:'CONT',acts:[
    {id:'BM-01',n:'Kickoff planning & execution',o:'Kickoff pack: strategy summary, RACI, timeline, comms plan',d:['SAL-06'],dur:3,ts:1,pt:'C'},

    <div class="fl-a">→</div>
    <div class="fl-n" style="border-color:var(--gold);background:var(--gold-g);"><div class="fl-nl">M-Gate</div><div class="fl-nt">Storyboard</div><div class="fl-nd">BM-10 assured</div></div>
    <div class="fl-a">→</div>
    <div class="fl-n"><div class="fl-nl">Phase 2</div><div class="fl-nt">Produce</div><div class="fl-nd">Draft, review, finalise</div></div>
    <div class="fl-a">→</div>
    <div class="fl-n fl-grn"><div class="fl-nl">Submit</div><div class="fl-nt">Submit</div><div class="fl-nd">Confirmed</div></div>
    <div class="fl-a">→</div>
    <div class="fl-n fl-pk"><div class="fl-nl">Phase 3</div><div class="fl-nt">Post-Sub</div><div class="fl-nd">Present, clarify, BAFO, negotiate</div></div>
    <div class="fl-a">→</div>
    <div class="fl-n fl-grn"><div class="fl-nl">End</div><div class="fl-nt">Award</div><div class="fl-nd">Handover</div></div>
  </div>

  <div class="sh">Two Methodology Gates (Non-Configurable)</div>
  <div class="bt">Unlike governance gates (which the bid manager configures), methodology gates are enforced by the system on every bid. They prevent the most common structural failure: production starting before the strategic and design foundations are locked.</div>
  <table class="tb">
    <thead><tr><th>Gate</th><th>Activity</th><th>What It Prevents</th></tr></thead>
    <tbody>
      <tr><td><span class="fe fe-gl">Win Strategy Lock</span></td><td>SAL-06 must reach "assured"</td><td>Solution design (SOL-03+) proceeding without a confirmed win strategy. Solution that drifts because there's no agreed strategic direction.</td></tr>
      <tr><td><span class="fe fe-gl">Storyboard Sign-off</span></td><td>BM-10 must reach "assured"</td><td>Section drafting (PRD-02) starting before the response structure is approved. Writing that will need rewriting because the storyboard changed.</td></tr>
    </tbody>
  </table>

  <div class="sh">Activity Status vs Output Assurance</div>
  <div class="cg c2">
    <div class="cd a-blu"><div class="cd-t">Activity Status (is it done?)</div><div class="cd-b"><span class="fe fe-b">not started</span> <span class="fe fe-b">in progress</span> <span class="fe fe-a">draft complete</span> <span class="fe fe-g">final</span> <span class="fe fe-p">deactivated</span></div></div>
    <div class="cd a-grn"><div class="cd-t">Output Assurance (is it any good?)</div><div class="cd-b"><span class="fe fe-r">unassured</span> <span class="fe fe-a">under review</span> <span class="fe fe-g">assured</span> <span class="fe fe-p">accepted at gate</span></div></div>
  </div>

  <div class="sh">Post-Submission Phase</div>
  <div class="bt">The system tracks post-submission activities because your fee exposure continues until award. Not all post-submission activities apply to every bid — presentation, BAFO, and negotiation stages are activated during setup based on procurement type. The system monitors post-submission health on the practice portfolio the same way it monitors pre-submission readiness.</div>

  <div class="sh">Risk & Assumptions Register</div>
  <div class="bt">DEL-01 is the home for both risks and assumptions. It is a living activity maintained throughout the bid. Each entry has: description, type (risk or assumption), probability, impact, mitigation/validation status, owner, source activity, and impact if wrong. Unmitigated high risks or unvalidated assumptions at governance gates trigger contingency loading — the risk premium mechanism. The register's assurance status is a gate entry criterion.</div>
`;

// ARCHETYPE
// ═══════════════════════════════════════
R.archetype=()=>`
  <div class="sl">Services Bid Archetype</div>
  <div class="st">Standard Operating Model — Services (New Business / Rebid)</div>
  <div class="sd">Every activity carries effortDays (person-days), teamSize (standard default), and parallelisation type. Effort for parallelisable activities reflects total person-days. Elapsed = effort ÷ team + 20% overhead. BM-13 (bid risk register) added. LEG-03, DEL-03, DEL-05 dependencies relaxed to zero (can start day one).</div>

  <div class="co co-g"><div class="co-l">Effort vs Elapsed</div><div class="co-t">The 'Effort' column shows person-days of work. 'Team' shows concurrent workers (standard complexity). 'Elapsed' is calculated: CEIL((effort/team) × (1 + (team-1) × 0.20)). Example: SOL-03 = 45 person-days ÷ 3 people × 1.40 overhead = 21 elapsed days. The bid complexity selector in setup adjusts team sizes: complex ≈ 2× parallelisable activities, major ≈ 3×.</div></div>

  <div class="sh">Bid Complexity Defaults (Setup Stage 2)</div>
  <table class="tb">
    <thead><tr><th>Complexity</th><th>Total Team</th><th>P-Type Multiplier</th><th>SOL-03 Team</th><th>SOL-03 Elapsed</th><th>PRD-02 Team</th><th>PRD-02 Elapsed</th></tr></thead>
    <tbody>
      <tr><td>Standard</td><td>8–12</td><td>1× (template)</td><td>3</td><td>21 days</td><td>4</td><td>22 days</td></tr>
      <tr><td>Complex</td><td>15–25</td><td>~2×</td><td>5</td><td>17 days</td><td>6</td><td>16 days</td></tr>
      <tr><td>Major</td><td>25–40</td><td>~3×</td><td>7</td><td>14 days</td><td>8</td><td>14 days</td></tr>
    </tbody>
  </table>

  <div class="sh">Zero-Dependency Activities (Start Day One)</div>
  <div class="cg c4">
    ${['SAL-01: Customer intel','SAL-02: Incumbent review','SOL-02: Operating model assessment','LEG-01: Contract review','LEG-03: Insurance review','DEL-03: KPI/SLA framework','DEL-05: BC/exit planning','BM-13: Bid risk register'].map(a=>`<div class="cd a-grn" style="padding:8px;"><div class="cd-b" style="font-family:'DM Mono',monospace;font-size:10px;">${a}</div></div>`).join('')}
  </div>

  <div class="sh">Activity Parallelisation Types</div>
  <div class="cg c3">
    <div class="cd a-blu"><div class="cd-t"><span class="fe fe-b">P</span> Parallelisable</div><div class="cd-b">More people = shorter elapsed time. Solution design, evidence assembly, drafting, partner inputs. Team size scales with bid complexity.</div></div>
    <div class="cd a-gold"><div class="cd-t"><span class="fe fe-gl">S</span> Specialist</div><div class="cd-b">Always team size 1. Legal review, pricing model, TUPE analysis, data protection. Adding people doesn't help — one expert does the work.</div></div>
    <div class="cd a-pur"><div class="cd-t"><span class="fe fe-p">C</span> Coordination</div><div class="cd-b">Effort increases with bid complexity but doesn't parallelise. Kickoff, governance, reviews, progress reporting. Bid manager's operational overhead.</div></div>
  </div>

  <div class="cg c5" style="margin-bottom:10px;">
    <div class="cd a-gold" style="text-align:center;padding:8px;"><div class="cd-t" style="font-family:'Cormorant Garamond',serif;font-size:22px;">10</div><div class="cd-b">Workstreams</div></div>
    <div class="cd a-blu" style="text-align:center;padding:8px;"><div class="cd-t" style="font-family:'Cormorant Garamond',serif;font-size:22px;">${totalActs}</div><div class="cd-b">Activities</div></div>
    <div class="cd a-grn" style="text-align:center;padding:8px;"><div class="cd-t" style="font-family:'Cormorant Garamond',serif;font-size:22px;">${totalDeps}</div><div class="cd-b">Dependencies</div></div>
    <div class="cd a-amb" style="text-align:center;padding:8px;"><div class="cd-t" style="font-family:'Cormorant Garamond',serif;font-size:22px;">${totalDays}</div><div class="cd-b">Effort (person-days)</div></div>
    <div class="cd a-cyn" style="text-align:center;padding:8px;"><div class="cd-t" style="font-family:'Cormorant Garamond',serif;font-size:22px;">~55</div><div class="cd-b">Critical path (elapsed)</div></div>
  </div>

  ${WS.map(w=>`
    <div class="ent">
      <div class="ent-h" onclick="tog('ws-${w.id}')">
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="tog ${exp['ws-'+w.id]?'op':''}">▸</span>
          <span class="ent-nm"><span class="ws-${w.cls}">${w.id}</span> — ${w.name}</span>
          <span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--t3);">${w.acts.length} acts · ${w.acts.reduce((s,a)=>s+a.dur,0)} person-days</span>
        </div>
        <span class="ph ${w.ph==='DEV'?'ph-d':w.ph==='PRD'?'ph-p':w.ph==='POST'?'ph-ps':'ph-c'}">${w.ph==='DEV'?'Development':w.ph==='PRD'?'Production':w.ph==='POST'?'Post-Submission':'Continuous'}</span>
      </div>
      ${exp['ws-'+w.id]?`
        <div class="ent-bd"><div class="scroll-h">← scroll →</div><div style="overflow-x:auto;">
        <table class="tb" style="min-width:850px;">
          <thead><tr><th style="width:55px;">ID</th><th>Activity</th><th>Output</th><th style="width:45px;">Effort</th><th style="width:35px;">Team</th><th style="width:30px;">Type</th><th style="width:170px;">Dependencies</th></tr></thead>
          <tbody>${w.acts.map(a=>{
            const elapsed=a.ts<=1?a.dur:Math.ceil((a.dur/a.ts)*(1+(a.ts-1)*0.2));
            return `<tr><td><span class="ws-${w.cls}">${a.id}</span></td><td style="color:var(--t1);">${a.n}</td><td style="font-style:italic;font-size:11px;">${a.o}</td><td style="text-align:center;">${a.dur||'—'}</td><td style="text-align:center;">${a.ts}</td><td style="text-align:center;"><span class="fe ${a.pt==='P'?'fe-b':a.pt==='S'?'fe-gl':'fe-p'}">${a.pt}</span></td><td>${a.d.length?a.d.map(d=>`<span class="fe fe-c">${d}</span>`).join(' '):'<span style="color:var(--grn);">DAY ONE</span>'}</td></tr>`;
          }).join('')}</tbody>
        </table></div></div>
      `:''}
    </div>
  `).join('')}

  <div class="co co-b"><div class="co-l">Dependency Notes</div><div class="co-t">LEG-03 (insurance review) — dependency on LEG-01 removed; can begin from tender requirements independently. DEL-03 (KPI/SLA framework) — dependency on SOL-04 removed; draft framework can be built from tender-specified KPIs, refined when solution locks. DEL-05 (BC/exit planning) — dependency on SOL-04 removed; standard structure can be drafted early, populated with solution specifics later. All dependency thresholds default to 'draft_complete' but can be overridden to 'in_progress' (early start) or 'final' (conservative) per dependency in setup.</div></div>
`;

    {l:'Win Strategy → Storyboard → Pink Review → Production',ch:'SAL-06 → BM-10 → PRD-05 → PRD-02 → PRD-06 → PRD-07 → PRD-08 → PRD-09',r:'Win strategy lock must precede storyboard. Storyboard must pass pink review before drafting begins. Two methodology gates in sequence.'},

R.modules=()=>`
  <div class="sl">Module Architecture</div>
  <div class="st">Nine Modules Across Four Layers</div>
  <div class="sd">All modules operate on a shared data model. The Activity Framework is the spine; every other module is a specialised view. Full UX specifications are in the UX Design tab.</div>
  <div class="cg c3">
    ${[
      {t:'Bid Setup Wizard',l:'Setup',a:'amb',d:'5-stage configuration with configurable governance gate library and feasibility check. Generates full activity set from archetype template. 30–45 min target.'},
      {t:'Practice Portfolio',l:'Practice',a:'pur',d:'All active bids ranked by fee-weighted risk. Health status, trends, intervention log, team utilisation. Post-submission bids tracked through to award. Never client-facing.'},
      {t:'Bid Workspace',l:'Platform',a:'blu',d:'Single-bid command console. Dual-track readiness, 10 workstream health bars with timing analysis, today\'s actions, milestone tracker, methodology gate status, compression alerts. Smart nudge summary panel. Standup action count. Embedded methodology guidance.'},
      {t:'Activity Tracker',l:'Core',a:'gold',d:'${totalActs} activities across 10 workstreams. Six views: workstream, kanban, list, dependency, standup, and Gantt. Status + output assurance tracking. Effort/teamSize/elapsed duration model with parallelisation types. Smart nudging engine. Standup action layer. Drag-and-drop. Bulk updates.'},
      {t:'Submissions',l:'Core',a:'gold',d:'Two tracks. Track 1: Client Response Requirements Register — every question, document, certificate the client expects in the submission. Each response item tracked through a 10-stage production lifecycle (not started → storyboard → storyboard approved → first draft → pink ready → pink reviewed → red ready → red reviewed → gold ready → final). Per-response quality dimensions: answers the question, follows question structure, client score self-assessment with gap analysis, credentials incorporated, win themes integrated, compliance mapping. Word counts drive effort estimation; evaluation weights drive team prioritisation. Track 2: Client Compliance Matrix — UX deferred to V2 (managed externally via AI + Excel in V1). PRD-01 activity retained. Governance hard gates for mandatory compliance gaps still enforced. ComplianceRequirement data model retained for V2. Quality dimension fields are structured data — manual assessment by bid manager in base product, designed for AI-assisted continuous quality monitoring in future.'},
      {t:'Reviews',l:'Assurance',a:'grn',d:'Formal peer and external SME review of written responses at pink, red, and gold stages. Scorecards scoring against quality dimensions (answers the question, structure, responsiveness, evidence, credentials, win themes, readability). Structured feedback capture per response with severity-rated actions, clear owners, resolution path, and closure tracking. Review closure advances production status in Submissions. Gate logic: critical actions must be resolved before review can close.'},
      {t:'Governance',l:'Governance',a:'pur',d:'Organisational assurance across solution, commercial/financial, and executive levels. Solution assurance — is the proposed solution sound? Commercial assurance — pricing defensible, margins acceptable? Executive governance — formal decision authority to agree price, risk, and margin with escalating tiers (BU → ExCo → Board by TCV). Configurable gates with auto-generated preparation sequences. Entry criteria linked to output assurance. Decision records. Risk premium tracking. BAFO authority.'},
      {t:'Readiness Dashboard',l:'Assurance',a:'grn',d:'Dual-track score: development readiness + production readiness. Workstream timing analysis. Compression alerts. Methodology gate status. Executive A4 print. Post-submission readiness for presentation/BAFO.'},
      {t:'Submission Manager',l:'Platform',a:'blu',d:'Artefact register, document checklist, formatting QA, portal upload tracker, sign-off record, submission log. Active in final 5–7 days. Triggers hot debrief (BM-11) on confirmation.'},
    ].map(m=>`<div class="cd a-${m.a}"><div class="cd-l">${m.l}</div><div class="cd-t">${m.t}</div><div class="cd-b">${m.d}</div></div>`).join('')}
  </div>
`;

// DATA MODEL

R.data=()=>`
  <div class="sl">Data Architecture</div>
  <div class="st">Entity Model (v6)</div>
  <div class="sd">24 entities, ~280 fields. <strong>ITT Ingestion Layer (new):</strong> ResponseSection separates the exam paper (what the client is asking) from the answer sheet (ResponseItem production tracking) — enabling CSV import, manual entry, and future AI ingestion of ITT question registers before any response work begins. EvaluationFramework captures the tender-level scoring methodology (one per bid) driving effort allocation strategy. ITTDocument provides a registry of all received procurement documents with version and parse status tracking. Bid entity extended with procurement context (route, portal, contract duration, TUPE, security clearance). ResponseItem simplified to production tracking only — question-definition fields migrated to ResponseSection, linked 1:1. <strong>Unchanged from v5:</strong> ResponseItem 10-stage production lifecycle, per-response quality dimensions, win theme integration assessments. WinTheme entity for differentiating value propositions. ClientScoringScheme (optional) with grade bands. ReviewCycle for formal peer/SME review (pink/red/gold); ReviewScorecard with dual scoring. ComplianceRequirement for compliance declarations. GovernanceGate absorbing development reviews alongside executive governance. Activity with teamSize, parallelisationType, dependencyThreshold. TeamMember, Stakeholder, RateCard.</div>

  ${[
    {id:'Bid',bg:'bg-p',d:'Top-level container. Extended with procurement context fields for ITT ingestion.',f:[['id','UUID'],['name','string'],['client','string'],['sector','enum: defence|justice|citizen_services|health|transport|central_govt'],['procurementType','enum: rebid|new_business_itt|framework_calloff|bafo|competitive_dialogue'],['archetype','enum: services|technology|advisory'],['tcv','number'],['acv','number'],['submissionDeadline','datetime'],['ittIssueDate','date'],['hasCompetitiveDialogue','boolean'],['hasPresentation','boolean'],['hasBafo','boolean'],['status','enum: setup|active|submitted|post_submission|won|lost|withdrawn'],['bidManager','string'],['solutionLead','string'],['commercialLead','string'],['procurementRoute','enum: open|restricted|competitive_dialogue|competitive_flexible|negotiated|direct_award|framework_calloff|dynamic_market|null — procurement procedure type'],['portalPlatform','enum: jaggaer|oracle|proactis|intend|procontract|bravo|atamis|delta|ariba|other|null — e-tendering platform'],['portalReference','string|null — portal opportunity reference number'],['contractDurationMonths','number|null — initial contract term in months'],['extensionOptions','string|null — extension structure (e.g. "2 x 12 months")'],['estimatedTotalValue','number|null — published estimated total value'],['tupeApplicable','boolean|null — whether TUPE transfers are involved'],['tupeStaffCount','number|null — number of staff subject to TUPE if known'],['securityClearanceTier','enum: none|bpss|ctc|sc|dv|null — highest clearance required'],['isRebid','boolean — whether this is a rebid of an existing contract'],['incumbentName','string|null — current contract holder'],['linkedEvaluationFrameworkId','string|null — FK→EvaluationFramework']]},
