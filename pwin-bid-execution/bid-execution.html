  {id:'SOL',name:'Solution Design',cls:'solution',ph:'DEV',acts:[
    {id:'SOL-01',n:'Requirements analysis & interpretation',o:'Requirements interpretation document',d:['SAL-06'],dur:5,ts:2,pt:'P',rl:'Solution Architect',
      subs:[
        {id:'SOL-01.1',n:'ITT Decomposition & Requirements Extraction',t:[
          {id:'SOL-01.1.1',n:'Decompose ITT documentation into structured requirements -- extract every requirement from specification, schedules, annexes, and contract',raci:{r:'Solution Architect',a:'Bid Director',c:'Bid Manager / Workstream Leads',i:'Commercial Lead'},e:'High',tp:'Sequential',o:[{n:'Structured requirements register',f:'Structured register',q:['Every requirement extracted -- not just the obvious specification items but also contract obligations, performance standards, and compliance conditions','Requirements sourced and referenced -- ITT section, clause, and page for each','Requirements from different documents cross-referenced -- specification requirement linked to corresponding contract clause and evaluation criterion','Hidden requirements identified -- obligations embedded in contract schedules, annexes, or evaluation criteria that are not obvious from the specification alone']}]},
          {id:'SOL-01.1.2',n:'Categorise requirements by type and priority -- mandatory vs desirable, scored vs pass/fail, explicit vs implied',raci:{r:'Solution Architect',a:'Bid Director',c:'Bid Manager',i:'Commercial Lead'},e:'Medium',tp:'Sequential',o:[{n:'Categorised requirements register',f:'Structured register (enriched)',q:['Each requirement categorised by type: functional, technical, performance, contractual, compliance, format/submission','Priority categorised: mandatory (must comply), desirable (scored if exceeded), pass/fail (threshold)','Explicit vs implied distinction noted -- explicit requirements stated in the ITT, implied requirements inferred from context, industry standards, or regulatory obligations','Scoring linkage noted -- which evaluation criterion and marks value each requirement contributes to']}]},
          {id:'SOL-01.1.3',n:'Identify ambiguities, contradictions, gaps, and unstated requirements -- what is missing, unclear, or inconsistent in the documentation?',raci:{r:'Solution Architect',a:'Bid Director',c:'Workstream Leads (SOL/COM/LEG/DEL)',i:'Bid Manager'},e:'Medium',tp:'Parallel',o:[{n:'Requirements issues log',f:'Structured log',q:['Ambiguities identified -- requirements that can be interpreted in more than one way','Contradictions identified -- requirements in different documents that conflict','Gaps identified -- areas where requirements are expected but absent','Unstated requirements identified -- things the client clearly needs but hasn\'t explicitly asked for (informed by buyer values and client problem statement)','Each issue assessed for impact -- does this block solution design, affect scoring, or create delivery risk?','Issues flagged for clarification fed forward to SAL-07']}]}
        ]},
        {id:'SOL-01.2',n:'Requirements Interpretation & Solution Alignment',t:[
          {id:'SOL-01.2.1',n:'Interpret requirements against buyer values and client strategic context -- what does the client really mean, and what is driving each requirement?',raci:{r:'Solution Architect',a:'Bid Director',c:'Capture Lead / Account Manager',i:'Workstream Leads'},e:'High',tp:'Sequential',o:[{n:'Requirements interpretation notes',f:'Per-requirement structured annotation',q:['Key requirements annotated with interpretation -- what the client wrote vs what they likely mean','Buyer value linkage documented -- which buyer values drive which requirements','Strategic intent behind requirements identified where possible -- why is the client asking for this?','Interpretation distinguishes between confident reading and assumptions to be tested']}]},
          {id:'SOL-01.2.2',n:'Assess our solution alignment per requirement area -- where are we strong, where do we need to develop, where do we have gaps?',raci:{r:'Solution Architect',a:'Bid Director',c:'Workstream Leads (SOL/COM/LEG/DEL)',i:'Commercial Lead'},e:'Medium',tp:'Parallel',o:[{n:'Solution alignment assessment',f:'Structured assessment per requirement area',q:['Each requirement area assessed: strong alignment (can respond confidently), partial (need to develop), gap (no current capability or approach)','Gaps linked to score gap analysis from SAL-05 -- consistency between scoring gaps and solution gaps','Areas requiring partner or supply chain capability identified (feeds SUP-01)','Priority areas for solution design effort identified -- where to focus SOL-03 onwards']}]},
          {id:'SOL-01.2.3',n:'Synthesise requirements interpretation document -- the consolidated output consumed by solution design and clarification strategy',raci:{r:'Solution Architect',a:'Bid Director',c:'',i:'Bid Manager'},e:'Low',tp:'Sequential',o:[{n:'Requirements interpretation document (activity primary output)',f:'Document / structured register with interpretation',q:['All requirements extracted, categorised, and interpreted in a single authoritative document','Solution alignment per requirement area documented -- strengths, development needs, gaps','Issues log consolidated -- ambiguities, contradictions, gaps with impact and clarification referral','Priority areas for solution design effort clearly identified','Reviewed by Bid Director -- not single-author interpretation','Usable by SOL-03 (target operating model), SAL-07 (clarification strategy), and all solution workstream activities without further analysis']}]}
        ]}
      ],
      outs:[{n:'Requirements interpretation document',f:'Document / structured register with interpretation',q:['Every requirement extracted from ITT documentation -- specification, contract, schedules, annexes','Requirements categorised by type, priority, and scoring linkage','Ambiguities, contradictions, gaps, and unstated requirements identified with impact assessment','Requirements interpreted against buyer values and client strategic context','Solution alignment assessed per requirement area -- strengths, gaps, development needs','Validated by Bid Director -- not single-author interpretation']}]},
    {id:'SOL-02',n:'Current operating model assessment',o:'As-is operating model assessment',d:[],dur:5,ts:1,pt:'S',rl:'Solution Architect',
      subs:[
        {id:'SOL-02.1',n:'Current Operating Model Discovery',t:[
          {id:'SOL-02.1.1',n:'Map current organisational structure -- departments, sub-departments, reporting lines, governance framework, interfaces with client organisation',raci:{r:'Solution Architect',a:'Bid Director',c:'Delivery Director / Account Manager',i:'HR Lead'},e:'Medium',tp:'Sequential',o:[{n:'Current organisational structure map',f:'Structured assessment with org chart',q:['Organisational structure documented -- departments, sub-departments, teams, reporting lines','Governance framework mapped -- decision-making, escalation, client interface points','Key management roles and responsibilities identified','Interfaces between supplier organisation and client organisation documented','Gaps in knowledge flagged -- what we can\'t determine from available information']}]},
          {id:'SOL-02.1.2',n:'Assess current workforce -- headcount, roles, grades, management structure, TUPE-relevant employment terms and conditions',raci:{r:'HR Lead / Solution Architect',a:'Bid Director',c:'Commercial Lead / Legal',i:'Delivery Director'},e:'Medium',tp:'Parallel',o:[{n:'Current workforce assessment',f:'Structured register with analysis',q:['Workforce headcount and profile documented -- roles, grades, locations, employment type (permanent, contractor, agency)','Management structure and people governance documented -- how the workforce is managed today','TUPE-relevant terms assessed where data available -- pension, benefits, collective agreements','Skills and capability profile assessed at team/function level -- what capability exists in the workforce?','Data gaps explicitly flagged -- what TUPE and workforce data is missing and when it might be disclosed']}]},
          {id:'SOL-02.1.3',n:'Review current systems, tools, and data landscape -- technology stack, legacy systems, data flows, integration points, licensing',raci:{r:'Technical Lead / Solution Architect',a:'Bid Director',c:'Technology SME',i:'Commercial Lead'},e:'Medium',tp:'Parallel',o:[{n:'Current technology and data landscape assessment',f:'Structured assessment',q:['Systems and tools supporting service delivery identified -- including legacy, bespoke, and COTS platforms','Data landscape documented -- key data sets, data flows, integration points between systems','Ownership and licensing documented -- which systems transfer, which are client-owned, which are incumbent IP?','Technology risks identified -- end-of-life systems, unsupported platforms, security vulnerabilities','Data migration and system transition implications identified at a strategic level']}]}
        ]},
        {id:'SOL-02.2',n:'Current Performance & Service Baseline',t:[
          {id:'SOL-02.2.1',n:'Assess current service performance against existing KPIs and SLA framework -- what is the performance baseline we are inheriting or competing against?',raci:{r:'Solution Architect',a:'Bid Director',c:'Delivery Director',i:'Commercial Lead'},e:'Medium',tp:'Sequential',o:[{n:'Current performance baseline',f:'Structured performance assessment',q:['Existing KPIs and SLA framework documented -- what is being measured and how?','Performance against each KPI/SLA assessed where data available -- meeting, exceeding, or failing','Performance trends identified -- improving, stable, or declining areas','Performance gaps and pain points linked to operating model root causes where identifiable','Baseline established for comparison with our proposed service improvement']}]},
          {id:'SOL-02.2.2',n:'Document the current operating model -- how organisation, people, systems, and processes combine to deliver the service today',raci:{r:'Solution Architect',a:'Bid Director',c:'Delivery Director / Technical Lead',i:'Bid Manager'},e:'Medium',tp:'Sequential',o:[{n:'Current operating model document',f:'Structured operating model assessment',q:['Operating model documented as an integrated view -- not just individual components in isolation','How organisation, people, systems, processes, and governance work together described','Key dependencies and interdependencies between components identified','Strengths of the current model identified -- what works well and should be retained or built upon','Weaknesses and structural issues identified -- what drives the performance gaps?']}]},
          {id:'SOL-02.2.3',n:'Identify what we are inheriting on day one and key transition implications -- the handover baseline that feeds transition planning',raci:{r:'Solution Architect',a:'Bid Director',c:'Delivery Director / Commercial Lead / Legal',i:'HR Lead'},e:'Low',tp:'Sequential',o:[{n:'Day-one inheritance and transition implications (activity primary output complement)',f:'Structured assessment',q:['Day-one inheritance clearly defined -- what transfers to us: people, systems, assets, data, contracts, obligations','What remains with the client or outgoing supplier identified -- boundaries of transfer','Key transition risks identified at a strategic level -- feeds SOL-07 (transition planning)','Service continuity requirements identified -- what must not be disrupted during handover','Implications for our target operating model design articulated -- what constraints does the as-is place on our future model?']}]}
        ]}
      ],
      outs:[{n:'As-is operating model assessment',f:'Document / structured assessment',q:['Current organisational structure mapped -- departments, reporting lines, governance, client interfaces','Current workforce assessed -- headcount, roles, management, TUPE-relevant terms','Current systems, tools, and data landscape documented -- technology stack, legacy, integration, licensing','Current service performance baselined against existing KPIs and SLAs','Integrated operating model documented -- how components work together to deliver the service','Day-one inheritance defined -- what transfers, what stays, transition implications','Gaps in available information explicitly flagged']}]},
    {id:'SOL-03',n:'Target operating model design',o:'Target operating model',d:['SOL-01','SOL-02'],dur:45,ts:3,pt:'P',rl:'Solution Architect',
      subs:[
        {id:'SOL-03.1',n:'Solution Vision & Design Principles',t:[
          {id:'SOL-03.1.1',n:'Determine solution positioning -- where on the spectrum between low-capex/compliant and high-capex/transformational does this solution land, and why?',raci:{r:'Solution Architect',a:'Bid Director',c:'Commercial Lead / Capture Lead / Delivery Director',i:'Partner'},e:'High',tp:'Sequential',o:[{n:'Solution positioning decision',f:'Structured decision paper',q:['Position on the compliance-to-transformation spectrum explicitly stated with rationale','Key factors driving the positioning documented -- evaluation framework, buyer appetite, commercial strategy, competitive landscape, incumbent stickiness','Investment appetite defined -- what level of upfront capex is the organisation willing to commit?','Lifetime value argument articulated -- if high capex, what is the payback through lower operating cost or better outcomes?','Trade-offs acknowledged -- what do we gain and what do we sacrifice at this positioning?','Alignment to win strategy confirmed -- does this positioning deliver our win themes?']}]},
          {id:'SOL-03.1.2',n:'Establish solution design principles -- the rules that guide all downstream design decisions, flowing from the positioning choice',raci:{r:'Solution Architect',a:'Bid Director',c:'Delivery Director / Technical Lead',i:'Bid Manager'},e:'Medium',tp:'Sequential',o:[{n:'Solution design principles',f:'Structured principles document',q:['Design principles are specific to this bid -- not generic "best practice" statements','Each principle flows from the positioning decision or a key requirement -- traceable rationale','Principles are actionable -- a solution designer can use them to make trade-off decisions','Principles address: service philosophy, technology strategy, people approach, governance model, commercial alignment','Principles are testable -- the final TOM can be assessed against them']}]},
          {id:'SOL-03.1.3',n:'Define solution scope and boundary -- what is in, what is out, where our service interfaces with the client and third parties',raci:{r:'Solution Architect',a:'Bid Director',c:'Commercial Lead / Delivery Director',i:'Legal'},e:'Medium',tp:'Sequential',o:[{n:'Solution scope and boundary definition',f:'Structured scope document',q:['Service boundary clearly defined -- what we deliver vs what the client retains vs what third parties provide','Interface points identified -- where our service meets client operations, other suppliers, regulatory bodies','Scope assumptions documented -- areas where the ITT is ambiguous and we have assumed in or out','Exclusions explicitly stated with rationale -- what we are deliberately not proposing and why','Dependencies on client or third parties identified -- what must others provide for our model to work?']}]}
        ]},
        {id:'SOL-03.2',n:'Operating Model Architecture',t:[
          {id:'SOL-03.2.1',n:'Design the high-level operating model framework -- service lines, how they relate, how they map to requirements and deliver against the specification',raci:{r:'Solution Architect',a:'Bid Director',c:'Delivery Director / Workstream Leads',i:'Commercial Lead'},e:'High',tp:'Sequential',o:[{n:'Operating model framework',f:'Operating model canvas / architecture diagram with narrative',q:['Service lines defined -- each with clear purpose, scope, and relationship to requirements','How service lines integrate and interact documented -- dependencies, shared services, escalation paths','Transformation story articulated -- how the future model improves on the as-is (from SOL-02)','Framework is at architecture level -- sufficient for downstream activities to detail, not so detailed it constrains them','Requirements coverage demonstrated -- every key requirement area has a home in the model']}]},
          {id:'SOL-03.2.2',n:'Design the governance and management model -- how the service will be managed, client interface, decision-making, escalation, performance reporting',raci:{r:'Solution Architect',a:'Bid Director',c:'Delivery Director / Account Manager',i:'Bid Manager'},e:'Medium',tp:'Parallel',o:[{n:'Governance and management model',f:'Structured governance design',q:['Management tiers defined -- strategic, operational, tactical -- with purpose and cadence','Client interface model designed -- joint governance, reporting, escalation, relationship management','Decision-making framework documented -- who decides what, at which level, with what authority','Performance reporting structure designed -- what gets reported, to whom, at what frequency','Continuous improvement and contract management mechanisms included']}]},
          {id:'SOL-03.2.3',n:'Design the organisational concept -- future structure, key roles, capability requirements at a strategic level (detail in SOL-06)',raci:{r:'Solution Architect',a:'Bid Director',c:'HR Lead / Delivery Director',i:'Commercial Lead'},e:'Medium',tp:'Parallel',o:[{n:'Organisational concept',f:'High-level org design with narrative',q:['Future organisational structure designed at strategic level -- functions, teams, reporting lines','Key leadership and specialist roles identified with capability requirements','Relationship to current workforce indicated -- what broadly transfers, what changes, what is new','Organisational design principles stated -- spans of control, empowerment, flexibility','Sufficient for SOL-06 to detail staffing model and TUPE analysis -- not so detailed it pre-empts that work']}]}
        ]},
        {id:'SOL-03.3',n:'Solution Integration & Narrative',t:[
          {id:'SOL-03.3.1',n:'Map solution to requirements -- demonstrate how the TOM addresses every key requirement area from SOL-01',raci:{r:'Solution Architect',a:'Bid Director',c:'Workstream Leads',i:'Bid Manager'},e:'Medium',tp:'Sequential',o:[{n:'Requirements-to-solution mapping',f:'Traceability matrix',q:['Every key requirement area mapped to the solution component that addresses it','Coverage gaps identified -- requirements not yet addressed by the TOM','Strength of response per requirement area assessed -- strong, adequate, needs development','Gaps assigned to downstream detailed design activities for resolution']}]},
          {id:'SOL-03.3.2',n:'Map solution to win themes -- demonstrate how the TOM delivers our differentiators and competitive messaging',raci:{r:'Solution Architect',a:'Bid Director',c:'Capture Lead',i:'Bid Manager'},e:'Low',tp:'Sequential',o:[{n:'Win theme-to-solution mapping',f:'Structured mapping',q:['Every win theme mapped to the solution features and design choices that deliver it','Win themes that are strongly supported by the TOM identified -- these become headline solution messages','Win themes that are weakly supported flagged -- solution must be strengthened or theme reconsidered','Solution features that don\'t connect to any win theme questioned -- are they necessary or scope creep?']}]},
          {id:'SOL-03.3.3',n:'Validate TOM with bid team -- confirm as the baseline for detailed design activities (SOL-04 onwards) and identify risks and dependencies',raci:{r:'Solution Architect',a:'Bid Director',c:'Bid Team (collective)',i:''},e:'Medium',tp:'Sequential',o:[{n:'Target operating model (validated -- activity primary output)',f:'Comprehensive TOM document',q:['Bid team has reviewed and challenged -- not single-author design','Solution positioning confirmed -- team understands and supports the compliance/transformation balance','Requirements coverage confirmed -- all key areas addressed or assigned to downstream activities','Win theme delivery confirmed -- solution supports the competitive narrative','Risks and open issues documented -- what could go wrong and what needs resolving in detailed design','Downstream activities briefed -- SOL-04 through SOL-09 understand their design envelope','TOM baselined as the reference point -- changes require formal review']}]}
        ]}
      ],
      outs:[{n:'Target operating model',f:'Comprehensive TOM document',q:['Solution positioning decision made and documented -- compliance/transformation spectrum with rationale','Design principles established -- specific, actionable, traceable to positioning and requirements','Scope and boundary defined -- what is in, what is out, interfaces with client and third parties','Operating model framework designed -- service lines, integration, transformation story from as-is','Governance and management model designed -- tiers, client interface, decision-making, reporting','Organisational concept designed -- future structure, key roles, capability requirements','Requirements coverage demonstrated -- every key area mapped to solution component','Win theme delivery demonstrated -- solution supports competitive narrative','Validated by bid team and baselined for detailed design']}]},
    {id:'SOL-04',n:'Service delivery model design',o:'Service delivery model',d:['SOL-03'],dur:30,ts:3,pt:'P',rl:'Solution Architect',
      subs:[
        {id:'SOL-04.1',n:'Service Line Design',t:[
          {id:'SOL-04.1.1',n:'Design service delivery processes per service line -- workflows, activities, handoffs, triggers, volumes, and operating procedures',raci:{r:'Solution Architect / Service Line Leads',a:'Bid Director',c:'Delivery Director / SMEs',i:'Commercial Lead'},e:'High',tp:'Parallel',o:[{n:'Service delivery process designs',f:'Per-service-line process documentation',q:['Each service line has documented delivery processes -- not just what is delivered but how','Workflows define activities, roles, handoffs, triggers, and decision points','Volume assumptions documented -- what throughput the process is designed to handle','Process improvements over the as-is model identified -- what changes and what the improvement delivers','Processes are specific enough to cost -- resource types, effort, and frequency identifiable']}]},
          {id:'SOL-04.1.2',n:'Design resource and capacity model per service line -- what resources deliver this service, at what capacity, with what scalability?',raci:{r:'Solution Architect / Service Line Leads',a:'Bid Director',c:'Delivery Director / HR Lead',i:'Commercial Lead'},e:'High',tp:'Parallel',o:[{n:'Resource and capacity model',f:'Per-service-line resource model',q:['Resource types and quantities defined per service line -- roles, FTEs, skills, location','Capacity designed against expected volumes -- with headroom assumptions stated','Scalability mechanisms defined -- how does capacity flex with demand (up and down)?','Peak and trough scenarios considered -- not just average steady-state','Resource model is directly costable -- feeds COM-01 should-cost model']}]},
          {id:'SOL-04.1.3',n:'Design interfaces and dependencies between service lines -- how work flows across boundaries, shared services, escalation paths',raci:{r:'Solution Architect',a:'Bid Director',c:'Service Line Leads',i:'Delivery Director'},e:'Medium',tp:'Sequential',o:[{n:'Service line interface and dependency map',f:'Interface matrix with process documentation',q:['All interfaces between service lines identified and documented -- triggers, handoffs, data flows','Shared services and common capabilities identified -- what is centralised vs distributed','Escalation paths across service line boundaries defined','Dependencies that create bottleneck or single-point-of-failure risk identified','End-to-end service journeys traced across service lines -- does the integrated model work for the end user?']}]}
        ]},
        {id:'SOL-04.2',n:'Performance & Assurance Framework',t:[
          {id:'SOL-04.2.1',n:'Map SLA/KPI commitments to delivery components -- which parts of the delivery model are responsible for which performance outcomes?',raci:{r:'Solution Architect',a:'Bid Director',c:'Delivery Director / Commercial Lead',i:'Bid Manager'},e:'Medium',tp:'Sequential',o:[{n:'SLA/KPI-to-delivery commitment matrix',f:'Structured matrix',q:['Every SLA and KPI mapped to the service line and process component responsible for delivering it','Where multiple service lines contribute to a single KPI, the contribution model is defined','Commitments are achievable within the resource and capacity model -- not aspirational','Service credit and penalty exposure assessed per commitment -- what is the financial risk?','Monitoring mechanism identified per KPI -- how will we know if we are meeting the commitment?']}]},
          {id:'SOL-04.2.2',n:'Design quality assurance and continuous improvement mechanisms -- how we monitor, measure, and improve service delivery over the contract term',raci:{r:'Solution Architect',a:'Bid Director',c:'Delivery Director / Quality Lead',i:'Commercial Lead'},e:'Medium',tp:'Sequential',o:[{n:'Quality assurance and continuous improvement framework',f:'Structured framework document',q:['Quality assurance mechanisms defined -- inspection, audit, review, self-assessment cadence','Performance monitoring and reporting mechanisms designed -- dashboards, alerts, thresholds','Continuous improvement process defined -- how improvements are identified, assessed, approved, and implemented','Lessons learned and knowledge management mechanisms included','Framework is proportionate to contract value and complexity -- not over-engineered']}]},
          {id:'SOL-04.2.3',n:'Validate service delivery model -- confirm it delivers against requirements, is costable for COM-01, and is deliverable within the organisational concept',raci:{r:'Solution Architect',a:'Bid Director',c:'Bid Team (collective)',i:''},e:'Low',tp:'Sequential',o:[{n:'Service delivery model (validated -- activity primary output)',f:'Comprehensive delivery model document',q:['Bid team has reviewed and challenged -- not single-author design','Requirements coverage confirmed -- every functional and performance requirement addressed','Commercial readiness confirmed -- resource model, capacity model, and process designs are sufficiently detailed for costing','Deliverability confirmed -- the delivery team believes this model can be mobilised and operated','Risks and assumptions documented -- what could go wrong and what has been assumed','Baselined for downstream consumption -- SOL-06 (staffing), SOL-07 (transition), COM-01 (costing)']}]}
        ]}
      ],
      outs:[{n:'Service delivery model',f:'Comprehensive delivery model document',q:['Service delivery processes designed per service line -- workflows, activities, volumes, operating procedures','Resource and capacity model defined per service line -- roles, FTEs, scalability mechanisms','Service line interfaces and dependencies mapped -- handoffs, shared services, escalation','SLA/KPI commitments mapped to delivery components with monitoring mechanisms','Quality assurance and continuous improvement framework designed','Model validated as deliverable, costable, and requirements-compliant']}]},
    {id:'SOL-05',n:'Technology & digital approach',o:'Technology solution design',d:['SOL-03','SUP-02'],dur:20,ts:2,pt:'P',rl:'Technical Lead',
      subs:[
        {id:'SOL-05.1',n:'Technology Architecture & Platform Design',t:[
          {id:'SOL-05.1.1',n:'Design target technology architecture -- platforms, infrastructure, applications, and how they support the service delivery model',raci:{r:'Technical Lead',a:'Solution Architect',c:'Delivery Director / Technology SMEs',i:'Commercial Lead'},e:'High',tp:'Sequential',o:[{n:'Target technology architecture',f:'Architecture document with diagrams',q:['Technology architecture covers all layers -- infrastructure, platform, application, user interface','Each technology component mapped to the service delivery process it enables','Transformational technology opportunities from SAL-02 L2.3 incorporated where evaluation-aligned','Architecture principles stated -- cloud strategy, scalability approach, resilience, maintainability','Technology roadmap across contract term outlined -- what is delivered at mobilisation vs phased in']}]},
          {id:'SOL-05.1.2',n:'Assess build vs buy vs reuse decisions -- what do we develop bespoke, what COTS/partner platforms do we adopt, what existing systems do we retain and enhance?',raci:{r:'Technical Lead',a:'Solution Architect',c:'Commercial Lead / Partner Lead',i:'Delivery Director'},e:'Medium',tp:'Sequential',o:[{n:'Build/buy/reuse assessment',f:'Structured decision register per component',q:['Every significant technology component assessed: build bespoke, buy COTS/SaaS, reuse existing, or partner-provided','Decision rationale documented per component -- cost, capability, risk, time-to-deploy, lock-in','Partner and COTS dependencies identified with licensing and commercial implications','Legacy systems to be retained have a lifecycle and risk assessment -- supportability, end-of-life, migration path','Decisions are commercially viable -- feeds directly into COM-01 technology cost model']}]},
          {id:'SOL-05.1.3',n:'Design cyber security and information assurance approach -- security architecture, data classification, accreditation requirements',raci:{r:'Security Architect / Technical Lead',a:'Solution Architect',c:'Client Security (if available) / Legal',i:'Bid Director'},e:'Medium',tp:'Parallel',o:[{n:'Security and information assurance design',f:'Security architecture document',q:['Security architecture designed -- access control, encryption, network security, endpoint protection','Data classification and handling requirements addressed -- what data at what classification, storage, transmission, retention','Accreditation requirements identified -- what certifications and assurance processes are needed and timeline','Security compliance with ITT requirements and government frameworks demonstrated','Security risks identified and mitigated -- residual risk accepted or escalated']}]}
        ]},
        {id:'SOL-05.2',n:'Data & Integration Design',t:[
          {id:'SOL-05.2.1',n:'Design data architecture and migration approach -- data model, data flows, migration from legacy systems, data quality strategy',raci:{r:'Technical Lead / Data Architect',a:'Solution Architect',c:'Technology SMEs',i:'Delivery Director'},e:'High',tp:'Sequential',o:[{n:'Data architecture and migration design',f:'Structured design document',q:['Target data model designed -- key data entities, relationships, ownership, lifecycle','Data flows mapped -- how data moves between systems, services, and external parties','Data migration approach defined -- what migrates, from where, transformation rules, validation approach','Data quality strategy defined -- cleansing, validation, ongoing quality management','Data migration risks identified -- volume, complexity, quality, downtime implications']}]},
          {id:'SOL-05.2.2',n:'Design integration architecture -- how systems connect, APIs, interfaces with client systems and third-party platforms',raci:{r:'Technical Lead',a:'Solution Architect',c:'Technology SMEs / Partner Technical Leads',i:'Commercial Lead'},e:'Medium',tp:'Parallel',o:[{n:'Integration architecture',f:'Integration design document',q:['All system-to-system interfaces identified and designed -- internal, client, and third-party','Integration patterns defined -- APIs, messaging, batch, real-time, file transfer','Client system integration requirements addressed -- what we connect to, protocol, frequency, ownership','Third-party and partner system integration designed -- dependencies, SLAs, fallback','Integration testing approach outlined -- how we validate interfaces work end-to-end']}]},
          {id:'SOL-05.2.3',n:'Validate technology solution -- confirm it enables the delivery model, is costable, is deliverable, and meets security requirements',raci:{r:'Technical Lead',a:'Solution Architect',c:'Bid Team (collective)',i:''},e:'Low',tp:'Sequential',o:[{n:'Technology solution design (validated -- activity primary output)',f:'Comprehensive technology design document',q:['Technology architecture, data architecture, and integration architecture consolidated','Build/buy/reuse decisions confirmed with commercial implications quantified','Security and IA approach confirmed as compliant with requirements and government frameworks','Technology solution validated as enabling the service delivery model -- no gaps','Costable for COM-01 -- licensing, development, hosting, support costs identifiable','Deliverable within transition timeline -- technology readiness mapped to mobilisation phases','Risks and assumptions documented -- technology risk feeds SOL-12']}]}
        ]}
      ],
      outs:[{n:'Technology solution design',f:'Comprehensive technology design document',q:['Target technology architecture designed -- infrastructure, platform, application, user interface','Build/buy/reuse decisions made per component with rationale and commercial implications','Cyber security and information assurance approach designed and compliance demonstrated','Data architecture and migration approach designed -- model, flows, migration, quality','Integration architecture designed -- internal, client, and third-party interfaces','Solution validated as enabling delivery model, costable, deliverable, and security-compliant']}]},
    {id:'SOL-06',n:'Staffing model & TUPE analysis',o:'Staffing model with TUPE schedule',d:['SOL-04'],dur:8,ts:1,pt:'S',rl:'HR Lead / Solution Architect',
      subs:[
        {id:'SOL-06.1',n:'Target Staffing Model Design',t:[
          {id:'SOL-06.1.1',n:'Design target workforce structure -- roles, grades, FTEs, reporting lines, mapped to service lines and organisational concept',raci:{r:'HR Lead / Solution Architect',a:'Bid Director',c:'Delivery Director / Service Line Leads',i:'Commercial Lead'},e:'High',tp:'Sequential',o:[{n:'Target staffing model',f:'Structured workforce model',q:['Every role defined -- title, grade, function, service line, reporting line, location','FTE count per role with rationale -- linked to service delivery process and volume assumptions','Management structure defined -- spans of control, team sizes, supervisory ratios','Shift patterns and working arrangements documented where applicable','Model is directly costable -- grade, rate, hours identifiable per role for COM-01']}]},
          {id:'SOL-06.1.2',n:'Define skills and capability requirements per role -- what competencies, qualifications, clearances, and experience does the future workforce need?',raci:{r:'HR Lead / Solution Architect',a:'Bid Director',c:'Service Line Leads / SMEs',i:'Delivery Director'},e:'Medium',tp:'Sequential',o:[{n:'Skills and capability requirements matrix',f:'Per-role competency framework',q:['Each role has defined competency requirements -- skills, qualifications, experience, clearances','Mandatory vs desirable competencies distinguished','Security clearance requirements mapped per role -- SC, DV, BPSS, CTC as applicable','Specialist or scarce skills identified -- roles that will be difficult to fill','Training and development needs anticipated -- what upskilling will the workforce need?']}]}
        ]},
        {id:'SOL-06.2',n:'TUPE & Workforce Transition Analysis',t:[
          {id:'SOL-06.2.1',n:'Analyse TUPE-transferring workforce -- headcount, terms and conditions, pensions, collective agreements, protected rights, and legal obligations',raci:{r:'HR Lead',a:'Bid Director',c:'Legal / Commercial Lead',i:'Solution Architect'},e:'High',tp:'Sequential',o:[{n:'TUPE analysis and schedule',f:'Structured TUPE register with analysis',q:['Transferring workforce profiled -- headcount, roles, grades, locations, employment type','Terms and conditions analysed -- pay, benefits, hours, leave, notice periods, collective agreements','Pension obligations assessed -- scheme type (LGPS, NHSPS, private), employer contribution rates, Fair Deal/New Fair Deal implications','Protected rights identified -- what cannot be changed post-transfer and for how long','TUPE cost impact quantified -- what does the transferring workforce cost vs our target model assumptions?','TUPE data gaps flagged -- what information is still missing and the risk of the unknown']}]},
          {id:'SOL-06.2.2',n:'Conduct workforce gap analysis -- delta between transferring workforce and target staffing model: recruit, redeploy, upskill, or restructure',raci:{r:'HR Lead / Solution Architect',a:'Bid Director',c:'Delivery Director / Legal',i:'Commercial Lead'},e:'Medium',tp:'Sequential',o:[{n:'Workforce gap analysis',f:'Structured gap register with resolution strategy',q:['Role-by-role comparison: transferring workforce mapped to target staffing model','Gaps identified by type: new roles to recruit, surplus roles to redeploy/exit, skills gaps to upskill','Resolution strategy per gap -- recruitment, redeployment, training, restructuring, agency/contractor','Timeline for resolution -- what can be done pre-mobilisation vs during transition vs steady-state','Cost implications quantified -- recruitment, redundancy, training, interim resourcing costs for COM-01','Legal risk assessed -- restructuring and redundancy implications under TUPE']}]},
          {id:'SOL-06.2.3',n:'Validate staffing model -- confirm it delivers the service, is TUPE-compliant, and is costable for COM-01',raci:{r:'HR Lead / Solution Architect',a:'Bid Director',c:'Commercial Lead / Legal',i:'Bid Manager'},e:'Low',tp:'Sequential',o:[{n:'Staffing model with TUPE schedule (validated -- activity primary output)',f:'Comprehensive workforce model with TUPE register',q:['Target staffing model confirmed as sufficient to deliver the service delivery model','TUPE compliance confirmed -- legal obligations met, protected rights respected','Workforce gap resolution strategy accepted -- recruitment, redeployment, and training plans viable','Total workforce cost quantified -- transferring workforce + new hires + gap resolution costs','Pension and benefits obligations quantified -- employer cost fully modelled for COM-01','Risks documented -- TUPE data gaps, restructuring risk, scarce skills, clearance timelines']}]}
        ]}
      ],
      outs:[{n:'Staffing model with TUPE schedule',f:'Comprehensive workforce model with TUPE register',q:['Target workforce structure designed -- roles, grades, FTEs, reporting lines per service line','Skills and capability requirements defined per role including clearance requirements','TUPE-transferring workforce analysed -- terms, pensions, protected rights, cost impact','Workforce gap analysis complete -- gaps identified, resolution strategy per gap, timeline, cost','Total workforce cost quantified and costable for COM-01','TUPE-compliant and legally validated']}]},
    {id:'SOL-07',n:'Transition & mobilisation approach',o:'Transition plan',d:['SOL-04','SOL-05','SOL-06'],dur:16,ts:2,pt:'P',rl:'Delivery Director',
      subs:[
        {id:'SOL-07.1',n:'Transition Planning',t:[
          {id:'SOL-07.1.1',n:'Design the transition approach and phasing -- pre-contract, day one, transition period, steady state -- with service continuity as the overriding constraint',raci:{r:'Delivery Director',a:'Bid Director',c:'Solution Architect / Commercial Lead',i:'Bid Manager'},e:'High',tp:'Sequential',o:[{n:'Transition approach and phase plan',f:'Structured phase plan',q:['Transition phases defined -- pre-contract preparation, day one, transition period (typically 3-6 months), steady state','Service continuity strategy articulated -- how service is maintained at every phase of transition','Cutover approach defined -- big bang, phased, parallel running, or hybrid -- with rationale','Dependencies on client and outgoing supplier explicitly identified -- what we need from them and when','Critical path through transition identified -- what must happen in sequence, what can be parallel']}]},
          {id:'SOL-07.1.2',n:'Plan people transition -- TUPE transfer process, day-one workforce readiness, induction, gap recruitment timeline, training programme',raci:{r:'HR Lead / Delivery Director',a:'Bid Director',c:'Legal / Solution Architect',i:'Commercial Lead'},e:'High',tp:'Parallel',o:[{n:'People transition plan',f:'Structured plan with timeline',q:['TUPE transfer process designed -- consultation timeline, communication plan, day-one logistics','Day-one workforce readiness defined -- who must be in place, with what induction, on what terms','Recruitment timeline for gap roles -- sequenced against transition phases and service need','Training and upskilling programme designed -- what skills, for whom, by when','Employee engagement and retention approach during transition -- managing uncertainty and attrition risk']}]},
          {id:'SOL-07.1.3',n:'Plan technology and data transition -- system migration, data migration, new platform deployment, parallel running, legacy decommission',raci:{r:'Technical Lead',a:'Solution Architect',c:'Delivery Director / Technology SMEs',i:'Commercial Lead'},e:'High',tp:'Parallel',o:[{n:'Technology transition plan',f:'Structured plan with timeline',q:['System migration sequence defined -- which systems when, dependencies, parallel running periods','Data migration plan detailed -- extraction, transformation, loading, validation, rollback approach','New platform deployment phased against transition timeline -- what is available at day one vs later','Legacy system decommission planned -- when systems are switched off, data archival, licence termination','Technology transition risks identified -- downtime, data loss, integration failure, parallel running cost']}]}
        ]},
        {id:'SOL-07.2',n:'Mobilisation Programme & Risk',t:[
          {id:'SOL-07.2.1',n:'Design the mobilisation programme -- governance, milestones, dependencies, resource plan, client and outgoing-supplier interface',raci:{r:'Delivery Director',a:'Bid Director',c:'Solution Architect / Bid Manager',i:'Commercial Lead'},e:'Medium',tp:'Sequential',o:[{n:'Mobilisation programme',f:'Programme plan with governance structure',q:['Mobilisation governance designed -- programme board, workstream leads, reporting cadence, decision rights','Milestones defined with acceptance criteria -- measurable, not just dates','Dependencies mapped -- between transition workstreams, on client, on outgoing supplier, on third parties','Mobilisation resource plan defined -- who is needed, when, distinct from steady-state team','Client and outgoing-supplier interface designed -- joint working arrangements, information sharing, escalation']}]},
          {id:'SOL-07.2.2',n:'Identify transition risks and develop mitigation strategies -- what could go wrong during transition and how we prevent or manage it',raci:{r:'Delivery Director',a:'Bid Director',c:'Solution Architect / HR Lead / Technical Lead',i:'Commercial Lead'},e:'Medium',tp:'Sequential',o:[{n:'Transition risk register',f:'Structured risk register with mitigations',q:['Risks identified across all transition dimensions -- people, technology, service, commercial, client dependency','Each risk assessed for likelihood and impact -- particularly impact on service continuity','Mitigation strategies defined per risk -- preventive and contingent actions','Key dependency risks highlighted -- risks we cannot fully mitigate because they depend on client or outgoing supplier action','Residual risk accepted or escalated -- no unaddressed high-impact risks']}]},
          {id:'SOL-07.2.3',n:'Validate transition plan -- confirm it delivers service continuity, is achievable within timeline, and is costable',raci:{r:'Delivery Director',a:'Bid Director',c:'Bid Team (collective)',i:''},e:'Low',tp:'Sequential',o:[{n:'Transition plan (validated -- activity primary output)',f:'Comprehensive transition and mobilisation document',q:['Bid team has reviewed and challenged -- not single-author plan','Service continuity confirmed -- no unacceptable disruption at any phase','Timeline achievable -- critical path fits within contract mobilisation period','Dependencies on client and outgoing supplier are reasonable and clearly communicated','Transition costs quantified -- mobilisation team, dual running, recruitment, training, technology migration','Risks documented with mitigations -- credible plan for managing what could go wrong','Plan is compelling for evaluators -- demonstrates we have thought this through in detail']}]}
        ]}
      ],
      outs:[{n:'Transition plan',f:'Comprehensive transition and mobilisation document',q:['Transition approach and phasing designed -- pre-contract through to steady state','Service continuity strategy articulated with cutover approach','People transition planned -- TUPE, induction, recruitment, training','Technology transition planned -- migration, deployment, parallel running, decommission','Mobilisation programme designed -- governance, milestones, dependencies, resource plan','Transition risks identified and mitigated','Plan validated as achievable, costable, and credible for evaluators']}]},
    {id:'SOL-08',n:'Innovation & continuous improvement',o:'Innovation roadmap',d:['SOL-03'],dur:5,ts:1,pt:'S',rl:'Solution Architect',
      subs:[
        {id:'SOL-08.1',n:'Innovation Strategy & Roadmap',t:[
          {id:'SOL-08.1.1',n:'Define innovation strategy -- vision, principles, and how innovation aligns to buyer values, win themes, and the evaluation framework',raci:{r:'Solution Architect',a:'Bid Director',c:'Capture Lead / Technical Lead',i:'Commercial Lead'},e:'Medium',tp:'Sequential',o:[{n:'Innovation strategy',f:'Structured strategy document',q:['Innovation vision articulated -- what does this service look like in 5 years vs today?','Innovation principles defined -- aligned to client values, not innovation for its own sake','Alignment to evaluation framework demonstrated -- how innovation will score','Innovation ambition calibrated to solution positioning (from SOL-03.1.1) -- if compliance play, innovation is measured improvement; if transformation play, innovation is step change']}]},
          {id:'SOL-08.1.2',n:'Design innovation roadmap across the contract term -- what innovations, when, what investment required, what outcomes delivered',raci:{r:'Solution Architect',a:'Bid Director',c:'Technical Lead / Delivery Director',i:'Commercial Lead'},e:'High',tp:'Sequential',o:[{n:'Innovation roadmap',f:'Phased roadmap with investment and outcomes',q:['Innovations phased across contract term -- year 1, year 2-3, year 4-5 -- not everything at once','Each innovation has: description, enabling technology, investment required, expected outcome, measurement criteria','AI and automation opportunities specifically identified -- which processes, which roles affected, what productivity gain','Roadmap is realistic -- builds on the technology platform (SOL-05) and delivery model (SOL-04)','Dependencies identified -- what must be in place before each innovation can be delivered']}]},
          {id:'SOL-08.1.3',n:'Identify day-one innovations -- what we bring from the start that the incumbent does not have and that immediately improves the service',raci:{r:'Solution Architect',a:'Bid Director',c:'Technical Lead / Delivery Director',i:'Capture Lead'},e:'Low',tp:'Sequential',o:[{n:'Day-one innovation register',f:'Structured register',q:['Each day-one innovation identifies what it replaces or improves vs the current service','Innovations are deliverable from day one -- not dependent on transition completion','Impact is tangible and demonstrable -- the client sees the difference immediately','Credible -- we have evidence, track record, or working prototypes to substantiate each claim']}]}
        ]},
        {id:'SOL-08.2',n:'Continuous Improvement Framework',t:[
          {id:'SOL-08.2.1',n:'Design continuous improvement governance -- how improvements are identified, assessed, approved, funded, and measured over the contract term',raci:{r:'Solution Architect',a:'Bid Director',c:'Delivery Director / Quality Lead',i:'Commercial Lead'},e:'Medium',tp:'Sequential',o:[{n:'Continuous improvement framework',f:'Governance and process document',q:['Improvement identification process defined -- how ideas surface from staff, data, client, technology scanning','Assessment and prioritisation criteria defined -- impact, feasibility, cost, alignment to client priorities','Approval and funding mechanism designed -- who approves, what budget, what governance','Implementation process defined -- how approved improvements get delivered without disrupting service','Measurement framework -- how we track whether improvements actually delivered the expected outcome']}]}
        ]},
        {id:'SOL-08.3',n:'Innovation Commercial Model & Workforce Impact',t:[
          {id:'SOL-08.3.1',n:'Model the innovation productivity curve -- how AI, automation, and process improvement progressively reduce cost base over the contract term',raci:{r:'Solution Architect',a:'Bid Director',c:'Commercial Lead / Technical Lead',i:'Delivery Director'},e:'High',tp:'Sequential',o:[{n:'Innovation productivity curve model',f:'Year-on-year cost and productivity model',q:['Year-on-year productivity trajectory modelled -- not a flat line but a progressive curve','Headcount impact per innovation quantified -- which roles reduce, by how many FTEs, in which year','Cost reduction quantified per year -- total cost base trajectory over contract term','Assumptions clearly stated -- adoption rate, technology maturity, client readiness, change management success','Sensitivity analysis -- what if adoption is slower or faster than assumed?']}]},
          {id:'SOL-08.3.2',n:'Design value sharing and investment framework -- who benefits from productivity gains, how innovation investment is funded, and how this is contractually governed',raci:{r:'Commercial Lead',a:'Bid Director',c:'Solution Architect / Legal',i:'Partner'},e:'High',tp:'Sequential',o:[{n:'Innovation value sharing and investment framework',f:'Structured commercial framework',q:['Value sharing mechanism defined -- gain share split, annual price reduction trajectory, or reinvestment commitment','Investment model defined -- where innovation funding comes from: upfront capex, efficiency reinvestment, dedicated fund, or client co-investment','Investment vs return profile modelled -- when does the crossover happen between investment and saving?','Contractual governance designed -- benchmarking, open-book, annual pricing reviews, innovation milestones, performance guarantees','Client benefit clearly articulated -- how the client sees lower cost, better outcomes, or both over the contract term','Supplier margin impact understood -- profitability trajectory as headcount reduces but investment increases']}]},
          {id:'SOL-08.3.3',n:'Plan workforce transformation alongside innovation -- how roles evolve, redeploy, or reduce as AI and automation are introduced, within TUPE and employment law constraints',raci:{r:'HR Lead / Solution Architect',a:'Bid Director',c:'Legal / Delivery Director',i:'Commercial Lead'},e:'Medium',tp:'Sequential',o:[{n:'Workforce transformation plan',f:'Phased workforce change plan',q:['Role evolution mapped to innovation roadmap -- which roles change, when, to what','Redeployment and reskilling strategy for displaced roles -- not just redundancy but career pathways','TUPE and employment law implications of role displacement addressed -- what can and cannot be done within legal constraints','Natural attrition factored in -- headcount reduction through turnover vs active restructuring','Employee engagement approach -- how workforce transformation is communicated and managed without destabilising service delivery']}]},
          {id:'SOL-08.3.4',n:'Validate innovation roadmap -- credible investment case, measurable outcomes, commercially viable, workforce impact managed, aligned to evaluation criteria',raci:{r:'Solution Architect',a:'Bid Director',c:'Bid Team (collective)',i:''},e:'Low',tp:'Sequential',o:[{n:'Innovation roadmap (validated -- activity primary output)',f:'Comprehensive innovation strategy with commercial model',q:['Innovation roadmap validated as realistic and deliverable','Investment case is credible -- funding source identified, return modelled, risk assessed','Productivity curve accepted by commercial team -- feeds directly into pricing model','Value sharing framework accepted -- client benefit and supplier margin impact understood','Workforce transformation plan is legally compliant and operationally viable','Day-one innovations are credible and substantiated','Continuous improvement framework is proportionate and sustainable','Overall innovation proposition aligned to evaluation criteria and win themes']}]}
        ]}
      ],
      outs:[{n:'Innovation roadmap',f:'Comprehensive innovation strategy with commercial model',q:['Innovation strategy defined -- vision, principles, evaluation alignment','Phased roadmap across contract term -- innovations, investment, outcomes, timelines','Day-one innovations identified -- immediate impact vs current service','Continuous improvement governance framework designed','Productivity curve modelled -- year-on-year cost trajectory as AI/automation reduce headcount','Value sharing and investment framework designed -- who benefits, how funded, contractual governance','Workforce transformation planned -- role evolution, reskilling, TUPE-compliant displacement management','Validated as commercially viable, deliverable, and evaluation-aligned']}]},
    {id:'SOL-09',n:'Social value proposition',o:'Social value plan',d:['SOL-04'],dur:5,ts:1,pt:'S',rl:'Solution Architect',
      subs:[
        {id:'SOL-09.1',n:'Social Value Strategy & Commitment Design',t:[
          {id:'SOL-09.1.1',n:'Analyse social value requirements and evaluation criteria -- what the ITT requires, what themes are weighted, what the client\'s local priorities are',raci:{r:'Solution Architect / Social Value Lead',a:'Bid Director',c:'Capture Lead / Bid Manager',i:'Commercial Lead'},e:'Medium',tp:'Sequential',o:[{n:'Social value requirements analysis',f:'Structured analysis',q:['All social value evaluation criteria identified with weightings and marks','Social Value Model themes mapped to ITT requirements -- which themes matter most for this procurement','Local context analysed -- what social value outcomes are most relevant to this geography and community','Client priorities beyond the formal criteria identified -- what resonates with this buyer','Scoring guidance analysed -- what does a top-scoring social value response look like?']}]},
          {id:'SOL-09.1.2',n:'Design social value commitments -- specific, measurable, embedded in delivery model and supply chain, aligned to Social Value Model themes and local priorities',raci:{r:'Solution Architect / Social Value Lead',a:'Bid Director',c:'Delivery Director / HR Lead / Supply Chain Lead',i:'Commercial Lead'},e:'High',tp:'Sequential',o:[{n:'Social value commitment register',f:'Structured register with measurable commitments',q:['Each commitment is specific and measurable -- quantity, location, timeline, target population','Commitments aligned to Social Value Model themes and TOMs metrics where applicable','Commitments are embedded in the delivery model -- linked to specific service, staffing, or supply chain components','Supply chain social value commitments included -- not just our own but partners and subcontractors','Commitments are locally relevant -- targeted at the geography, demographics, and priorities of the client area','Commitments are proportionate to contract value and scope -- credible, not aspirational']}]},
          {id:'SOL-09.1.3',n:'Define monitoring and reporting framework -- how social value commitments will be tracked, measured, and reported over the contract term',raci:{r:'Solution Architect / Social Value Lead',a:'Bid Director',c:'Delivery Director / Bid Manager',i:'Commercial Lead'},e:'Low',tp:'Sequential',o:[{n:'Social value monitoring and reporting framework',f:'Structured framework',q:['Each commitment has a defined metric, data source, collection frequency, and reporting mechanism','Reporting aligned to client requirements -- format, frequency, governance forum','Accountability defined -- who is responsible for delivering and reporting each commitment','Corrective action process defined -- what happens if a commitment is behind target','Framework is sustainable -- not so burdensome that reporting overhead undermines delivery']}]}
        ]},
        {id:'SOL-09.2',n:'Social Value Integration & Validation',t:[
          {id:'SOL-09.2.1',n:'Embed social value commitments in the operating model -- link each commitment to specific service delivery, staffing, or supply chain components',raci:{r:'Solution Architect',a:'Bid Director',c:'Delivery Director / HR Lead / Supply Chain Lead',i:'Bid Manager'},e:'Medium',tp:'Sequential',o:[{n:'Social value integration map',f:'Commitment-to-delivery-component mapping',q:['Every commitment mapped to the operating model component that delivers it -- not free-standing','Delivery mechanism for each commitment is explicit -- not just "we will" but how exactly','Resource and cost implications identified per commitment -- feeds COM-01','Commitments that depend on supply chain partners are confirmed with those partners','No orphan commitments -- everything connects to the delivery model']}]},
          {id:'SOL-09.2.2',n:'Validate social value plan -- commitments are deliverable, measurable, proportionate, and will score against evaluation criteria',raci:{r:'Solution Architect',a:'Bid Director',c:'Bid Team (collective)',i:''},e:'Low',tp:'Sequential',o:[{n:'Social value plan (validated -- activity primary output)',f:'Comprehensive social value document',q:['Bid team has reviewed and challenged -- not single-author plan','Every commitment confirmed as deliverable within the operating model and resource plan','Every commitment confirmed as measurable -- metrics, data sources, and reporting defined','Commitments are proportionate -- neither underweight (won\'t score) nor overcommitted (can\'t deliver)','Alignment to evaluation criteria confirmed -- plan will score well','Cost implications quantified and accepted -- feeds COM-01','Plan is compelling for evaluators -- demonstrates genuine local impact, not generic promises']}]}

      outs:[{n:'Social value plan',f:'Comprehensive social value document',q:['Social value requirements analysed -- themes, weightings, local priorities, scoring guidance','Commitments designed -- specific, measurable, locally relevant, proportionate to contract','Monitoring and reporting framework defined -- metrics, accountability, corrective action','Commitments embedded in operating model -- linked to delivery, staffing, and supply chain','Supply chain social value included -- partner commitments, not just our own','Validated as deliverable, measurable, and evaluation-aligned']}]},
    {id:'SOL-10',n:'Evidence strategy & case study identification',o:'Evidence requirements matrix',d:['SOL-04','SAL-05'],dur:3,ts:1,pt:'S',rl:'Bid Manager',
      subs:[
