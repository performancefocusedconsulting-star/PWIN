      <div style="background:var(--bg2);border:1px solid var(--bdr);overflow-x:auto;">
        ${gapItems.map(r => {
          const gaps = [];
          if (r.qualityAnswersQuestion === 'no' || r.qualityAnswersQuestion === 'partial') gaps.push('answers');
          if (r.qualityFollowsStructure === 'no' || r.qualityFollowsStructure === 'partial') gaps.push('structure');
          if (r.qualityCredentials === 'no' || r.qualityCredentials === 'partial') gaps.push('credentials');
          return `<div style="padding:6px 14px;border-bottom:1px solid var(--bdr-s);display:flex;gap:10px;align-items:center;">
            <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--gold);min-width:50px;">${h(r.reference||'')}</span>
            <span style="flex:1;font-size:12px;color:var(--t1);">${h(r.title||r.questionText||'')}</span>
            <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--amb);">${r.evaluationWeightPct ? r.evaluationWeightPct+'%' : ''}</span>
            ${gaps.map(g => `<span class="fe fe-r">${g}</span>`).join('')}
          </div>`;
        }).join('')}
      </div>`;
  }

  return `${metricsHtml}${detailHtml}${gapHtml}`;
}

// _renderGapReport removed — gap report UX deferred to V2 (depends on in-product compliance tracking)

function renderReviews(bid) {
  const cycles = bid.reviewCycles || [];
  const totalActions = cycles.reduce((s,c) => s + (c.actions||[]).length, 0);
  const openActions = cycles.reduce((s,c) => s + (c.actions||[]).filter(a => ['open','in_progress'].includes(a.status)).length, 0);
  const critOpen = cycles.reduce((s,c) => s + REVIEWS.criticalOpenCount(c), 0);
  const stats = REVIEWS.crossReviewStats(cycles);

  // Metrics row
  const metrics = [
    { l:'Cycles', v: cycles.length, cls:'fe-b' },
    { l:'Actions Open', v: openActions, cls: openActions > 0 ? 'fe-a' : 'fe-g' },
    { l:'Critical Open', v: critOpen, cls: critOpen > 0 ? 'fe-r' : 'fe-g' },
    { l:'Resolution Rate', v: stats.resolutionRate + '%', cls: stats.resolutionRate >= 80 ? 'fe-g' : stats.resolutionRate >= 50 ? 'fe-a' : 'fe-r' },
  ];
  const metricsHtml = `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;">${metrics.map(m =>
    `<div class="metric"><div class="metric-val">${m.v}</div><div class="metric-lbl">${m.l}</div></div>`
  ).join('')}</div>`;

  // View tabs
  const tabs = [
    { id:'timeline', l:'Timeline' },
    { id:'cross', l:'Cross-Review' },
  ];
  const tabsHtml = `<div class="view-tabs">${tabs.map(t =>
    `<button class="view-tab ${ROUTER.revView===t.id?'on':''}" onclick="ROUTER.setRevView('${t.id}')">${t.l}</button>`
  ).join('')}</div>`;

  let body = '';
  if (ROUTER.revView === 'cross') {
    body = _renderCrossReview(bid, stats);
  } else {
    body = _renderRevTimeline(bid, cycles);
  }

  const addBtn = `<div style="margin-top:12px;"><button class="btn btn-sm" onclick="handleAddCycleModal()">+ Add Review Cycle</button></div>`;

  return `<div class="sh2">Review Governance</div>${metricsHtml}${tabsHtml}${body}${addBtn}`;
}

function _renderRevTimeline(bid, cycles) {
  if (cycles.length === 0) {
    return `<div class="co" style="padding:24px;text-align:center;"><div class="co-t" style="color:var(--t3);">No review cycles yet. Add a review cycle to begin tracking.</div></div>`;
  }

  const typeLabels = {
    solution_review:'Solution Review', pricing_review:'Pricing Review', risk_review:'Risk Review',
    pink:'Pink Review', red:'Red Review', gold:'Gold Review', adhoc:'Ad-hoc Review',
  };
  const statusBadge = s => {
    const m = { scheduled:'fe-mute', in_progress:'fe-b', actions_open:'fe-a', closed:'fe-g' };
    return `<span class="fe ${m[s]||'fe-mute'}">${(s||'').replace(/_/g,' ')}</span>`;
  };

  const timelineHtml = `<div class="rv-timeline">${cycles.map(c =>
    `<div class="rv-cycle type-${c.type} ${ROUTER.revCycleId===c.id?'on':''}" onclick="ROUTER.selectCycle('${c.id}')">
      <div class="rv-cycle-type">${c.type.replace(/_/g,' ')}</div>
      <div class="rv-cycle-name">${h(typeLabels[c.type] || c.type)}</div>
      <div class="rv-cycle-date">${c.targetDate || 'No date'}</div>
      <div class="rv-cycle-badge">${statusBadge(c.status)}</div>
    </div>`
  ).join('')}</div>`;

  // Cycle detail
  let detailHtml = '';
  if (ROUTER.revCycleId) {
    const cycle = cycles.find(c => c.id === ROUTER.revCycleId);
    if (cycle) detailHtml = _renderCycleDetail(bid, cycle);
  }

  return timelineHtml + detailHtml;
}

function _renderCycleDetail(bid, cycle) {
  const summary = REVIEWS.scorecardSummary(cycle);
  const critOpen = REVIEWS.criticalOpenCount(cycle);
  const actions = cycle.actions || [];
  const acts = bid.activities || [];

  // Status controls
  const statusFlow = ['scheduled','in_progress','actions_open','closed'];
  const curIdx = statusFlow.indexOf(cycle.status);
  let statusCtrl = '';
  if (cycle.status === 'scheduled') {
    statusCtrl = `<button class="btn btn-sm" onclick="handleCycleAdvance('${cycle.id}','in_progress')">Start Review</button>`;
  } else if (cycle.status === 'in_progress' && actions.length > 0) {
    statusCtrl = `<button class="btn btn-sm" onclick="handleCycleAdvance('${cycle.id}','actions_open')">Log Actions</button>`;
  } else if (cycle.status === 'actions_open') {
    if (critOpen === 0) {
      statusCtrl = `<button class="btn btn-sm btn-primary" onclick="handleCycleAdvance('${cycle.id}','closed')">Close Review</button>`;
    }
  }

  // Scorecard summary
  const criteria = REVIEWS.criteriaForType(cycle.type);
  const scCardHtml = `<div class="sh2" style="margin-top:16px;">Scorecard</div>
    <div class="sc-grid">${criteria.map(c => {
      const d = summary.criteria[c] || { avg:0, count:0, pass:false };
      const cls = d.count === 0 ? 'na' : d.pass ? 'pass' : d.avg >= summary.threshold * 0.8 ? 'warn' : 'fail';
      return `<div class="sc-cell">
        <div class="sc-cell-label">${c}</div>
        <div class="sc-cell-val ${cls}">${d.count > 0 ? d.avg.toFixed(1) : '—'}</div>
      </div>`;
    }).join('')}
    <div class="sc-cell">
      <div class="sc-cell-label">Overall</div>
      <div class="sc-cell-val ${summary.totalScores === 0 ? 'na' : summary.overall >= summary.threshold ? 'pass' : 'fail'}">${summary.totalScores > 0 ? summary.overall.toFixed(1) : '—'}</div>
    </div>
  </div>`;

  // Scorecard entry — one row per activity in targetActivities
  const targetActs = (cycle.targetActivities || []).map(id => acts.find(a => a.id === id)).filter(Boolean);
  let scoreEntryHtml = '';
  if (cycle.status !== 'scheduled' && targetActs.length > 0) {
    scoreEntryHtml = `<div class="sh2" style="margin-top:16px;">Score Entry</div>
      <div class="sc-input-hdr"><span>Section</span><span>Activity</span>${criteria.map(c => `<span>${c.slice(0,4)}</span>`).join('')}<span>Avg</span></div>
      ${targetActs.map((act, ai) => {
        const existing = (cycle.scores || []).find(s => s.activityId === act.id) || {};
        const vals = criteria.map(c => existing[c] || 0);
        const filled = vals.filter(v => v > 0);
        const avg = filled.length > 0 ? (filled.reduce((a,b)=>a+b,0)/filled.length).toFixed(1) : '—';
        return `<div class="sc-input-row">
          <div style="font-size:11px;color:var(--t1);">${h(act.name || act.id)}</div>
          <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);">${act.id}</div>
          ${criteria.map(c => {
            const cur = existing[c] || 0;
            return `<div style="text-align:center;">
              <select class="sel" style="width:40px;padding:2px;font-size:10px;text-align:center;" onchange="handleScoreEntry('${cycle.id}','${act.id}','${c}',+this.value)">
                <option value="0" ${cur===0?'selected':''}>—</option>
                ${[1,2,3,4,5].map(v => `<option value="${v}" ${cur===v?'selected':''}>${v}</option>`).join('')}
              </select>
            </div>`;
          }).join('')}
          <div style="font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:700;text-align:center;color:var(--t1);">${avg}</div>
        </div>`;
      }).join('')}`;
  }

  // Action table
  const sevRank = { critical:0, major:1, minor:2 };
  const statusRank = { open:0, in_progress:1, disputed:2, resolved:3, accepted:4 };
  const sortedActions = [...actions].sort((a,b) => {
    const col = ROUTER.revActionSort.col;
    const dir = ROUTER.revActionSort.dir === 'asc' ? 1 : -1;
    if (col === 'severity') return dir * ((sevRank[a.severity]||0) - (sevRank[b.severity]||0));
    if (col === 'status') return dir * ((statusRank[a.status]||0) - (statusRank[b.status]||0));
    if (col === 'deadline') return dir * ((a.deadline||'').localeCompare(b.deadline||''));
    if (col === 'section') return dir * ((a.activityCode||'').localeCompare(b.activityCode||''));
    return 0;
  });

  const sevBadge = s => {
    const m = { critical:'fe-r', major:'fe-a', minor:'fe-mute' };
    return `<span class="fe ${m[s]||'fe-mute'}">${s}</span>`;
  };
  const actStatusBadge = s => {
    const m = { open:'fe-r', in_progress:'fe-b', resolved:'fe-g', accepted:'fe-g', disputed:'fe-a' };
    return `<span class="fe ${m[s]||'fe-mute'}">${(s||'').replace(/_/g,' ')}</span>`;
  };
  const sortArrow = col => ROUTER.revActionSort.col === col ? (ROUTER.revActionSort.dir === 'asc' ? ' ↑' : ' ↓') : '';

  const actionTableHtml = `<div class="sh2" style="margin-top:16px;">Actions <span class="fe fe-mute">${actions.length}</span></div>
    <div class="ra-hdr">
      <span>#</span>
      <span style="cursor:pointer;" onclick="ROUTER.revSortBy('section')">Section${sortArrow('section')}</span>
      <span>Comment</span>
      <span style="cursor:pointer;" onclick="ROUTER.revSortBy('severity')">Severity${sortArrow('severity')}</span>
      <span>Criterion</span>
      <span>Owner</span>
      <span style="cursor:pointer;" onclick="ROUTER.revSortBy('deadline')">Deadline${sortArrow('deadline')}</span>
      <span style="cursor:pointer;" onclick="ROUTER.revSortBy('status')">Status${sortArrow('status')}</span>
    </div>
    ${sortedActions.map((a, i) => `<div class="ra-row sev-${a.severity}">
      <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);">${i+1}</div>
      <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--t1);">${h(a.activityCode||'—')}</div>
      <div class="ra-comment">${h(a.comment)}</div>
      <div>${sevBadge(a.severity)}</div>
      <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--t3);">${a.criterion||'—'}</div>
      <div style="font-size:11px;color:var(--t2);">${h(a.owner||'—')}</div>
      <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--t2);">${a.deadline||'—'}</div>
      <div>
        <select class="sel" style="font-size:9px;padding:2px 4px;" onchange="handleActionStatusChange('${cycle.id}','${a.id}',this.value)">
          ${['open','in_progress','resolved','accepted','disputed'].map(s =>
            `<option value="${s}" ${a.status===s?'selected':''}${!REVIEWS.canActionTransition(a.status,s)&&a.status!==s?' disabled':''}>${s.replace(/_/g,' ')}</option>`
          ).join('')}
        </select>
      </div>
    </div>`).join('')}
    ${cycle.status !== 'closed' ? `<div style="margin-top:8px;"><button class="btn btn-sm" onclick="handleAddActionModal('${cycle.id}')">+ Add Action</button></div>` : ''}`;

  // Gate logic panel
  const gateHtml = `<div class="gate-panel">
    <div class="gate-indicator ${critOpen > 0 ? 'locked' : 'unlocked'}"></div>
    <div class="gate-msg">${critOpen > 0
      ? `<strong>${critOpen} critical action(s)</strong> must be resolved before this review can close.`
      : cycle.status === 'closed' ? '<strong>Review closed.</strong> All critical actions resolved.' : '<strong>Gate unlocked.</strong> All critical actions resolved — ready to close.'
    }</div>
    ${statusCtrl}
  </div>`;

  return `<div style="margin-top:12px;border:1px solid var(--bdr);padding:14px;background:var(--bg1);">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <div style="font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;color:var(--t1);">${h(cycle.type.replace(/_/g,' '))} — Detail</div>
      <div>${_cycleStatusBadge(cycle.status)}</div>
    </div>
    ${gateHtml}${scCardHtml}${scoreEntryHtml}${actionTableHtml}
  </div>`;
}

function _cycleStatusBadge(s) {
  const m = { scheduled:'fe-mute', in_progress:'fe-b', actions_open:'fe-a', closed:'fe-g' };
  return `<span class="fe ${m[s]||'fe-mute'}">${(s||'').replace(/_/g,' ')}</span>`;
}

function _renderCrossReview(bid, stats) {
  const cycles = bid.reviewCycles || [];
  if (cycles.length === 0) {
    return `<div class="co" style="padding:24px;text-align:center;"><div class="co-t" style="color:var(--t3);">No review cycles to analyse.</div></div>`;
  }

  // Severity breakdown
  const sevHtml = `<div class="sh2" style="margin-top:8px;">Actions by Severity</div>
    <div style="display:flex;gap:12px;margin-bottom:16px;">
      <div class="metric"><div class="metric-val" style="color:var(--red);">${stats.bySeverity.critical||0}</div><div class="metric-lbl">Critical</div></div>
      <div class="metric"><div class="metric-val" style="color:var(--amb);">${stats.bySeverity.major||0}</div><div class="metric-lbl">Major</div></div>
      <div class="metric"><div class="metric-val" style="color:var(--t3);">${stats.bySeverity.minor||0}</div><div class="metric-lbl">Minor</div></div>
    </div>`;

  // Cycle comparison table
  const cycleRows = cycles.map(c => {
    const sc = REVIEWS.scorecardSummary(c);
    const crit = REVIEWS.criticalOpenCount(c);
    const total = (c.actions||[]).length;
    const resolved = (c.actions||[]).filter(a => ['resolved','accepted'].includes(a.status)).length;
    const rate = total > 0 ? Math.round((resolved/total)*100) : 0;
    return `<div class="cr-row">
      <div style="font-size:12px;color:var(--t1);">${h(c.type.replace(/_/g,' '))}</div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:700;color:var(--t1);">${sc.totalScores > 0 ? sc.overall.toFixed(1) : '—'}</div>
      <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--t2);">${total}</div>
      <div style="font-family:'DM Mono',monospace;font-size:10px;color:${crit>0?'var(--red)':'var(--grn)'};">${crit}</div>
      <div><div class="cr-bar"><div class="cr-bar-fill" style="width:${rate}%;background:${rate>=80?'var(--grn)':rate>=50?'var(--amb)':'var(--red)'};"></div></div></div>
    </div>`;
  });

  const cycleTable = `<div class="sh2" style="margin-top:12px;">Cycle Comparison</div>
    <div class="cr-hdr"><span>Cycle</span><span>Score</span><span>Actions</span><span>Crit</span><span>Resolved</span></div>
    ${cycleRows.join('')}`;

  // Hotspots
  let hotspotsHtml = '';
  if (stats.hotspots.length > 0) {
    hotspotsHtml = `<div class="sh2" style="margin-top:16px;">Quality Hotspots</div>
      <div style="margin-bottom:8px;">${stats.hotspots.map(hs =>
        `<div style="display:flex;align-items:center;gap:8px;padding:4px 0;">
          <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--t1);min-width:80px;">${h(hs.section)}</span>
          <div class="cr-bar" style="flex:1;"><div class="cr-bar-fill" style="width:${Math.min(100,hs.count/Math.max(1,stats.totalActions)*200)}%;background:var(--amb);"></div></div>
          <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);">${hs.count} actions</span>
        </div>`
      ).join('')}</div>`;
  }

  return sevHtml + cycleTable + hotspotsHtml;
}

function renderGovernance(bid) {
  const gates = bid.governanceGates || [];

  // Evaluate entry criteria for all gates
  gates.forEach(g => GOVERNANCE.evaluateEntryCriteria(g, bid.activities || []));

  // Metrics
  const totalGates = gates.length;
  const passed = gates.filter(g => g.status === 'passed').length;
  const failed = gates.filter(g => g.status === 'failed').length;
  const rpSum = GOVERNANCE.riskPremiumSummary(gates, bid.tcv || 0);

  const metricsHtml = `<div class="metrics-row">
    <div class="metric"><div class="metric-val">${totalGates}</div><div class="metric-lbl">Gates Configured</div></div>
    <div class="metric"><div class="metric-val" style="color:var(--grn)">${passed}</div><div class="metric-lbl">Passed</div></div>
    <div class="metric"><div class="metric-val" style="color:var(--red)">${failed}</div><div class="metric-lbl">Failed</div></div>
    <div class="metric"><div class="metric-val" style="color:var(--amb)">${rpSum.totalPct ? rpSum.totalPct.toFixed(1)+'%' : '0%'}</div><div class="metric-lbl">Risk Premium</div></div>
  </div>`;

  // View tabs
  const tabs = [{id:'pipeline',l:'Gate Pipeline'},{id:'premium',l:'Risk Premium'}];
  const tabsHtml = `<div class="view-tabs">${tabs.map(t =>
    `<button class="view-tab ${ROUTER.govView===t.id?'on':''}" onclick="ROUTER.setGovView('${t.id}')">${t.l}</button>`
  ).join('')}</div>`;

  let body = '';
  if (ROUTER.govView === 'premium') {
    body = _renderRiskPremium(bid, gates, rpSum);
  } else {
    body = _renderGatePipeline(bid, gates);
  }

  const addBtn = `<div style="margin-top:14px;">
    <button class="btn btn-gold" onclick="handleAddGateModal()">+ Add Gate</button>
  </div>`;

  return `<div class="sh2">Governance Manager</div>${metricsHtml}${tabsHtml}${body}${addBtn}`;
}

function _gateStatusBadge(s) {
  const map = {
    pending:'t3', upcoming:'blu', ready:'amb', in_progress:'gold',
    passed:'grn', failed:'red', deferred:'t3',
  };
  const c = map[s] || 't3';
  return `<span class="badge" style="background:var(--${c}-d,var(--bg3));color:var(--${c},var(--t3));">${(s||'upcoming').replace(/_/g,' ')}</span>`;
}

function _renderGatePipeline(bid, gates) {
  if (gates.length === 0) return '<div class="bt" style="margin:18px 0;">No governance gates configured. Add gates via the button below or use the setup wizard.</div>';

  const sorted = [...gates].sort((a, b) => {
    const seqA = GATE_LIB.findIndex(g => g.id === a.templateId);
    const seqB = GATE_LIB.findIndex(g => g.id === b.templateId);
    return seqA - seqB;
  });

  const pipelineHtml = `<div class="gv-pipeline">${sorted.map((g, i) => {
    const lib = GATE_LIB.find(gl => gl.id === g.templateId) || {};
    const critMet = g.criteriaMetCount || 0;
    const critTotal = g.criteriaTotalCount || (g.entryCriteria || []).length;
    const sel = ROUTER.govGateId === g.id;
    return `<div class="gv-gate type-${g.type} ${sel?'on':''}" onclick="ROUTER.selectGate('${g.id}')">
      <div class="gv-gate-seq">${i+1}</div>
      <div>
        <div class="gv-gate-name">${h(g.name)}</div>
        <div class="gv-gate-type">${h(g.type)}${lib.tier ? ' · Tier '+lib.tier : ''}</div>
      </div>
      <div class="gv-gate-date">${g.plannedDate || 'No date'}</div>
      <div class="gv-gate-criteria">${critMet} / ${critTotal} criteria</div>
      <div>${_gateStatusBadge(g.status)}</div>
    </div>`;
  }).join('')}</div>`;

  let detailHtml = '';
  if (ROUTER.govGateId) {
    const gate = gates.find(g => g.id === ROUTER.govGateId);
    if (gate) detailHtml = _renderGateDetail(bid, gate);
  }

  return pipelineHtml + detailHtml;
}

function _renderGateDetail(bid, gate) {
  const lib = GATE_LIB.find(g => g.id === gate.templateId) || {};
  const isPassed = gate.status === 'passed';
  const isFailed = gate.status === 'failed';
  const isTerminal = isPassed || isFailed;

  // Status controls
  const statusOpts = [];
  if (gate.status === 'pending' || gate.status === 'upcoming') {
    if (gate.allCriteriaMet) statusOpts.push({ val: 'ready', lbl: 'Mark Ready' });
    statusOpts.push({ val: 'deferred', lbl: 'Defer' });
  }
  if (gate.status === 'ready') statusOpts.push({ val: 'in_progress', lbl: 'Open Gate' });
  if (gate.status === 'in_progress') {
    statusOpts.push({ val: 'passed', lbl: 'Approve' });
    statusOpts.push({ val: 'failed', lbl: 'Reject' });
    statusOpts.push({ val: 'deferred', lbl: 'Defer' });
  }
  if (gate.status === 'deferred') statusOpts.push({ val: 'upcoming', lbl: 'Reschedule' });

  const statusBtns = statusOpts.map(o =>
    `<button class="btn btn-sm" onclick="handleGateAdvance('${gate.id}','${o.val}')">${o.lbl}</button>`
  ).join(' ');

  // Entry criteria table
  const ecRows = (gate.entryCriteria || []).map(ec => {
    const metIcon = ec.met ? '<div class="ec-check met">✓</div>' : '<div class="ec-check unmet">✗</div>';
    return `<div class="ec-row">
      ${metIcon}
      <div class="ec-text">${h(ec.text)}</div>
      <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);">${ec.currentAssurance || '—'}</div>
      <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--t2);">${ec.requiredAssurance || 'assured'}</div>
    </div>`;
  }).join('');

  const ecHtml = `<div class="sh3" style="margin:14px 0 6px;">Entry Criteria</div>
    <div class="ec-hdr"><span></span><span>Criterion</span><span>Current</span><span>Required</span></div>
    ${ecRows}
    <div style="margin:6px 0;"><button class="btn btn-sm" onclick="handleToggleCriterion('${gate.id}')">Toggle Selected Criterion</button></div>`;

  // Prep timeline
  let prepHtml = '';
  const prepActions = gate.prepActions || [];
  if (prepActions.length > 0) {
    const today = new Date().toISOString().slice(0, 10);
    prepHtml = `<div class="sh3" style="margin:14px 0 6px;">Preparation Timeline</div>
      <div class="pt-timeline">${prepActions.map(pa => {
        const statusCls = pa.status === 'done' ? 'done' : (pa.dueDate && pa.dueDate < today && pa.status === 'open') ? 'overdue' : pa.status === 'in_progress' ? 'in_progress' : '';
        const offsetLabel = pa.offset === 0 ? 'T-0' : pa.offset > 0 ? `T+${pa.offset}` : `T${pa.offset}`;
        return `<div class="pt-step ${statusCls}">
          <div class="pt-status-dot ${statusCls || 'pending'}"></div>
          <div class="pt-offset">${offsetLabel}</div>
          <div class="pt-desc">${h(pa.description)}</div>
          <div class="pt-owner">${h(pa.owner || 'Bid Manager')}</div>
          <div class="pt-date">${pa.dueDate || '—'}</div>
          <select class="inp" style="font-size:10px;padding:2px 4px;margin-top:4px;" onchange="handlePrepActionStatus('${gate.id}','${pa.id}',this.value)">
            <option value="open" ${pa.status==='open'?'selected':''}>Open</option>
            <option value="in_progress" ${pa.status==='in_progress'?'selected':''}>In Progress</option>
            <option value="done" ${pa.status==='done'?'selected':''}>Done</option>
          </select>
        </div>`;
      }).join('')}</div>`;
  } else if (gate.plannedDate && !gate.prepActionsGenerated) {
    prepHtml = `<div style="margin:14px 0;">
      <button class="btn btn-sm" onclick="handleGeneratePrep('${gate.id}')">Generate Preparation Actions</button>
    </div>`;
  }

  // Decision section
  const decReadonly = isTerminal ? 'readonly' : '';
  const decHtml = `<div class="sh3" style="margin:14px 0 6px;">Decision Record</div>
    <div class="gv-decision ${decReadonly}">
      <div class="gv-dec-row">
        <div class="gv-dec-label">Decision</div>
        <select class="inp" style="max-width:220px;" onchange="handleGateDecision('${gate.id}','decision',this.value)" ${isTerminal?'disabled':''}>
          <option value="" ${!gate.decision?'selected':''}>— Select —</option>
          <option value="approve" ${gate.decision==='approve'?'selected':''}>Approve</option>
          <option value="approve_with_conditions" ${gate.decision==='approve_with_conditions'?'selected':''}>Approve with Conditions</option>
          <option value="revise" ${gate.decision==='revise'?'selected':''}>Revise</option>
          <option value="reject" ${gate.decision==='reject'?'selected':''}>Reject</option>
          <option value="defer" ${gate.decision==='defer'?'selected':''}>Defer</option>
        </select>
      </div>
      <div class="gv-dec-row">
        <div class="gv-dec-label">Risk Premium %</div>
        <input class="inp" style="max-width:100px;" type="number" min="0" max="100" step="0.1"
          value="${gate.riskPremium||0}"
          onchange="handleGateDecision('${gate.id}','riskPremium',this.value)" ${isTerminal?'disabled':''}>
      </div>
      <div class="gv-dec-row">
        <div class="gv-dec-label">Approving Body</div>
        <input class="inp" style="max-width:240px;" value="${h(gate.approvingBody||'')}"
          onchange="handleGateDecision('${gate.id}','approvingBody',this.value)" ${isTerminal?'disabled':''}>
      </div>
      <div class="gv-dec-row">
        <div class="gv-dec-label">Notes</div>
        <textarea class="inp" style="max-width:500px;min-height:60px;" onchange="handleGateDecision('${gate.id}','notes',this.value)" ${isTerminal?'disabled':''}>${h(gate.notes||'')}</textarea>
      </div>
      <div class="gv-dec-row">
        <div class="gv-dec-label">Planned Date</div>
        <input class="inp" style="max-width:160px;" type="date" value="${gate.plannedDate||''}"
          onchange="handleGateDecision('${gate.id}','plannedDate',this.value)" ${isTerminal?'disabled':''}>
      </div>
    </div>`;

  return `<div class="gv-detail">
    <div class="gv-detail-hdr">
      <div class="gv-detail-title">${h(gate.name)}</div>
      ${_gateStatusBadge(gate.status)}
      ${statusBtns}
    </div>
    ${ecHtml}${prepHtml}${decHtml}
  </div>`;
}

function _renderRiskPremium(bid, gates, rpSum) {
  const tcv = bid.tcv || 0;

  const summaryHtml = `<div class="rp-summary">
    <div>
      <div class="rp-total">${rpSum.totalPct.toFixed(1)}%</div>
      <div class="rp-label">Total Risk Premium</div>
    </div>
    <div>
      <div class="rp-impact">${tcv > 0 ? `${rpSum.totalPct.toFixed(1)}% on ${fmtGBP(tcv)} = ${fmtGBP(rpSum.totalValue)} added to price` : 'Set TCV to calculate impact'}</div>
    </div>
  </div>`;

  if (rpSum.entries.length === 0) {
    return summaryHtml + '<div class="bt" style="margin:12px 0;">No risk premium applied at any gate.</div>';
  }

  const rowsHtml = rpSum.entries.map(e => `<div class="rp-row">
    <div style="font-size:12px;color:var(--t1);">${h(e.gateName)}</div>
    <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--amb);">${e.premiumPct.toFixed(1)}%</div>
    <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--t2);">${fmtGBP(e.premiumValue)}</div>
    <div style="font-size:11px;color:var(--t3);">${e.cause.length > 0 ? e.cause.slice(0,2).map(c=>h(c)).join('; ') : 'No unmet criteria'}</div>
    <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--t3);">${h(e.approver)}</div>
  </div>`).join('');

  return summaryHtml + `<div class="rp-hdr"><span>Gate</span><span>%</span><span>Value</span><span>Cause</span><span>Approver</span></div>${rowsHtml}`;
}

function renderReadiness(bid) {
  const r = READINESS.overallReadiness(bid);
  const compression = READINESS.detectCompression(bid);
  const postSub = READINESS.postSubmissionReadiness(bid);
  const verdict = READINESS.executiveVerdict(r.overall);

  const h = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');

  // View tabs
  const tabs = [{id:'dashboard',l:'Dashboard'},{id:'print',l:'Executive Print'}];
  const tabHtml = tabs.map(t =>
    `<button class="view-tab ${ROUTER.rdView===t.id?'on':''}" onclick="ROUTER.setRdView('${t.id}')">${t.l}</button>`
  ).join('');

  if (ROUTER.rdView === 'print') {
    return _renderReadinessPrint(bid, r, compression, postSub, verdict);
  }

  // ── Score cards ──
  const scoreCards = `<div class="rd-scores">
    <div class="rd-score-card health-${r.health}">
      <div class="rd-val">${r.overall}%</div>
      <div class="rd-lbl">Overall Readiness</div>
      <div class="rd-verdict ${verdict.replace(' ','-')}" style="margin-top:6px;">${verdict}</div>
    </div>
    <div class="rd-score-card health-${READINESS.deriveHealth(r.dev.score)}">
      <div class="rd-val">${r.dev.score}%</div>
      <div class="rd-lbl">Development Track</div>
    </div>
    <div class="rd-score-card health-${READINESS.deriveHealth(r.prod.score)}">
      <div class="rd-val">${r.prod.score}%</div>
      <div class="rd-lbl">Production Track</div>
    </div>
  </div>`;

  // ── Hard gates ──
  const hardGateHtml = r.hardGates.map(hg =>
    `<div class="rd-hardgate"><span class="rd-hg-icon">&#9888;</span><span class="rd-hg-text">${h(hg.message)} — readiness capped at ${hg.cap}%</span></div>`
  ).join('');

  // ── Trend ──
  const trendIcon = r.trend === 'improving' ? '&#9650;' : r.trend === 'deteriorating' ? '&#9660;' : '&#9644;';
  const trendColor = r.trend === 'improving' ? 'var(--grn)' : r.trend === 'deteriorating' ? 'var(--red)' : 'var(--t3)';
  const trendHtml = `<div class="rd-trend">
    <span class="rd-trend-label">Trend</span>
    <span class="rd-trend-val" style="color:${trendColor}">${trendIcon} ${r.trend === 'insufficient' ? 'Insufficient data' : r.trend}</span>
    <button class="btn btn-sm" style="margin-left:auto;" onclick="handleReadinessSnapshot()">Snapshot</button>
  </div>`;

  // ── Signal renderer ──
  function _sigRows(signals) {
    return signals.map(sig => {
      const health = sig.score >= 70 ? 'green' : sig.score >= 40 ? 'amber' : 'red';
      return `<div class="rd-sig-row">
        <span class="rd-sig-name">${h(sig.name)}${sig.hardGate ? ' <span style="color:var(--red);">&#9888;</span>' : ''}</span>
        <span class="rd-sig-val">${sig.score}%</span>
        <span class="rd-sig-src">${h(sig.source)}</span>
        <span class="rd-sig-dot ${health}"></span>
      </div>`;
    }).join('');
  }

  // ── Dev signals ──
  const devSignals = `<div class="rd-signals">
    <div class="rd-sig-title">Development Readiness Signals (60% weight)</div>
    ${_sigRows(r.dev.signals)}
  </div>`;

  // ── Prod signals ──
  const prodSignals = `<div class="rd-signals">
    <div class="rd-sig-title">Production Readiness Signals (40% weight)</div>
    ${_sigRows(r.prod.signals)}
  </div>`;

  // ── Compression alerts ──
  let compressionHtml = '';
  if (compression.length > 0) {
    compressionHtml = `<div class="rd-compression">
      <div class="rd-sig-title">Compression Alerts (${compression.length})</div>
      <div class="rd-comp-row" style="font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);">
        <span>Chain</span><span style="text-align:center;">Buffer</span><span>Impact</span><span>Suggested action</span>
      </div>
      ${compression.map(c => `<div class="rd-comp-row">
        <span class="rd-comp-chain">${h(c.chain)}</span>
        <span class="rd-comp-buf ${c.severity}">${c.bufferDays}d</span>
        <span class="rd-comp-impact">${h(c.impact)}</span>
        <span class="rd-comp-action">${h(c.suggestion)}</span>
      </div>`).join('')}
    </div>`;
  }

  // ── Post-submission (conditional) ──
  let postSubHtml = '';
  if (postSub) {
    postSubHtml = `<div class="rd-signals">
      <div class="rd-sig-title">Post-Submission Readiness (${postSub.score}%)</div>
      ${postSub.signals.map(sig => {
        const health = sig.score >= 70 ? 'green' : sig.score >= 40 ? 'amber' : 'red';
        return `<div class="rd-sig-row">
          <span class="rd-sig-name">${h(sig.name)}</span>
          <span class="rd-sig-val">${sig.score}%</span>
          <span class="rd-sig-src">${h(sig.source)}</span>
          <span class="rd-sig-dot ${health}"></span>
        </div>`;
      }).join('')}
    </div>`;
  }

  return `<div class="module-hdr">
    <span class="module-tag" style="background:var(--cyn)">M8</span>
    <span class="module-title">Readiness Dashboard</span>
    <span class="view-tabs">${tabHtml}</span>
  </div>
  ${scoreCards}
  ${hardGateHtml}
  ${trendHtml}
  ${devSignals}
  ${prodSignals}
  ${compressionHtml}
  ${postSubHtml}`;
}

function _renderReadinessPrint(bid, r, compression, postSub, verdict) {
  const h = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');
  const allSignals = [...r.dev.signals, ...r.prod.signals];
  const tabs = [{id:'dashboard',l:'Dashboard'},{id:'print',l:'Executive Print'}];
  const tabHtml = tabs.map(t =>
    `<button class="view-tab ${ROUTER.rdView===t.id?'on':''}" onclick="ROUTER.setRdView('${t.id}')">${t.l}</button>`
  ).join('');

  const signalRows = allSignals.map(sig => {
    const health = sig.score >= 70 ? 'green' : sig.score >= 40 ? 'amber' : 'red';

  return `<div class="module-hdr">

      <div class="rd-score-card health-${r.health}">
        <div class="rd-val">${r.overall}%</div>
        <div class="rd-lbl">Overall</div>
        <div class="rd-verdict ${verdict.replace(' ','-')}" style="margin-top:4px;">${verdict}</div>
      </div>
      <div class="rd-score-card health-${READINESS.deriveHealth(r.dev.score)}">
        <div class="rd-val">${r.dev.score}%</div>
        <div class="rd-lbl">Development</div>
      </div>
      <div class="rd-score-card health-${READINESS.deriveHealth(r.prod.score)}">
        <div class="rd-val">${r.prod.score}%</div>
        <div class="rd-lbl">Production</div>

    <table style="width:100%;border-collapse:collapse;font-size:11px;margin-bottom:14px;">
      <thead><tr style="background:var(--bg4);"><th style="border:1px solid var(--bdr-s);padding:4px 6px;text-align:left;">Signal</th><th style="border:1px solid var(--bdr-s);padding:4px 6px;">Weight</th><th style="border:1px solid var(--bdr-s);padding:4px 6px;">Score</th><th style="border:1px solid var(--bdr-s);padding:4px 6px;">Source</th><th style="border:1px solid var(--bdr-s);padding:4px 6px;">Status</th></tr></thead>

      <div><strong style="font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;color:var(--t3);">Hard Gates</strong><ul style="font-size:11px;margin:4px 0;padding-left:16px;">${hardGateRows}</ul></div>
      <div><strong style="font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;color:var(--t3);">Compression Alerts</strong><ul style="font-size:11px;margin:4px 0;padding-left:16px;">${compressionRows}</ul></div>
    </div>
    <p style="font-family:'DM Mono',monospace;font-size:9px;color:var(--t3);margin-top:14px;text-align:center;">Generated by PWIN Bid Execution — ${new Date().toISOString().slice(0,10)}</p>
  </div>`;
}

function renderSubmission(bid) {
  const h = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');
  const arts = bid.artefacts || [];
  if (!bid.qaChecklist) bid.qaChecklist = _defaultQAChecklist();
  if (!bid.approvals) bid.approvals = _defaultApprovals();
  const qa = bid.qaChecklist;
  const approvals = bid.approvals;

  // Metrics
  const artReady = arts.filter(a => ['final','uploaded','confirmed'].includes(a.status)).length;
  const apprDone = approvals.filter(a => a.status === 'approved').length;
  const qaCleared = qa.filter(q => q.done).length;
  const hoursToDeadline = bid.submissionDeadline
    ? Math.max(0, Math.round((new Date(bid.submissionDeadline + 'T23:59:59') - new Date()) / 3600000))
    : '—';

  const artClass = artReady === arts.length && arts.length > 0 ? 'ok' : 'warn';
  const apprClass = apprDone === approvals.length ? 'ok' : approvals.some(a => a.status === 'rejected') ? 'crit' : 'warn';
  const qaClass = qaCleared === qa.length ? 'ok' : 'warn';
  const hourClass = typeof hoursToDeadline === 'number' && hoursToDeadline < 24 ? 'crit' : typeof hoursToDeadline === 'number' && hoursToDeadline < 72 ? 'warn' : 'ok';

  const metricsHtml = `<div class="sm-metrics">
    <div class="sm-metric"><div class="sm-val ${artClass}">${artReady}/${arts.length}</div><div class="sm-lbl">Artefacts Ready</div></div>
    <div class="sm-metric"><div class="sm-val ${apprClass}">${apprDone}/${approvals.length}</div><div class="sm-lbl">Approvals Complete</div></div>
    <div class="sm-metric"><div class="sm-val ${qaClass}">${qaCleared}/${qa.length}</div><div class="sm-lbl">QA Items Clear</div></div>
    <div class="sm-metric"><div class="sm-val ${hourClass}">${hoursToDeadline}</div><div class="sm-lbl">Hours to Deadline</div></div>
  </div>`;

  // View tabs
  const tabs = [{id:'checklist',l:'Submission Checklist'},{id:'upload',l:'Upload Tracker'}];
  const tabHtml = tabs.map(t =>
    `<button class="view-tab ${ROUTER.smView===t.id?'on':''}" onclick="ROUTER.setSmView('${t.id}')">${t.l}</button>`
  ).join('');

  if (ROUTER.smView === 'upload') {
    return `<div class="module-hdr"><span class="module-tag" style="background:var(--red)">M9</span><span class="module-title">Submission Manager</span><span class="view-tabs">${tabHtml}</span></div>
    ${metricsHtml}
    ${_renderUploadTracker(bid, arts)}`;
  }

  // ── Pre-submission validation ──
  const blockers = _submissionBlockers(bid, arts, qa, approvals);
  let blockerHtml = '';
  if (bid.status === 'submitted') {
    blockerHtml = `<div class="sm-ready">&#10003; Bid submitted${bid.submissionLog ? ' on ' + bid.submissionLog.submittedAt : ''}</div>`;
  } else if (blockers.length === 0) {
    blockerHtml = `<div class="sm-ready">&#10003; All prerequisites met — ready to submit</div>
      <button class="btn" style="margin-bottom:14px;" onclick="handleConfirmSubmission()">Confirm Submission</button>`;
  } else {
    blockerHtml = blockers.map(b => `<div class="sm-blocker">&#9888; ${h(b)}</div>`).join('');
  }

  // ── Artefact register ──
  const artSection = `<div class="sm-section">
    <div class="sm-section-title">Artefact Register <button class="btn btn-sm" style="float:right;" onclick="handleAddArtefact()">+ Add</button></div>
    <div class="sm-art-hdr"><span>Document</span><span>Type</span><span>Owner</span><span>Status</span><span></span></div>
    ${arts.length === 0 ? '<div style="padding:8px;color:var(--t3);font-size:12px;">No artefacts added yet</div>' :
      arts.map((a, i) => {
        const isAmber = !['final','uploaded','confirmed'].includes(a.status);
        const isRed = isAmber && typeof hoursToDeadline === 'number' && hoursToDeadline < 24;
        return `<div class="sm-art-row ${isRed?'red':isAmber?'amber':''}">
          <span class="sm-art-name">${h(a.name)}</span>
          <span><span class="badge">${h(a.type)}</span></span>
          <span style="font-size:11px;color:var(--t2);">${h(a.owner)}</span>
          <span><select class="inp" style="font-size:11px;padding:2px 4px;" onchange="handleArtefactStatus(${i},this.value)">
            ${['not_started','draft','final','uploaded','confirmed'].map(s => `<option value="${s}" ${a.status===s?'selected':''}>${s.replace(/_/g,' ')}</option>`).join('')}
          </select></span>
          <span><button class="btn btn-sm" onclick="handleRemoveArtefact(${i})" style="font-size:9px;">&#10005;</button></span>
        </div>`;
      }).join('')}
  </div>`;

  // ── QA Checklist ──
  const qaSection = `<div class="sm-section">
    <div class="sm-section-title">Final QA Checklist</div>
    ${qa.map((q, i) => `<div class="sm-qa-row" onclick="handleToggleQA(${i})">
      <span class="sm-qa-check ${q.done?'done':'todo'}">${q.done?'✓':'✗'}</span>
      <span class="sm-qa-label">${h(q.label)}</span>
    </div>`).join('')}
  </div>`;

  // ── Approval tracker ──
  const apprSection = `<div class="sm-section">
    <div class="sm-section-title">Approval Tracker</div>
    <div class="sm-appr-hdr"><span>Approval</span><span>Approver</span><span>Status</span><span>Date</span></div>
    ${approvals.map((a, i) => `<div class="sm-appr-row">
      <span class="sm-appr-name">${h(a.label)}</span>
      <span><input class="inp" style="font-size:11px;padding:2px 4px;width:100px;" value="${h(a.approver)}" onchange="handleApprovalField(${i},'approver',this.value)"></span>
      <span><select class="inp" style="font-size:11px;padding:2px 4px;" onchange="handleApprovalField(${i},'status',this.value)">
        ${['pending','approved','rejected'].map(s => `<option value="${s}" ${a.status===s?'selected':''}>${s}</option>`).join('')}
      </select></span>
      <span style="font-size:10px;color:var(--t3);">${a.date || '—'}</span>
    </div>`).join('')}
  </div>`;

  // ── Submission log (if submitted) ──
  let logHtml = '';
  if (bid.submissionLog) {
    const log = bid.submissionLog;
    logHtml = `<div class="sm-section">
      <div class="sm-section-title">Submission Log</div>
      <div class="sm-log">
        <div>Submitted by: ${h(log.submittedBy)}</div>
        <div>Submitted at: ${log.submittedAt}</div>
        <div>Channel: ${h(log.channel)}</div>
        <div>Confirmation ref: ${h(log.confirmationRef || '—')}</div>
      </div>
    </div>`;
  }

  return `<div class="module-hdr"><span class="module-tag" style="background:var(--red)">M9</span><span class="module-title">Submission Manager</span><span class="view-tabs">${tabHtml}</span></div>
  ${metricsHtml}
  ${blockerHtml}
  ${artSection}
  ${qaSection}
  ${apprSection}
  ${logHtml}`;
}

    { label: 'Pagination continuous', done: false },

    { label: 'Attachments present', done: false },
    { label: 'Signatures obtained', done: false },
  ];
}

function _defaultApprovals() {
  return [
    { label: 'Pricing sign-off', approver: '', status: 'pending', date: null },
    { label: 'Legal sign-off', approver: '', status: 'pending', date: null },
    { label: 'Executive sign-off', approver: '', status: 'pending', date: null },
    { label: 'Final submission authority', approver: '', status: 'pending', date: null },
  ];
}

function _submissionBlockers(bid, arts, qa, approvals) {
  const blockers = [];
  // 1. All artefacts must be final+
  const artNotReady = arts.filter(a => !['final','uploaded','confirmed'].includes(a.status));
  if (artNotReady.length > 0) blockers.push(`${artNotReady.length} artefact(s) not at final or above`);
  // 2. QA must be 100%
  const qaIncomplete = qa.filter(q => !q.done);
  if (qaIncomplete.length > 0) blockers.push(`${qaIncomplete.length} QA item(s) incomplete`);
  // 3. All approvals must be approved
  const apprPending = approvals.filter(a => a.status !== 'approved');
  if (apprPending.length > 0) blockers.push(`${apprPending.length} approval(s) not yet approved`);
  // 4. Any rejected approval
  if (approvals.some(a => a.status === 'rejected')) blockers.push('Approval rejected — rework required');
  // 5. GOV-05 must be passed
  const gov05 = (bid.governanceGates || []).find(g => g.templateId === 'G5' || g.name === 'Final Submission Authority');
  if (gov05 && gov05.status !== 'passed') blockers.push('Final submission authority gate (GOV-05) not passed');
  // 6. Mandatory gaps
  const mandatoryGaps = (bid.requirements || []).filter(r => r.classification === 'mandatory' && r.coverageStatus === 'gap');
  if (mandatoryGaps.length > 0) blockers.push(`${mandatoryGaps.length} mandatory compliance gap(s)`);
  // 7. Critical open review actions
  const allActions = [];
  (bid.reviewCycles || []).forEach(c => (c.actions || []).forEach(a => allActions.push(a)));
  const critOpen = allActions.filter(a => a.severity === 'critical' && a.status === 'open');
  if (critOpen.length > 0) blockers.push(`${critOpen.length} critical review action(s) still open`);
  return blockers;
}

function _renderUploadTracker(bid, arts) {
  const h = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');
  const channel = bid.submissionChannel || 'portal';

  return `<div class="sm-section">
    <div class="sm-section-title">Portal Upload Status</div>
    <div style="margin-bottom:10px;font-size:11px;color:var(--t2);">Submission channel: <strong>${h(channel)}</strong></div>
    <div class="sm-art-hdr"><span>Document</span><span>Upload Status</span><span>Timestamp</span><span>Confirmation Ref</span><span></span></div>
    ${arts.length === 0 ? '<div style="padding:8px;color:var(--t3);font-size:12px;">No artefacts to upload</div>' :
      arts.map((a, i) => {
        const uploadStatus = a.uploadStatus || 'not_uploaded';
        return `<div class="sm-art-row">

            ${['not_uploaded','uploading','uploaded','confirmed'].map(s => `<option value="${s}" ${uploadStatus===s?'selected':''}>${s.replace(/_/g,' ')}</option>`).join('')}
          </select></span>
          <span style="font-size:10px;color:var(--t3);">${a.uploadTimestamp || '—'}</span>
          <span><input class="inp" style="font-size:10px;padding:2px 4px;width:80px;" placeholder="Ref" value="${h(a.confirmationRef||'')}" onchange="handleArtefactUpload(${i},'confirmationRef',this.value)"></span>
          <span></span>
        </div>`;
      }).join('')}
  </div>
  <div style="margin-top:8px;">
    <div style="font-size:11px;color:var(--t3);margin-bottom:4px;">Upload progress: ${arts.filter(a => ['uploaded','confirmed'].includes(a.uploadStatus)).length}/${arts.length}</div>
    <div style="height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;">
      <div style="height:100%;width:${arts.length > 0 ? (arts.filter(a => ['uploaded','confirmed'].includes(a.uploadStatus)).length / arts.length * 100) : 0}%;background:var(--grn);border-radius:3px;transition:width .3s;"></div>
    </div>
  </div>`;
}

function wizNext() {
  const d = WIZARD.draft;
  const step = WIZARD.step;
  if (step === 1) {
    if (!d.name.trim())              { alert('Bid name is required.'); return; }
    const _sub = d.milestones.find(m => m.type === 'submission_deadline');
    if (!_sub || !_sub.date)         { alert('Submission deadline is required.'); return; }
    // Auto-select gates based on TCV before entering Stage 2
    WIZARD.autoGates();
  }
  WIZARD.setStep(step + 1);
  renderApp();
  window.scrollTo(0, 0);
}

function wizBack() {
  WIZARD.setStep(WIZARD.step - 1);
  renderApp();
  window.scrollTo(0, 0);
}

function wizUnavailCsvUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const rows = ev.target.result.trim().split(/\r?\n/);
    let added = 0, skipped = 0;
    rows.forEach((row, i) => {
      const cols = row.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
      if (i === 0 && /^name$/i.test(cols[0])) return; // header row
      const [name='', from='', to='', notes=''] = cols;
      if (!name || !from || !to) { skipped++; return; }
      if (!/^\d{4}-\d{2}-\d{2}$/.test(from) || !/^\d{4}-\d{2}-\d{2}$/.test(to)) { skipped++; return; }
      if (from > to) { skipped++; return; }
      WIZARD.addUnavail({ name, from, to, notes });
      added++;
    });
    const msg = document.getElementById('unavail-csv-msg');
    if (msg) msg.textContent = `${added} added${skipped ? ', ' + skipped + ' skipped' : ''}`;
    input.value = '';
    renderApp();
  };
  reader.readAsText(file);
}

function _doWizResponseCsvImport() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.csv';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const rows = ev.target.result.trim().split(/\r?\n/);
      let imported = 0, rejected = 0;
      rows.forEach((row, i) => {
        const cols = row.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
        if (i === 0 && /^ref/i.test(cols[0])) return;
        const [ref='', title='', type='written_question', wl='', pl='', wt='', ms='', cx='high', owner=''] = cols;
        if (!title) { rejected++; return; }
        WIZARD.addResponseItem({
          id: STORE.uuid(), reference: ref, title, questionText: '',
          responseType: type, sectionNumber: '',
          evaluationWeightPct: parseFloat(wt) || 0, evaluationMaxScore: parseFloat(ms) || 0,
          wordLimit: parseInt(wl) || 0, pageLimit: parseInt(pl) || 0,
          currentWordCount: 0, complexityEstimate: cx || 'high',
          effortDays: 0, owner, status: 'not_started',
          linkedActivityCode: '', linkedComplianceIds: [],
          dueDate: '', notes: '', notesNextSteps: '', notesIssues: '', notesRisks: '', notesConversations: '', lastUpdated: STORE.now(),
        });
        imported++;
      });
      alert(`${imported} imported, ${rejected} rejected`);
      renderApp();
    };
    reader.readAsText(file);
  };
  input.click();
}

function confirmWizard() {
  const d = WIZARD.draft;
  const _subMs = d.milestones && d.milestones.find(m => m.type === 'submission_deadline');
  if (!d.name.trim() || !_subMs || !_subMs.date) {
    alert('Bid name and submission deadline are required. Please go back to Stage 1.');
    return;
  }

  // Infeasible acknowledgment check
  if (_wizFeasibility && _wizFeasibility.verdict === 'infeasible') {
    const ack = document.getElementById('wiz-ack-check');
    if (!ack || !ack.checked) {
      alert('Please acknowledge the timeline risk before proceeding.');
      return;
    }
  }

  const bid = _generateBidFromWizard(d);

  // Run backward scheduler to populate planned dates
  if (bid.submissionDeadline) {
    const schedule = SCHED.backwardSchedule(bid.activities, bid.submissionDeadline, bid.calendar);
    bid.activities.forEach(a => {
      if (schedule[a.id]) {
        a.plannedStart = schedule[a.id].plannedStart;
        a.plannedEnd   = schedule[a.id].plannedEnd;
      }
    });
  }

  // Set health from feasibility verdict
  const health = _wizFeasibility
    ? (_wizFeasibility.verdict === 'infeasible' ? 'red' : _wizFeasibility.verdict === 'tight' ? 'amber' : 'green')
    : 'unk';

  // Store feasibility summary on bid
  if (_wizFeasibility) {
    bid.feasibility = {
      verdict: _wizFeasibility.verdict,
      availableDays: _wizFeasibility.availableDays,
      criticalPathDays: _wizFeasibility.criticalPathDays,
      criticalPathBuffer: _wizFeasibility.criticalPathBuffer,
      deficit: _wizFeasibility.deficit,
      criticalPath: _wizFeasibility.criticalPath.map(a => a.id),
      checkedAt: STORE.now(),
    };
  }

  // Auto-populate BM-13 assumptions (Rule 10.4)
  const _assumptions = [
    'Sequential execution within workstreams — activities with team size 1 cannot overlap within the same workstream',
    'Effort estimates are based on mid-complexity defaults — override where this bid differs from standard',
    'Team members available at stated allocation — no unplanned absences or reassignment to other bids',
    'Client clarification responses will be received within the stated timeline',
    'Partner inputs (SUP-02, SUP-04) will be delivered on schedule',
  ];
  _assumptions.forEach(desc => {
    bid.riskAssumptions.push({
      id: STORE.uuid(), registerType: 'bid', type: 'assumption',
      description: desc, status: 'open',
      owner: bid.bidManager, createdAt: STORE.now(),
    });
  });

  // Auto-create infeasibility risk entry (Rule 10.3)
  if (_wizFeasibility && _wizFeasibility.verdict === 'infeasible') {
    bid.riskAssumptions.push({
      id: STORE.uuid(), registerType: 'bid', type: 'risk',
      description: `Bid created with infeasible timeline. Deficit: ${_wizFeasibility.deficit} days. Acknowledged by ${bid.bidManager || 'bid manager'} on ${STORE.today()}.`,
      probability: 'high', impact: 'high', status: 'open',
      owner: bid.bidManager, createdAt: STORE.now(),
    });
  }

  bid.health = health;

  STORE.setBid(bid);
  STORE.addBidSummary({
    id: bid.id, name: bid.name, client: bid.client,
    bidManager: bid.bidManager,
    submissionDeadline: bid.submissionDeadline,
    status: 'setup', health,
    winFeeValue: 0, devReadiness: 0, prodReadiness: 0,
  });

  _wizFeasibility = null; // clean up
  WIZARD.abandon();
  ROUTER.goBid(bid.id);
}

function _generateBidFromWizard(d) {
  const id   = STORE.uuid();
  const tcvM = parseFloat(d.tcv) || 0;
  const acvM = parseFloat(d.acv) || 0;
  const _mDate = t => ((d.milestones||[]).find(m=>m.type===t)||{}).date || null;

  // Build activities from WS template with complexity + config overrides
  const activities = [];
  const workstreams = WS.map(ws => ({ id: ws.id, name: ws.name, cls: ws.cls, phase: ws.ph }));

  WS.forEach(ws => {
    ws.acts.forEach(tmpl => {
      const cfg    = d.activityConfig[tmpl.id] || {};
      const active = cfg.active !== false;
      const dur    = cfg.dur != null ? cfg.dur : tmpl.dur;
      const ts     = WIZARD.effTs(tmpl, d.complexity, cfg.ts != null ? cfg.ts : null);

      activities.push({
        id: tmpl.id,
        workstreamId: ws.id,
        name: tmpl.n,
        output: tmpl.o,
        parallelisationType: tmpl.pt,
        dependencies: [...tmpl.d],
        effortDays: dur,
        teamSize: ts,
        active,
        status: 'not_started',
        assurance: 'none',
        owner: _activityOwner(tmpl.id, ws.id, d.team),
        plannedStart: null, plannedEnd: null,
        actualStart: null, actualEnd: null,
        lastUpdated: null, notes: '',
      });
    });
  });

  // Build governance gates from selected gates
  const governanceGates = GATE_LIB
    .filter(g => d.gateSelection[g.id])
    .map(g => ({
      id: STORE.uuid(), templateId: g.id, name: g.name, type: g.type,
      status: 'pending', plannedDate: null, actualDate: null,
      decision: null, conditions: [], riskPremium: 0,
      entryCriteria: g.entryCriteria.map(c => ({ text: c, met: false })),
      prepActions: [], notes: '',
    }));

  // Activate BM-09 if competitive dialogue
  if (d.hasCompetitiveDialogue) {
    const bm09 = activities.find(a => a.id === 'BM-09');
    if (bm09) bm09.active = true;
  }

  return {
    id, name: d.name, client: d.client,
    sector: d.sector, procurementType: d.procurementType,
    bidManager: d.team.bidManager, solutionLead: d.team.solutionLead,
    commercialLead: d.team.commercialLead, deliveryLead: d.team.deliveryLead,
    legalLead: d.team.legalLead, supplyChainLead: d.team.supplyLead,
    milestones: d.milestones.map(m=>({...m})),
    submissionDeadline: _mDate('submission_deadline'),
    ittIssueDate: _mDate('tender_commencement'),
    clarificationDeadline: _mDate('clarification_deadline'),
    presentationDate: _mDate('presentation'),
    expectedAwardDate: _mDate('contract_award'),
    contractCommencement: _mDate('contract_commencement'),
    submissionChannel: d.submissionChannel,
    hasIncumbent: d.hasIncumbent, incumbent: d.incumbent,
    hasCompetitiveDialogue: d.hasCompetitiveDialogue,
    hasPresentation: d.milestones.some(m=>m.type==='presentation'&&m.date),
    hasBafo: d.hasBafo,
    // Procurement context (ITT ingestion layer)
    procurementRoute: d.procurementRoute || '',
    portalPlatform: d.portalPlatform || '',
    portalReference: d.portalReference || '',
    contractDurationMonths: parseFloat(d.contractDurationMonths) || null,
    extensionOptions: d.extensionOptions || '',
    estimatedTotalValue: parseFloat(d.estimatedTotalValue) || null,
    tupeApplicable: !!d.tupeApplicable,
    tupeStaffCount: parseInt(d.tupeStaffCount) || null,
    securityClearanceTier: d.securityClearanceTier || '',
    isRebid: !!d.isRebid,
    status: 'setup', archetype: 'services', complexity: d.complexity,
    tcv: tcvM, acv: acvM, winFeeValue: 0,
    health: 'unk', devReadiness: 0, prodReadiness: 0,
    createdAt: STORE.now(), updatedAt: STORE.now(),
    calendar: {
      workingDays: d.workingDays,
      publicHolidays: [...d.publicHolidays],
      weekendWorking: [],
      teamUnavailability: [...d.teamUnavailability],
      clientBlackouts: [],
    },
    workstreams, activities,
    requirements: [...d.requirements],  // legacy — kept for backward compat
    responseSections: [...(d.responseSections || [])],
    responseItems: [...(d.responseItems || [])],
    complianceRequirements: [...(d.complianceRequirements || [])],
    ittDocuments: [...(d.ittDocuments || [])],
    evaluationFramework: d.evaluationFramework ? {...d.evaluationFramework} : null,
    reviewCycles: [], governanceGates, standupActions: [],
    riskAssumptions: [],
    teamMembers: (d.extendedTeam||[]).map(m=>({...m, id:STORE.uuid()})),
    artefacts: [],
  };
}

function _activityOwner(actId, wsId, team) {
  if (wsId === 'SOL') return team.solutionLead  || '';
  if (wsId === 'COM') return team.commercialLead || '';
  if (wsId === 'DEL') return team.deliveryLead   || '';
  if (wsId === 'LEG') return team.legalLead      || '';
  if (wsId === 'SUP') return team.supplyLead     || '';
  return team.bidManager || '';
}

function handleStatusChange(actId, newStatus) {
  STORE.mutateBid(ROUTER.bidId, bid => {
    const act = bid.activities.find(a => a.id === actId);
    if (!act) return;
    const result = TRANSITIONS.changeActivityStatus(act, newStatus);
    if (!result.ok) { alert(result.error); return; }
    // Auto-update linked requirement coverage (Rule 2.5)
    (bid.requirements || []).forEach(r => {
      if ((r.responseActivityId || r.responseRef) === actId) {
        TRANSITIONS.autoUpdateCoverage(r, act);
      }
    });
  });
  renderApp();
}

function handleAssuranceChange(actId, newAssurance) {
  STORE.mutateBid(ROUTER.bidId, bid => {
    const act = bid.activities.find(a => a.id === actId);
    if (!act) return;
    const result = TRANSITIONS.changeAssurance(act, newAssurance);

    // Auto-update linked requirement coverage (Rule 2.5)
    (bid.requirements || []).forEach(r => {

}

function handleActNotes(actId, notes) {
  STORE.mutateBid(ROUTER.bidId, bid => {

}

}

function handleNudgeDismiss(actId) {
  STORE.mutateBid(ROUTER.bidId, bid => {
    const act = bid.activities.find(a => a.id === actId);
    if (act) act.lastUpdated = STORE.now();
  });

function actSortBy(col) {
  if (ROUTER.actSort.col === col) {
    ROUTER.actSort.dir = ROUTER.actSort.dir === 'asc' ? 'desc' : 'asc';
  } else {
    ROUTER.actSort = { col, dir: 'asc' };
  }
  renderApp();
}

function _doResponseCsvImport() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.csv';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const rows = ev.target.result.trim().split(/\r?\n/);
      let imported = 0, rejected = 0, duplicates = 0;
      const validTypes = ['written_question','document_upload','certificate','cv','pricing_schedule','case_study','presentation','form','data_return','other'];
      const validCategories = ['quality','price','social_value','pass_fail','unscored'];
      STORE.mutateBid(ROUTER.bidId, bid => {
        if (!bid.responseSections) bid.responseSections = [];
        rows.forEach((row, i) => {
          const cols = row.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
          if (i === 0 && /^ref/i.test(cols[0])) return;
          // Column order: reference, title, questionText, responseType, evaluationCategory,
          //   evaluationMaxScore, evaluationCriteria, sectionNumber, hurdleScore, wordLimit, pageLimit
          const [ref='', title='', qtext='', type='', cat='', ms='', criteria='', secNum='', hurdle='', wl='', pl=''] = cols;
          // Validate required fields
          if (!ref || !title || !qtext || !type || !cat || !ms || !criteria || !secNum) { rejected++; return; }
          if (!validTypes.includes(type)) { rejected++; return; }
          if (!validCategories.includes(cat)) { rejected++; return; }
          // Duplicate detection: warn but still import
          if (bid.responseSections.some(s => s.reference === ref)) duplicates++;
          bid.responseSections.push({
            id: STORE.uuid(), bidId: bid.id,
            reference: ref, title, questionText: qtext,
            responseType: type,
            ittVolume: null,
            sectionNumber: secNum,
            evaluationCategory: cat,
            evaluationWeightPct: 0, // section-level weight derived from EvaluationFramework
            evaluationMaxScore: parseFloat(ms) || 0,
            evaluationCriteria: criteria,
            hurdleScore: hurdle ? parseFloat(hurdle) : null,
            wordLimit: parseInt(wl) || 0, pageLimit: parseInt(pl) || 0,
            responseFormat: null,
            linkedResponseItemId: null,
            sortOrder: bid.responseSections.length,
            notes: null, sourceDocumentId: null,
            createdBy: 'csv_import', lastAmended: null, lastUpdated: STORE.now(),
          });
          imported++;
        });
      });
      let msg = `${imported} response section${imported!==1?'s':''} imported`;
      if (rejected) msg += `, ${rejected} rejected (missing required field or invalid enum)`;
      if (duplicates) msg += `, ${duplicates} duplicate reference${duplicates!==1?'s':''} (imported anyway)`;
      alert(msg);
      renderApp();
    };
    reader.readAsText(file);
  };
  input.click();
}

function handleCycleAdvance(cycleId, newStatus) {
  STORE.mutateBid(ROUTER.bidId, bid => {
    const cycle = (bid.reviewCycles || []).find(c => c.id === cycleId);
    if (!cycle) return;
    const result = REVIEWS.changeCycleStatus(cycle, newStatus);
    if (!result.ok) { alert(result.error); return; }
    // Rule 7.1: On close, promote assurance
    if (newStatus === 'closed') {
      REVIEWS.onCycleClose(cycle, bid.activities || []);
      // Auto-update requirement coverage for promoted activities
      (bid.activities || []).forEach(act => {
        (bid.requirements || []).forEach(r => {
          if ((r.responseActivityId || r.responseRef) === act.id) {
            TRANSITIONS.autoUpdateCoverage(r, act);
          }
        });
      });
    }
  });
  renderApp();
}

  STORE.mutateBid(ROUTER.bidId, bid => {
    const cycle = (bid.reviewCycles || []).find(c => c.id === cycleId);
    if (!cycle) return;
    if (!cycle.scores) cycle.scores = [];
    let entry = cycle.scores.find(s => s.activityId === actId);
    if (!entry) {
      entry = { activityId: actId };
      cycle.scores.push(entry);
    }
    if (value >= 1 && value <= 5) {
      entry[criterion] = value;
    } else {
      delete entry[criterion];
    }
  });
  renderApp();
}

function handleAddGateConfirm() {
  const templateId = document.getElementById('gg-template').value;
  const plannedDate = document.getElementById('gg-date').value || null;
  const approvingBody = (document.getElementById('gg-approver').value || '').trim();

  const lib = GATE_LIB.find(g => g.id === templateId);
  if (!lib) return;

  STORE.mutateBid(ROUTER.bidId, bid => {
    if (!bid.governanceGates) bid.governanceGates = [];
    bid.governanceGates.push({
      id: STORE.uuid(), templateId: lib.id, name: lib.name, type: lib.type,
      status: 'upcoming', plannedDate, actualDate: null,
      decision: null, conditions: [], riskPremium: 0,
      approvingBody,
      entryCriteria: lib.entryCriteria.map(c => ({ text: c, met: false })),
      prepActions: [], prepActionsGenerated: false, notes: '',
    });
  });
  closeModal();
  renderApp();
}

function handleGateAdvance(gateId, newStatus) {
  STORE.mutateBid(ROUTER.bidId, bid => {
    const gate = (bid.governanceGates || []).find(g => g.id === gateId);
    if (!gate) return;
    const result = GOVERNANCE.changeGateStatus(gate, newStatus);
    if (!result.ok) { alert(result.error); return; }
    if (newStatus === 'passed') {
      gate.actualDate = STORE.today();
      GOVERNANCE.onGatePassed(gate, bid.activities || []);
    }
    if (newStatus === 'failed') {
      gate.actualDate = STORE.today();
    }
  });
  renderApp();
}

function handleGateDecision(gateId, field, value) {
  STORE.mutateBid(ROUTER.bidId, bid => {
    const gate = (bid.governanceGates || []).find(g => g.id === gateId);
    if (!gate) return;
    if (field === 'riskPremium') {
      gate.riskPremium = parseFloat(value) || 0;
    } else {
      gate[field] = value;
    }
  });
  renderApp();
}

function handleGeneratePrep(gateId) {
  STORE.mutateBid(ROUTER.bidId, bid => {
    const gate = (bid.governanceGates || []).find(g => g.id === gateId);
    if (!gate) return;
    const actions = GOVERNANCE.generatePrepActions(gate, bid.calendar);
    // Also add to bid's standup actions
    if (!bid.standupActions) bid.standupActions = [];
    actions.forEach(a => bid.standupActions.push({...a}));
  });
  renderApp();
}

function handlePrepActionStatus(gateId, actionId, newStatus) {
  STORE.mutateBid(ROUTER.bidId, bid => {
    const gate = (bid.governanceGates || []).find(g => g.id === gateId);
    if (!gate) return;
    const action = (gate.prepActions || []).find(a => a.id === actionId);
    if (!action) return;
    action.status = newStatus;
    if (newStatus === 'done') action.completedDate = STORE.today();
  });
  renderApp();
}

function handleToggleCriterion(gateId) {
  STORE.mutateBid(ROUTER.bidId, bid => {
    const gate = (bid.governanceGates || []).find(g => g.id === gateId);
    if (!gate || !gate.entryCriteria || gate.entryCriteria.length === 0) return;
    // Toggle the first unmet criterion (simple UX — bid manager clicks to mark criteria manually)
    const unmet = gate.entryCriteria.find(ec => !ec.met);
    if (unmet) {
      unmet.met = true;
    } else {
      // All met — toggle the last one back to unmet
      gate.entryCriteria[gate.entryCriteria.length - 1].met = false;
    }
    // Re-evaluate counts
    GOVERNANCE.evaluateEntryCriteria(gate, bid.activities || []);
  });
  renderApp();
}

function handleToggleQA(idx) {

  });

function handleApprovalField(idx, field, value) {
  STORE.mutateBid(ROUTER.bidId, bid => {
    if (!bid.approvals) bid.approvals = _defaultApprovals();
    const appr = bid.approvals[idx];
    if (!appr) return;
    appr[field] = value;
    if (field === 'status' && value === 'approved') {
      appr.date = new Date().toISOString().slice(0, 10);
    } else if (field === 'status' && value !== 'approved') {
      appr.date = null;
    }
  });

}

function handleConfirmSubmission() {
  const bid = STORE.loadBid(ROUTER.bidId);
  if (!bid) return;
  if (!bid.qaChecklist) bid.qaChecklist = _defaultQAChecklist();
  if (!bid.approvals) bid.approvals = _defaultApprovals();
  const blockers = _submissionBlockers(bid, bid.artefacts || [], bid.qaChecklist, bid.approvals);
  if (blockers.length > 0) { alert('Cannot submit:\n' + blockers.join('\n')); return; }
  if (!confirm('Confirm final submission? This action cannot be undone.')) return;

  const submittedBy = bid.bidManager || prompt('Submitted by:') || 'Bid Manager';
  const channel = bid.submissionChannel || 'portal';
  const confirmationRef = prompt('Portal confirmation reference (optional):') || '';

  STORE.mutateBid(ROUTER.bidId, bid => {
    bid.status = 'submitted';
    bid.submissionLog = {
      submittedBy,
      submittedAt: new Date().toISOString().slice(0, 19).replace('T', ' '),
      channel,
      confirmationRef,
    };
    // Mark PRD activities as final
    (bid.activities || []).forEach(a => {
      if (a.workstreamId === 'PRD' && a.active !== false && a.status !== 'deactivated') {
        a.status = 'final';
        a.lastUpdated = new Date().toISOString();
      }
    });
    // Activate post-submission activities if configured
    if (bid.hasPresentation) {
      ['POST-01','POST-02','POST-03'].forEach(id => {
        const act = (bid.activities || []).find(a => a.id === id);
        if (act) { act.active = true; act.status = act.status === 'deactivated' ? 'not_started' : act.status; }
      });
    }
    if (bid.hasBafo) {
      ['POST-05','POST-06'].forEach(id => {
        const act = (bid.activities || []).find(a => a.id === id);
        if (act) { act.active = true; act.status = act.status === 'deactivated' ? 'not_started' : act.status; }
      });
    }
    // Generate hot debrief standup action
    if (!bid.standupActions) bid.standupActions = [];
    bid.standupActions.push({
      id: STORE.uuid(),
      description: 'Hot debrief (BM-11) — capture immediate lessons and team feedback',
      output: 'Hot debrief notes',
      owner: bid.bidManager || '',
      dueDate: bid.calendar
        ? SCHED.addWorkingDays(new Date().toISOString().slice(0, 10), 2, bid.calendar)
        : new Date(Date.now() + 2 * 86400000).toISOString().slice(0, 10),
      status: 'open',
      source: 'submission',
      createdDate: new Date().toISOString(),
      completedDate: null,
    });
    // Snapshot readiness
    READINESS.snapshotReadiness(bid);
  });
  renderApp();
}

/* ════════════════════════════════════════════════════════════
   UTILITIES
════════════════════════════════════════════════════════════ */
function h(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtGBP(v) {
  const n = parseFloat(String(v).replace(/[^0-9.]/g,''));
  if (isNaN(n)) return '';
  return new Intl.NumberFormat('en-GB',{style:'currency',currency:'GBP',maximumFractionDigits:0}).format(n);
}

function parseMoney(s) {
  const n = parseFloat(String(s).replace(/[^0-9.]/g,''));
  return isNaN(n) ? '' : String(Math.round(n));
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const t = new Date(dateStr); const n = new Date();
  t.setHours(0,0,0,0); n.setHours(0,0,0,0);
  return Math.round((t - n) / 86400000);
}

function _download(content, filename, type) {
  const blob = new Blob([content], {type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}


/* ════════════════════════════════════════════════════════════
   SCHED TESTS — run via console: SCHED_TEST()
════════════════════════════════════════════════════════════ */
function SCHED_TEST() {
  let pass = 0, fail = 0;
  function assert(label, actual, expected) {
    if (actual === expected) { pass++; }
    else { fail++; console.error(`FAIL: ${label} — expected ${expected}, got ${actual}`); }
  }

  // Test calendar
  const cal = {
    workingDays: [1,2,3,4,5],
    publicHolidays: ['2026-04-03'], // Good Friday
    weekendWorking: [],
    teamUnavailability: [],
    clientBlackouts: [],
  };

  // ── elapsedDays (Rule 1.1) ──
  assert('elapsed: 15d/1p',  SCHED.elapsedDays(15, 1), 15);
  assert('elapsed: 15d/2p',  SCHED.elapsedDays(15, 2), 9);   // ceil((15/2)*1.20)=9
  assert('elapsed: 15d/3p',  SCHED.elapsedDays(15, 3), 7);   // ceil((15/3)*1.40)=7
  assert('elapsed: 45d/5p',  SCHED.elapsedDays(45, 5), 17);  // ceil((45/5)*1.80)=16.2→17
  assert('elapsed: 0d/1p',   SCHED.elapsedDays(0, 1),  0);
  assert('elapsed: 10d/0p',  SCHED.elapsedDays(10, 0), 10);

  // ── isWorkingDay ──
  assert('monday is working',    SCHED.isWorkingDay('2026-03-23', cal), true);   // Mon
  assert('saturday not working',  SCHED.isWorkingDay('2026-03-28', cal), false);  // Sat
  assert('sunday not working',    SCHED.isWorkingDay('2026-03-29', cal), false);  // Sun
  assert('good friday holiday',   SCHED.isWorkingDay('2026-04-03', cal), false);

  // Weekend working override
  const cal2 = { ...cal, weekendWorking: [{from:'2026-03-28', to:'2026-03-29'}] };
  assert('weekend override sat', SCHED.isWorkingDay('2026-03-28', cal2), true);
  assert('weekend override sun', SCHED.isWorkingDay('2026-03-29', cal2), true);

  // ── addWorkingDays ──
  assert('add 1 wd from Mon',   SCHED.addWorkingDays('2026-03-23', 1, cal), '2026-03-24');
  assert('add 5 wd from Mon',   SCHED.addWorkingDays('2026-03-23', 5, cal), '2026-03-30');
  // Add 5 from Mon Mar 30 — includes Good Friday Apr 3 holiday
  assert('add 5 wd across holiday', SCHED.addWorkingDays('2026-03-30', 5, cal), '2026-04-07');

  // ── subtractWorkingDays ──
  assert('sub 1 wd from Tue',   SCHED.subtractWorkingDays('2026-03-24', 1, cal), '2026-03-23');
  assert('sub 5 wd from Mon',   SCHED.subtractWorkingDays('2026-03-30', 5, cal), '2026-03-23');
  // Sub 5 from Tue Apr 7 — skips Good Friday
  assert('sub 5 wd across holiday', SCHED.subtractWorkingDays('2026-04-07', 5, cal), '2026-03-30');

  // ── countWorkingDays ──
  assert('count Mon-Fri',       SCHED.countWorkingDays('2026-03-23', '2026-03-27', cal), 4);
  assert('count Mon-Mon',       SCHED.countWorkingDays('2026-03-23', '2026-03-30', cal), 5);
  // Across Good Friday
  assert('count across holiday', SCHED.countWorkingDays('2026-03-30', '2026-04-07', cal), 5);
  assert('count same day',       SCHED.countWorkingDays('2026-03-23', '2026-03-23', cal), 0);

  // ── backwardSchedule — simple chain ──
  // A → B → C, deadline 2026-04-10 (Fri)
  const acts = [
    { id:'A', effortDays:5, teamSize:1, dependencies:[], active:true, status:'not_started', owner:'' },
    { id:'B', effortDays:3, teamSize:1, dependencies:['A'], active:true, status:'not_started', owner:'' },
    { id:'C', effortDays:2, teamSize:1, dependencies:['B'], active:true, status:'not_started', owner:'' },
  ];
  const sched = SCHED.backwardSchedule(acts, '2026-04-10', cal);

  // C is leaf → ends Apr 10, starts = sub 2 wd = Apr 8
  assert('C end',   sched['C'].plannedEnd,   '2026-04-10');
  assert('C start', sched['C'].plannedStart, '2026-04-08');
  // B ends 1 wd before C start = Apr 7, starts = sub 3 wd (skips Good Fri) = Apr 1
  assert('B end',   sched['B'].plannedEnd,   '2026-04-07');
  assert('B start', sched['B'].plannedStart, '2026-04-01');
  // A ends 1 wd before B start = Mar 31, starts = sub 5 wd = Mar 24
  assert('A end',   sched['A'].plannedEnd,   '2026-03-31');
  assert('A start', sched['A'].plannedStart, '2026-03-24');

  // ── backwardSchedule — parallel activities ──
  // X → Z, Y → Z (X and Y are independent, Z depends on both)
  const acts2 = [
    { id:'X', effortDays:3, teamSize:1, dependencies:[], active:true, status:'not_started', owner:'' },
    { id:'Y', effortDays:5, teamSize:1, dependencies:[], active:true, status:'not_started', owner:'' },
    { id:'Z', effortDays:2, teamSize:1, dependencies:['X','Y'], active:true, status:'not_started', owner:'' },
  ];
  const sched2 = SCHED.backwardSchedule(acts2, '2026-04-10', cal);
  // Z: leaf, ends Apr 10, starts Apr 8
  assert('Z end', sched2['Z'].plannedEnd, '2026-04-10');
  // X and Y both end 1 wd before Z start (Apr 7)
  assert('X end', sched2['X'].plannedEnd, '2026-04-07');
  assert('Y end', sched2['Y'].plannedEnd, '2026-04-07');
  // Y takes 5 days, starts earlier than X (3 days)
  assert('Y start < X start', sched2['Y'].plannedStart < sched2['X'].plannedStart, true);

  // ── backwardSchedule — deactivated activities skipped ──
  const acts3 = [
    { id:'P', effortDays:3, teamSize:1, dependencies:[], active:true, status:'not_started', owner:'' },
    { id:'Q', effortDays:5, teamSize:1, dependencies:['P'], active:false, status:'deactivated', owner:'' },
    { id:'R', effortDays:2, teamSize:1, dependencies:['P'], active:true, status:'not_started', owner:'' },
  ];
  const sched3 = SCHED.backwardSchedule(acts3, '2026-04-10', cal);
  assert('deactivated Q not scheduled', sched3['Q'], undefined);
  assert('R scheduled', !!sched3['R'], true);

  // ── calculateBuffer ──
  const bufActs = {
    a: { plannedEnd: '2026-04-01' },
    b: { plannedStart: '2026-04-07' },
  };
  const buf = SCHED.calculateBuffer(bufActs.a, bufActs.b, cal);
  assert('buffer days', buf.days, 3); // Apr 2,3(holiday skip),6 → 2,6,7 wait — actually count from Apr 1 to Apr 7
  // Let me recalculate: countWorkingDays('2026-04-01','2026-04-07',cal) = Apr 2(Th),Apr 3(holiday-skip),Apr 6(Mon)= wait
  // Apr 1 is Wed, Apr 2 Thu, Apr 3 Fri(holiday), Apr 4 Sat, Apr 5 Sun, Apr 6 Mon, Apr 7 Tue
  // Working days after Apr 1 up to Apr 7: Apr 2, Apr 6, Apr 7 = 3
  // Hmm wait: count goes current < endDate, so Apr 2,3(skip),4(skip),5(skip),6,7 → 3 working days
  assert('buffer status', buf.status, 'compressed'); // 3 < 5

  const bufCrit = SCHED.calculateBuffer(
    { plannedEnd: '2026-04-07' },
    { plannedStart: '2026-04-07' },
    cal
  );
  assert('buffer critical', bufCrit.days, 0);
  assert('buffer critical status', bufCrit.status, 'critical');

  // ── Feasibility check tests ──

  // Feasible scenario: plenty of buffer
  const fBid = { ittIssueDate: '2026-01-05', submissionDeadline: '2026-06-30', bidManager: 'Jane' };
  const fActs = [
    { id:'A', effortDays:5, teamSize:1, dependencies:[], active:true, status:'not_started', owner:'Jane', workstreamId:'X', name:'A', parallelisationType:'P' },
    { id:'B', effortDays:3, teamSize:1, dependencies:['A'], active:true, status:'not_started', owner:'Jane', workstreamId:'X', name:'B', parallelisationType:'S' },
  ];
  const fRes = SCHED.runFeasibilityCheck(fBid, fActs, cal);
  assert('feasibility: feasible verdict', fRes.verdict, 'feasible');
  assert('feasibility: has critical path', fRes.criticalPath.length > 0, true);
  assert('feasibility: buffer > 0', fRes.criticalPathBuffer > 0, true);
  assert('feasibility: no recs for feasible', SCHED.generateRecommendations(fRes, fActs).length, 0);

  // Infeasible scenario: too much work for too little time
  const iBid = { ittIssueDate: '2026-04-06', submissionDeadline: '2026-04-10', bidManager: 'Jane' };
  const iActs = [
    { id:'X', effortDays:20, teamSize:1, dependencies:[], active:true, status:'not_started', owner:'', workstreamId:'W', name:'Big task', parallelisationType:'P' },

  assert('infeasible: negotiate rec', iRecs.some(r => r.type === 'negotiate_timeline'), true);

  assert('tight: verdict is tight or feasible', ['tight','feasible'].includes(tRes.verdict), true);

  // Critical path finder
  const cpActs = [

  assert('offset: +1 skips weekend', d3, '2026-06-15');

  console.log(`S7_TEST: ${pass} passed, ${fail} failed`);
  return { pass, fail };
