          {id:'SOL-10.1.2',n:'Assess current evidence availability -- search existing library, identify what is reusable, what is outdated, and where the gaps are',raci:{r:'Bid Coordinator / Bid Manager',a:'Bid Director',c:'SMEs / Account Managers',i:'Writers'},e:'Medium',tp:'Sequential',o:[{n:'Evidence availability assessment',f:'Structured gap analysis',q:['Every evidence requirement assessed: available (ready to use), adaptable (needs updating), gap (does not exist)','Available evidence assessed for currency -- is it recent enough to be credible?','Available evidence assessed for relevance -- does it relate to this sector, scale, and service type?','Gaps clearly identified with impact -- which gaps affect high-value scoring sections?']}]},
          {id:'SOL-10.1.3',n:'Cross-reference evidence gaps with score gap analysis -- where evidence gaps create scoring risk, prioritise accordingly',raci:{r:'Bid Manager',a:'Bid Director',c:'Capture Lead',i:'Solution Architect'},e:'Low',tp:'Sequential',o:[{n:'Prioritised evidence gap register',f:'Structured register with priority ranking',q:['Evidence gaps ranked by scoring impact -- which gaps cost us the most marks?','Gaps that overlap with SAL-05 score gaps highlighted -- double jeopardy (capability gap AND evidence gap)','Win theme evidence gaps cross-referenced -- themes we cannot substantiate','Resolution approach identified per gap -- commission new, source from partner, adapt existing, accept deficit']}]}
        ]},
        {id:'SOL-10.2',n:'Evidence Sourcing & Commission',t:[
          {id:'SOL-10.2.1',n:'Retrieve and adapt existing evidence from content library -- case studies, CVs, credentials, certifications, reference letters',raci:{r:'Bid Coordinator',a:'Bid Manager',c:'SMEs / Account Managers',i:'Writers'},e:'Medium',tp:'Parallel',o:[{n:'Adapted evidence pack (existing)',f:'Collection of adapted evidence items',q:['Each evidence item adapted for this bid -- sector, scale, and service context aligned','Currency confirmed -- dates, data, and outcomes are recent and verifiable','Format aligned to ITT requirements -- word limits, templates, structure','Client permission confirmed where required -- reference letters, testimonials, named clients']}]},
          {id:'SOL-10.2.2',n:'Commission new evidence where gaps identified -- new case studies, reference letters, updated CVs, partner credentials, performance data',raci:{r:'Bid Coordinator',a:'Bid Manager',c:'SMEs / Account Managers / Partner Leads',i:'Bid Director'},e:'Medium',tp:'Parallel',o:[{n:'Evidence commission register',f:'Structured register with status tracking',q:['Every high-priority gap has a commission action -- who is producing what by when','Partner evidence requirements communicated to SUP-05 -- case studies, CVs, credentials from partners','New case studies commissioned with clear brief -- what to cover, what outcomes to highlight, what format','CV updates commissioned for key personnel -- aligned to role requirements in staffing model','Timeline realistic -- evidence will be available before PRD-03 (evidence assembly) needs it']}]},
          {id:'SOL-10.2.3',n:'Validate evidence requirements matrix -- all high-priority evidence either sourced or commissioned, feeds PRD-03 for assembly',raci:{r:'Bid Manager',a:'Bid Director',c:'Capture Lead',i:''},e:'Low',tp:'Sequential',o:[{n:'Evidence requirements matrix (validated -- activity primary output)',f:'Comprehensive evidence matrix with sourcing status',q:['Every evaluation section has evidence identified or commissioned','High-priority gaps closed or actively being resolved -- no unaddressed critical evidence gaps','Evidence sourcing status tracked -- available, in adaptation, commissioned, outstanding','Residual evidence gaps documented with impact and mitigation -- what we cannot evidence and the scoring cost','Handover to PRD-03 confirmed -- evidence assembly team knows what they are working with']}]}
        ]}
      ],
      outs:[{n:'Evidence requirements matrix',f:'Comprehensive evidence matrix with sourcing status',q:['Evidence requirements mapped to every evaluation section by type','Current evidence availability assessed -- reusable, adaptable, gap','Evidence gaps prioritised by scoring impact and cross-referenced with score gap analysis','Existing evidence retrieved and adapted for this bid','New evidence commissioned with clear briefs and timelines','All high-priority evidence sourced or in progress -- no unaddressed critical gaps']}]},
    {id:'SOL-11',n:'Solution design lock',o:'Solution design pack (locked & assured)',d:['SOL-03','SOL-04','SOL-05','SOL-06','SOL-07','SOL-08','SOL-09','SOL-10','SOL-12'],dur:3,ts:1,pt:'C',rl:'Solution Architect',
      subs:[
        {id:'SOL-11.1',n:'Solution Consolidation',t:[
          {id:'SOL-11.1.1',n:'Consolidate all solution workstream outputs into a single design pack -- TOM, service delivery, technology, staffing, transition, innovation, social value, evidence, risk',raci:{r:'Solution Architect',a:'Bid Director',c:'Workstream Leads',i:'Bid Manager'},e:'Medium',tp:'Sequential',o:[{n:'Consolidated solution design pack (draft)',f:'Comprehensive solution document',q:['All solution components present -- no missing workstream outputs','Document structure is navigable -- clear sections, cross-references, summary','Version control applied -- each component at its validated/final version']}]},
          {id:'SOL-11.1.2',n:'Conduct completeness and coherence check -- are all components present, consistent with each other, and aligned to the win strategy?',raci:{r:'Solution Architect',a:'Bid Director',c:'Workstream Leads',i:'Capture Lead'},e:'Medium',tp:'Sequential',o:[{n:'Solution coherence assessment',f:'Structured review checklist with findings',q:['Consistency checked across components -- staffing model matches service delivery, technology enables the operating model, transition delivers the future state','Requirements coverage confirmed -- cross-reference against SOL-01 requirements interpretation','Win strategy alignment confirmed -- solution still delivers the win themes and competitive positioning from SAL-06','Contradictions or gaps between components identified and resolved','Open issues documented -- anything unresolved that governance must accept']}]}
        ]},
        {id:'SOL-11.2',n:'Solution Assurance & Lock',t:[
          {id:'SOL-11.2.1',n:'Conduct internal solution assurance review -- is the solution deliverable, costable, compliant, and competitive?',raci:{r:'Solution Architect',a:'Bid Director',c:'Delivery Director / Commercial Lead / Technical Lead',i:'Bid Manager'},e:'Medium',tp:'Sequential',o:[{n:'Solution assurance record',f:'Structured assurance review output',q:['Deliverability confirmed -- the delivery team believes this solution can be mobilised and operated','Costability confirmed -- commercial team can build a should-cost model from this design','Compliance confirmed -- solution addresses all mandatory requirements and scored criteria','Competitiveness assessed -- solution delivers the win themes and creates differentiation','Risk position accepted -- solution risk register reviewed, residual risks acknowledged','Residual issues documented -- anything that must be resolved during production or accepted as risk']}]},
          {id:'SOL-11.2.2',n:'Baseline and lock solution design pack -- formal sign-off, "Solution Design Complete" milestone fires, feeds GOV-02',raci:{r:'Bid Director',a:'Senior Responsible Executive',c:'Solution Architect',i:'Bid Team (collective)'},e:'Low',tp:'Sequential',o:[{n:'Solution design pack (locked & assured -- activity primary output)',f:'Baselined solution document with formal sign-off',q:['Solution design pack formally baselined -- this is the authoritative solution reference for the bid','Bid Director sign-off recorded -- accountability for the solution accepted','"Solution Design Complete" milestone fires in the product','Changes after lock require formal change review -- not ad hoc modification','Downstream activities briefed -- COM-01 (costing), BM-10 (storyboard), PRD-02 (drafting) all build from this baseline','GOV-02 (Solution & Strategy Review) can now proceed with formal governance assurance']}]}
        ]}
      ],
      outs:[{n:'Solution design pack (locked & assured)',f:'Baselined solution document with formal sign-off',q:['All solution workstream outputs consolidated into single authoritative pack','Completeness and coherence confirmed -- components are consistent and integrated','Requirements coverage confirmed against SOL-01','Win strategy alignment confirmed against SAL-06','Solution assured as deliverable, costable, compliant, and competitive','Risk position accepted -- solution risk register acknowledged','Formally baselined with Bid Director sign-off -- changes require formal review']}]},
    {id:'SOL-12',n:'Solution risk identification & analysis',o:'Solution risk register',d:['SOL-03','SOL-04'],dur:3,ts:1,pt:'S',rl:'Solution Architect',
      subs:[
        {id:'SOL-12.1',n:'Solution Risk Consolidation',t:[
          {id:'SOL-12.1.1',n:'Harvest solution risks from all upstream SOL activities -- consolidate technology, staffing, transition, innovation, and social value risks into a single register',raci:{r:'Solution Architect',a:'Bid Director',c:'Workstream Leads (SOL/COM/DEL)',i:'Bid Manager'},e:'Medium',tp:'Sequential',o:[{n:'Consolidated solution risk register (draft)',f:'Structured risk register',q:['All risks from upstream SOL activities harvested into a single register','Duplicates consolidated -- same risk identified by multiple activities merged','Risk categorisation applied -- delivery, technology, workforce, transition, compliance, commercial, innovation','Source activity referenced for each risk -- traceability to where it was identified']}]},
          {id:'SOL-12.1.2',n:'Identify additional delivery and compliance risks not captured upstream -- gaps, dependencies, assumptions that could fail, integration risks across solution components',raci:{r:'Solution Architect',a:'Bid Director',c:'Workstream Leads (SOL/COM/DEL)',i:'Commercial Lead'},e:'Medium',tp:'Sequential',o:[{n:'Complete solution risk register (draft)',f:'Structured risk register (enriched)',q:['Cross-cutting risks identified -- risks that arise from the interaction between solution components, not within any single one','Assumption risks captured -- key design assumptions that, if wrong, invalidate part of the solution','Compliance risks identified -- where the solution is non-compliant or partially compliant with requirements','Dependency risks captured -- risks that depend on client, outgoing supplier, or partner action','Scoring risks from SAL-05 gap analysis cross-referenced -- capability gaps that create delivery risk as well as scoring risk']}]}
        ]},
        {id:'SOL-12.2',n:'Risk Assessment & Mitigation',t:[
          {id:'SOL-12.2.1',n:'Assess and prioritise consolidated risks -- likelihood, impact, proximity, and assign risk owner for each',raci:{r:'Solution Architect',a:'Bid Director',c:'Workstream Leads',i:'Bid Manager'},e:'Medium',tp:'Sequential',o:[{n:'Prioritised solution risk register',f:'Structured risk register with assessments',q:['Every risk assessed for likelihood (high/medium/low), impact (high/medium/low), and proximity (when could it materialise)','Risk priority derived -- critical, significant, moderate, low','Risk owner assigned for every risk -- named role, not "team"','Top 10 risks identified -- the risks that could fundamentally threaten solution delivery or bid success']}]},
          {id:'SOL-12.2.2',n:'Develop mitigation strategies for high-priority risks and confirm residual risk position',raci:{r:'Solution Architect',a:'Bid Director',c:'Risk Owners / Workstream Leads',i:'Commercial Lead'},e:'Medium',tp:'Sequential',o:[{n:'Mitigated solution risk register',f:'Structured risk register with mitigations',q:['Every high and significant risk has a defined mitigation strategy -- preventive and contingent actions','Mitigation owner and timeline assigned -- who does what by when','Residual risk assessed post-mitigation -- what risk remains after mitigations are applied?','Risks that cannot be mitigated to acceptable levels flagged for escalation -- these may affect go/no-go or require commercial provisions (e.g., risk pricing)','Cost of mitigation identified where significant -- feeds COM-01']}]},
          {id:'SOL-12.2.3',n:'Validate solution risk register -- confirm it is complete, mitigations are credible, and the register is ready for governance gates and BM-13',raci:{r:'Solution Architect',a:'Bid Director',c:'Bid Team (collective)',i:''},e:'Low',tp:'Sequential',o:[{n:'Solution risk register (validated -- activity primary output)',f:'Authoritative risk register',q:['Bid team has reviewed and challenged -- not single-author risk assessment','All solution dimensions covered -- no blind spots across technology, workforce, transition, innovation, compliance','Top risks are understood and accepted by Bid Director -- residual risk position is clear','Mitigations are credible and resourced -- not aspirational','Register is ready for governance gates (GOV-02) and consolidation into BM-13','Risk position informs whether solution design can be locked (SOL-11)']}]}
        ]}
      ],
      outs:[{n:'Solution risk register',f:'Authoritative risk register',q:['All solution risks consolidated from upstream activities','Cross-cutting, assumption, compliance, and dependency risks identified','Every risk assessed for likelihood, impact, proximity with named owner','High-priority risks mitigated with credible strategies and assigned owners','Residual risk position confirmed -- accepted by Bid Director','Register validated by bid team and ready for governance']}]}
  ]},
  {id:'COM',name:'Commercial & Pricing',cls:'commercial',ph:'DEV',acts:[
    {id:'COM-01',n:'Should-cost model development',o:'Should-cost model',d:['SOL-04','SOL-06'],dur:8,ts:1,pt:'S',rl:'Commercial Lead',
      subs:[
        {id:'COM-01.1',n:'Cost Build-Up',t:[
          {id:'COM-01.1.1',n:'Build workforce cost model -- people costs from SOL-06 staffing model: salaries, pensions, employer NI, benefits, training, recruitment costs per role per year',raci:{r:'Commercial Lead',a:'Bid Director',c:'HR Lead / Finance',i:'Solution Architect'},e:'High',tp:'Sequential',o:[{n:'Workforce cost model',f:'Structured cost model (per role, per year)',q:['Every role costed -- salary/day rate, employer NI, pension contribution, benefits, overhead','TUPE-transferring workforce costed at their actual terms -- not our standard rates','Gap resolution costs included -- recruitment fees, redundancy provisions, interim/agency costs','Training and upskilling costs included per the workforce gap analysis','Year-on-year workforce cost profile -- not flat, reflects planned changes across contract term']}]},
          {id:'COM-01.1.2',n:'Build non-workforce cost model -- technology, facilities, consumables, travel, insurance, management overhead, third-party services',raci:{r:'Commercial Lead',a:'Bid Director',c:'Technical Lead / Delivery Director',i:'Finance'},e:'Medium',tp:'Parallel',o:[{n:'Non-workforce cost model',f:'Structured cost model (per category, per year)',q:['Technology costs itemised -- licensing, hosting, development, support, maintenance per year','Facilities and property costs included where applicable -- rent, utilities, equipment','Social value delivery costs quantified per commitment','Management overhead and corporate charges applied appropriately','Year-on-year non-workforce profile modelled -- technology costs may reduce as development completes']}]},
          {id:'COM-01.1.3',n:'Build transition and mobilisation cost model -- one-off costs from SOL-07: dual running, recruitment, technology migration, training, mobilisation team',raci:{r:'Commercial Lead',a:'Bid Director',c:'Delivery Director',i:'Finance'},e:'Medium',tp:'Parallel',o:[{n:'Transition cost model',f:'Structured one-off cost model',q:['All one-off transition costs quantified -- mobilisation team, dual running period, parallel systems','Recruitment and onboarding costs for gap roles included','Technology migration costs included -- data migration, system deployment, parallel running','Training and induction costs for transferring and new workforce included','Clear distinction between one-off transition costs and recurring steady-state costs']}]},
          {id:'COM-01.1.4',n:'Incorporate partner and supply chain cost placeholder -- to be updated when COM-03 confirms partner pricing',raci:{r:'Commercial Lead',a:'Bid Director',c:'Supply Chain Lead',i:'Partner Leads'},e:'Low',tp:'Parallel',o:[{n:'Partner cost placeholder',f:'Estimated partner cost line items',q:['All known partner and subcontractor cost elements identified with indicative values','Placeholder marked for update when COM-03 (partner pricing) confirms actual costs','Risk range noted -- what is the variance between indicative and likely final partner costs?']}]}
        ]},
        {id:'COM-01.2',n:'Cost Modelling & Assumptions',t:[
          {id:'COM-01.2.1',n:'Model cost trajectory across the contract term -- year-on-year cost profile incorporating innovation productivity curve and planned changes',raci:{r:'Commercial Lead',a:'Bid Director',c:'Solution Architect / Finance',i:'Delivery Director'},e:'High',tp:'Sequential',o:[{n:'Contract-term cost model',f:'Year-on-year cost projection',q:['Full contract term modelled year by year -- not a flat annual cost extrapolated','Innovation productivity curve incorporated -- headcount and cost reductions phased per SOL-08 roadmap','Transition costs profiled in year 0/1 -- clear distinction from steady-state recurring costs','Indexation and inflation assumptions applied where applicable','Total cost of service and total cost of ownership both calculated']}]},
          {id:'COM-01.2.2',n:'Document all cost assumptions -- inflation, attrition, utilisation, volume, demand variability, rate card basis, contingency approach',raci:{r:'Commercial Lead',a:'Bid Director',c:'Finance',i:'Solution Architect'},e:'Medium',tp:'Sequential',o:[{n:'Cost assumptions register',f:'Structured assumptions register',q:['Every material cost assumption documented -- basis, source, confidence level','Key assumptions identified -- the ones that, if wrong, materially change the cost','Contingency approach documented -- how risk is priced (explicit contingency line, risk premium, or absorbed in margin)','Assumptions register feeds directly into COM-05 (sensitivity analysis) -- each assumption is a sensitivity variable']}]},
          {id:'COM-01.2.3',n:'Validate should-cost model -- confirm it reflects the locked solution, is internally consistent, and provides a credible basis for pricing',raci:{r:'Commercial Lead',a:'Bid Director',c:'Finance / Solution Architect',i:'Bid Manager'},e:'Low',tp:'Sequential',o:[{n:'Should-cost model (validated -- activity primary output)',f:'Comprehensive cost model with assumptions',q:['Cost model reconciles to the locked solution -- every SOL output is costed','Bottom-up total is internally consistent -- workforce + non-workforce + transition + partner = total','Year-on-year cost trajectory is credible -- reflects planned innovation and workforce changes','All assumptions documented and flagged for sensitivity testing','Model is structured for executive presentation -- clear, auditable, defensible','Ready for comparison against top-down price-to-win (COM-02)']}]}
        ]}
      ],
      outs:[{n:'Should-cost model',f:'Comprehensive cost model with assumptions',q:['Workforce costs built from staffing model -- per role, per year, TUPE terms reflected','Non-workforce costs built -- technology, facilities, social value, overhead','Transition costs profiled -- one-off mobilisation and migration costs','Partner costs included (indicative pending COM-03)','Year-on-year cost trajectory modelled -- innovation productivity curve incorporated','All assumptions documented with confidence levels','Validated as reflective of locked solution, internally consistent, and executive-presentable']}]},
    {id:'COM-02',n:'Price-to-win analysis',o:'Price-to-win assessment',d:['SAL-03','COM-01'],dur:3,ts:1,pt:'S',rl:'Commercial Lead',
      subs:[
        {id:'COM-02.1',n:'Market Price Intelligence',t:[
          {id:'COM-02.1.1',n:'Establish the current cost baseline -- existing contract value, historical award data, and industry benchmarking for comparable services or commodities',raci:{r:'Commercial Lead',a:'Bid Director',c:'Capture Lead / Market Intelligence',i:'Solution Architect'},e:'Medium',tp:'Sequential',o:[{n:'Market price baseline',f:'Structured price intelligence',q:['Current contract value documented with source -- known award value, extensions, amendments','Historical price trajectory noted -- has the contract value grown, shrunk, or remained stable?','Industry benchmarks applied where available -- unit costs for commodity elements (e.g., cost per endpoint, cost per FTE managed, cost per transaction)','Benchmark sources cited -- Gartner, ISG, NelsonHall, RICS, or sector-specific -- with publication date and relevance assessment','Where no benchmarks exist, comparable contract values used as proxy with confidence assessment']}]},
          {id:'COM-02.1.2',n:'Assess competitor price positioning -- what are credible competitors likely to bid based on their cost base, strategy, and market behaviour?',raci:{r:'Commercial Lead',a:'Bid Director',c:'Capture Lead',i:'Partner Lead'},e:'Medium',tp:'Sequential',o:[{n:'Competitor price position assessment',f:'Per-competitor estimated price range',q:['Each credible competitor assessed for likely price range -- low/mid/high with rationale','Assessment based on known cost structures, market behaviour, strategic intent (buying the contract, defending margin, disrupting)','Incumbent price advantage or disadvantage quantified -- are they likely to bid below current value?','Confidence level stated per assessment -- known, inferred, or assumed']}]},
          {id:'COM-02.1.3',n:'Assess client budget and affordability -- what can the client afford, what signals have they given, and how does the Procurement Act MAT framework affect price evaluation?',raci:{r:'Commercial Lead',a:'Bid Director',c:'Capture Lead / Account Manager',i:'Bid Manager'},e:'Medium',tp:'Parallel',o:[{n:'Client affordability and evaluation context assessment',f:'Structured assessment',q:['Client budget signals documented -- affordability cap, spending review constraints, value-for-money expectations','Price/quality weighting analysed -- under Procurement Act MAT framework, how much does price actually drive the outcome?','Assessment of whether quality-dominant evaluation enables a premium price position -- can we win at a higher price with a superior quality score?','New Procurement Act mechanisms assessed -- direct award thresholds, competitive flexible procedure, dynamic markets (if relevant to this procurement)','Affordability risk assessed -- is there a price ceiling above which the client simply cannot award, regardless of quality?']}]}
        ]},
        {id:'COM-02.2',n:'Price-to-Win Modelling',t:[
          {id:'COM-02.2.1',n:'Model the price envelope -- floor, competitive midpoint, and ceiling -- incorporating quality/price interaction and Procurement Act MAT assessment framework',raci:{r:'Commercial Lead',a:'Bid Director',c:'Capture Lead / Finance',i:'Solution Architect'},e:'High',tp:'Sequential',o:[{n:'Price-to-win envelope',f:'Structured price range with rationale',q:['Three price points defined: floor (minimum viable margin), competitive midpoint (likely winning range), ceiling (maximum the market will bear)','Quality/price interaction modelled -- at our expected quality score, what price range wins? Under MAT, quality advantage may justify price premium','Each price point has a rationale -- not arbitrary numbers but evidence-based from market intelligence','Industry benchmarks used as validation -- does our envelope align with market rates for comparable services?','Scenario analysis: what happens if our quality score is higher or lower than expected?']}]},
          {id:'COM-02.2.2',n:'Compare bottom-up cost against top-down price envelope -- is the gap bridgeable? What are the options if it is not?',raci:{r:'Commercial Lead',a:'Bid Director',c:'Solution Architect / Finance',i:'Partner'},e:'Medium',tp:'Sequential',o:[{n:'Bottom-up vs top-down gap analysis',f:'Structured gap assessment with options',q:['Gap between bottom-up cost and top-down win price quantified -- total and per year','Gap characterised: positive (margin available), neutral (break-even), or negative (cost exceeds win price)','If negative: options identified and quantified -- solution descope, innovation acceleration, margin reduction, partner renegotiation, or walk away','If positive: margin range identified -- what profit is available at each price point in the envelope?','Commercial strategy recommendation stated -- where in the envelope should we land, and why?']}]},
          {id:'COM-02.2.3',n:'Validate price-to-win assessment -- confirm the recommended price position and escalate if bottom-up exceeds top-down',raci:{r:'Commercial Lead',a:'Bid Director',c:'Finance / Partner',i:'Bid Manager'},e:'Low',tp:'Sequential',o:[{n:'Price-to-win assessment (validated -- activity primary output)',f:'Executive pricing intelligence document',q:['Recommended price position stated with rationale -- where in the envelope and why','Market intelligence summarised -- current value, competitor positioning, benchmarks, client affordability','Quality/price interaction under MAT framework assessed -- does our quality advantage justify our price position?','Bottom-up vs top-down gap clearly stated -- margin available or gap to close','If gap exists: options presented with recommendation for executive decision','Assessment ready for executive presentation at pricing governance gate']}]}
        ]}
      ],
      outs:[{n:'Price-to-win assessment',f:'Executive pricing intelligence document',q:['Market price baseline established -- current contract value, historical data, industry benchmarks','Competitor price positioning assessed per credible competitor','Client affordability and budget context assessed','Procurement Act MAT framework implications analysed -- quality/price interaction','Price envelope modelled -- floor, midpoint, ceiling with evidence-based rationale','Bottom-up vs top-down gap quantified with options if negative','Recommended price position stated for executive decision']}]},
    {id:'COM-03',n:'Subcontractor & supply chain pricing',o:'Partner pricing schedule',d:['SUP-04'],dur:5,ts:1,pt:'S',rl:'Commercial Lead',
      subs:[
        {id:'COM-03.1',n:'Commercial Structure & Work Breakdown Detailing',t:[
          {id:'COM-03.1.1',n:'Detail the inter-party commercial framework -- margin stack, risk sharing principles, payment flow, indexation basis, volume commitments between consortium members',raci:{r:'Commercial Lead',a:'Bid Director',c:'Legal / Partner Commercial Leads',i:'Finance'},e:'High',tp:'Sequential',o:[{n:'Inter-party commercial framework',f:'Structured commercial terms document',q:['Margin stack defined -- how margin is allocated across the consortium (prime margin, partner margin, management fee)','Risk sharing principles defined -- who bears what risk (delivery, performance, financial, TUPE)','Payment flow designed -- how money flows from client through prime to partners, payment terms, retention','Indexation and volume commitment basis aligned -- partners price against the same assumptions as our model','Framework is commercially viable for all parties -- not so aggressive that partners walk away or price in risk']}]},
          {id:'COM-03.1.2',n:'Prepare structured pricing requests for each partner -- scope, volumes, assumptions, timeline, format aligned to work breakdown and our commercial model',raci:{r:'Commercial Lead',a:'Bid Director',c:'Supply Chain Lead / Solution Architect',i:'Partner Leads'},e:'Medium',tp:'Sequential',o:[{n:'Partner pricing request packs',f:'Per-partner structured pricing request',q:['Each partner receives a clear scope definition -- what they are pricing, aligned to the work breakdown','Volume and demand assumptions specified -- partners price the same volumes we are modelling','Pricing format specified -- aligned to our commercial model structure for easy integration','Timeline specified -- when we need firm pricing by, aligned to COM-06 pricing lock','Commercial terms summarised -- margin, risk, payment, indexation basis included so partners price realistically']}]}

        {id:'COM-03.2',n:'Partner Pricing Collection & Negotiation',t:[
          {id:'COM-03.2.1',n:'Review and validate partner pricing submissions -- completeness, assumption alignment, competitiveness, and fit within our commercial model',raci:{r:'Commercial Lead',a:'Bid Director',c:'Finance / Solution Architect',i:'Supply Chain Lead'},e:'Medium',tp:'Parallel',o:[{n:'Partner pricing validation assessment',f:'Per-partner structured review',q:['Each partner submission reviewed for completeness -- all scope elements priced, no gaps','Assumption alignment confirmed -- volumes, indexation, demand basis consistent with our model','Competitiveness assessed -- is the partner pricing reasonable vs market benchmarks?','Integration with our cost model tested -- does the partner pricing fit within the overall commercial framework?','Issues and gaps documented per partner -- what needs resolving before pricing can be confirmed']}]},

  let acts=0, deps=0, effort=0, l2s=0, l3s=0;

    acts++; deps+=a.d.length; effort+=a.dur;
    if(a.subs) a.subs.forEach(s => { l2s++; if(s.t) l3s+=s.t.length; });
  }));
  return { acts, deps, effort, l2s, l3s };
})();

    responseSections:[],    // exam paper — what the client is asking (ITT ingestion layer)
    responseItems:[],       // answer sheet — production tracking (linked to responseSections)
    complianceRequirements:[], // prescriptive requirements (optional)
    ittDocuments:[],        // ITT document registry
    evaluationFramework: null, // tender-level evaluation structure (one per bid)
    winThemes: [],

    GATE_LIB.forEach(g => {

    if (act.pt !== 'P' || complexity === 'standard') return act.ts;
    return complexity === 'complex' ? act.ts * 2 : act.ts * 3;
  }

  function _elapsed(dur, ts) {
    if (!dur) return 0;
    return ts <= 1 ? dur : Math.ceil((dur / ts) * (1 + (ts - 1) * 0.2));
