    reviewCycles: [{ id: 'rc1', actions: [{ severity: 'critical', status: 'open' }] }],
  };
  blockers = _submissionBlockers(critBid, critBid.artefacts, critBid.qaChecklist, critBid.approvals);
  assert('blocker: critical open action', blockers.some(b => b.includes('critical')), true);

  // ── Blocker: GOV-05 not passed ──
  const govBid = {
    artefacts: [{ status: 'final' }],
    qaChecklist: _defaultQAChecklist().map(q => ({ ...q, done: true })),
    approvals: _defaultApprovals().map(a => ({ ...a, status: 'approved' })),
    governanceGates: [{ id: 'g1', templateId: 'G5', name: 'Final Submission Authority', status: 'upcoming' }],
    requirements: [], reviewCycles: [],
  };
  blockers = _submissionBlockers(govBid, govBid.artefacts, govBid.qaChecklist, govBid.approvals);
  assert('blocker: GOV-05 not passed', blockers.some(b => b.includes('submission authority')), true);

  // ── GOV-05 passed = no gate blocker ──
  govBid.governanceGates[0].status = 'passed';
  blockers = _submissionBlockers(govBid, govBid.artefacts, govBid.qaChecklist, govBid.approvals);
  assert('no blocker: GOV-05 passed', blockers.some(b => b.includes('submission authority')), false);

  // ── QA toggle ──
  const qaList = _defaultQAChecklist();
  qaList[0].done = true;
  assert('qa toggle: first done', qaList[0].done, true);
  assert('qa toggle: second still false', qaList[1].done, false);

  // ── Approval date auto-set ──
  const testAppr = { label: 'Test', approver: 'Bob', status: 'pending', date: null };
  testAppr.status = 'approved';
  testAppr.date = new Date().toISOString().slice(0, 10);
  assert('approval: date set on approved', typeof testAppr.date, 'string');
  assert('approval: date format', testAppr.date.length, 10);

  // ── Artefact status transitions ──
  const statuses = ['not_started', 'draft', 'final', 'uploaded', 'confirmed'];
  assert('artefact: 5 statuses', statuses.length, 5);
  assert('artefact: final is ready', ['final','uploaded','confirmed'].includes('final'), true);
  assert('artefact: draft not ready', ['final','uploaded','confirmed'].includes('draft'), false);

  // ── Multiple blockers combined ──
  const multiBid = {
    artefacts: [{ status: 'draft' }],
    qaChecklist: [{ label: 'test', done: false }],
    approvals: [{ label: 'test', status: 'pending', approver: '', date: null }],
    governanceGates: [{ id: 'g1', templateId: 'G5', name: 'Final Submission Authority', status: 'upcoming' }],
    requirements: [{ classification: 'mandatory', coverageStatus: 'gap' }],
    reviewCycles: [{ id: 'rc1', actions: [{ severity: 'critical', status: 'open' }] }],
  };
  blockers = _submissionBlockers(multiBid, multiBid.artefacts, multiBid.qaChecklist, multiBid.approvals);
  assert('multi-blocker: at least 5', blockers.length >= 5, true);

  console.log(`S9_TEST: ${pass} passed, ${fail} failed`);
  return { pass, fail };
}


/* ════════════════════════════════════════════════════════════
   TEAM MANAGER (M10) — Data Initialisation
════════════════════════════════════════════════════════════ */
function _ensureTeamData(bid) {
  if (!bid.teamMembers) bid.teamMembers = [];
  if (!bid.rateCard) bid.rateCard = _defaultRateCard();
  if (!bid.stakeholders) bid.stakeholders = [];
  if (!bid.unavailability) {
    // Migrate from calendar.teamUnavailability if present
    bid.unavailability = ((bid.calendar && bid.calendar.teamUnavailability) || []).map(u => ({
      id: STORE.uuid(), name: u.name || '', from: u.from || '', to: u.to || '', notes: u.notes || ''
    }));
  }
  // Seed core roles into teamMembers if not already present
  const coreMap = [
    ['bid_manager', bid.bidManager, 'Bid Manager'],
    ['solution_lead', bid.solutionLead, 'Solution Lead'],
    ['commercial_lead', bid.commercialLead, 'Commercial Lead'],
    ['delivery_lead', bid.deliveryLead, 'Delivery Lead'],
    ['legal_lead', bid.legalLead, 'Legal Lead'],
    ['supply_chain_lead', bid.supplyChainLead, 'Supply Chain Lead'],
  ];
  coreMap.forEach(([coreRole, name, roleLabel]) => {
    if (!name) return;
    const exists = bid.teamMembers.some(m => m.coreRole === coreRole && m.isActive !== false);
    if (!exists) {
      const byName = bid.teamMembers.find(m => m.name === name && m.isActive !== false);
      if (byName) { byName.coreRole = coreRole; if (!byName.role) byName.role = roleLabel; }
      else bid.teamMembers.push({ id: STORE.uuid(), name, role: roleLabel, coreRole, organisation: '', email: '', phone: '', clearance: '', clearanceStatus: '', isContractor: false, individualDayRate: null, reportsTo: null, workstreams: '', startDate: '', endDate: '', isActive: true });
    }
  });
  // Ensure existing members have required fields
  bid.teamMembers.forEach(m => {
    if (m.isActive === undefined) m.isActive = true;
    if (!m.id) m.id = STORE.uuid();
    if (m.coreRole === undefined) m.coreRole = null;
    if (m.reportsTo === undefined) m.reportsTo = null;
    if (m.isContractor === undefined) m.isContractor = false;
    if (m.individualDayRate === undefined) m.individualDayRate = null;
    if (m.organisation === undefined) m.organisation = '';
    if (m.email === undefined) m.email = '';
    if (m.phone === undefined) m.phone = '';
    if (m.clearanceStatus === undefined) m.clearanceStatus = '';
    if (m.startDate === undefined) m.startDate = '';
    if (m.endDate === undefined) m.endDate = '';
  });
}

function _defaultRateCard() {

/* ════════════════════════════════════════════════════════════
   TEAM MANAGER (M10) — Business Logic (Rule Set 11)
════════════════════════════════════════════════════════════ */
const TEAM = {
  // 11.2 Build org tree
  buildOrgTree(bid) {
    const members = bid.teamMembers.filter(m => m.isActive !== false);
    const bm = members.find(m => m.coreRole === 'bid_manager') || members[0];
    if (!bm) return null;
    const root = { member: bm, children: [] };
    const coreLeads = members.filter(m => m.coreRole && m.coreRole !== 'bid_manager' && m.id !== bm.id);
    coreLeads.forEach(lead => {
      const reports = members.filter(m => m.reportsTo === lead.id);
      root.children.push({ member: lead, children: reports.map(r => ({ member: r, children: [] })) });
    });
    const assigned = new Set([bm.id, ...coreLeads.map(l => l.id), ...members.filter(m => m.reportsTo).map(m => m.id)]);
    const unassigned = members.filter(m => !assigned.has(m.id));
    unassigned.forEach(u => root.children.push({ member: u, children: [] }));
    return root;
  },

  // 11.3 Rate resolution
  resolveRate(member, rateCard) {
    if (member.individualDayRate !== null && member.individualDayRate > 0) return member.individualDayRate;
    const std = (rateCard || []).find(r => r.roleName && member.role && r.roleName.toLowerCase().trim() === member.role.toLowerCase().trim());
    if (std) return std.standardDayRate;
    return null;
  },

  findStandardRate(role, rateCard) {
    if (!role) return null;
    const std = (rateCard || []).find(r => r.roleName && r.roleName.toLowerCase().trim() === role.toLowerCase().trim());
    return std ? std.standardDayRate : null;
  },

  // 11.4 Spend forecast
  calculateSpendForecast(bid) {
    const activities = (bid.activities || []).filter(a => a.status !== 'deactivated' && a.active !== false);
    const members = bid.teamMembers.filter(m => m.isActive !== false);
    const rateCard = bid.rateCard || [];
    const forecast = { byPerson: {}, byWorkstream: {}, total: 0, totalAtStandard: 0, totalEffort: 0, uncosted: [] };

    activities.forEach(act => {
      const member = members.find(m => m.name === act.owner);
      if (!member) { forecast.uncosted.push({ activity: act, reason: 'no_owner' }); forecast.totalEffort += (act.effortDays || 0); return; }
      const rate = this.resolveRate(member, rateCard);
      if (rate === null) { forecast.uncosted.push({ activity: act, reason: 'no_rate', member }); forecast.totalEffort += (act.effortDays || 0); return; }
      const effort = act.effortDays || 0;
      const cost = effort * rate;
      const stdRate = this.findStandardRate(member.role, rateCard) || rate;
      const costAtStd = effort * stdRate;

      if (!forecast.byPerson[member.id]) forecast.byPerson[member.id] = { member, effort: 0, cost: 0, costAtStandard: 0 };
      forecast.byPerson[member.id].effort += effort;
      forecast.byPerson[member.id].cost += cost;
      forecast.byPerson[member.id].costAtStandard += costAtStd;

      const ws = act.workstreamId || 'unknown';
      if (!forecast.byWorkstream[ws]) forecast.byWorkstream[ws] = { effort: 0, cost: 0 };
      forecast.byWorkstream[ws].effort += effort;
      forecast.byWorkstream[ws].cost += cost;

      forecast.total += cost;
      forecast.totalAtStandard += costAtStd;
      forecast.totalEffort += effort;
    });

    forecast.contractorPremium = forecast.total - forecast.totalAtStandard;
    return forecast;
  },

  // 11.6 Unavailability impact
  checkUnavailabilityImpact(entry, bid) {
    const member = bid.teamMembers.find(m => m.name === entry.name && m.isActive !== false);
    if (!member) return [];
    const activities = (bid.activities || []).filter(a =>
      a.owner === member.name && a.active !== false && !['final','deactivated'].includes(a.status)
    );
    const impacts = [];
    activities.forEach(act => {
      const overlap = _dateOverlapDays(entry.from, entry.to, act.plannedStart, act.plannedEnd);
      if (overlap > 0) {
        impacts.push({ activity: act, member, overlapDays: overlap, severity: overlap >= 3 ? 'high' : overlap >= 1 ? 'medium' : 'low' });
      }
    });
    return impacts;
  },

  // 11.7 Rate variance
  rateVarianceLevel(individualRate, standardRate) {
    if (!standardRate || standardRate === 0) return 'no_benchmark';
    const variance = (individualRate - standardRate) / standardRate;
    if (variance > 0.50) return 'red';
    if (variance > 0.20) return 'amber';
    return 'green';
  }
};

function _dateOverlapDays(fromA, toA, fromB, toB) {
  if (!fromA || !toA || !fromB || !toB) return 0;
  const a0 = new Date(fromA), a1 = new Date(toA), b0 = new Date(fromB), b1 = new Date(toB);
  const start = a0 > b0 ? a0 : b0;
  const end = a1 < b1 ? a1 : b1;
  if (start > end) return 0;
  return Math.max(0, Math.round((end - start) / 86400000) + 1);
}

function _renderOrgNode(node, depth) {
  const m = node.member;
  const clrCls = m.clearance ? (m.clearanceStatus === 'held' ? 'fe-g' : m.clearanceStatus === 'in_progress' ? 'fe-a' : 'fe-mute') : '';
  const contractorCls = m.isContractor ? ' contractor' : '';
  let html = `<div class="tm-org-node${contractorCls}" onclick="handleEditTeamMember('${m.id}')">
    <div class="tm-org-name">${h(m.name)}</div>
    <div class="tm-org-role">${h(m.role || m.coreRole || '')}</div>
    <div class="tm-org-badges">
      ${m.coreRole ? `<span class="fe fe-gl">${h(m.coreRole.replace(/_/g,' '))}</span>` : ''}
      ${m.clearance ? `<span class="fe ${clrCls}">${h(m.clearance)}</span>` : ''}
      ${m.isContractor ? '<span class="fe fe-c">contractor</span>' : ''}
    </div>
  </div>`;
  if (node.children.length > 0) {
    const levelCls = depth === 0 ? 'tm-org-level' : 'tm-org-level2';
    html += `<div class="${levelCls}">${node.children.map(c => _renderOrgNode(c, depth + 1)).join('')}</div>`;
  }
  return html;
}


/* ── Tab 2: Unavailability ─────────────────────────────── */
function _renderTeamUnavailability(bid) {
  const entries = bid.unavailability || [];
  const members = bid.teamMembers.filter(m => m.isActive !== false);

  // Impact warnings
  let impactHtml = '';
  entries.forEach(entry => {
    const impacts = TEAM.checkUnavailabilityImpact(entry, bid);
    impacts.forEach(imp => {
      impactHtml += `<div class="tm-impact">⚠ ${h(imp.member.name)} unavailable ${h(entry.from)} – ${h(entry.to)} — ${imp.overlapDays} day${imp.overlapDays>1?'s':''} overlap with ${h(imp.activity.code || imp.activity.id)} (${imp.severity})</div>`;
    });
  });

  // Gantt view
  let ganttHtml = '';
  if (entries.length > 0 && bid.submissionDeadline) {
    const bidStart = bid.ittIssueDate || bid.createdAt.slice(0,10);
    const bidEnd = bid.submissionDeadline;
    const totalDays = Math.max(1, Math.round((new Date(bidEnd) - new Date(bidStart)) / 86400000));
    const today = new Date().toISOString().slice(0,10);
    const todayPct = Math.max(0, Math.min(100, ((new Date(today) - new Date(bidStart)) / (new Date(bidEnd) - new Date(bidStart))) * 100));

    const uniqueNames = [...new Set(entries.map(e => e.name))].sort();
    ganttHtml = `<div class="tm-section">
      <div class="tm-section-title">Timeline</div>
      <div class="tm-gantt">${uniqueNames.map(name => {
        const personEntries = entries.filter(e => e.name === name);
        const blocks = personEntries.map(e => {
          const startPct = Math.max(0, ((new Date(e.from) - new Date(bidStart)) / (new Date(bidEnd) - new Date(bidStart))) * 100);
          const endPct = Math.min(100, ((new Date(e.to) - new Date(bidStart)) / (new Date(bidEnd) - new Date(bidStart))) * 100);
          const width = Math.max(1, endPct - startPct);
          return `<div class="tm-gantt-block" style="left:${startPct}%;width:${width}%;" title="${h(name)}: ${h(e.from)} – ${h(e.to)}${e.notes ? ' — ' + h(e.notes) : ''}"></div>`;
        }).join('');
        return `<div class="tm-gantt-row">
          <div class="tm-gantt-name">${h(name)}</div>
          <div class="tm-gantt-track">${blocks}<div class="tm-gantt-today" style="left:${todayPct}%;" title="Today"></div></div>
        </div>`;
      }).join('')}</div>
    </div>`;
  }

  // List view
  const listRows = entries.map((e, i) => {
    const dur = e.from && e.to ? Math.max(1, Math.round((new Date(e.to) - new Date(e.from)) / 86400000) + 1) : '—';
    return `<div class="tm-row tm-row-unavail">
      <div class="tm-cell name">${h(e.name)}</div>
      <div class="tm-cell mono">${h(e.from)}</div>
      <div class="tm-cell mono">${h(e.to)}</div>
      <div class="tm-cell mono">${dur}</div>
      <div class="tm-cell">${h(e.notes)}</div>
      <div class="tm-cell"><button class="btn btn-sm btn-danger" onclick="handleRemoveUnavailability(${i})">×</button></div>
    </div>`;
  }).join('');

  return `
    ${impactHtml}
    ${ganttHtml}
    <div class="tm-section">
      <div class="tm-section-title">Unavailability Register
        <div style="display:flex;gap:6px;">
          <button class="btn btn-sm" onclick="handleAddUnavailability()">+ Add</button>

      <div class="tm-row tm-row-unavail tm-hdr">
        <div>Name</div><div>From</div><div>To</div><div>Days</div><div>Notes</div><div></div>
      </div>
      ${listRows || '<div class="tm-empty">No unavailability entries.</div>'}
    </div>`;
}


/* ── Tab 3: Rate Card ──────────────────────────────────── */
function _renderTeamRateCard(bid) {
  const rateCard = bid.rateCard || [];
  const members = bid.teamMembers.filter(m => m.isActive !== false);

  // Standard rate card table
  const stdRows = rateCard.map((r, i) => `<div class="tm-row" style="grid-template-columns:1fr 100px 40px;">
    <div class="tm-cell name">${h(r.roleName)}</div>
    <div class="tm-cell mono right">${fmtGBP(r.standardDayRate)}</div>
    <div class="tm-cell"><button class="btn btn-sm btn-danger" onclick="handleRemoveRateCardEntry(${i})">×</button></div>
  </div>`).join('');

  // Individual rate comparison
  const compRows = members.map(m => {
    const rate = TEAM.resolveRate(m, rateCard);
    const stdRate = TEAM.findStandardRate(m.role, rateCard);
    const variance = (rate !== null && stdRate !== null && stdRate > 0) ? Math.round(((rate - stdRate) / stdRate) * 100) : null;
    const varLevel = (rate !== null && stdRate !== null) ? TEAM.rateVarianceLevel(rate, stdRate) : 'no_benchmark';
    const varCls = varLevel === 'red' ? 'fe-r' : varLevel === 'amber' ? 'fe-a' : varLevel === 'green' ? 'fe-g' : 'fe-mute';
    return `<div class="tm-row tm-row-rate">
      <div class="tm-cell name">${h(m.name)}</div>
      <div class="tm-cell">${h(m.role)}</div>
      <div class="tm-cell">${h(m.organisation)}</div>
      <div class="tm-cell">${m.isContractor ? '<span class="fe fe-c">Y</span>' : 'N'}</div>
      <div class="tm-cell mono right">${m.individualDayRate ? fmtGBP(m.individualDayRate) : '<span style="color:var(--t4);">—</span>'}</div>
      <div class="tm-cell mono right">${stdRate !== null ? fmtGBP(stdRate) : '—'}</div>

/* ── Tab 4: Stakeholders ───────────────────────────────── */
function _renderTeamStakeholders(bid) {
  const stakeholders = (bid.stakeholders || []).filter(s => s.isActive !== false);
  const gates = bid.governanceGates || [];
  const types = ['sponsor','approver','reviewer','influencer','sme'];
  const typeCounts = {};
  types.forEach(t => typeCounts[t] = stakeholders.filter(s => s.stakeholderType === t).length);

  const stkMetrics = `<div class="tm-metrics">
    <div class="tm-metric"><div class="tm-val" style="color:var(--pur);">${stakeholders.length}</div><div class="tm-lbl">Total Stakeholders</div></div>
    <div class="tm-metric"><div class="tm-val" style="color:var(--pur);">${typeCounts.sponsor || 0}</div><div class="tm-lbl">Sponsors</div></div>
    <div class="tm-metric"><div class="tm-val" style="color:var(--pur);">${typeCounts.approver || 0}</div><div class="tm-lbl">Approvers</div></div>
    <div class="tm-metric"><div class="tm-val" style="color:var(--pur);">${typeCounts.reviewer || 0}</div><div class="tm-lbl">Reviewers</div></div>
  </div>`;

  const typeBadge = t => {
    const cls = t === 'sponsor' ? 'fe-gl' : t === 'approver' ? 'fe-g' : t === 'reviewer' ? 'fe-b' : t === 'influencer' ? 'fe-p' : 'fe-c';
    return `<span class="fe ${cls}">${h(t)}</span>`;
  };

  const stkRows = stakeholders.map((s, i) => {
    const linkedGateBadges = (s.linkedGates || []).map(gId => {
      const g = gates.find(g => g.id === gId);
      return g ? `<span class="fe fe-mute">${h(g.name || g.templateId)}</span>` : '';
    }).join(' ');
    return `<div class="tm-row tm-row-stake">
      <div class="tm-cell name">${h(s.name)}</div>
      <div class="tm-cell">${h(s.role)}</div>
      <div class="tm-cell">${h(s.organisation)}</div>
      <div class="tm-cell">${typeBadge(s.stakeholderType)}</div>
      <div class="tm-cell">${h(s.email)}</div>
      <div class="tm-cell">${linkedGateBadges || '—'}</div>
      <div class="tm-cell">
        <button class="btn btn-sm" onclick="handleEditStakeholder(${i})">Edit</button>
        <button class="btn btn-sm btn-danger" onclick="handleRemoveStakeholder(${i})">×</button>
      </div>
    </div>`;
  }).join('');

  // Gate Participation Matrix
  let matrixHtml = '';
  if (stakeholders.length > 0 && gates.length > 0) {
    const gateHeaders = gates.map(g => `<th>${h(g.name || g.templateId || 'Gate')}</th>`).join('');
    const matrixRows = stakeholders.map(s => {
      const cells = gates.map(g => {
        const linked = (s.linkedGates || []).includes(g.id);
        return `<td class="${linked ? 'active' : ''}" onclick="handleToggleGateParticipation(${stakeholders.indexOf(s)}, '${g.id}')">${linked ? '●' : '○'}</td>`;
      }).join('');
      return `<tr><td class="name-cell">${h(s.name)} ${typeBadge(s.stakeholderType)}</td>${cells}</tr>`;
    }).join('');

    // Check for gates with no approver
    const gateWarnings = gates.map(g => {
      const hasApprover = stakeholders.some(s => s.stakeholderType === 'approver' && (s.linkedGates || []).includes(g.id));
      return hasApprover ? '' : `<div class="tm-impact">⚠ ${h(g.name || g.templateId)} has no linked approver</div>`;
    }).join('');

    matrixHtml = `
      <div class="tm-section">
        <div class="tm-section-title">Gate Participation Matrix</div>
        ${gateWarnings}
        <div class="tm-matrix"><table>
          <thead><tr><th></th>${gateHeaders}</tr></thead>
          <tbody>${matrixRows}</tbody>
        </table></div>
      </div>`;
  }

  return `
    ${stkMetrics}
    <div class="tm-section">
      <div class="tm-section-title">Stakeholder Register
        <div style="display:flex;gap:6px;">
          <button class="btn btn-sm" onclick="handleAddStakeholder()">+ Add Stakeholder</button>
          <button class="btn btn-sm" onclick="handleStakeholderCsvImport()">CSV Import</button>
          <button class="btn btn-sm" onclick="handleStakeholderCsvExport()">CSV Export</button>
        </div>
      </div>
      <div class="tm-row tm-row-stake tm-hdr">
        <div>Name</div><div>Role</div><div>Organisation</div><div>Type</div><div>Email</div><div>Gates</div><div></div>
      </div>
      ${stkRows || '<div class="tm-empty">No stakeholders added yet.</div>'}
    </div>
    ${matrixHtml}`;
}


/* ── Tab 5: Spend Forecast ─────────────────────────────── */
function _renderTeamSpend(bid) {
  const forecast = TEAM.calculateSpendForecast(bid);
  const byPerson = Object.values(forecast.byPerson).sort((a, b) => b.cost - a.cost);
  const byWorkstream = Object.entries(forecast.byWorkstream).sort((a, b) => b[1].cost - a[1].cost);
  const maxPersonCost = byPerson.length ? byPerson[0].cost : 1;
  const maxWsCost = byWorkstream.length ? byWorkstream[0][1].cost : 1;

  const spendMetrics = `<div class="tm-metrics">
    <div class="tm-metric"><div class="tm-val gold">${fmtGBP(forecast.total)}</div><div class="tm-lbl">Forecast Spend</div></div>
    <div class="tm-metric"><div class="tm-val ok">${fmtGBP(forecast.totalAtStandard)}</div><div class="tm-lbl">At Standard Rates</div></div>
    <div class="tm-metric"><div class="tm-val ${forecast.contractorPremium > 0 ? 'warn' : ''}">${fmtGBP(Math.abs(forecast.contractorPremium))}</div><div class="tm-lbl">Contractor Premium</div></div>
    <div class="tm-metric"><div class="tm-val">${forecast.totalEffort}</div><div class="tm-lbl">Total Effort (days)</div></div>
  </div>`;

  // Uncosted warnings
  const uncostHtml = forecast.uncosted.length ? `<div class="tm-section">
    <div class="tm-section-title" style="color:var(--amb);">⚠ Uncosted Activities (${forecast.uncosted.length})</div>
    ${forecast.uncosted.slice(0, 10).map(u => `<div style="font-size:11px;color:var(--amb);padding:2px 0;">${h(u.activity.code || u.activity.id)} — ${u.reason === 'no_owner' ? 'no owner assigned' : 'no rate set for ' + h(u.member ? u.member.name : '?')}</div>`).join('')}
    ${forecast.uncosted.length > 10 ? `<div style="font-size:11px;color:var(--t3);">…and ${forecast.uncosted.length - 10} more</div>` : ''}
  </div>` : '';

  // Spend by person
  const personRows = byPerson.map(p => {
    const pct = forecast.total > 0 ? Math.round((p.cost / forecast.total) * 100) : 0;
    return `<div class="tm-row tm-row-spend">
      <div class="tm-cell name">${h(p.member.name)} ${p.member.isContractor ? '<span class="fe fe-c">contr.</span>' : ''}</div>
      <div class="tm-cell">${h(p.member.role)}</div>
      <div class="tm-cell mono right">${fmtGBP(TEAM.resolveRate(p.member, bid.rateCard))}</div>
      <div class="tm-cell mono right">${p.effort}</div>
      <div class="tm-cell mono right">${fmtGBP(p.cost)}</div>
      <div class="tm-cell mono right">${pct}%</div>
    </div>`;
  }).join('');

  // Spend by person bar chart
  const personChart = byPerson.length ? `<div class="tm-chart">
    <div class="tm-chart-title">Spend by Person</div>
    ${byPerson.map(p => {
      const widthPct = maxPersonCost > 0 ? Math.round((p.cost / maxPersonCost) * 100) : 0;
      const color = p.member.isContractor ? 'var(--cyn)' : 'var(--gold)';
      return `<div class="tm-chart-bar">
        <div class="tm-chart-label">${h(p.member.name)}</div>
        <div class="tm-bar" style="flex:1;"><div class="tm-bar-fill" style="width:${widthPct}%;background:${color};"></div></div>
        <div class="tm-chart-val">${fmtGBP(p.cost)}</div>
      </div>`;
    }).join('')}
  </div>` : '';

  // Spend by workstream
  const wsNames = {};
  (bid.workstreams || []).forEach(ws => wsNames[ws.id] = ws.name || ws.id);
  const wsChart = byWorkstream.length ? `<div class="tm-chart">
    <div class="tm-chart-title">Spend by Workstream</div>
    ${byWorkstream.map(([wsId, data]) => {
      const widthPct = maxWsCost > 0 ? Math.round((data.cost / maxWsCost) * 100) : 0;
      return `<div class="tm-chart-bar">
        <div class="tm-chart-label">${h(wsNames[wsId] || wsId)}</div>
        <div class="tm-bar" style="flex:1;"><div class="tm-bar-fill" style="width:${widthPct}%;background:var(--blu);"></div></div>
        <div class="tm-chart-val">${fmtGBP(data.cost)}</div>
      </div>`;
    }).join('')}
  </div>` : '';

  // Rate variance analysis
  const rateCard = bid.rateCard || [];
  const varianceRows = byPerson.map(p => {
    const rate = TEAM.resolveRate(p.member, rateCard);
    const stdRate = TEAM.findStandardRate(p.member.role, rateCard) || rate;
    const costAtStd = p.effort * (stdRate || 0);
    const variance = p.cost - costAtStd;
    const varLevel = rate && stdRate ? TEAM.rateVarianceLevel(rate, stdRate) : 'no_benchmark';
    const varCls = varLevel === 'red' ? 'fe-r' : varLevel === 'amber' ? 'fe-a' : varLevel === 'green' ? 'fe-g' : 'fe-mute';
    return `<div class="tm-row" style="grid-template-columns:1fr 80px 80px 60px 80px 80px 80px;">
      <div class="tm-cell name">${h(p.member.name)}</div>
      <div class="tm-cell mono right">${rate ? fmtGBP(rate) : '—'}</div>
      <div class="tm-cell mono right">${stdRate ? fmtGBP(stdRate) : '—'}</div>
      <div class="tm-cell mono right">${p.effort}</div>
      <div class="tm-cell mono right">${fmtGBP(p.cost)}</div>
      <div class="tm-cell mono right">${fmtGBP(costAtStd)}</div>
      <div class="tm-cell mono right"><span class="fe ${varCls}">${variance > 0 ? '+' : ''}${fmtGBP(Math.abs(variance))}</span></div>
    </div>`;
  }).join('');

  return `
    ${spendMetrics}
    ${uncostHtml}
    <div class="tm-section">
      <div class="tm-section-title">Spend by Person</div>
      <div class="tm-row tm-row-spend tm-hdr">
        <div>Name</div><div>Role</div><div>Day Rate</div><div>Effort</div><div>Cost</div><div>% Total</div>
      </div>
      ${personRows || '<div class="tm-empty">No costed activities yet.</div>'}
    </div>
    ${personChart}
    ${wsChart}
    <div class="tm-section">
      <div class="tm-section-title">Rate Variance Analysis</div>
      <div class="tm-row tm-hdr" style="grid-template-columns:1fr 80px 80px 60px 80px 80px 80px;">
        <div>Name</div><div>Actual Rate</div><div>Std Rate</div><div>Effort</div><div>Actual Cost</div><div>Std Cost</div><div>Variance</div>
      </div>
      ${varianceRows || '<div class="tm-empty">No data to show.</div>'}
    </div>`;
}

function _submitAddTeamMember() {
  const f = document.getElementById('tm-add-form');
  const name = f.querySelector('[name=name]').value.trim();
  const role = f.querySelector('[name=role]').value.trim();
  if (!name || !role) { alert('Name and role are required.'); return; }
  STORE.mutateBid(ROUTER.bidId, bid => {
    _ensureTeamData(bid);
    const coreRole = f.querySelector('[name=coreRole]').value || null;
    // If assigning a core role, demote existing holder (Rule 11.1)
    if (coreRole) {
      const existing = bid.teamMembers.find(m => m.coreRole === coreRole && m.isActive !== false);
      if (existing) existing.coreRole = null;
    }
    bid.teamMembers.push({
      id: STORE.uuid(), name, role, coreRole,
      organisation: f.querySelector('[name=organisation]').value.trim(),
      workstreams: f.querySelector('[name=workstreams]').value.trim(),
      email: f.querySelector('[name=email]').value.trim(),
      phone: f.querySelector('[name=phone]').value.trim(),
      clearance: f.querySelector('[name=clearance]').value.trim(),
      clearanceStatus: f.querySelector('[name=clearanceStatus]').value,
      isContractor: f.querySelector('[name=isContractor]').value === 'true',
      individualDayRate: parseFloat(f.querySelector('[name=individualDayRate]').value) || null,
      reportsTo: f.querySelector('[name=reportsTo]').value || null,
      startDate: f.querySelector('[name=startDate]').value || '',
      endDate: f.querySelector('[name=endDate]').value || '',
      isActive: true,
    });
  });
  closeModal();
  renderApp();
}

function _submitEditTeamMember(memberId) {
  const f = document.getElementById('tm-edit-form');
  STORE.mutateBid(ROUTER.bidId, bid => {
    _ensureTeamData(bid);
    const m = bid.teamMembers.find(x => x.id === memberId);
    if (!m) return;
    const oldName = m.name;
    m.name = f.querySelector('[name=name]').value.trim();
    m.role = f.querySelector('[name=role]').value.trim();
    m.organisation = f.querySelector('[name=organisation]').value.trim();
    m.workstreams = f.querySelector('[name=workstreams]').value.trim();
    m.email = f.querySelector('[name=email]').value.trim();
    m.phone = f.querySelector('[name=phone]').value.trim();
    m.clearance = f.querySelector('[name=clearance]').value.trim();
    m.clearanceStatus = f.querySelector('[name=clearanceStatus]').value;
    m.isContractor = f.querySelector('[name=isContractor]').value === 'true';
    m.individualDayRate = parseFloat(f.querySelector('[name=individualDayRate]').value) || null;
    m.reportsTo = f.querySelector('[name=reportsTo]').value || null;
    m.startDate = f.querySelector('[name=startDate]').value || '';
    m.endDate = f.querySelector('[name=endDate]').value || '';
    const newCoreRole = f.querySelector('[name=coreRole]').value || null;
    if (newCoreRole !== m.coreRole) {
      if (newCoreRole) {
        const existing = bid.teamMembers.find(x => x.coreRole === newCoreRole && x.isActive !== false && x.id !== memberId);
        if (existing) existing.coreRole = null;
      }
      m.coreRole = newCoreRole;
    }
    // Propagate name change to activity ownership
    if (oldName !== m.name) {
      (bid.activities || []).forEach(a => { if (a.owner === oldName) a.owner = m.name; });

function _teamCsvFileLoad(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const rows = ev.target.result.trim().split(/\r?\n/);
    let added = 0, skipped = 0;
    STORE.mutateBid(ROUTER.bidId, bid => {
      _ensureTeamData(bid);
      rows.forEach((row, i) => {
        const cols = row.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
        if (i === 0 && /^name$/i.test(cols[0])) return;
        const [name='', role='', organisation='', workstreams='', email='', phone='', clearance='', clearanceStatus='', isContr='', dayRate=''] = cols;
        if (!name || !role) { skipped++; return; }
        bid.teamMembers.push({
          id: STORE.uuid(), name, role, organisation, workstreams, email, phone, clearance, clearanceStatus,
          isContractor: isContr.toLowerCase() === 'true' || isContr === '1',
          individualDayRate: parseFloat(dayRate) || null,
          coreRole: null, reportsTo: null, startDate: '', endDate: '', isActive: true,
        });
        added++;
      });
    });
    const msg = document.getElementById('team-csv-msg');
    if (msg) msg.textContent = `${added} added${skipped ? ', ' + skipped + ' skipped' : ''}`;
    input.value = '';
    renderApp();
  };
  reader.readAsText(file);
}

function handleTeamCsvExport() {
  const bid = STORE.loadBid(ROUTER.bidId);
  if (!bid) return;
  _ensureTeamData(bid);
  const header = 'name,role,organisation,workstreams,email,phone,clearance,clearanceStatus,isContractor,individualDayRate';
  const rows = bid.teamMembers.filter(m => m.isActive !== false).map(m =>
    [m.name, m.role, m.organisation, m.workstreams||'', m.email, m.phone, m.clearance, m.clearanceStatus, m.isContractor, m.individualDayRate||''].map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')
  );
  _downloadCsv('team_members.csv', [header, ...rows].join('\n'));
}

function _downloadCsv(filename, content) {
  const blob = new Blob([content], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
