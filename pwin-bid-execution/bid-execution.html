function confirmWizard() {
  const d = WIZARD.draft;
  const _subMs = d.milestones && d.milestones.find(m => m.type === 'submission_deadline');
  if (!d.name.trim() || !_subMs || !_subMs.date) {
    alert('Bid name and submission deadline are required. Please go back to Stage 1.');
    return;
  }

  // Infeasible acknowledgment check
  if (_wizFeasibility && _wizFeasibility.verdict === 'infeasible') {
    const ack = document.getElementById('wiz-ack-check');
    if (!ack || !ack.checked) {
      alert('Please acknowledge the timeline risk before proceeding.');
      return;
    }
  }

  const bid = _generateBidFromWizard(d);

  // Run backward scheduler to populate planned dates
  if (bid.submissionDeadline) {
    const schedule = SCHED.backwardSchedule(bid.activities, bid.submissionDeadline, bid.calendar);
    bid.activities.forEach(a => {
      if (schedule[a.id]) {
        a.plannedStart = schedule[a.id].plannedStart;
        a.plannedEnd   = schedule[a.id].plannedEnd;
      }
    });
  }

  // Set health from feasibility verdict
  const health = _wizFeasibility
    ? (_wizFeasibility.verdict === 'infeasible' ? 'red' : _wizFeasibility.verdict === 'tight' ? 'amber' : 'green')
    : 'unk';

  // Store feasibility summary on bid
  if (_wizFeasibility) {
    bid.feasibility = {
      verdict: _wizFeasibility.verdict,
      availableDays: _wizFeasibility.availableDays,
      criticalPathDays: _wizFeasibility.criticalPathDays,
      criticalPathBuffer: _wizFeasibility.criticalPathBuffer,
      deficit: _wizFeasibility.deficit,
      criticalPath: _wizFeasibility.criticalPath.map(a => a.id),
      checkedAt: STORE.now(),
    };
  }

  // Auto-populate BM-13 assumptions (Rule 10.4)
  const _assumptions = [
    'Sequential execution within workstreams — activities with team size 1 cannot overlap within the same workstream',
    'Effort estimates are based on mid-complexity defaults — override where this bid differs from standard',
    'Team members available at stated allocation — no unplanned absences or reassignment to other bids',
    'Client clarification responses will be received within the stated timeline',
    'Partner inputs (SUP-02, SUP-04) will be delivered on schedule',
  ];
  _assumptions.forEach(desc => {
    bid.riskAssumptions.push({
      id: STORE.uuid(), registerType: 'bid', type: 'assumption',
      description: desc, status: 'open',
      owner: bid.bidManager, createdAt: STORE.now(),
    });
  });

  // Auto-create infeasibility risk entry (Rule 10.3)
  if (_wizFeasibility && _wizFeasibility.verdict === 'infeasible') {
    bid.riskAssumptions.push({
      id: STORE.uuid(), registerType: 'bid', type: 'risk',
      description: `Bid created with infeasible timeline. Deficit: ${_wizFeasibility.deficit} days. Acknowledged by ${bid.bidManager || 'bid manager'} on ${STORE.today()}.`,
      probability: 'high', impact: 'high', status: 'open',
      owner: bid.bidManager, createdAt: STORE.now(),
    });
  }

  bid.health = health;

  STORE.setBid(bid);
  STORE.addBidSummary({
    id: bid.id, name: bid.name, client: bid.client,
    bidManager: bid.bidManager,
    submissionDeadline: bid.submissionDeadline,
    status: 'setup', health,
    winFeeValue: 0, devReadiness: 0, prodReadiness: 0,
  });

  _wizFeasibility = null; // clean up
  WIZARD.abandon();
  ROUTER.goBid(bid.id);
}

function _generateBidFromWizard(d) {
  const id   = STORE.uuid();
  const tcvM = parseFloat(d.tcv) || 0;
  const acvM = parseFloat(d.acv) || 0;
  const _mDate = t => ((d.milestones||[]).find(m=>m.type===t)||{}).date || null;

  // Build activities from WS template with complexity + config overrides
  const activities = [];
  const workstreams = WS.map(ws => ({ id: ws.id, name: ws.name, cls: ws.cls, phase: ws.ph }));

  WS.forEach(ws => {
    ws.acts.forEach(tmpl => {
      const cfg    = d.activityConfig[tmpl.id] || {};
      const active = cfg.active !== false;
      const dur    = cfg.dur != null ? cfg.dur : tmpl.dur;
      const ts     = WIZARD.effTs(tmpl, d.complexity, cfg.ts != null ? cfg.ts : null);

      activities.push({
        id: tmpl.id,
        workstreamId: ws.id,
        name: tmpl.n,
        output: tmpl.o,
        parallelisationType: tmpl.pt,
        dependencies: [...tmpl.d],
        effortDays: dur,
        teamSize: ts,
        active,
        status: 'not_started',
        assurance: 'none',
        owner: _activityOwner(tmpl.id, ws.id, d.team),
        plannedStart: null, plannedEnd: null,
        actualStart: null, actualEnd: null,
        lastUpdated: null, notes: '',
      });
    });
  });

  // Build governance gates from selected gates
  const governanceGates = GATE_LIB
    .filter(g => d.gateSelection[g.id])
    .map(g => ({
      id: STORE.uuid(), templateId: g.id, name: g.name, type: g.type,
      status: 'pending', plannedDate: null, actualDate: null,
      decision: null, conditions: [], riskPremium: 0,
      entryCriteria: g.entryCriteria.map(c => ({ text: c, met: false })),
      prepActions: [], notes: '',
    }));

  // Activate BM-09 if competitive dialogue
  if (d.hasCompetitiveDialogue) {
    const bm09 = activities.find(a => a.id === 'BM-09');
    if (bm09) bm09.active = true;
  }

  return {
    id, name: d.name, client: d.client,
    sector: d.sector, procurementType: d.procurementType,
    bidManager: d.team.bidManager, solutionLead: d.team.solutionLead,
    commercialLead: d.team.commercialLead, deliveryLead: d.team.deliveryLead,
    legalLead: d.team.legalLead, supplyChainLead: d.team.supplyLead,
    milestones: d.milestones.map(m=>({...m})),
    submissionDeadline: _mDate('submission_deadline'),
    ittIssueDate: _mDate('tender_commencement'),
    clarificationDeadline: _mDate('clarification_deadline'),
    presentationDate: _mDate('presentation'),
    expectedAwardDate: _mDate('contract_award'),
    contractCommencement: _mDate('contract_commencement'),
    submissionChannel: d.submissionChannel,
    hasIncumbent: d.hasIncumbent, incumbent: d.incumbent,
    hasCompetitiveDialogue: d.hasCompetitiveDialogue,
    hasPresentation: d.milestones.some(m=>m.type==='presentation'&&m.date),
    hasBafo: d.hasBafo,
    // Procurement context (ITT ingestion layer)
    procurementRoute: d.procurementRoute || '',
    portalPlatform: d.portalPlatform || '',
    portalReference: d.portalReference || '',
    contractDurationMonths: parseFloat(d.contractDurationMonths) || null,
    extensionOptions: d.extensionOptions || '',
    estimatedTotalValue: parseFloat(d.estimatedTotalValue) || null,
    tupeApplicable: !!d.tupeApplicable,
    tupeStaffCount: parseInt(d.tupeStaffCount) || null,

function handleStatusChange(actId, newStatus) {
  STORE.mutateBid(ROUTER.bidId, bid => {
    const act = bid.activities.find(a => a.id === actId);
    if (!act) return;
    const result = TRANSITIONS.changeActivityStatus(act, newStatus);

    (bid.requirements || []).forEach(r => {
      if ((r.responseActivityId || r.responseRef) === actId) {
        TRANSITIONS.autoUpdateCoverage(r, act);
      }
    });
  });
  renderApp();
}

function handleAssuranceChange(actId, newAssurance) {

    if (!act) return;

      }
    });
  });
  renderApp();
}

function handleActNotes(actId, notes) {
  STORE.mutateBid(ROUTER.bidId, bid => {
    const act = bid.activities.find(a => a.id === actId);
    if (act) { act.notes = notes; act.lastUpdated = STORE.now(); }
  });
}

function _getActTemplate(actId) {
  for (const ws of WS) { const tmpl = ws.acts.find(a => a.id === actId); if (tmpl) return tmpl; }
  return null;
}

function handleTaskToggle(actId, taskId) {
  STORE.mutateBid(ROUTER.bidId, bid => {
    const act = bid.activities.find(a => a.id === actId);
    if (!act) return;
    if (!act.taskProgress) act.taskProgress = {};
    act.taskProgress[taskId] = !act.taskProgress[taskId];
    act.lastUpdated = STORE.now();
    _deriveStatusFromTasks(act);
  });
  renderApp();
}

function handleQualityToggle(actId, key) {
  STORE.mutateBid(ROUTER.bidId, bid => {
    const act = bid.activities.find(a => a.id === actId);
    if (!act) return;
    if (!act.qualityProgress) act.qualityProgress = {};
    act.qualityProgress[key] = !act.qualityProgress[key];
    act.lastUpdated = STORE.now();
    _deriveStatusFromTasks(act);
  });
  renderApp();
}

function _deriveStatusFromTasks(act) {
  const tmpl = _getActTemplate(act.id);
  if (!tmpl || !tmpl.subs) return;
  const tp = act.taskProgress || {};
  const qp = act.qualityProgress || {};
  let totalTasks = 0, doneTasks = 0;
  tmpl.subs.forEach(s => (s.t || []).forEach(t => { totalTasks++; if (tp[t.id]) doneTasks++; }));
  let totalQc = 0, doneQc = 0;
  (tmpl.outs || []).forEach(o => (o.q || []).forEach((q, i) => { totalQc++; if (qp[o.n + '::' + i]) doneQc++; }));
  if (act.status === 'deactivated') return;
  if (totalTasks > 0 && doneTasks > 0 && act.status === 'not_started') {
    act.status = 'in_progress';
    if (!act.actualStart) act.actualStart = STORE.now().split('T')[0];
  }
  if (totalTasks > 0 && doneTasks === totalTasks && act.status === 'in_progress') act.status = 'draft_complete';
  if (totalTasks > 0 && doneTasks === totalTasks && totalQc > 0 && doneQc === totalQc && act.status === 'draft_complete') {
    act.status = 'final';
    if (!act.actualEnd) act.actualEnd = STORE.now().split('T')[0];
  }
  if (doneTasks < totalTasks && act.status === 'draft_complete') act.status = 'in_progress';
  if (doneTasks < totalTasks && act.status === 'final') { act.status = 'draft_complete'; act.actualEnd = null; }
  if (totalQc > 0 && doneQc < totalQc && act.status === 'final') { act.status = 'draft_complete'; act.actualEnd = null; }
}

function _doResponseCsvImport() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.csv';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const rows = ev.target.result.trim().split(/\r?\n/);
      let imported = 0, rejected = 0, duplicates = 0;
      const validTypes = ['written_question','document_upload','certificate','cv','pricing_schedule','case_study','presentation','form','data_return','other'];
      const validCategories = ['quality','price','social_value','pass_fail','unscored'];
      STORE.mutateBid(ROUTER.bidId, bid => {
        if (!bid.responseSections) bid.responseSections = [];
        rows.forEach((row, i) => {
          const cols = row.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
          if (i === 0 && /^ref/i.test(cols[0])) return;
          // Column order: reference, title, questionText, responseType, evaluationCategory,
          //   evaluationMaxScore, evaluationCriteria, sectionNumber, hurdleScore, wordLimit, pageLimit
          const [ref='', title='', qtext='', type='', cat='', ms='', criteria='', secNum='', hurdle='', wl='', pl=''] = cols;
          // Validate required fields
          if (!ref || !title || !qtext || !type || !cat || !ms || !criteria || !secNum) { rejected++; return; }
          if (!validTypes.includes(type)) { rejected++; return; }
          if (!validCategories.includes(cat)) { rejected++; return; }
          // Duplicate detection: warn but still import
          if (bid.responseSections.some(s => s.reference === ref)) duplicates++;
          bid.responseSections.push({
            id: STORE.uuid(), bidId: bid.id,
            reference: ref, title, questionText: qtext,
            responseType: type,
            ittVolume: null,
            sectionNumber: secNum,
            evaluationCategory: cat,
            evaluationWeightPct: 0, // section-level weight derived from EvaluationFramework
            evaluationMaxScore: parseFloat(ms) || 0,
            evaluationCriteria: criteria,
            hurdleScore: hurdle ? parseFloat(hurdle) : null,
            wordLimit: parseInt(wl) || 0, pageLimit: parseInt(pl) || 0,
            responseFormat: null,
            linkedResponseItemId: null,
            sortOrder: bid.responseSections.length,
            notes: null, sourceDocumentId: null,
            createdBy: 'csv_import', lastAmended: null, lastUpdated: STORE.now(),
          });
          imported++;
        });
      });
      let msg = `${imported} response section${imported!==1?'s':''} imported`;
      if (rejected) msg += `, ${rejected} rejected (missing required field or invalid enum)`;
      if (duplicates) msg += `, ${duplicates} duplicate reference${duplicates!==1?'s':''} (imported anyway)`;
      alert(msg);
      renderApp();
    };
    reader.readAsText(file);
  };
  input.click();
}

// ── Legacy handlers (kept for backward compat with old requirement data) ──
function handleReqLink(idx, actId) {
  STORE.mutateBid(ROUTER.bidId, bid => {
    const req = (bid.requirements || [])[idx];
    if (!req) return;
    req.responseActivityId = actId || null;
    if (actId) {
      const act = bid.activities.find(a => a.id === actId);
      if (req.coverageStatus === 'unmapped') req.coverageStatus = 'mapped';
      if (act) TRANSITIONS.autoUpdateCoverage(req, act);
    } else {
      req.coverageStatus = 'unmapped';
    }
  });
  renderApp();
}
function handleReqCovStatus(idx, status) {
  STORE.mutateBid(ROUTER.bidId, bid => {
    const req = (bid.requirements || [])[idx]; if (req) req.coverageStatus = status;
  });
  renderApp();
}

function handleAddCycleConfirm() {
  const type = document.getElementById('rc-type').value;
  const targetDate = document.getElementById('rc-date').value || '';
  const reviewers = (document.getElementById('rc-reviewers').value || '').split(',').map(s => s.trim()).filter(Boolean);
  const checkboxes = document.querySelectorAll('.rc-act-cb:checked');
  const targetActivities = Array.from(checkboxes).map(cb => cb.value);

  STORE.mutateBid(ROUTER.bidId, bid => {
    if (!bid.reviewCycles) bid.reviewCycles = [];
    bid.reviewCycles.push({
      id: STORE.uuid(),
      bidId: bid.id,
      type,
      targetDate,
      status: 'scheduled',
      reviewers,
      targetActivities,
      actions: [],
      scores: [],
    });
    // Rule 2.2: promote linked activities to under_review if unassured
    targetActivities.forEach(actId => {
      const act = (bid.activities || []).find(a => a.id === actId);
      if (act) {
        const ass = act.assurance || 'none';
        if (ass === 'none' || ass === 'unassured') {
          TRANSITIONS.changeAssurance(act, 'under_review');
        }
      }
    });
  });
  closeModal();
  renderApp();
}

function handleCycleAdvance(cycleId, newStatus) {
  STORE.mutateBid(ROUTER.bidId, bid => {
    const cycle = (bid.reviewCycles || []).find(c => c.id === cycleId);
    if (!cycle) return;
    const result = REVIEWS.changeCycleStatus(cycle, newStatus);
    if (!result.ok) { alert(result.error); return; }
    // Rule 7.1: On close, promote assurance
    if (newStatus === 'closed') {
      REVIEWS.onCycleClose(cycle, bid.activities || []);
      // Auto-update requirement coverage for promoted activities
      (bid.activities || []).forEach(act => {
        (bid.requirements || []).forEach(r => {
          if ((r.responseActivityId || r.responseRef) === act.id) {
            TRANSITIONS.autoUpdateCoverage(r, act);
          }
        });
      });
    }
  });
  renderApp();
}

function handleActionStatusChange(cycleId, actionId, newStatus) {
  STORE.mutateBid(ROUTER.bidId, bid => {
    const cycle = (bid.reviewCycles || []).find(c => c.id === cycleId);
    if (!cycle) return;
    const action = (cycle.actions || []).find(a => a.id === actionId);
    if (!action) return;
    const result = REVIEWS.changeActionStatus(action, newStatus);
    if (!result.ok) { alert(result.error); return; }
    if (newStatus === 'resolved') {
      action.resolvedDate = STORE.today();
    }
  });
  renderApp();
}

function handleAddActionConfirm(cycleId) {
  const comment = (document.getElementById('ra-comment').value || '').trim();
  if (!comment) { alert('Comment is required.'); return; }
  const severity = document.getElementById('ra-severity').value;
  const activityCode = document.getElementById('ra-section').value;
  const criterion = document.getElementById('ra-criterion').value;
  const owner = (document.getElementById('ra-owner').value || '').trim();
  const deadline = document.getElementById('ra-deadline').value || '';

  STORE.mutateBid(ROUTER.bidId, bid => {
    const cycle = (bid.reviewCycles || []).find(c => c.id === cycleId);
    if (!cycle) return;
    if (!cycle.actions) cycle.actions = [];
    cycle.actions.push({
      id: STORE.uuid(),
      reviewCycleId: cycleId,
      activityCode,
      comment,
      severity,
      criterion,
      owner,
      deadline: deadline || null,
      status: 'open',
      resolution: '',
      resolvedDate: null,
    });
    // Rule 7.1: auto-advance in_progress → actions_open
    if (cycle.status === 'in_progress') {
      REVIEWS.changeCycleStatus(cycle, 'actions_open');
    }
  });
  closeModal();
  renderApp();
}

function handleScoreEntry(cycleId, actId, criterion, value) {
  STORE.mutateBid(ROUTER.bidId, bid => {
    const cycle = (bid.reviewCycles || []).find(c => c.id === cycleId);
    if (!cycle) return;
    if (!cycle.scores) cycle.scores = [];
    let entry = cycle.scores.find(s => s.activityId === actId);
    if (!entry) {
      entry = { activityId: actId };
      cycle.scores.push(entry);
    }
    if (value >= 1 && value <= 5) {
      entry[criterion] = value;
    } else {
      delete entry[criterion];
    }
  });
  renderApp();
}

function handleAddGateConfirm() {
  const templateId = document.getElementById('gg-template').value;
  const plannedDate = document.getElementById('gg-date').value || null;
  const approvingBody = (document.getElementById('gg-approver').value || '').trim();

  const lib = GATE_LIB.find(g => g.id === templateId);
  if (!lib) return;

  STORE.mutateBid(ROUTER.bidId, bid => {
    if (!bid.governanceGates) bid.governanceGates = [];
    bid.governanceGates.push({
      id: STORE.uuid(), templateId: lib.id, name: lib.name, type: lib.type,
      status: 'upcoming', plannedDate, actualDate: null,
      decision: null, conditions: [], riskPremium: 0,
      approvingBody,
      entryCriteria: lib.entryCriteria.map(c => ({ text: c, met: false })),
      prepActions: [], prepActionsGenerated: false, notes: '',
    });
  });
  closeModal();
  renderApp();
}

function handleGateAdvance(gateId, newStatus) {
  STORE.mutateBid(ROUTER.bidId, bid => {
    const gate = (bid.governanceGates || []).find(g => g.id === gateId);
    if (!gate) return;
    const result = GOVERNANCE.changeGateStatus(gate, newStatus);
    if (!result.ok) { alert(result.error); return; }
    if (newStatus === 'passed') {
      gate.actualDate = STORE.today();
      GOVERNANCE.onGatePassed(gate, bid.activities || []);
    }
    if (newStatus === 'failed') {
      gate.actualDate = STORE.today();
    }
  });
  renderApp();
}

function handleGateDecision(gateId, field, value) {
  STORE.mutateBid(ROUTER.bidId, bid => {
    const gate = (bid.governanceGates || []).find(g => g.id === gateId);
    if (!gate) return;
    if (field === 'riskPremium') {
      gate.riskPremium = parseFloat(value) || 0;
    } else {
      gate[field] = value;
    }
  });
  renderApp();
}

function handleGeneratePrep(gateId) {
  STORE.mutateBid(ROUTER.bidId, bid => {
    const gate = (bid.governanceGates || []).find(g => g.id === gateId);
    if (!gate) return;
    const actions = GOVERNANCE.generatePrepActions(gate, bid.calendar);
    // Also add to bid's standup actions
    if (!bid.standupActions) bid.standupActions = [];
    actions.forEach(a => bid.standupActions.push({...a}));
  });
  renderApp();
}

function handlePrepActionStatus(gateId, actionId, newStatus) {
  STORE.mutateBid(ROUTER.bidId, bid => {
    const gate = (bid.governanceGates || []).find(g => g.id === gateId);
    if (!gate) return;
    const action = (gate.prepActions || []).find(a => a.id === actionId);
    if (!action) return;
    action.status = newStatus;
    if (newStatus === 'done') action.completedDate = STORE.today();
  });
  renderApp();
}

function handleToggleCriterion(gateId) {
  STORE.mutateBid(ROUTER.bidId, bid => {
    const gate = (bid.governanceGates || []).find(g => g.id === gateId);
    if (!gate || !gate.entryCriteria || gate.entryCriteria.length === 0) return;
    // Toggle the first unmet criterion (simple UX — bid manager clicks to mark criteria manually)
    const unmet = gate.entryCriteria.find(ec => !ec.met);
    if (unmet) {
      unmet.met = true;
    } else {
      // All met — toggle the last one back to unmet
      gate.entryCriteria[gate.entryCriteria.length - 1].met = false;
    }
    // Re-evaluate counts
    GOVERNANCE.evaluateEntryCriteria(gate, bid.activities || []);
  });
  renderApp();
}

function handleRemoveArtefact(idx) {
  if (!confirm('Remove this artefact?')) return;
  STORE.mutateBid(ROUTER.bidId, bid => {
    (bid.artefacts || []).splice(idx, 1);
  });
  renderApp();
}

function handleArtefactStatus(idx, newStatus) {
  STORE.mutateBid(ROUTER.bidId, bid => {
    const art = (bid.artefacts || [])[idx];
    if (art) art.status = newStatus;
  });
  renderApp();
}

function handleArtefactUpload(idx, field, value) {
  STORE.mutateBid(ROUTER.bidId, bid => {
    const art = (bid.artefacts || [])[idx];
    if (!art) return;
    art[field] = value;
    if (field === 'uploadStatus' && (value === 'uploaded' || value === 'confirmed')) {
      art.uploadTimestamp = new Date().toISOString().slice(0, 19).replace('T', ' ');
    }
  });
  renderApp();
}

function handleToggleQA(idx) {
  STORE.mutateBid(ROUTER.bidId, bid => {
    if (!bid.qaChecklist) bid.qaChecklist = _defaultQAChecklist();
    const item = bid.qaChecklist[idx];
    if (item) item.done = !item.done;
  });
  renderApp();
}

function handleApprovalField(idx, field, value) {
  STORE.mutateBid(ROUTER.bidId, bid => {
    if (!bid.approvals) bid.approvals = _defaultApprovals();
    const appr = bid.approvals[idx];
    if (!appr) return;
    appr[field] = value;
    if (field === 'status' && value === 'approved') {
      appr.date = new Date().toISOString().slice(0, 10);
    } else if (field === 'status' && value !== 'approved') {
      appr.date = null;
    }
  });
  renderApp();
}

function handleConfirmSubmission() {
  const bid = STORE.loadBid(ROUTER.bidId);
  if (!bid) return;
  if (!bid.qaChecklist) bid.qaChecklist = _defaultQAChecklist();
  if (!bid.approvals) bid.approvals = _defaultApprovals();
  const blockers = _submissionBlockers(bid, bid.artefacts || [], bid.qaChecklist, bid.approvals);
  if (blockers.length > 0) { alert('Cannot submit:\n' + blockers.join('\n')); return; }
  if (!confirm('Confirm final submission? This action cannot be undone.')) return;

  const submittedBy = bid.bidManager || prompt('Submitted by:') || 'Bid Manager';
  const channel = bid.submissionChannel || 'portal';
  const confirmationRef = prompt('Portal confirmation reference (optional):') || '';

  STORE.mutateBid(ROUTER.bidId, bid => {
    bid.status = 'submitted';
    bid.submissionLog = {
      submittedBy,
      submittedAt: new Date().toISOString().slice(0, 19).replace('T', ' '),
      channel,
      confirmationRef,
    };
    // Mark PRD activities as final
    (bid.activities || []).forEach(a => {
      if (a.workstreamId === 'PRD' && a.active !== false && a.status !== 'deactivated') {
        a.status = 'final';
        a.lastUpdated = new Date().toISOString();
      }
    });
    // Activate post-submission activities if configured
    if (bid.hasPresentation) {
      ['POST-01','POST-02','POST-03'].forEach(id => {
        const act = (bid.activities || []).find(a => a.id === id);
        if (act) { act.active = true; act.status = act.status === 'deactivated' ? 'not_started' : act.status; }
      });
    }
    if (bid.hasBafo) {
      ['POST-05','POST-06'].forEach(id => {
        const act = (bid.activities || []).find(a => a.id === id);
        if (act) { act.active = true; act.status = act.status === 'deactivated' ? 'not_started' : act.status; }
      });
    }
    // Generate hot debrief standup action
    if (!bid.standupActions) bid.standupActions = [];
    bid.standupActions.push({
      id: STORE.uuid(),
      description: 'Hot debrief (BM-11) — capture immediate lessons and team feedback',
      output: 'Hot debrief notes',
      owner: bid.bidManager || '',
      dueDate: bid.calendar
        ? SCHED.addWorkingDays(new Date().toISOString().slice(0, 10), 2, bid.calendar)
        : new Date(Date.now() + 2 * 86400000).toISOString().slice(0, 10),
      status: 'open',
      source: 'submission',
      createdDate: new Date().toISOString(),
      completedDate: null,
    });
    // Snapshot readiness
    READINESS.snapshotReadiness(bid);
  });
  renderApp();
}

function handleImport() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        STORE.importAll(ev.target.result);
        renderApp();
      } catch(err) { alert('Import failed: ' + err.message); }
    };
    reader.readAsText(file);
  };
  input.click();
}

/* ════════════════════════════════════════════════════════════
   UTILITIES
════════════════════════════════════════════════════════════ */
function h(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtGBP(v) {
  const n = parseFloat(String(v).replace(/[^0-9.]/g,''));
  if (isNaN(n)) return '';
  return new Intl.NumberFormat('en-GB',{style:'currency',currency:'GBP',maximumFractionDigits:0}).format(n);
}

function parseMoney(s) {
  const n = parseFloat(String(s).replace(/[^0-9.]/g,''));
  return isNaN(n) ? '' : String(Math.round(n));
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const t = new Date(dateStr); const n = new Date();
  t.setHours(0,0,0,0); n.setHours(0,0,0,0);
  return Math.round((t - n) / 86400000);
}

function _download(content, filename, type) {
  const blob = new Blob([content], {type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}


/* ════════════════════════════════════════════════════════════
   SCHED TESTS — run via console: SCHED_TEST()
════════════════════════════════════════════════════════════ */
function SCHED_TEST() {
  let pass = 0, fail = 0;
  function assert(label, actual, expected) {
    if (actual === expected) { pass++; }
    else { fail++; console.error(`FAIL: ${label} — expected ${expected}, got ${actual}`); }
  }

  // Test calendar
  const cal = {
    workingDays: [1,2,3,4,5],
    publicHolidays: ['2026-04-03'], // Good Friday
    weekendWorking: [],
    teamUnavailability: [],
    clientBlackouts: [],
  };

  // ── elapsedDays (Rule 1.1) ──
  assert('elapsed: 15d/1p',  SCHED.elapsedDays(15, 1), 15);
  assert('elapsed: 15d/2p',  SCHED.elapsedDays(15, 2), 9);   // ceil((15/2)*1.20)=9
  assert('elapsed: 15d/3p',  SCHED.elapsedDays(15, 3), 7);   // ceil((15/3)*1.40)=7
  assert('elapsed: 45d/5p',  SCHED.elapsedDays(45, 5), 17);  // ceil((45/5)*1.80)=16.2→17
  assert('elapsed: 0d/1p',   SCHED.elapsedDays(0, 1),  0);
  assert('elapsed: 10d/0p',  SCHED.elapsedDays(10, 0), 10);

  // ── isWorkingDay ──
  assert('monday is working',    SCHED.isWorkingDay('2026-03-23', cal), true);   // Mon
  assert('saturday not working',  SCHED.isWorkingDay('2026-03-28', cal), false);  // Sat
  assert('sunday not working',    SCHED.isWorkingDay('2026-03-29', cal), false);  // Sun
  assert('good friday holiday',   SCHED.isWorkingDay('2026-04-03', cal), false);

  // Weekend working override
  const cal2 = { ...cal, weekendWorking: [{from:'2026-03-28', to:'2026-03-29'}] };
  assert('weekend override sat', SCHED.isWorkingDay('2026-03-28', cal2), true);
  assert('weekend override sun', SCHED.isWorkingDay('2026-03-29', cal2), true);

  // ── addWorkingDays ──
  assert('add 1 wd from Mon',   SCHED.addWorkingDays('2026-03-23', 1, cal), '2026-03-24');
  assert('add 5 wd from Mon',   SCHED.addWorkingDays('2026-03-23', 5, cal), '2026-03-30');
  // Add 5 from Mon Mar 30 — includes Good Friday Apr 3 holiday
  assert('add 5 wd across holiday', SCHED.addWorkingDays('2026-03-30', 5, cal), '2026-04-07');

  // ── subtractWorkingDays ──
  assert('sub 1 wd from Tue',   SCHED.subtractWorkingDays('2026-03-24', 1, cal), '2026-03-23');
  assert('sub 5 wd from Mon',   SCHED.subtractWorkingDays('2026-03-30', 5, cal), '2026-03-23');
  // Sub 5 from Tue Apr 7 — skips Good Friday
  assert('sub 5 wd across holiday', SCHED.subtractWorkingDays('2026-04-07', 5, cal), '2026-03-30');

  // ── countWorkingDays ──
  assert('count Mon-Fri',       SCHED.countWorkingDays('2026-03-23', '2026-03-27', cal), 4);
  assert('count Mon-Mon',       SCHED.countWorkingDays('2026-03-23', '2026-03-30', cal), 5);
  // Across Good Friday
  assert('count across holiday', SCHED.countWorkingDays('2026-03-30', '2026-04-07', cal), 5);
  assert('count same day',       SCHED.countWorkingDays('2026-03-23', '2026-03-23', cal), 0);

  // ── backwardSchedule — simple chain ──
  // A → B → C, deadline 2026-04-10 (Fri)
  const acts = [
    { id:'A', effortDays:5, teamSize:1, dependencies:[], active:true, status:'not_started', owner:'' },
    { id:'B', effortDays:3, teamSize:1, dependencies:['A'], active:true, status:'not_started', owner:'' },
    { id:'C', effortDays:2, teamSize:1, dependencies:['B'], active:true, status:'not_started', owner:'' },
  ];
  const sched = SCHED.backwardSchedule(acts, '2026-04-10', cal);

  // C is leaf → ends Apr 10, starts = sub 2 wd = Apr 8
  assert('C end',   sched['C'].plannedEnd,   '2026-04-10');
  assert('C start', sched['C'].plannedStart, '2026-04-08');
  // B ends 1 wd before C start = Apr 7, starts = sub 3 wd (skips Good Fri) = Apr 1
  assert('B end',   sched['B'].plannedEnd,   '2026-04-07');
  assert('B start', sched['B'].plannedStart, '2026-04-01');
  // A ends 1 wd before B start = Mar 31, starts = sub 5 wd = Mar 24
  assert('A end',   sched['A'].plannedEnd,   '2026-03-31');
  assert('A start', sched['A'].plannedStart, '2026-03-24');

  // ── backwardSchedule — parallel activities ──
  // X → Z, Y → Z (X and Y are independent, Z depends on both)
  const acts2 = [
    { id:'X', effortDays:3, teamSize:1, dependencies:[], active:true, status:'not_started', owner:'' },
    { id:'Y', effortDays:5, teamSize:1, dependencies:[], active:true, status:'not_started', owner:'' },
    { id:'Z', effortDays:2, teamSize:1, dependencies:['X','Y'], active:true, status:'not_started', owner:'' },
  ];
  const sched2 = SCHED.backwardSchedule(acts2, '2026-04-10', cal);
  // Z: leaf, ends Apr 10, starts Apr 8
  assert('Z end', sched2['Z'].plannedEnd, '2026-04-10');
  // X and Y both end 1 wd before Z start (Apr 7)
  assert('X end', sched2['X'].plannedEnd, '2026-04-07');
  assert('Y end', sched2['Y'].plannedEnd, '2026-04-07');
  // Y takes 5 days, starts earlier than X (3 days)
  assert('Y start < X start', sched2['Y'].plannedStart < sched2['X'].plannedStart, true);

  // ── backwardSchedule — deactivated activities skipped ──
  const acts3 = [
    { id:'P', effortDays:3, teamSize:1, dependencies:[], active:true, status:'not_started', owner:'' },
    { id:'Q', effortDays:5, teamSize:1, dependencies:['P'], active:false, status:'deactivated', owner:'' },
    { id:'R', effortDays:2, teamSize:1, dependencies:['P'], active:true, status:'not_started', owner:'' },
  ];
  const sched3 = SCHED.backwardSchedule(acts3, '2026-04-10', cal);
  assert('deactivated Q not scheduled', sched3['Q'], undefined);
  assert('R scheduled', !!sched3['R'], true);

  // ── calculateBuffer ──
  const bufActs = {
    a: { plannedEnd: '2026-04-01' },
    b: { plannedStart: '2026-04-07' },
  };
  const buf = SCHED.calculateBuffer(bufActs.a, bufActs.b, cal);
  assert('buffer days', buf.days, 3); // Apr 2,3(holiday skip),6 → 2,6,7 wait — actually count from Apr 1 to Apr 7
  // Let me recalculate: countWorkingDays('2026-04-01','2026-04-07',cal) = Apr 2(Th),Apr 3(holiday-skip),Apr 6(Mon)= wait
  // Apr 1 is Wed, Apr 2 Thu, Apr 3 Fri(holiday), Apr 4 Sat, Apr 5 Sun, Apr 6 Mon, Apr 7 Tue
  // Working days after Apr 1 up to Apr 7: Apr 2, Apr 6, Apr 7 = 3
  // Hmm wait: count goes current < endDate, so Apr 2,3(skip),4(skip),5(skip),6,7 → 3 working days
  assert('buffer status', buf.status, 'compressed'); // 3 < 5

  const bufCrit = SCHED.calculateBuffer(
    { plannedEnd: '2026-04-07' },
    { plannedStart: '2026-04-07' },
    cal
  );
  assert('buffer critical', bufCrit.days, 0);
  assert('buffer critical status', bufCrit.status, 'critical');

  // ── Feasibility check tests ──

  // Feasible scenario: plenty of buffer
  const fBid = { ittIssueDate: '2026-01-05', submissionDeadline: '2026-06-30', bidManager: 'Jane' };
  const fActs = [
    { id:'A', effortDays:5, teamSize:1, dependencies:[], active:true, status:'not_started', owner:'Jane', workstreamId:'X', name:'A', parallelisationType:'P' },
    { id:'B', effortDays:3, teamSize:1, dependencies:['A'], active:true, status:'not_started', owner:'Jane', workstreamId:'X', name:'B', parallelisationType:'S' },
  ];
  const fRes = SCHED.runFeasibilityCheck(fBid, fActs, cal);
  assert('feasibility: feasible verdict', fRes.verdict, 'feasible');
  assert('feasibility: has critical path', fRes.criticalPath.length > 0, true);
  assert('feasibility: buffer > 0', fRes.criticalPathBuffer > 0, true);
  assert('feasibility: no recs for feasible', SCHED.generateRecommendations(fRes, fActs).length, 0);

  // Infeasible scenario: too much work for too little time
  const iBid = { ittIssueDate: '2026-04-06', submissionDeadline: '2026-04-10', bidManager: 'Jane' };
  const iActs = [
    { id:'X', effortDays:20, teamSize:1, dependencies:[], active:true, status:'not_started', owner:'', workstreamId:'W', name:'Big task', parallelisationType:'P' },
    { id:'Y', effortDays:10, teamSize:1, dependencies:['X'], active:true, status:'not_started', owner:'', workstreamId:'W', name:'Follow-up', parallelisationType:'S' },
  ];
  const iRes = SCHED.runFeasibilityCheck(iBid, iActs, cal);
  assert('infeasible: verdict', iRes.verdict, 'infeasible');
  assert('infeasible: deficit > 0', iRes.deficit > 0, true);
  const iRecs = SCHED.generateRecommendations(iRes, iActs);
  assert('infeasible: has recs', iRecs.length > 0, true);
  // Should include negotiate_timeline for deficit > 10
  assert('infeasible: negotiate rec', iRecs.some(r => r.type === 'negotiate_timeline'), true);

  // Tight scenario
  const tBid = { ittIssueDate: '2026-04-01', submissionDeadline: '2026-04-10', bidManager: 'Jane' };
  const tActs = [
    { id:'T1', effortDays:5, teamSize:1, dependencies:[], active:true, status:'not_started', owner:'', workstreamId:'W', name:'Task', parallelisationType:'P' },
  ];
  const tRes = SCHED.runFeasibilityCheck(tBid, tActs, cal);
  // Available days from Apr 1 to Apr 10 = 6 (Apr 2,6,7,8,9,10) minus holiday = depends on cal
  // Critical path = 5 days. Buffer = available - 5.
  // If buffer < 3 → tight. Let's check.
  assert('tight: verdict is tight or feasible', ['tight','feasible'].includes(tRes.verdict), true);

  // Critical path finder
  const cpActs = [
    { id:'P', effortDays:10, teamSize:1, dependencies:[], active:true, status:'not_started' },
    { id:'Q', effortDays:20, teamSize:1, dependencies:['P'], active:true, status:'not_started' },
    { id:'R', effortDays:5,  teamSize:1, dependencies:[], active:true, status:'not_started' },
  ];
  const cpSch = SCHED.backwardSchedule(cpActs, '2026-06-30', cal);
  const cp = SCHED.findCriticalPath(cpActs, cpSch);
  assert('critical path: P→Q is longest', cp.map(a=>a.id).join('→'), 'P→Q');

  console.log(`SCHED_TEST: ${pass} passed, ${fail} failed`);
  return { pass, fail };
}


/* ════════════════════════════════════════════════════════════
   SESSION 5 TESTS — run via console: S5_TEST()
════════════════════════════════════════════════════════════ */
function S5_TEST() {
  let pass = 0, fail = 0;
  function assert(label, actual, expected) {
    if (actual === expected) { pass++; }
    else { fail++; console.error(`FAIL: ${label} — expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`); }
  }

  // ── TRANSITIONS: Activity Status (Rule 2.1) ──

  // Valid transitions
  assert('ns→ip valid', TRANSITIONS.canTransition('not_started','in_progress', TRANSITIONS._actValid), true);
  assert('ns→deact valid', TRANSITIONS.canTransition('not_started','deactivated', TRANSITIONS._actValid), true);
  assert('ip→dc valid', TRANSITIONS.canTransition('in_progress','draft_complete', TRANSITIONS._actValid), true);
  assert('ip→ns valid', TRANSITIONS.canTransition('in_progress','not_started', TRANSITIONS._actValid), true);
  assert('dc→fn valid', TRANSITIONS.canTransition('draft_complete','final', TRANSITIONS._actValid), true);
  assert('dc→ip valid', TRANSITIONS.canTransition('draft_complete','in_progress', TRANSITIONS._actValid), true);
  assert('fn→dc valid', TRANSITIONS.canTransition('final','draft_complete', TRANSITIONS._actValid), true);
  assert('deact→ns valid', TRANSITIONS.canTransition('deactivated','not_started', TRANSITIONS._actValid), true);

  // Invalid transitions
  assert('ns→fn invalid', TRANSITIONS.canTransition('not_started','final', TRANSITIONS._actValid), false);
  assert('ns→dc invalid', TRANSITIONS.canTransition('not_started','draft_complete', TRANSITIONS._actValid), false);
  assert('deact→ip invalid', TRANSITIONS.canTransition('deactivated','in_progress', TRANSITIONS._actValid), false);
  assert('fn→ns invalid', TRANSITIONS.canTransition('final','not_started', TRANSITIONS._actValid), false);

  // changeActivityStatus side effects
  const act1 = { id:'T1', status:'not_started', active:true, lastUpdated:null, actualStart:null, actualEnd:null };
  const r1 = TRANSITIONS.changeActivityStatus(act1, 'in_progress');
  assert('change ns→ip ok', r1.ok, true);
  assert('status is ip', act1.status, 'in_progress');
  assert('actualStart set', !!act1.actualStart, true);

  const act2 = { id:'T2', status:'in_progress', active:true, lastUpdated:null, actualStart:'2026-01-01', actualEnd:null };
  TRANSITIONS.changeActivityStatus(act2, 'draft_complete');
  TRANSITIONS.changeActivityStatus(act2, 'final');
  assert('status is final', act2.status, 'final');
  assert('actualEnd set', !!act2.actualEnd, true);

  // Invalid change rejected
  const act3 = { id:'T3', status:'not_started', active:true };
  const r3 = TRANSITIONS.changeActivityStatus(act3, 'final');
  assert('invalid change rejected', r3.ok, false);
  assert('status unchanged', act3.status, 'not_started');

  // Deactivation side effect
  const act4 = { id:'T4', status:'not_started', active:true };
  TRANSITIONS.changeActivityStatus(act4, 'deactivated');
  assert('deactivated: active=false', act4.active, false);

  // Reactivation side effect
  TRANSITIONS.changeActivityStatus(act4, 'not_started');
  assert('reactivated: active=true', act4.active, true);

  // ── TRANSITIONS: Assurance (Rule 2.2) ──
  assert('unassured→under_review', TRANSITIONS.canTransition('unassured','under_review', TRANSITIONS._assValid), true);
  assert('under_review→assured', TRANSITIONS.canTransition('under_review','assured', TRANSITIONS._assValid), true);
  assert('unassured→assured invalid', TRANSITIONS.canTransition('unassured','assured', TRANSITIONS._assValid), false);

  // ── TRANSITIONS: Coverage auto-update (Rule 2.5) ──
  const req1 = { coverageStatus: 'mapped' };
  TRANSITIONS.autoUpdateCoverage(req1, { status: 'in_progress', assurance: 'none' });
  assert('coverage auto: mapped→dip', req1.coverageStatus, 'draft_in_progress');

  const req2 = { coverageStatus: 'draft_in_progress' };
  TRANSITIONS.autoUpdateCoverage(req2, { status: 'final', assurance: 'under_review' });
  assert('coverage auto: dip→reviewed', req2.coverageStatus, 'reviewed');

  const req3 = { coverageStatus: 'reviewed' };
  TRANSITIONS.autoUpdateCoverage(req3, { status: 'final', assurance: 'assured' });
  assert('coverage auto: reviewed→approved', req3.coverageStatus, 'approved');

  // ── COMPLIANCE: Coverage calculations (Rule 6.1) ──

  // Empty
  const cov0 = COMPLIANCE.calculateCoverage([]);
  assert('empty: mandatory 100', cov0.mandatoryCoverage, 100);
  assert('empty: gaps 0', cov0.totalGaps, 0);

  // Mixed requirements
  const reqs = [
    { classification: 'mandatory', coverageStatus: 'approved' },
    { classification: 'mandatory', coverageStatus: 'gap' },
    { classification: 'mandatory', coverageStatus: 'approved' },
    { classification: 'scored',    coverageStatus: 'reviewed' },
    { classification: 'scored',    coverageStatus: 'unmapped' },
    { classification: 'scored',    coverageStatus: 'approved' },
  ];
  const cov1 = COMPLIANCE.calculateCoverage(reqs);
  assert('mandatory coverage', cov1.mandatoryCoverage, 66.7); // 2/3
  assert('mandatory gaps', cov1.mandatoryGaps, 1);
  assert('scored coverage', cov1.scoredCoverage, 66.7); // 2/3 (reviewed + approved)
  assert('total gaps', cov1.totalGaps, 2); // 1 gap + 1 unmapped
  assert('overall coverage', cov1.overallCoverage, 66.7); // 4/6

  // All approved
  const cov2 = COMPLIANCE.calculateCoverage([
    { classification: 'mandatory', coverageStatus: 'approved' },
    { classification: 'scored', coverageStatus: 'approved' },
  ]);
  assert('all approved: mandatory 100', cov2.mandatoryCoverage, 100);
  assert('all approved: gaps 0', cov2.totalGaps, 0);

  // ── NUDGE: Smart nudging ──
  const staleAct = {
    id:'STL-01', status:'in_progress', active:true, name:'Stale task',
    workstreamId:'SAL', lastUpdated: new Date(Date.now() - 5*86400000).toISOString(),
    dependencies:[], plannedEnd:null,
  };
  const nudgeBid = {
    activities: [staleAct],
    workstreams: [{ id:'SAL', phase:'DEV' }],
  };

/* ════════════════════════════════════════════════════════════

function S9_TEST() {
  let pass = 0, fail = 0;
  function assert(label, actual, expected) {
    if (actual === expected) { pass++; }
    else { fail++; console.error(`  FAIL [${label}]: got ${JSON.stringify(actual)}, expected ${JSON.stringify(expected)}`); }
  }

  // ── Default QA checklist ──
  const qa = _defaultQAChecklist();
  assert('qa: 10 items', qa.length, 10);
  assert('qa: all start undone', qa.every(q => !q.done), true);

  // ── Default approvals ──
  const appr = _defaultApprovals();
  assert('approvals: 4 items', appr.length, 4);
  assert('approvals: all pending', appr.every(a => a.status === 'pending'), true);
  assert('approvals: pricing first', appr[0].label, 'Pricing sign-off');

  // ── Submission blockers: empty bid ──
  const emptyBid = {
    artefacts: [],
    qaChecklist: _defaultQAChecklist(),
    approvals: _defaultApprovals(),
    governanceGates: [],
    requirements: [],
    reviewCycles: [],
  };
  let blockers = _submissionBlockers(emptyBid, [], emptyBid.qaChecklist, emptyBid.approvals);
  // QA incomplete (10) + approvals not approved (4)
  assert('blockers: empty bid has QA + approval blockers', blockers.length >= 2, true);

  // ── Submission blockers: all clear ──
  const clearBid = {
    artefacts: [{ status: 'final' }, { status: 'uploaded' }],
    qaChecklist: _defaultQAChecklist().map(q => ({ ...q, done: true })),
    approvals: _defaultApprovals().map(a => ({ ...a, status: 'approved' })),
    governanceGates: [],
    requirements: [],
    reviewCycles: [],
  };
  blockers = _submissionBlockers(clearBid, clearBid.artefacts, clearBid.qaChecklist, clearBid.approvals);
  assert('blockers: all clear = 0 blockers', blockers.length, 0);

  // ── Blocker: artefact not ready ──
  const artBid = {
    artefacts: [{ status: 'draft' }],
    qaChecklist: _defaultQAChecklist().map(q => ({ ...q, done: true })),
    approvals: _defaultApprovals().map(a => ({ ...a, status: 'approved' })),
    governanceGates: [], requirements: [], reviewCycles: [],
  };
  blockers = _submissionBlockers(artBid, artBid.artefacts, artBid.qaChecklist, artBid.approvals);
  assert('blocker: draft artefact', blockers.some(b => b.includes('artefact')), true);

  // ── Blocker: QA incomplete ──
  const qaBid = {
    artefacts: [{ status: 'final' }],
    qaChecklist: [{ label: 'test', done: false }],
    approvals: _defaultApprovals().map(a => ({ ...a, status: 'approved' })),
    governanceGates: [], requirements: [], reviewCycles: [],
  };
  blockers = _submissionBlockers(qaBid, qaBid.artefacts, qaBid.qaChecklist, qaBid.approvals);
  assert('blocker: QA incomplete', blockers.some(b => b.includes('QA')), true);

  // ── Blocker: approval rejected ──
  const rejBid = {
    artefacts: [{ status: 'final' }],
    qaChecklist: _defaultQAChecklist().map(q => ({ ...q, done: true })),
    approvals: [{ label: 'test', status: 'rejected', approver: '', date: null }],
    governanceGates: [], requirements: [], reviewCycles: [],
  };
  blockers = _submissionBlockers(rejBid, rejBid.artefacts, rejBid.qaChecklist, rejBid.approvals);
  assert('blocker: rejected approval (not approved)', blockers.some(b => b.includes('not yet approved')), true);
  assert('blocker: rejected approval (rework)', blockers.some(b => b.includes('rejected')), true);

  // ── Blocker: mandatory gap ──
  const gapBid = {
    artefacts: [{ status: 'final' }],
    qaChecklist: _defaultQAChecklist().map(q => ({ ...q, done: true })),
    approvals: _defaultApprovals().map(a => ({ ...a, status: 'approved' })),
    governanceGates: [],
    requirements: [{ classification: 'mandatory', coverageStatus: 'gap' }],
    reviewCycles: [],
  };
  blockers = _submissionBlockers(gapBid, gapBid.artefacts, gapBid.qaChecklist, gapBid.approvals);
  assert('blocker: mandatory gap', blockers.some(b => b.includes('mandatory')), true);

  // ── Blocker: critical open action ──
  const critBid = {
    artefacts: [{ status: 'final' }],
    qaChecklist: _defaultQAChecklist().map(q => ({ ...q, done: true })),
    approvals: _defaultApprovals().map(a => ({ ...a, status: 'approved' })),
    governanceGates: [], requirements: [],
    reviewCycles: [{ id: 'rc1', actions: [{ severity: 'critical', status: 'open' }] }],
  };
  blockers = _submissionBlockers(critBid, critBid.artefacts, critBid.qaChecklist, critBid.approvals);
  assert('blocker: critical open action', blockers.some(b => b.includes('critical')), true);

  // ── Blocker: GOV-05 not passed ──
  const govBid = {
    artefacts: [{ status: 'final' }],
    qaChecklist: _defaultQAChecklist().map(q => ({ ...q, done: true })),
    approvals: _defaultApprovals().map(a => ({ ...a, status: 'approved' })),
    governanceGates: [{ id: 'g1', templateId: 'G5', name: 'Final Submission Authority', status: 'upcoming' }],
    requirements: [], reviewCycles: [],
  };
  blockers = _submissionBlockers(govBid, govBid.artefacts, govBid.qaChecklist, govBid.approvals);
  assert('blocker: GOV-05 not passed', blockers.some(b => b.includes('submission authority')), true);

  // ── GOV-05 passed = no gate blocker ──
  govBid.governanceGates[0].status = 'passed';
  blockers = _submissionBlockers(govBid, govBid.artefacts, govBid.qaChecklist, govBid.approvals);
  assert('no blocker: GOV-05 passed', blockers.some(b => b.includes('submission authority')), false);

  // ── QA toggle ──
  const qaList = _defaultQAChecklist();
  qaList[0].done = true;
  assert('qa toggle: first done', qaList[0].done, true);
  assert('qa toggle: second still false', qaList[1].done, false);

  // ── Approval date auto-set ──
  const testAppr = { label: 'Test', approver: 'Bob', status: 'pending', date: null };
  testAppr.status = 'approved';
  testAppr.date = new Date().toISOString().slice(0, 10);
  assert('approval: date set on approved', typeof testAppr.date, 'string');
  assert('approval: date format', testAppr.date.length, 10);

  // ── Artefact status transitions ──
  const statuses = ['not_started', 'draft', 'final', 'uploaded', 'confirmed'];
  assert('artefact: 5 statuses', statuses.length, 5);
  assert('artefact: final is ready', ['final','uploaded','confirmed'].includes('final'), true);
  assert('artefact: draft not ready', ['final','uploaded','confirmed'].includes('draft'), false);

  // ── Multiple blockers combined ──
  const multiBid = {
    artefacts: [{ status: 'draft' }],
    qaChecklist: [{ label: 'test', done: false }],
    approvals: [{ label: 'test', status: 'pending', approver: '', date: null }],

  blockers = _submissionBlockers(multiBid, multiBid.artefacts, multiBid.qaChecklist, multiBid.approvals);
  assert('multi-blocker: at least 5', blockers.length >= 5, true);

  console.log(`S9_TEST: ${pass} passed, ${fail} failed`);
  return { pass, fail };
}


/* ════════════════════════════════════════════════════════════
   TEAM MANAGER (M10) — Data Initialisation
════════════════════════════════════════════════════════════ */
function _ensureTeamData(bid) {
  if (!bid.teamMembers) bid.teamMembers = [];
  if (!bid.rateCard) bid.rateCard = _defaultRateCard();
  if (!bid.stakeholders) bid.stakeholders = [];
  if (!bid.unavailability) {
    // Migrate from calendar.teamUnavailability if present
    bid.unavailability = ((bid.calendar && bid.calendar.teamUnavailability) || []).map(u => ({
      id: STORE.uuid(), name: u.name || '', from: u.from || '', to: u.to || '', notes: u.notes || ''
    }));
  }
  // Seed core roles into teamMembers if not already present
  const coreMap = [
    ['bid_manager', bid.bidManager, 'Bid Manager'],
    ['solution_lead', bid.solutionLead, 'Solution Lead'],
    ['commercial_lead', bid.commercialLead, 'Commercial Lead'],
    ['delivery_lead', bid.deliveryLead, 'Delivery Lead'],
    ['legal_lead', bid.legalLead, 'Legal Lead'],
    ['supply_chain_lead', bid.supplyChainLead, 'Supply Chain Lead'],
  ];
  coreMap.forEach(([coreRole, name, roleLabel]) => {
    if (!name) return;
    const exists = bid.teamMembers.some(m => m.coreRole === coreRole && m.isActive !== false);
    if (!exists) {
      const byName = bid.teamMembers.find(m => m.name === name && m.isActive !== false);
      if (byName) { byName.coreRole = coreRole; if (!byName.role) byName.role = roleLabel; }
      else bid.teamMembers.push({ id: STORE.uuid(), name, role: roleLabel, coreRole, organisation: '', email: '', phone: '', clearance: '', clearanceStatus: '', isContractor: false, individualDayRate: null, reportsTo: null, workstreams: '', startDate: '', endDate: '', isActive: true });
    }
  });
  // Ensure existing members have required fields
  bid.teamMembers.forEach(m => {
    if (m.isActive === undefined) m.isActive = true;
    if (!m.id) m.id = STORE.uuid();
    if (m.coreRole === undefined) m.coreRole = null;
    if (m.reportsTo === undefined) m.reportsTo = null;
    if (m.isContractor === undefined) m.isContractor = false;
    if (m.individualDayRate === undefined) m.individualDayRate = null;
    if (m.organisation === undefined) m.organisation = '';
    if (m.email === undefined) m.email = '';
    if (m.phone === undefined) m.phone = '';
    if (m.clearanceStatus === undefined) m.clearanceStatus = '';
    if (m.startDate === undefined) m.startDate = '';
    if (m.endDate === undefined) m.endDate = '';
  });
}

/* ════════════════════════════════════════════════════════════
   TEAM MANAGER (M10) — Business Logic (Rule Set 11)
════════════════════════════════════════════════════════════ */
const TEAM = {
  // 11.2 Build org tree
  buildOrgTree(bid) {
    const members = bid.teamMembers.filter(m => m.isActive !== false);
    const bm = members.find(m => m.coreRole === 'bid_manager') || members[0];
    if (!bm) return null;
    const root = { member: bm, children: [] };
    const coreLeads = members.filter(m => m.coreRole && m.coreRole !== 'bid_manager' && m.id !== bm.id);
    coreLeads.forEach(lead => {
      const reports = members.filter(m => m.reportsTo === lead.id);
      root.children.push({ member: lead, children: reports.map(r => ({ member: r, children: [] })) });
    });
    const assigned = new Set([bm.id, ...coreLeads.map(l => l.id), ...members.filter(m => m.reportsTo).map(m => m.id)]);
    const unassigned = members.filter(m => !assigned.has(m.id));
    unassigned.forEach(u => root.children.push({ member: u, children: [] }));
    return root;
  },

  // 11.3 Rate resolution
  resolveRate(member, rateCard) {
    if (member.individualDayRate !== null && member.individualDayRate > 0) return member.individualDayRate;
    const std = (rateCard || []).find(r => r.roleName && member.role && r.roleName.toLowerCase().trim() === member.role.toLowerCase().trim());
    if (std) return std.standardDayRate;
    return null;
  },

  findStandardRate(role, rateCard) {
    if (!role) return null;
    const std = (rateCard || []).find(r => r.roleName && r.roleName.toLowerCase().trim() === role.toLowerCase().trim());
    return std ? std.standardDayRate : null;
  },

  // 11.4 Spend forecast
  calculateSpendForecast(bid) {
    const activities = (bid.activities || []).filter(a => a.status !== 'deactivated' && a.active !== false);
    const members = bid.teamMembers.filter(m => m.isActive !== false);
    const rateCard = bid.rateCard || [];
    const forecast = { byPerson: {}, byWorkstream: {}, total: 0, totalAtStandard: 0, totalEffort: 0, uncosted: [] };

    activities.forEach(act => {
      const member = members.find(m => m.name === act.owner);
      if (!member) { forecast.uncosted.push({ activity: act, reason: 'no_owner' }); forecast.totalEffort += (act.effortDays || 0); return; }
      const rate = this.resolveRate(member, rateCard);
      if (rate === null) { forecast.uncosted.push({ activity: act, reason: 'no_rate', member }); forecast.totalEffort += (act.effortDays || 0); return; }
      const effort = act.effortDays || 0;
      const cost = effort * rate;
      const stdRate = this.findStandardRate(member.role, rateCard) || rate;
      const costAtStd = effort * stdRate;

      if (!forecast.byPerson[member.id]) forecast.byPerson[member.id] = { member, effort: 0, cost: 0, costAtStandard: 0 };
      forecast.byPerson[member.id].effort += effort;
      forecast.byPerson[member.id].cost += cost;
      forecast.byPerson[member.id].costAtStandard += costAtStd;

      const ws = act.workstreamId || 'unknown';
      if (!forecast.byWorkstream[ws]) forecast.byWorkstream[ws] = { effort: 0, cost: 0 };
      forecast.byWorkstream[ws].effort += effort;
      forecast.byWorkstream[ws].cost += cost;

      forecast.total += cost;
      forecast.totalAtStandard += costAtStd;
      forecast.totalEffort += effort;
    });

    forecast.contractorPremium = forecast.total - forecast.totalAtStandard;
    return forecast;
  },

  // 11.6 Unavailability impact
  checkUnavailabilityImpact(entry, bid) {
    const member = bid.teamMembers.find(m => m.name === entry.name && m.isActive !== false);
    if (!member) return [];
    const activities = (bid.activities || []).filter(a =>
      a.owner === member.name && a.active !== false && !['final','deactivated'].includes(a.status)
    );
    const impacts = [];
    activities.forEach(act => {
      const overlap = _dateOverlapDays(entry.from, entry.to, act.plannedStart, act.plannedEnd);
      if (overlap > 0) {
        impacts.push({ activity: act, member, overlapDays: overlap, severity: overlap >= 3 ? 'high' : overlap >= 1 ? 'medium' : 'low' });
      }
    });
    return impacts;
  },

  // 11.7 Rate variance
  rateVarianceLevel(individualRate, standardRate) {
    if (!standardRate || standardRate === 0) return 'no_benchmark';
    const variance = (individualRate - standardRate) / standardRate;
    if (variance > 0.50) return 'red';
    if (variance > 0.20) return 'amber';
    return 'green';
  }
};

function _dateOverlapDays(fromA, toA, fromB, toB) {
  if (!fromA || !toA || !fromB || !toB) return 0;
  const a0 = new Date(fromA), a1 = new Date(toA), b0 = new Date(fromB), b1 = new Date(toB);
  const start = a0 > b0 ? a0 : b0;
  const end = a1 < b1 ? a1 : b1;
  if (start > end) return 0;
  return Math.max(0, Math.round((end - start) / 86400000) + 1);
}

function _renderOrgNode(node, depth) {
  const m = node.member;
  const clrCls = m.clearance ? (m.clearanceStatus === 'held' ? 'fe-g' : m.clearanceStatus === 'in_progress' ? 'fe-a' : 'fe-mute') : '';
  const contractorCls = m.isContractor ? ' contractor' : '';
  let html = `<div class="tm-org-node${contractorCls}" onclick="handleEditTeamMember('${m.id}')">
    <div class="tm-org-name">${h(m.name)}</div>
    <div class="tm-org-role">${h(m.role || m.coreRole || '')}</div>
    <div class="tm-org-badges">
      ${m.coreRole ? `<span class="fe fe-gl">${h(m.coreRole.replace(/_/g,' '))}</span>` : ''}
      ${m.clearance ? `<span class="fe ${clrCls}">${h(m.clearance)}</span>` : ''}
      ${m.isContractor ? '<span class="fe fe-c">contractor</span>' : ''}
    </div>
  </div>`;
  if (node.children.length > 0) {
    const levelCls = depth === 0 ? 'tm-org-level' : 'tm-org-level2';
    html += `<div class="${levelCls}">${node.children.map(c => _renderOrgNode(c, depth + 1)).join('')}</div>`;
  }
  return html;
}


/* ── Tab 2: Unavailability ─────────────────────────────── */
function _renderTeamUnavailability(bid) {
  const entries = bid.unavailability || [];
  const members = bid.teamMembers.filter(m => m.isActive !== false);

  // Impact warnings
  let impactHtml = '';
  entries.forEach(entry => {
    const impacts = TEAM.checkUnavailabilityImpact(entry, bid);
    impacts.forEach(imp => {
      impactHtml += `<div class="tm-impact">⚠ ${h(imp.member.name)} unavailable ${h(entry.from)} – ${h(entry.to)} — ${imp.overlapDays} day${imp.overlapDays>1?'s':''} overlap with ${h(imp.activity.code || imp.activity.id)} (${imp.severity})</div>`;
    });
  });

  // Gantt view
  let ganttHtml = '';
  if (entries.length > 0 && bid.submissionDeadline) {
    const bidStart = bid.ittIssueDate || bid.createdAt.slice(0,10);
    const bidEnd = bid.submissionDeadline;
    const totalDays = Math.max(1, Math.round((new Date(bidEnd) - new Date(bidStart)) / 86400000));
    const today = new Date().toISOString().slice(0,10);
    const todayPct = Math.max(0, Math.min(100, ((new Date(today) - new Date(bidStart)) / (new Date(bidEnd) - new Date(bidStart))) * 100));

    const uniqueNames = [...new Set(entries.map(e => e.name))].sort();
    ganttHtml = `<div class="tm-section">
      <div class="tm-section-title">Timeline</div>
      <div class="tm-gantt">${uniqueNames.map(name => {
        const personEntries = entries.filter(e => e.name === name);
        const blocks = personEntries.map(e => {
          const startPct = Math.max(0, ((new Date(e.from) - new Date(bidStart)) / (new Date(bidEnd) - new Date(bidStart))) * 100);
          const endPct = Math.min(100, ((new Date(e.to) - new Date(bidStart)) / (new Date(bidEnd) - new Date(bidStart))) * 100);
          const width = Math.max(1, endPct - startPct);
          return `<div class="tm-gantt-block" style="left:${startPct}%;width:${width}%;" title="${h(name)}: ${h(e.from)} – ${h(e.to)}${e.notes ? ' — ' + h(e.notes) : ''}"></div>`;
        }).join('');
        return `<div class="tm-gantt-row">
          <div class="tm-gantt-name">${h(name)}</div>
          <div class="tm-gantt-track">${blocks}<div class="tm-gantt-today" style="left:${todayPct}%;" title="Today"></div></div>
        </div>`;
      }).join('')}</div>
    </div>`;
  }

  // List view
  const listRows = entries.map((e, i) => {
    const dur = e.from && e.to ? Math.max(1, Math.round((new Date(e.to) - new Date(e.from)) / 86400000) + 1) : '—';
    return `<div class="tm-row tm-row-unavail">
      <div class="tm-cell name">${h(e.name)}</div>
      <div class="tm-cell mono">${h(e.from)}</div>
      <div class="tm-cell mono">${h(e.to)}</div>
      <div class="tm-cell mono">${dur}</div>
      <div class="tm-cell">${h(e.notes)}</div>
      <div class="tm-cell"><button class="btn btn-sm btn-danger" onclick="handleRemoveUnavailability(${i})">×</button></div>
    </div>`;
  }).join('');

  return `
    ${impactHtml}
    ${ganttHtml}
    <div class="tm-section">
      <div class="tm-section-title">Unavailability Register
        <div style="display:flex;gap:6px;">
          <button class="btn btn-sm" onclick="handleAddUnavailability()">+ Add</button>
          <button class="btn btn-sm" onclick="handleBulkUnavailability()">+ Bulk Add</button>
          <button class="btn btn-sm" onclick="handleUnavailCsvImport()">CSV Import</button>
          <button class="btn btn-sm" onclick="handleUnavailCsvExport()">CSV Export</button>
        </div>
      </div>
      <div class="tm-row tm-row-unavail tm-hdr">
        <div>Name</div><div>From</div><div>To</div><div>Days</div><div>Notes</div><div></div>
      </div>
      ${listRows || '<div class="tm-empty">No unavailability entries.</div>'}
    </div>`;
}


/* ── Tab 3: Rate Card ──────────────────────────────────── */
function _renderTeamRateCard(bid) {
  const rateCard = bid.rateCard || [];
  const members = bid.teamMembers.filter(m => m.isActive !== false);

  // Standard rate card table
  const stdRows = rateCard.map((r, i) => `<div class="tm-row" style="grid-template-columns:1fr 100px 40px;">
    <div class="tm-cell name">${h(r.roleName)}</div>
    <div class="tm-cell mono right">${fmtGBP(r.standardDayRate)}</div>
    <div class="tm-cell"><button class="btn btn-sm btn-danger" onclick="handleRemoveRateCardEntry(${i})">×</button></div>
  </div>`).join('');

  // Individual rate comparison
  const compRows = members.map(m => {
    const rate = TEAM.resolveRate(m, rateCard);
    const stdRate = TEAM.findStandardRate(m.role, rateCard);
    const variance = (rate !== null && stdRate !== null && stdRate > 0) ? Math.round(((rate - stdRate) / stdRate) * 100) : null;
    const varLevel = (rate !== null && stdRate !== null) ? TEAM.rateVarianceLevel(rate, stdRate) : 'no_benchmark';
    const varCls = varLevel === 'red' ? 'fe-r' : varLevel === 'amber' ? 'fe-a' : varLevel === 'green' ? 'fe-g' : 'fe-mute';
    return `<div class="tm-row tm-row-rate">
      <div class="tm-cell name">${h(m.name)}</div>
      <div class="tm-cell">${h(m.role)}</div>
      <div class="tm-cell">${h(m.organisation)}</div>
      <div class="tm-cell">${m.isContractor ? '<span class="fe fe-c">Y</span>' : 'N'}</div>
      <div class="tm-cell mono right">${m.individualDayRate ? fmtGBP(m.individualDayRate) : '<span style="color:var(--t4);">—</span>'}</div>
      <div class="tm-cell mono right">${stdRate !== null ? fmtGBP(stdRate) : '—'}</div>
      <div class="tm-cell mono right">${variance !== null ? `<span class="fe ${varCls}">${variance > 0 ? '+' : ''}${variance}%</span>` : '—'}</div>
      <div class="tm-cell mono right">${rate !== null ? fmtGBP(rate) : '<span class="fe fe-r">not set</span>'}</div>

  return `

      <div class="tm-section-title">Individual Rate Comparison</div>
      <div class="tm-row tm-row-rate tm-hdr">
        <div>Name</div><div>Role</div><div>Org</div><div>Contr.</div><div>Individual</div><div>Standard</div><div>Variance</div><div>Effective</div>
      </div>

/* ── Tab 5: Spend Forecast ─────────────────────────────── */
function _renderTeamSpend(bid) {
  const forecast = TEAM.calculateSpendForecast(bid);
  const byPerson = Object.values(forecast.byPerson).sort((a, b) => b.cost - a.cost);
  const byWorkstream = Object.entries(forecast.byWorkstream).sort((a, b) => b[1].cost - a[1].cost);
  const maxPersonCost = byPerson.length ? byPerson[0].cost : 1;
  const maxWsCost = byWorkstream.length ? byWorkstream[0][1].cost : 1;

  const spendMetrics = `<div class="tm-metrics">
    <div class="tm-metric"><div class="tm-val gold">${fmtGBP(forecast.total)}</div><div class="tm-lbl">Forecast Spend</div></div>
    <div class="tm-metric"><div class="tm-val ok">${fmtGBP(forecast.totalAtStandard)}</div><div class="tm-lbl">At Standard Rates</div></div>
    <div class="tm-metric"><div class="tm-val ${forecast.contractorPremium > 0 ? 'warn' : ''}">${fmtGBP(Math.abs(forecast.contractorPremium))}</div><div class="tm-lbl">Contractor Premium</div></div>
    <div class="tm-metric"><div class="tm-val">${forecast.totalEffort}</div><div class="tm-lbl">Total Effort (days)</div></div>

  // Uncosted warnings
  const uncostHtml = forecast.uncosted.length ? `<div class="tm-section">
    <div class="tm-section-title" style="color:var(--amb);">⚠ Uncosted Activities (${forecast.uncosted.length})</div>

    ${forecast.uncosted.length > 10 ? `<div style="font-size:11px;color:var(--t3);">…and ${forecast.uncosted.length - 10} more</div>` : ''}
  </div>` : '';

  // Spend by person
  const personRows = byPerson.map(p => {
    const pct = forecast.total > 0 ? Math.round((p.cost / forecast.total) * 100) : 0;
    return `<div class="tm-row tm-row-spend">
      <div class="tm-cell name">${h(p.member.name)} ${p.member.isContractor ? '<span class="fe fe-c">contr.</span>' : ''}</div>
      <div class="tm-cell">${h(p.member.role)}</div>
      <div class="tm-cell mono right">${fmtGBP(TEAM.resolveRate(p.member, bid.rateCard))}</div>
      <div class="tm-cell mono right">${p.effort}</div>
      <div class="tm-cell mono right">${fmtGBP(p.cost)}</div>
      <div class="tm-cell mono right">${pct}%</div>
    </div>`;
  }).join('');

  // Spend by person bar chart
  const personChart = byPerson.length ? `<div class="tm-chart">
    <div class="tm-chart-title">Spend by Person</div>
    ${byPerson.map(p => {
      const widthPct = maxPersonCost > 0 ? Math.round((p.cost / maxPersonCost) * 100) : 0;
      const color = p.member.isContractor ? 'var(--cyn)' : 'var(--gold)';
      return `<div class="tm-chart-bar">
        <div class="tm-chart-label">${h(p.member.name)}</div>
        <div class="tm-bar" style="flex:1;"><div class="tm-bar-fill" style="width:${widthPct}%;background:${color};"></div></div>
        <div class="tm-chart-val">${fmtGBP(p.cost)}</div>
      </div>`;
    }).join('')}
  </div>` : '';

  // Spend by workstream
  const wsNames = {};
  (bid.workstreams || []).forEach(ws => wsNames[ws.id] = ws.name || ws.id);
  const wsChart = byWorkstream.length ? `<div class="tm-chart">
    <div class="tm-chart-title">Spend by Workstream</div>
    ${byWorkstream.map(([wsId, data]) => {
      const widthPct = maxWsCost > 0 ? Math.round((data.cost / maxWsCost) * 100) : 0;
      return `<div class="tm-chart-bar">
        <div class="tm-chart-label">${h(wsNames[wsId] || wsId)}</div>
        <div class="tm-bar" style="flex:1;"><div class="tm-bar-fill" style="width:${widthPct}%;background:var(--blu);"></div></div>
        <div class="tm-chart-val">${fmtGBP(data.cost)}</div>
      </div>`;
    }).join('')}
  </div>` : '';

  // Rate variance analysis
  const rateCard = bid.rateCard || [];
  const varianceRows = byPerson.map(p => {
    const rate = TEAM.resolveRate(p.member, rateCard);
    const stdRate = TEAM.findStandardRate(p.member.role, rateCard) || rate;
    const costAtStd = p.effort * (stdRate || 0);
    const variance = p.cost - costAtStd;
    const varLevel = rate && stdRate ? TEAM.rateVarianceLevel(rate, stdRate) : 'no_benchmark';
    const varCls = varLevel === 'red' ? 'fe-r' : varLevel === 'amber' ? 'fe-a' : varLevel === 'green' ? 'fe-g' : 'fe-mute';
    return `<div class="tm-row" style="grid-template-columns:1fr 80px 80px 60px 80px 80px 80px;">
      <div class="tm-cell name">${h(p.member.name)}</div>
      <div class="tm-cell mono right">${rate ? fmtGBP(rate) : '—'}</div>
      <div class="tm-cell mono right">${stdRate ? fmtGBP(stdRate) : '—'}</div>
      <div class="tm-cell mono right">${p.effort}</div>
      <div class="tm-cell mono right">${fmtGBP(p.cost)}</div>
      <div class="tm-cell mono right">${fmtGBP(costAtStd)}</div>
      <div class="tm-cell mono right"><span class="fe ${varCls}">${variance > 0 ? '+' : ''}${fmtGBP(Math.abs(variance))}</span></div>
    </div>`;
  }).join('');

  return `
    ${spendMetrics}
    ${uncostHtml}
    <div class="tm-section">
      <div class="tm-section-title">Spend by Person</div>
      <div class="tm-row tm-row-spend tm-hdr">
        <div>Name</div><div>Role</div><div>Day Rate</div><div>Effort</div><div>Cost</div><div>% Total</div>
      </div>
      ${personRows || '<div class="tm-empty">No costed activities yet.</div>'}
    </div>
    ${personChart}
    ${wsChart}
    <div class="tm-section">
      <div class="tm-section-title">Rate Variance Analysis</div>
      <div class="tm-row tm-hdr" style="grid-template-columns:1fr 80px 80px 60px 80px 80px 80px;">
        <div>Name</div><div>Actual Rate</div><div>Std Rate</div><div>Effort</div><div>Actual Cost</div><div>Std Cost</div><div>Variance</div>
      </div>
      ${varianceRows || '<div class="tm-empty">No data to show.</div>'}
    </div>`;
}

function _submitAddTeamMember() {
  const f = document.getElementById('tm-add-form');
  const name = f.querySelector('[name=name]').value.trim();
  const role = f.querySelector('[name=role]').value.trim();
  if (!name || !role) { alert('Name and role are required.'); return; }
  STORE.mutateBid(ROUTER.bidId, bid => {
    _ensureTeamData(bid);
    const coreRole = f.querySelector('[name=coreRole]').value || null;
    // If assigning a core role, demote existing holder (Rule 11.1)
    if (coreRole) {
      const existing = bid.teamMembers.find(m => m.coreRole === coreRole && m.isActive !== false);
      if (existing) existing.coreRole = null;
    }
    bid.teamMembers.push({
      id: STORE.uuid(), name, role, coreRole,
      organisation: f.querySelector('[name=organisation]').value.trim(),
      workstreams: f.querySelector('[name=workstreams]').value.trim(),
      email: f.querySelector('[name=email]').value.trim(),
      phone: f.querySelector('[name=phone]').value.trim(),
      clearance: f.querySelector('[name=clearance]').value.trim(),
      clearanceStatus: f.querySelector('[name=clearanceStatus]').value,
      isContractor: f.querySelector('[name=isContractor]').value === 'true',
      individualDayRate: parseFloat(f.querySelector('[name=individualDayRate]').value) || null,
      reportsTo: f.querySelector('[name=reportsTo]').value || null,
      startDate: f.querySelector('[name=startDate]').value || '',
      endDate: f.querySelector('[name=endDate]').value || '',
      isActive: true,
    });
  });
  closeModal();
  renderApp();
}

function _submitEditTeamMember(memberId) {
  const f = document.getElementById('tm-edit-form');
  STORE.mutateBid(ROUTER.bidId, bid => {
    _ensureTeamData(bid);
    const m = bid.teamMembers.find(x => x.id === memberId);
    if (!m) return;
    const oldName = m.name;
    m.name = f.querySelector('[name=name]').value.trim();
    m.role = f.querySelector('[name=role]').value.trim();
    m.organisation = f.querySelector('[name=organisation]').value.trim();
    m.workstreams = f.querySelector('[name=workstreams]').value.trim();
    m.email = f.querySelector('[name=email]').value.trim();
    m.phone = f.querySelector('[name=phone]').value.trim();
    m.clearance = f.querySelector('[name=clearance]').value.trim();
    m.clearanceStatus = f.querySelector('[name=clearanceStatus]').value;
    m.isContractor = f.querySelector('[name=isContractor]').value === 'true';
    m.individualDayRate = parseFloat(f.querySelector('[name=individualDayRate]').value) || null;
    m.reportsTo = f.querySelector('[name=reportsTo]').value || null;
    m.startDate = f.querySelector('[name=startDate]').value || '';
    m.endDate = f.querySelector('[name=endDate]').value || '';
    const newCoreRole = f.querySelector('[name=coreRole]').value || null;
    if (newCoreRole !== m.coreRole) {
      if (newCoreRole) {
        const existing = bid.teamMembers.find(x => x.coreRole === newCoreRole && x.isActive !== false && x.id !== memberId);
        if (existing) existing.coreRole = null;
      }
      m.coreRole = newCoreRole;
    }
    // Propagate name change to activity ownership
    if (oldName !== m.name) {
      (bid.activities || []).forEach(a => { if (a.owner === oldName) a.owner = m.name; });
      (bid.unavailability || []).forEach(u => { if (u.name === oldName) u.name = m.name; });
    }
  });
  closeModal();
  renderApp();
}

function _teamCsvFileLoad(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const rows = ev.target.result.trim().split(/\r?\n/);
    let added = 0, skipped = 0;
    STORE.mutateBid(ROUTER.bidId, bid => {
      _ensureTeamData(bid);
      rows.forEach((row, i) => {
        const cols = row.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
        if (i === 0 && /^name$/i.test(cols[0])) return;
        const [name='', role='', organisation='', workstreams='', email='', phone='', clearance='', clearanceStatus='', isContr='', dayRate=''] = cols;
        if (!name || !role) { skipped++; return; }
        bid.teamMembers.push({
          id: STORE.uuid(), name, role, organisation, workstreams, email, phone, clearance, clearanceStatus,
          isContractor: isContr.toLowerCase() === 'true' || isContr === '1',
          individualDayRate: parseFloat(dayRate) || null,
          coreRole: null, reportsTo: null, startDate: '', endDate: '', isActive: true,
        });
        added++;
      });
    });
    const msg = document.getElementById('team-csv-msg');
    if (msg) msg.textContent = `${added} added${skipped ? ', ' + skipped + ' skipped' : ''}`;
    input.value = '';
    renderApp();
  };
  reader.readAsText(file);
}

function handleTeamCsvExport() {
  const bid = STORE.loadBid(ROUTER.bidId);
  if (!bid) return;
  _ensureTeamData(bid);
  const header = 'name,role,organisation,workstreams,email,phone,clearance,clearanceStatus,isContractor,individualDayRate';
  const rows = bid.teamMembers.filter(m => m.isActive !== false).map(m =>
    [m.name, m.role, m.organisation, m.workstreams||'', m.email, m.phone, m.clearance, m.clearanceStatus, m.isContractor, m.individualDayRate||''].map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')
  );
  _downloadCsv('team_members.csv', [header, ...rows].join('\n'));
}

function _downloadCsv(filename, content) {
  const blob = new Blob([content], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function _submitBulkUnavailability() {
  const f = document.getElementById('bulk-unavail-form');
  const from = f.querySelector('[name=from]').value;
  const to = f.querySelector('[name=to]').value;
  const notes = f.querySelector('[name=notes]').value.trim();
  const checked = [...f.querySelectorAll('[name=bulk-person]:checked')].map(cb => cb.value);
  if (!from || !to || checked.length === 0) { alert('Dates and at least one person are required.'); return; }
  STORE.mutateBid(ROUTER.bidId, bid => {
    if (!bid.unavailability) bid.unavailability = [];
    checked.forEach(name => {
      bid.unavailability.push({ id: STORE.uuid(), name, from, to, notes });
    });
  });
  closeModal();
  renderApp();
}

function handleRemoveUnavailability(index) {
  STORE.mutateBid(ROUTER.bidId, bid => {

function _unavailCsvFileLoad(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const rows = ev.target.result.trim().split(/\r?\n/);
    let added = 0, skipped = 0;
    STORE.mutateBid(ROUTER.bidId, bid => {
      if (!bid.unavailability) bid.unavailability = [];
      rows.forEach((row, i) => {
        const cols = row.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
        if (i === 0 && /^name$/i.test(cols[0])) return;
        const [name='', from='', to='', notes=''] = cols;
        if (!name || !from || !to) { skipped++; return; }
        bid.unavailability.push({ id: STORE.uuid(), name, from, to, notes });
        added++;
      });
    });
    const msg = document.getElementById('unavail-csv-msg2');
    if (msg) msg.textContent = `${added} added${skipped ? ', ' + skipped + ' skipped' : ''}`;
    input.value = '';
    renderApp();
  };
  reader.readAsText(file);
}

function handleUnavailCsvExport() {
  const bid = STORE.loadBid(ROUTER.bidId);
  if (!bid) return;
  const header = 'name,from,to,notes';
  const rows = (bid.unavailability || []).map(u =>
    [u.name, u.from, u.to, u.notes].map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(',')
  );
  _downloadCsv('unavailability.csv', [header, ...rows].join('\n'));
}

}

function handleRemoveRateCardEntry(index) {
  if (!confirm('Remove this rate card entry?')) return;

}

function _submitEditStakeholder(index) {
  const f = document.getElementById('stk-edit-form');
  const linkedGates = [...f.querySelectorAll('[name=stk-gate]:checked')].map(cb => cb.value);
  STORE.mutateBid(ROUTER.bidId, bid => {
    const s = (bid.stakeholders || [])[index];
    if (!s) return;
    s.name = f.querySelector('[name=name]').value.trim();
    s.role = f.querySelector('[name=role]').value.trim();
    s.organisation = f.querySelector('[name=organisation]').value.trim();
    s.stakeholderType = f.querySelector('[name=stakeholderType]').value;

    s.phone = f.querySelector('[name=phone]').value.trim();
    s.notes = f.querySelector('[name=notes]').value.trim();
    s.linkedGates = linkedGates;
  });
  closeModal();
  renderApp();
}

function handleRemoveStakeholder(index) {
  if (!confirm('Remove this stakeholder?')) return;
  STORE.mutateBid(ROUTER.bidId, bid => {
    if (bid.stakeholders) bid.stakeholders[index].isActive = false;
  });
  renderApp();
}

function handleToggleGateParticipation(stkIndex, gateId) {
  STORE.mutateBid(ROUTER.bidId, bid => {
    const s = (bid.stakeholders || [])[stkIndex];
    if (!s) return;
    if (!s.linkedGates) s.linkedGates = [];
    const idx = s.linkedGates.indexOf(gateId);
    if (idx >= 0) s.linkedGates.splice(idx, 1);
    else s.linkedGates.push(gateId);
  });
  renderApp();
}
