      <span class="fe fe-mute">${sprint}</span>
    </div>
  </div>`;
}

function renderWorkspace(bid) {
  const acts = bid.activities || [];
  const active = acts.filter(a => a.active !== false && a.status !== 'deactivated');
  const today = new Date().toISOString().slice(0,10);

  // ── Headline metrics ──
  const r = READINESS.overallReadiness(bid);
  const health = READINESS.deriveHealth(r.overall);
  const healthCls = health === 'green' ? 'g' : health === 'amber' ? 'a' : 'r';

  const subDate = bid.submissionDeadline;
  const daysToSub = subDate ? Math.ceil((new Date(subDate) - new Date(today)) / 86400000) : '—';
  const daysCls = typeof daysToSub === 'number' ? (daysToSub <= 7 ? 'r' : daysToSub <= 21 ? 'a' : 'b') : 'b';

  const phase = _wsCurrentPhase(bid);

  const devActs = active.filter(a => {
    const ws = (bid.workstreams||[]).find(w => w.id === a.workstreamId);
    return ws && ws.phase === 'DEV';
  });
  const devDone = devActs.filter(a => a.status === 'final').length;
  const devPct = devActs.length ? Math.round((devDone / devActs.length) * 100) : 0;

  const prdActs = active.filter(a => {
    const ws = (bid.workstreams||[]).find(w => w.id === a.workstreamId);
    return ws && ws.phase === 'PRD';
  });
  const prdDone = prdActs.filter(a => a.status === 'final').length;
  const prdPct = prdActs.length ? Math.round((prdDone / prdActs.length) * 100) : 0;

  const metricsHtml = `<div class="ws-metrics">
    <div class="ws-metric" onclick="ROUTER.setBidTab('readiness')">
      <div class="ws-m-val ${healthCls}">${Math.round(r.overall)}%</div>
      <div class="ws-m-lbl">Readiness</div>
    </div>
    <div class="ws-metric" onclick="ROUTER.setBidTab('activities')">
      <div class="ws-m-val ${daysCls}">${daysToSub}</div>
      <div class="ws-m-lbl">Days to Submission</div>
    </div>
    <div class="ws-metric">
      <div class="ws-m-val b">${h(phase)}</div>
      <div class="ws-m-lbl">Phase</div>
    </div>
    <div class="ws-metric" onclick="ROUTER.setBidTab('readiness')">
      <div class="ws-m-val ${healthCls}">${health.toUpperCase()}</div>
      <div class="ws-m-lbl">Health</div>
    </div>
    <div class="ws-metric" onclick="ROUTER.setBidTab('activities')">
      <div class="ws-m-val b">${devPct}%</div>
      <div class="ws-m-lbl">Dev Complete</div>
    </div>
    <div class="ws-metric" onclick="ROUTER.setBidTab('activities')">
      <div class="ws-m-val b">${prdPct}%</div>
      <div class="ws-m-lbl">Prod Complete</div>
    </div>
  </div>`;

  // ── Workstream health rows ──
  const wsList = bid.workstreams || [];
  const compression = READINESS.detectCompression(bid);
  const compWsSet = new Set(compression.map(c => {
    const a = acts.find(x => x.id === c.from);
    return a ? a.workstreamId : null;
  }).filter(Boolean));

  const wsRowsHtml = wsList.map(ws => {
    const wsActs = active.filter(a => a.workstreamId === ws.id);
    const done = wsActs.filter(a => a.status === 'final').length;
    const pct = wsActs.length ? Math.round((done / wsActs.length) * 100) : 0;
    const barCls = pct >= 70 ? 'g' : pct >= 40 ? 'a' : 'r';
    const timing = _wsTimingHealth(ws.id, bid);
    const hasComp = compWsSet.has(ws.id);
    return `<div class="ws-row" onclick="ROUTER._expandedWs={};ROUTER._expandedWs['${ws.id}']=true;ROUTER.setBidTab('activities')">
      <div class="ws-row-name ws-${ws.cls}">${h(ws.name)}</div>
      <div><div class="ws-bar-track"><div class="ws-bar-fill ${barCls}" style="width:${pct}%"></div></div></div>
      <div class="ws-pct">${pct}%${hasComp ? ' ⚠' : ''}</div>
      <div class="ws-timing ${timing}"></div>
    </div>`;
  }).join('');

  const wsHtml = `<div style="background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:14px;">
    <div style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);margin-bottom:8px;">Workstream Health</div>
    ${wsRowsHtml}
  </div>`;

  // ── Methodology gates ──
  const sal06 = acts.find(a => a.id === 'SAL-06');
  const bm10  = acts.find(a => a.id === 'BM-10');
  const _gateIcon = a => (a && a.assurance === 'assured') ? `<span class="fe fe-g">● assured</span>` : `<span class="fe fe-mute">○ not yet</span>`;
  const methHtml = `<div style="background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:14px;">
    <div style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);margin-bottom:8px;">Methodology Gates</div>
    <div class="ws-gates">
      <div class="ws-gate-badge"><div class="ws-gate-name">Win Strategy Lock</div> ${_gateIcon(sal06)}</div>
      <div class="ws-gate-badge"><div class="ws-gate-name">Storyboard Sign-off</div> ${_gateIcon(bm10)}</div>
    </div>
  </div>`;

  // ── Governance gates ──
  const gates = bid.governanceGates || [];
  const govHtml = gates.length ? `<div style="background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:14px;">
    <div style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);margin-bottom:8px;">Governance Gates</div>
    <div class="ws-gates">${gates.map(g => {
      const sCls = g.status === 'passed' ? 'fe-g' : g.status === 'failed' ? 'fe-r' : g.status === 'in_progress' ? 'fe-b' : 'fe-mute';
      const daysUntil = g.plannedDate ? Math.ceil((new Date(g.plannedDate) - new Date(today)) / 86400000) : null;
      const daysStr = daysUntil !== null && g.status !== 'passed' && g.status !== 'failed' ? ` · ${daysUntil}d` : '';
      return `<div class="ws-gate-badge" onclick="ROUTER.setBidTab('governance')" style="cursor:pointer">
        <div class="ws-gate-name">${h(g.name)}</div>
        <span class="fe ${sCls}">${(g.status||'pending').replace(/_/g,' ')}${daysStr}</span>
      </div>`;
    }).join('')}</div>
  </div>` : '';

  // ── Smart nudge bar ──
  const nudges = NUDGE.generateNudges(bid);
  const staleN = nudges.filter(n => n.type === 'stale').length;
  const unblockedN = nudges.filter(n => n.type === 'unblocked').length;
  const deadlineN = nudges.filter(n => n.type === 'deadline').length;
  const gateN = nudges.filter(n => n.type === 'gate').length;
  const nudgeHtml = nudges.length ? `<div class="ws-nudge-bar" onclick="ROUTER.setActView('workstream');ROUTER.setBidTab('activities')">
    <span style="font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);">Nudges</span>
    ${staleN ? `<span class="ws-nudge-count stale">${staleN} stale</span>` : ''}
    ${unblockedN ? `<span class="ws-nudge-count unblocked">${unblockedN} unblocked</span>` : ''}
    ${deadlineN ? `<span class="ws-nudge-count deadline">${deadlineN} approaching</span>` : ''}
    ${gateN ? `<span class="ws-nudge-count gate">${gateN} gate</span>` : ''}
  </div>` : '';

  // ── Standup actions bar ──
  const saList = bid.standupActions || [];
  const saOverdue = saList.filter(a => a.status !== 'done' && a.dueDate && a.dueDate < today).length;
  const saDueToday = saList.filter(a => a.status !== 'done' && a.dueDate === today).length;
  const saOpen = saList.filter(a => a.status !== 'done').length;
  const saPulse = saOverdue > 0 ? ' pulse' : '';
  const standupHtml = saList.length ? `<div class="ws-standup-bar${saPulse}" onclick="ROUTER.setActView('workstream');ROUTER.setBidTab('activities')">
    <span style="font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);">Standup</span>
    <span class="ws-standup-val r">${saOverdue} overdue</span>
    <span class="ws-standup-val a">${saDueToday} due today</span>
    <span class="ws-standup-val b">${saOpen} open</span>
  </div>` : '';

  // ── Today's actions (overdue / due this week / review actions) ──
  const _daysDiff = d => d ? Math.ceil((new Date(d) - new Date(today)) / 86400000) : null;
  const overdue = active.filter(a => a.plannedEnd && _daysDiff(a.plannedEnd) < 0 && a.status !== 'final');
  const dueWeek = active.filter(a => {
    const dd = _daysDiff(a.plannedEnd);
    return dd !== null && dd >= 0 && dd <= 7 && a.status !== 'final';
  });

  const reviewActions = [];
  (bid.reviewCycles || []).forEach(c => {
    (c.actions || []).forEach(a => {
      if ((a.severity === 'critical' || a.severity === 'major') && a.status !== 'closed') {
        reviewActions.push({ ...a, cycleType: c.type, cycleId: c.id });
      }
    });
  });

  const _actRow = (a, extra) => `<div class="ws-act-item" onclick="ROUTER.openSlideout('activity','${a.id}');ROUTER.setBidTab('activities')">
    <span class="ws-act-code">${h(a.id)}</span>
    <span>${h((a.name||'').substring(0,40))}</span>
    ${extra}
  </div>`;

  const actionsHtml = `<div class="ws-actions-grid">
    <div class="ws-actions-col">
      <div class="ws-actions-col-title ov">Overdue (${overdue.length})</div>
      ${overdue.slice(0,8).map(a => _actRow(a, `<span class="ws-act-days r">${Math.abs(_daysDiff(a.plannedEnd))}d late</span>`)).join('') || '<div style="font-size:11px;color:var(--t3);">None</div>'}
    </div>
    <div class="ws-actions-col">
      <div class="ws-actions-col-title dw">Due This Week (${dueWeek.length})</div>
      ${dueWeek.slice(0,8).map(a => _actRow(a, `<span class="ws-act-days a">${_daysDiff(a.plannedEnd)}d</span>`)).join('') || '<div style="font-size:11px;color:var(--t3);">None</div>'}
    </div>
    <div class="ws-actions-col">
      <div class="ws-actions-col-title rv">Review Actions (${reviewActions.length})</div>
      ${reviewActions.slice(0,8).map(a => `<div class="ws-act-item" onclick="ROUTER.setBidTab('reviews')">
        <span class="ws-act-code">${h(a.activityId||'')}</span>
        <span>${h((a.description||'').substring(0,35))}</span>
        <span class="ws-act-days b">${h(a.severity)}</span>
      </div>`).join('') || '<div style="font-size:11px;color:var(--t3);">None</div>'}
    </div>
  </div>`;

  // ── Milestone timeline ──
  const milestones = (bid.milestones || []).filter(m => m.date).sort((a,b) => a.date.localeCompare(b.date));
  const _msStatus = m => {
    if (m.type === 'submission_deadline') return 'sub';
    const dd = _daysDiff(m.date);
    if (dd < 0) return 'done';
    if (dd <= 7) return 'at-risk';
    return 'on-track';
  };
  let nowInserted = false;
  const tlItems = [];
  milestones.forEach(m => {
    if (!nowInserted && m.date >= today) {
      tlItems.push(`<div class="ws-tl-now">▸ TODAY — ${today}</div>`);
      nowInserted = true;
    }
    const st = _msStatus(m);
    tlItems.push(`<div class="ws-tl-item">
      <div class="ws-tl-dot ${st}"></div>
      <span class="ws-tl-date">${m.date}</span>
      <span class="ws-tl-label">${h(m.label || m.type.replace(/_/g,' '))}</span>
    </div>`);
  });
  if (!nowInserted && milestones.length) {
    tlItems.push(`<div class="ws-tl-now">▸ TODAY — ${today}</div>`);
  }

  const timelineHtml = milestones.length ? `<div style="background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:14px;">
    <div style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);margin-bottom:8px;">Milestone Timeline</div>
    <div class="ws-timeline"><div class="ws-tl-line"></div>${tlItems.join('')}</div>
  </div>` : '';

  // ── Methodology guidance ──
  const guidanceText = phase === 'PRODUCE'
    ? 'Your priority is review action closure and compliance coverage. Every open critical action is a risk to submission quality.'
    : phase === 'POST-SUB'
    ? 'Submission complete. Focus on presentation preparation, debrief actions, and lessons learned capture.'
    : 'Your priority is workstream timing health. Watch for solution compressing commercial. If SOL progress is <50% with <40% of timeline remaining, escalate.';

  const guidanceHtml = `<div class="ws-guidance">
    <div class="ws-guidance-title">Methodology Guidance — ${h(phase)} Phase</div>
    ${guidanceText}
  </div>`;

  return `<div class="sl">Module M3</div>
    <div class="pg-title">Bid Workspace</div>
    <div class="pg-desc">Command console for ${h(bid.name || 'this bid')}. At-a-glance status, workstream health, and today's actions.</div>
    <div class="ws-dash">
      ${metricsHtml}
      ${nudgeHtml}
      ${standupHtml}
      <div style="display:grid;grid-template-columns:1fr 280px;gap:14px;">
        <div style="display:grid;gap:14px;align-content:start;">
          ${wsHtml}
          ${methHtml}
          ${govHtml}
          ${actionsHtml}
        </div>
        <div style="display:grid;gap:14px;align-content:start;">
          ${timelineHtml}
          ${guidanceHtml}
        </div>
      </div>
    </div>`;
}

function _wsCurrentPhase(bid) {
  const acts = (bid.activities || []).filter(a => a.active !== false && a.status !== 'deactivated');
  const ws = bid.workstreams || [];
  const postActs = acts.filter(a => { const w = ws.find(x => x.id === a.workstreamId); return w && w.phase === 'POST'; });
  const prdActs = acts.filter(a => { const w = ws.find(x => x.id === a.workstreamId); return w && w.phase === 'PRD'; });
  const devActs = acts.filter(a => { const w = ws.find(x => x.id === a.workstreamId); return w && w.phase === 'DEV'; });
  if (postActs.some(a => a.status === 'in_progress' || a.status === 'draft_complete')) return 'POST-SUB';
  if (prdActs.some(a => a.status === 'in_progress' || a.status === 'draft_complete')) return 'PRODUCE';
  if (devActs.some(a => a.status !== 'not_started')) return 'DEVELOP';
  return 'SETUP';
}

function _wsTimingHealth(wsId, bid) {
  const acts = (bid.activities || []).filter(a => a.workstreamId === wsId && a.active !== false && a.status !== 'deactivated');
  if (!acts.length || !bid.submissionDeadline) return 'u';
  const today = new Date().toISOString().slice(0,10);
  const overdue = acts.filter(a => a.plannedEnd && a.plannedEnd < today && a.status !== 'final');
  if (overdue.length > 0) return 'r';
  const tight = acts.filter(a => {
    if (!a.plannedEnd || a.status === 'final') return false;
    const dd = Math.ceil((new Date(a.plannedEnd) - new Date(today)) / 86400000);
    return dd >= 0 && dd <= 2;
  });
  if (tight.length > 0) return 'a';
  return 'g';
}

function renderActivities(bid) {

      <div class="nudge-actions">
        ${n.type === 'unblocked' ? `<button class="btn btn-sm" onclick="handleNudgeStart('${n.activityId}')">Start</button>` : ''}
        ${n.type === 'stale' ? `<button class="btn btn-sm" onclick="handleNudgeDismiss('${n.activityId}')">Dismiss</button>` : ''}
        <button class="btn btn-sm" onclick="ROUTER.openSlideout('activity','${n.activityId}')">View</button>
      </div>

  ).join('')}</div>`;

  // Search (hidden in gantt view)
  const searchHtml = ROUTER.actView === 'gantt' ? '' : `<div style="margin-bottom:12px;display:flex;gap:8px;align-items:center;">
    <input class="inp" style="max-width:260px;" placeholder="Search activities\u2026" value="${h(ROUTER.actFilter)}" oninput="ROUTER.actFilter=this.value;renderApp()">
    <span class="fe fe-mute">${active.length} active</span>

  const bodyHtml = ROUTER.actView === 'gantt' ? _renderGanttChart(bid)
    : ROUTER.actView === 'list' ? _renderActList(bid) : _renderActWorkstream(bid);

  // Slideout
  const slideoutHtml = ROUTER._slideout && ROUTER._slideout.type === 'activity'

  return `<div class="sl">Module M4</div>
    <div class="pg-title">Activity Tracker</div>
    <div class="pg-desc">Track all bid activities across workstreams. Enforce status transitions, monitor progress, and respond to smart nudges.</div>
    <div class="cg c4" style="margin-bottom:16px;">
      <div class="metric"><div class="metric-val" style="color:var(--gold);">${active.length}</div><div class="metric-lbl">Active</div></div>
      <div class="metric"><div class="metric-val" style="color:var(--blu);">${inProg}</div><div class="metric-lbl">In Progress</div></div>
      <div class="metric"><div class="metric-val" style="color:var(--amb);">${draft}</div><div class="metric-lbl">Draft Complete</div></div>
      <div class="metric"><div class="metric-val" style="color:var(--grn);">${complete}</div><div class="metric-lbl">Final</div></div>
    </div>
    ${nudgeHtml}
    ${tabHtml}
    ${searchHtml}
    ${bodyHtml}
    ${slideoutHtml}`;
}

function _renderActWorkstream(bid) {

  return wsList.map(ws => {
    const wsActs = acts.filter(a => a.workstreamId === ws.id);

    ) : wsActs;

function _renderActList(bid) {
  const acts = bid.activities || [];
  const filter = (ROUTER.actFilter || '').toLowerCase();
  let filtered = filter ? acts.filter(a =>
    a.id.toLowerCase().includes(filter) || (a.name||'').toLowerCase().includes(filter) || (a.owner||'').toLowerCase().includes(filter)
      || (a.workstreamId||'').toLowerCase().includes(filter)
  ) : [...acts];

  // Sort
  const { col, dir } = ROUTER.actSort;
  const rank = { not_started:0, in_progress:1, draft_complete:2, final:3, deactivated:4 };
  filtered.sort((a, b) => {
    let va, vb;
    switch(col) {
      case 'code':   va = a.id; vb = b.id; break;
      case 'name':   va = a.name||''; vb = b.name||''; break;
      case 'ws':     va = a.workstreamId||''; vb = b.workstreamId||''; break;
      case 'status': va = rank[a.status]||0; vb = rank[b.status]||0; break;
      case 'owner':  va = a.owner||''; vb = b.owner||''; break;
      case 'effort': va = a.effortDays||0; vb = b.effortDays||0; break;
      case 'start':  va = a.plannedStart||'9'; vb = b.plannedStart||'9'; break;
      case 'end':    va = a.plannedEnd||'9'; vb = b.plannedEnd||'9'; break;
      default:       va = a.id; vb = b.id;
    }
    if (typeof va === 'number') return dir === 'asc' ? va - vb : vb - va;
    return dir === 'asc' ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
  });

  const _sortClick = c => `onclick="actSortBy('${c}')"`;
  const _arrow = c => ROUTER.actSort.col === c ? (ROUTER.actSort.dir === 'asc' ? ' \u25B4' : ' \u25BE') : '';

  const _statusBadge = s => {
    const m = { not_started:'fe-mute', in_progress:'fe-b', draft_complete:'fe-a', final:'fe-g', deactivated:'fe-mute' };
    return `<span class="fe ${m[s]||'fe-mute'}">${(s||'not_started').replace(/_/g,' ')}</span>`;
  };

  const rows = filtered.map(a => {
    const deact = !a.active || a.status === 'deactivated';
    return `<div class="lt-row ${deact?'deactivated':''}" onclick="ROUTER.openSlideout('activity','${a.id}')">
      <div class="at-code">${h(a.id)}</div>
      <div class="at-name">${h(a.name)}</div>
      <div class="at-cell">${h(a.workstreamId||'')}</div>
      <div>${_statusBadge(a.status)}</div>
      <div class="at-cell">${h(a.owner||'\u2014')}</div>
      <div class="at-cell">${a.effortDays||0}d</div>
      <div class="at-cell">${STORE.fmtDate(a.plannedStart)}</div>
      <div class="at-cell">${STORE.fmtDate(a.plannedEnd)}</div>
      <div class="at-cell">${a.dependencies && a.dependencies.length ? a.dependencies.join(', ') : '\u2014'}</div>
    </div>`;
  }).join('');

  return `<div style="background:var(--bg2);border:1px solid var(--bdr);overflow-x:auto;">
    <div class="lt-hdr">
      <span style="cursor:pointer" ${_sortClick('code')}>Code${_arrow('code')}</span>
      <span style="cursor:pointer" ${_sortClick('name')}>Activity${_arrow('name')}</span>
      <span style="cursor:pointer" ${_sortClick('ws')}>Workstream${_arrow('ws')}</span>
      <span style="cursor:pointer" ${_sortClick('status')}>Status${_arrow('status')}</span>
      <span style="cursor:pointer" ${_sortClick('owner')}>Owner${_arrow('owner')}</span>
      <span style="cursor:pointer" ${_sortClick('effort')}>Effort${_arrow('effort')}</span>
      <span style="cursor:pointer" ${_sortClick('start')}>Start${_arrow('start')}</span>
      <span style="cursor:pointer" ${_sortClick('end')}>End${_arrow('end')}</span>
      <span>Deps</span>
    </div>
    ${rows || '<div style="padding:16px;color:var(--t3);font-size:12px;">No activities found</div>'}
  </div>`;
}

function _renderGanttChart(bid) {
  const acts = (bid.activities || []).filter(a => a.active !== false && a.status !== 'deactivated');
  const wsList = bid.workstreams || [];
  if (!acts.length || !bid.submissionDeadline) {
    return '<div style="padding:24px;color:var(--t3);font-size:12px;">No scheduled activities to display. Run the scheduler first.</div>';
  }

  const cal = bid.calendar || { workingDays:[1,2,3,4,5], publicHolidays:[] };
  const actMap = SCHED.backwardSchedule(acts, bid.submissionDeadline, cal);

  // ── Collect ALL date-bearing items ──
  const allMilestones = (bid.milestones || []).filter(m => m.date);
  const allGates = bid.governanceGates || [];
  // Derive gate dates: use plannedDate → GOV activity schedule → fallback near submission
  const gatesWithDates = allGates.map(g => {
    if (g.plannedDate) return { ...g, _date: g.plannedDate, _src: 'planned' };
    const lib = GATE_LIB.find(gl => gl.id === g.templateId);
    if (lib && lib.govActivityId) {
      const sched = actMap[lib.govActivityId];
      if (sched && sched.plannedEnd) return { ...g, _date: sched.plannedEnd, _src: 'activity' };
    }
    // Fallback: place near submission deadline with offset based on lead days
    if (bid.submissionDeadline) {
      const lead = (lib && lib.defaultLeadDays) || 5;
      const fb = new Date(bid.submissionDeadline);
      fb.setDate(fb.getDate() - lead);
      return { ...g, _date: fb.toISOString().slice(0,10), _src: 'estimated' };
    }
    return null;
  }).filter(Boolean);

  // Date range
  let minDate = bid.submissionDeadline, maxDate = bid.submissionDeadline;
  Object.values(actMap).forEach(s => {
    if (s.plannedStart && s.plannedStart < minDate) minDate = s.plannedStart;
    if (s.plannedEnd && s.plannedEnd > maxDate) maxDate = s.plannedEnd;
  });
  allMilestones.forEach(m => { if (m.date < minDate) minDate = m.date; if (m.date > maxDate) maxDate = m.date; });
  gatesWithDates.forEach(g => { if (g._date < minDate) minDate = g._date; if (g._date > maxDate) maxDate = g._date; });

  const padS = new Date(minDate); padS.setDate(padS.getDate() - 7);
  const padE = new Date(maxDate); padE.setDate(padE.getDate() + 7);
  minDate = padS.toISOString().slice(0,10);
  maxDate = padE.toISOString().slice(0,10);

  // All calendar days
  const allDays = [];
  const dc = new Date(minDate); const de = new Date(maxDate);
  while (dc <= de) { allDays.push(dc.toISOString().slice(0,10)); dc.setDate(dc.getDate() + 1); }
  if (!allDays.length) return '<div style="padding:16px;color:var(--t3);">Cannot compute timeline.</div>';
  const totalDays = allDays.length;

  // ── Scale bucketing ──
  const scale = ROUTER.ganttScale || 'fortnight';
  const buckets = [];
  if (scale === 'day') {
    allDays.forEach((dt, i) => buckets.push({ label: dt.slice(5), si: i, ei: i, sd: dt, ed: dt }));
  } else if (scale === 'week') {
    for (let i = 0; i < totalDays;) { const s = allDays[i]; const e = Math.min(i+6, totalDays-1); buckets.push({ label: s.slice(5), si: i, ei: e, sd: s, ed: allDays[e] }); i = e+1; }
  } else if (scale === 'fortnight') {
    for (let i = 0; i < totalDays;) { const s = allDays[i]; const e = Math.min(i+13, totalDays-1); buckets.push({ label: s.slice(5)+' – '+allDays[e].slice(5), si: i, ei: e, sd: s, ed: allDays[e] }); i = e+1; }
  } else {
    let ci = 0;
    const mn = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    while (ci < totalDays) { const ym = allDays[ci].slice(0,7); const si = ci; while (ci < totalDays && allDays[ci].slice(0,7) === ym) ci++; buckets.push({ label: mn[parseInt(ym.slice(5))]+' '+ym.slice(2,4), si, ei: ci-1, sd: allDays[si], ed: allDays[ci-1] }); }
  }

  const colW = scale === 'day' ? 28 : scale === 'week' ? 50 : scale === 'fortnight' ? 80 : 110;
  const barAreaW = buckets.length * colW;
  const today = new Date().toISOString().slice(0,10);

  // date → pixel X within bar area
  const _x = dt => {
    const di = allDays.indexOf(dt);
    if (di < 0) return null;
    return (di / totalDays) * barAreaW;
  };

  const _pct = s => ({ not_started:0, in_progress:25, draft_complete:60, final:100 }[s] || 0);
  const _wsColor = cls => ({ sales:'var(--gold)', solution:'var(--blu)', commercial:'var(--grn)', legal:'var(--pink,#EC4899)', delivery:'var(--amb)', supply:'var(--cyn,#22D3EE)', bidmgmt:'var(--lime,#84CC16)', governance:'var(--pur)', production:'var(--red)', postsub:'var(--pink,#EC4899)' }[cls] || 'var(--t3)');
  const _tip = `onmouseenter="var t=this.nextElementSibling;t.style.display='block';t.style.left=(event.clientX+12)+'px';t.style.top=(event.clientY-10)+'px';" onmousemove="var t=this.nextElementSibling;t.style.left=(event.clientX+12)+'px';t.style.top=(event.clientY-10)+'px';" onmouseleave="this.nextElementSibling.style.display='none'"`;

  // ── Scale buttons ──
  const scales = [['day','Day'],['week','Week'],['fortnight','Fortnight'],['month','Month']];
  const scaleHtml = `<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">
    <span style="font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--t3);">Scale</span>
    ${scales.map(([id,l]) => `<button class="btn btn-sm" onclick="ROUTER.setGanttScale('${id}')" style="font-size:10px;padding:3px 8px;${ROUTER.ganttScale===id?'background:var(--gold);color:var(--bg0);':''}">${l}</button>`).join('')}
  </div>`;

  // ── Header ──
  const hdrCols = buckets.map(bk => {
    const ht = today >= bk.sd && today <= bk.ed;
    return `<div class="gantt-hdr-col" style="width:${colW}px;min-width:${colW}px;${ht?'color:var(--gold);font-weight:600;':''}">${bk.label}</div>`;
  }).join('');

  // ── Column grid lines (drawn in bar area) ──
  const gridLines = buckets.map((bk, i) => i > 0 ? `<div class="gantt-col-line" style="left:${i * colW}px;"></div>` : '').join('');

  // ── Today line ──
  const todayX = _x(today);
  const todayLine = todayX !== null ? `<div class="gantt-today-line" style="left:${Math.round(todayX)}px;"></div>` : '';

  // ── Build rows ──
  let rows = '';

  // Helper: make a bar-area div with grid lines + today + content
  const _barArea = (content) => `<div class="gantt-row-bars" style="width:${barAreaW}px;min-width:${barAreaW}px;">${gridLines}${todayLine}${content}</div>`;

  // ── Procurement milestones (TOP of chart) ──
  // Always show submission deadline even if not in milestones array
  const msToShow = allMilestones.slice();
  if (bid.submissionDeadline && !msToShow.some(m => m.type === 'submission_deadline')) {
    msToShow.push({ type:'submission_deadline', label:'Submission Deadline', date: bid.submissionDeadline });
  }
  if (msToShow.length) {
    const msKey = '_milestones';
    const msCol = ROUTER.ganttCollapsed.has(msKey);
    rows += `<div class="gantt-row ws-hdr" onclick="ROUTER.toggleGanttGroup('${msKey}')"><div class="gantt-row-label"><span class="gantt-chevron${msCol?' collapsed':''}">▼</span><span style="color:var(--gold);">◆ Procurement Milestones</span></div>${_barArea('')}</div>`;
    if (!msCol) {
      msToShow.sort((a,b) => a.date.localeCompare(b.date)).forEach(m => {
        const mx = _x(m.date);
        const mColor = m.type === 'submission_deadline' ? 'var(--red)' : 'var(--gold)';
        const mLabel = m.label || m.type.replace(/_/g,' ');
        const marker = mx !== null ? `<div class="gantt-marker-line" style="left:${Math.round(mx)}px;background:${mColor};" ${_tip}></div>
          <div class="gantt-tooltip" style="display:none;"><div class="gt-code">◆ ${h(mLabel)}</div><div class="gt-row"><span>${m.date}</span></div></div>` : '';
        rows += `<div class="gantt-row"><div class="gantt-row-label" style="font-style:italic;" title="${h(mLabel)}">◆ ${h(mLabel)}</div>${_barArea(marker)}</div>`;
      });
    }
  }

  // ── Governance gates ──
  if (gatesWithDates.length) {
    const gtKey = '_gates';
    const gtCol = ROUTER.ganttCollapsed.has(gtKey);
    rows += `<div class="gantt-row ws-hdr" onclick="ROUTER.toggleGanttGroup('${gtKey}')"><div class="gantt-row-label"><span class="gantt-chevron${gtCol?' collapsed':''}">▼</span><span style="color:var(--pur);">◆ Governance Gates</span></div>${_barArea('')}</div>`;
    if (!gtCol) {
      gatesWithDates.sort((a,b) => a._date.localeCompare(b._date)).forEach(g => {
        const gx = _x(g._date);
        const gColor = g.status === 'passed' ? 'var(--grn)' : g.status === 'failed' ? 'var(--red)' : 'var(--pur)';
        const sl = (g.status||'pending').replace(/_/g,' ');
        const dateLabel = g._src === 'planned' ? g._date : g._date + ' (' + g._src + ')';
        const marker = gx !== null ? `<div class="gantt-marker-diamond" style="left:${Math.round(gx - 6)}px;background:${gColor};" ${_tip}></div>
          <div class="gantt-tooltip" style="display:none;"><div class="gt-code">◆ ${h(g.name)}</div><div class="gt-row"><span>${dateLabel}</span><span>${sl}</span></div></div>` : '';
        rows += `<div class="gantt-row"><div class="gantt-row-label" style="font-style:italic;cursor:pointer;" onclick="event.stopPropagation();ROUTER.setBidTab('governance')" title="${h(g.name)}">◆ ${h(g.name)}</div>${_barArea(marker)}</div>`;
      });
    }
  }

  // ── Activity rows grouped by workstream ──
  wsList.forEach(ws => {
    const wsActs = acts.filter(a => a.workstreamId === ws.id);
    if (!wsActs.length) return;
    const wsKey = 'ws_' + ws.id;
    const wsCol = ROUTER.ganttCollapsed.has(wsKey);
    rows += `<div class="gantt-row ws-hdr" onclick="ROUTER.toggleGanttGroup('${wsKey}')"><div class="gantt-row-label"><span class="gantt-chevron${wsCol?' collapsed':''}">▼</span><span class="ws-${ws.cls}">${h(ws.name)}</span> <span style="font-weight:400;color:var(--t3);font-size:9px;">(${wsActs.length})</span></div>${_barArea('')}</div>`;

    if (!wsCol) {
      wsActs.forEach(act => {
        const sched = actMap[act.id];
        const start = (sched && sched.plannedStart) || act.plannedStart;
        const finish = (sched && sched.plannedEnd) || act.plannedEnd;
        let barHtml = '';

        if (start && finish) {
          const x1 = _x(start); const x2 = _x(finish);
          if (x1 !== null && x2 !== null) {
            const dayPx = barAreaW / totalDays;
            const bw = Math.max(x2 - x1 + dayPx, 4);
            const prog = _pct(act.status);
            const color = _wsColor(ws.cls);
            barHtml = `<div class="gantt-bar" style="left:${Math.round(x1)}px;width:${Math.round(bw)}px;background:${color};" ${_tip}>
                ${prog > 0 ? `<div class="gantt-bar-fill" style="width:${prog}%;"></div>` : ''}
              </div><div class="gantt-tooltip" style="display:none;">
                <div class="gt-code">${h(act.id)} — ${h(act.name)}</div>
                <div class="gt-row"><span>${(act.status||'not_started').replace(/_/g,' ')}</span><span>${prog}%</span></div>
                <div class="gt-row"><span>${start} → ${finish}</span></div>
                <div class="gt-row"><span>Effort: ${act.effortDays||0}d · Team: ${act.teamSize||1}</span></div>
                ${act.owner ? `<div class="gt-row"><span>${h(act.owner)}</span></div>` : ''}
              </div>`;
          }
        }
        rows += `<div class="gantt-row"><div class="gantt-row-label" onclick="event.stopPropagation();ROUTER.openSlideout('activity','${act.id}')" title="${h(act.name)}">${h(act.id)} ${h((act.name||'').substring(0,28))}</div>${_barArea(barHtml)}</div>`;
      });
    }
  });

  // ── Legend ──
  const legendHtml = `<div class="gantt-legend">
    ${wsList.filter(ws => acts.some(a => a.workstreamId === ws.id)).map(ws =>
      `<div class="gantt-legend-item"><div class="gantt-legend-swatch" style="background:${_wsColor(ws.cls)}"></div>${h(ws.name)}</div>`
    ).join('')}
    <div class="gantt-legend-item"><div style="width:2px;height:12px;background:var(--gold);margin-right:2px;"></div>Today</div>
    <div class="gantt-legend-item"><div style="width:3px;height:12px;background:var(--gold);margin-right:4px;"></div>Milestone</div>
    <div class="gantt-legend-item"><div style="width:8px;height:8px;background:var(--pur);transform:rotate(45deg);margin-right:4px;border-radius:2px;"></div>Gate</div>
    <div class="gantt-legend-item"><div style="width:3px;height:12px;background:var(--red);margin-right:4px;"></div>Deadline</div>
  </div>`;

  return `${scaleHtml}${legendHtml}
    <div class="gantt-wrap">
      <div class="gantt-grid">
        <div class="gantt-hdr"><div class="gantt-hdr-label">Activity</div><div class="gantt-hdr-cols">${hdrCols}</div></div>
        ${rows}
      </div>
    </div>`;
}

function _renderActivitySlideout(bid, actId) {
  const act = (bid.activities || []).find(a => a.id === actId);
  if (!act) return '';

  const ws = (bid.workstreams || []).find(w => w.id === act.workstreamId);
  const elapsed = SCHED.elapsedDays(act.effortDays, act.teamSize);

  const _statusBadge = s => {
    const m = { not_started:'fe-mute', in_progress:'fe-b', draft_complete:'fe-a', final:'fe-g', deactivated:'fe-mute' };
    return `<span class="fe ${m[s]||'fe-mute'}">${(s||'not_started').replace(/_/g,' ')}</span>`;
  };
  const _assurBadge = a => {
    const norm = (!a || a === 'none') ? 'unassured' : a;
    const m = { unassured:'fe-mute', under_review:'fe-a', assured:'fe-g', accepted_at_gate:'fe-p' };
    return `<span class="fe ${m[norm]||'fe-mute'}">${norm.replace(/_/g,' ')}</span>`;
  };

  // Valid transitions
  const nextStatuses = TRANSITIONS.validNextStatuses(act.status || 'not_started');
  const nextAssur = TRANSITIONS.validNextAssurances(act.assurance);

  const statusBtns = nextStatuses.map(s =>
    `<button class="btn btn-sm" onclick="handleStatusChange('${actId}','${s}')">${s.replace(/_/g,' ')}</button>`
  ).join(' ');

  const assurBtns = nextAssur.map(a =>
    `<button class="btn btn-sm" onclick="handleAssuranceChange('${actId}','${a}')">${a.replace(/_/g,' ')}</button>`
  ).join(' ');

  // Dependencies — upstream and downstream
  const allActs = bid.activities || [];
  const upstream = (act.dependencies || []).map(d => {
    const dep = allActs.find(a => a.id === d);
    return dep ? `<span class="fe fe-mute" style="cursor:pointer;" onclick="ROUTER.openSlideout('activity','${d}')">${d}</span>` : `<span class="fe fe-mute">${d}</span>`;
  }).join(' ') || '<span style="color:var(--t3);font-size:11px;">None</span>';

  const downstream = allActs.filter(a => a.dependencies && a.dependencies.includes(actId)).map(a =>
    `<span class="fe fe-mute" style="cursor:pointer;" onclick="ROUTER.openSlideout('activity','${a.id}')">${a.id}</span>`
  ).join(' ') || '<span style="color:var(--t3);font-size:11px;">None</span>';

  return `<div class="slideout-overlay" onclick="ROUTER.closeSlideout()"></div>
  <div class="slideout">
    <div class="slideout-hdr">
      <div class="slideout-title">${h(act.id)} \u2014 ${h(act.name)}</div>
      <button class="modal-close" onclick="ROUTER.closeSlideout()">\u00D7</button>
    </div>
    <div class="slideout-body">
      <div class="sg">
        <div class="sg-k">Workstream</div><div class="sg-v">${ws ? `<span class="ws-${ws.cls}">${h(ws.name)}</span>` : '\u2014'}</div>
        <div class="sg-k">Output</div><div class="sg-v">${h(act.output || '\u2014')}</div>
        <div class="sg-k">Owner</div><div class="sg-v">${h(act.owner || '\u2014')}</div>
        <div class="sg-k">Effort</div><div class="sg-v">${act.effortDays||0} person-days \u00D7 ${act.teamSize||1} = ${elapsed} elapsed days</div>
        <div class="sg-k">Type</div><div class="sg-v">${act.parallelisationType === 'P' ? 'Parallelisable' : act.parallelisationType === 'S' ? 'Specialist' : 'Coordination'}</div>
        <div class="sg-k">Planned Start</div><div class="sg-v">${STORE.fmtDate(act.plannedStart)}</div>
        <div class="sg-k">Planned End</div><div class="sg-v">${STORE.fmtDate(act.plannedEnd)}</div>
        <div class="sg-k">Actual Start</div><div class="sg-v">${STORE.fmtDate(act.actualStart)}</div>
        <div class="sg-k">Actual End</div><div class="sg-v">${STORE.fmtDate(act.actualEnd)}</div>
        <div class="sg-k">Last Updated</div><div class="sg-v">${act.lastUpdated ? STORE.fmtDate(act.lastUpdated.split('T')[0]) : '\u2014'}</div>
      </div>

      <div class="sh2">Status ${_statusBadge(act.status)}</div>
      <div style="margin-bottom:14px;">${statusBtns || '<span style="color:var(--t3);font-size:11px;">No valid transitions</span>'}</div>

      <div class="sh2">Assurance ${_assurBadge(act.assurance)}</div>
      <div style="margin-bottom:14px;">${assurBtns || '<span style="color:var(--t3);font-size:11px;">No valid transitions</span>'}</div>

      <div class="sh2">Dependencies</div>
      <div style="margin-bottom:6px;"><span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;">Upstream:</span> ${upstream}</div>
      <div style="margin-bottom:14px;"><span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;">Downstream:</span> ${downstream}</div>

      <div class="sh2">Notes</div>
      <textarea class="textarea" placeholder="Add notes\u2026" onchange="handleActNotes('${actId}',this.value)">${h(act.notes||'')}</textarea>
    </div>
  </div>`;
}

function _renderResponseSlideout(bid, sectionId) {
  const sections = bid.responseSections || [];
  const sec = sections.find(s => s.id === sectionId);
  if (!sec) return '';
  const ef = bid.evaluationFramework || {};

  // Category label for context
  const catLabels = { quality:'Quality', price:'Price / Commercial', social_value:'Social Value', pass_fail:'Pass / Fail', unscored:'Unscored' };
  const catLabel = catLabels[sec.evaluationCategory] || (sec.evaluationCategory || '').replace(/_/g, ' ');

  // Hurdle detail
  const hasHurdle = sec.hurdleScore != null;
  const hurdleHtml = hasHurdle ? `<div class="co co-r" style="margin-bottom:16px;">
    <div class="co-l">Hurdle</div>
    <div class="co-t" style="font-size:13px;line-height:1.7;">Minimum score of <strong>${sec.hurdleScore}</strong>${sec.evaluationMaxScore != null ? ` out of ${sec.evaluationMaxScore}` : ''} required to qualify. Responses scoring below this threshold may be excluded from further evaluation regardless of overall bid quality.</div>
  </div>` : '';

  // Last amended indicator
  const amendedHtml = sec.lastAmended ? `<div style="display:flex;align-items:center;gap:6px;margin-bottom:16px;padding:8px 12px;background:var(--bg3);border:1px solid var(--amb);border-radius:6px;">
    <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--amb);">AMENDED</span>
    <span style="font-size:11px;color:var(--t2);">${STORE.fmtDate ? STORE.fmtDate(sec.lastAmended) : sec.lastAmended.split('T')[0]}</span>
  </div>` : '';

  return `<div class="slideout-overlay" onclick="ROUTER.closeSlideout()"></div>
  <div class="slideout slideout-wide">
    <div class="slideout-hdr">
      <div>
        <div class="slideout-title">${h(sec.reference||'')} \u2014 ${h(sec.title||'')}</div>
        <div style="font-size:10px;color:var(--t3);margin-top:2px;">${h(catLabel)}${sec.sectionNumber ? ' \u2014 ' + h(sec.sectionNumber) : ''}${sec.ittVolume ? ' \u2014 ' + h(sec.ittVolume) : ''}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <button class="btn btn-sm" onclick="handleEditResponseSection('${sec.id}')">Edit</button>
        <button class="modal-close" onclick="ROUTER.closeSlideout()">\u00D7</button>
      </div>
    </div>
    <div class="slideout-body">
      ${amendedHtml}
      ${sec.questionText ? `<div class="co co-g" style="margin-bottom:16px;"><div class="co-l">Question Text</div><div class="co-t" style="white-space:pre-line;font-size:13px;line-height:1.7;">${h(sec.questionText)}</div></div>` : ''}
      ${sec.evaluationCriteria ? `<div class="co co-b" style="margin-bottom:16px;"><div class="co-l">Evaluation Criteria</div><div class="co-t" style="font-size:13px;line-height:1.7;">${h(sec.evaluationCriteria)}</div></div>` : ''}
      ${hurdleHtml}
      ${sec.responseFormat ? `<div class="co co-v" style="margin-bottom:16px;"><div class="co-l">Format Requirements</div><div class="co-t" style="font-size:12px;">${h(sec.responseFormat)}</div></div>` : ''}

      <div class="sh2">Scoring &amp; Limits</div>
      <div class="sg">
        <div class="sg-k">Response Type</div><div class="sg-v">${h((sec.responseType||'').replace(/_/g,' '))}</div>
        <div class="sg-k">Marks Available</div><div class="sg-v" style="font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:700;color:var(--t1);">${sec.evaluationMaxScore != null ? sec.evaluationMaxScore : '\u2014'}</div>
        <div class="sg-k">Word Limit</div><div class="sg-v">${sec.wordLimit ? sec.wordLimit.toLocaleString() + ' words' : '\u2014'}</div>
        <div class="sg-k">Page Limit</div><div class="sg-v">${sec.pageLimit ? sec.pageLimit + ' pages' : '\u2014'}</div>
      </div>

      <div class="sh2" style="margin-top:18px;">Source Reference</div>
      <div class="sg">
        <div class="sg-k">ITT Section</div><div class="sg-v">${h(sec.sectionNumber || '\u2014')}</div>
        <div class="sg-k">Source Volume</div><div class="sg-v">${h(sec.ittVolume || '\u2014')}</div>
        <div class="sg-k">Evaluation Category</div><div class="sg-v">${h(catLabel)}</div>
      </div>
    </div>
  </div>`;
}

function handleResponseItemNotes(idx, val) {
  STORE.mutateBid(ROUTER.bidId, bid => {
    const item = (bid.responseItems||[])[idx];
    if (item) { item.notes = val; item.lastUpdated = STORE.now(); }
  });
}

function _renderProductionSlideout(bid, sectionId) {
  const sections = bid.responseSections || [];
  const items = bid.responseItems || [];
  const sec = sections.find(s => s.id === sectionId);
  if (!sec) return '';
  const item = sec.linkedResponseItemId ? items.find(r => r.id === sec.linkedResponseItemId) : null;
  const teamMembers = (bid.teamMembers || []).filter(m => m.isActive !== false);

  const _sm = {
    not_started:{cls:'fe-mute',label:'Not Started'}, storyboard:{cls:'fe-b',label:'Storyboard'},
    storyboard_approved:{cls:'fe-p',label:'SB Approved'}, first_draft:{cls:'fe-a',label:'1st Draft'},
    pink_ready:{cls:'fe-a',label:'Pink Ready'}, pink_reviewed:{cls:'fe-g',label:'Pink Done'},
    red_ready:{cls:'fe-a',label:'Red Ready'}, red_reviewed:{cls:'fe-g',label:'Red Done'},
    gold_ready:{cls:'fe-a',label:'Gold Ready'}, final:{cls:'fe-g',label:'Final'},
  };
  const status = item ? (item.status || 'not_started') : 'not_started';
  const statusMeta = _sm[status] || { cls:'fe-mute', label:status };
  const statusBadge = `<span class="fe ${statusMeta.cls}">${statusMeta.label}</span>`;

  // Status transition buttons
  let statusBtns = '';
  if (item) {
    const validNext = TRANSITIONS.validNextResponseStatuses(status);
    statusBtns = validNext.map(s => {
      const meta = _sm[s] || { label: s.replace(/_/g,' ') };
      const idx = items.indexOf(item);
      return `<button class="btn btn-sm" onclick="handleResponseStatus(${idx},'${s}');renderApp();">${meta.label}</button>`;
    }).join(' ');
  }

  // Word limit from section (read-only)
  const wordLimit = sec.wordLimit || 0;

  // Owner dropdown from team members
  const ownerOptions = teamMembers.map(m =>
    `<option value="${h(m.name)}" ${(item && item.owner === m.name) ? 'selected' : ''}>${h(m.name)}${m.role ? ' \u2014 ' + h(m.role) : ''}</option>`
  ).join('');

  // Effort and stage deadline
  const effortDays = item ? (item.effortDays || 0) : 0;

  // Structured notes
  const _note = (field, label, placeholder) => {
    const val = item ? (item[field] || '') : '';
    return `<div style="margin-bottom:10px;">
      <label style="font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.04em;text-transform:uppercase;color:var(--t3);display:block;margin-bottom:4px;">${label}</label>
      <textarea class="textarea" style="min-height:48px;" placeholder="${placeholder}" onchange="STORE.mutateBid(ROUTER.bidId,b=>{const r=(b.responseItems||[]).find(x=>x.id==='${item?item.id:''}');if(r){r['${field}']=this.value;r.lastUpdated=STORE.now();}});">${h(val)}</textarea>
    </div>`;
  };

  return `<div class="slideout-overlay" onclick="ROUTER.closeSlideout()"></div>
  <div class="slideout slideout-wide">
    <div class="slideout-hdr">
      <div>
        <div class="slideout-title">${h(sec.reference||'')} \u2014 ${h(sec.title||'')}</div>
        <div style="font-size:10px;color:var(--t3);margin-top:2px;">Production Tracking</div>
      </div>
      <button class="modal-close" onclick="ROUTER.closeSlideout()">\u00D7</button>
    </div>
    <div class="slideout-body">
      ${sec.questionText ? `<div class="co co-g" style="margin-bottom:16px;"><div class="co-l">Question Text</div><div class="co-t" style="white-space:pre-line;font-size:13px;line-height:1.7;">${h(sec.questionText)}</div></div>` : ''}

      <div class="sh2">Status ${statusBadge}</div>
      ${item ? `
      <div style="margin:8px 0 14px;display:flex;gap:6px;flex-wrap:wrap;">${statusBtns || '<span style="color:var(--t3);font-size:11px;">No valid transitions</span>'}</div>

      <div class="sg">
        <div class="sg-k">Owner</div><div class="sg-v">
          <select class="sel" style="font-size:12px;padding:4px 18px 4px 6px;min-width:180px;" onchange="STORE.mutateBid(ROUTER.bidId,b=>{const r=(b.responseItems||[]).find(x=>x.id==='${item.id}');if(r){r.owner=this.value;r.lastUpdated=STORE.now();}});renderApp();">
            <option value="">Select owner</option>
            ${ownerOptions}
          </select>
        </div>
        <div class="sg-k">Word Limit</div><div class="sg-v" style="font-family:'DM Mono',monospace;font-size:12px;color:var(--t1);">${wordLimit ? wordLimit.toLocaleString() + ' words' : '\u2014'}</div>
        <div class="sg-k">Effort (days)</div><div class="sg-v">
          <input class="inp" style="font-size:12px;padding:4px 8px;width:80px;" type="number" value="${effortDays||''}" placeholder="Est." onchange="STORE.mutateBid(ROUTER.bidId,b=>{const r=(b.responseItems||[]).find(x=>x.id==='${item.id}');if(r){r.effortDays=parseFloat(this.value)||0;r.lastUpdated=STORE.now();}});renderApp();">
        </div>
        <div class="sg-k">Stage Deadline</div><div class="sg-v">
          <input class="inp" style="font-size:12px;padding:4px 8px;width:140px;" type="date" value="${item.dueDate||''}" onchange="STORE.mutateBid(ROUTER.bidId,b=>{const r=(b.responseItems||[]).find(x=>x.id==='${item.id}');if(r){r.dueDate=this.value||null;r.lastUpdated=STORE.now();}});renderApp();">
          <span style="font-size:10px;color:var(--t3);margin-top:2px;display:block;">Date to complete this stage and move to next</span>
        </div>
      </div>

      <div class="sh2" style="margin-top:16px;">Production Log</div>
      ${_note('notesNextSteps', 'Next Steps', 'What needs to happen to progress to the next stage\u2026')}
      ${_note('notesIssues', 'Issues & Blockers', 'What is preventing progress right now\u2026')}
      ${_note('notesRisks', 'Risks', 'What could derail quality or timeline\u2026')}
      ${_note('notesConversations', 'Conversation Log', 'Record of discussions, decisions, and agreements\u2026')}
      ` : `<div style="padding:16px 0;"><button class="btn btn-primary" onclick="handleStartProductionForSection('${sec.id}');ROUTER.closeSlideout();">Start Production</button></div>`}
    </div>
  </div>`;
}

function renderSubmissions(bid) {
  const responseItems = bid.responseItems || [];
  const responseSections = bid.responseSections || [];
  const compReqs = bid.complianceRequirements || [];
  const respComp = COMPLIANCE.calculateResponseCompletion(responseItems, bid);
  const compCov = COMPLIANCE.calculateComplianceCoverage(compReqs);

  // Status metadata for 10-stage lifecycle
  const _statusMeta = {
    not_started:        { cls:'fe-mute', label:'Not Started' },
    storyboard:         { cls:'fe-b',    label:'Storyboard' },
    storyboard_approved:{ cls:'fe-p',    label:'SB Approved' },
    first_draft:        { cls:'fe-a',    label:'1st Draft' },
    pink_ready:         { cls:'fe-a',    label:'Pink Ready' },
    pink_reviewed:      { cls:'fe-g',    label:'Pink Done' },
    red_ready:          { cls:'fe-a',    label:'Red Ready' },
    red_reviewed:       { cls:'fe-g',    label:'Red Done' },
    gold_ready:         { cls:'fe-a',    label:'Gold Ready' },
    final:              { cls:'fe-g',    label:'Final' },
  };

  const PIPELINE_COLORS = {
    not_started:'var(--t4)', storyboard:'var(--blu)', storyboard_approved:'var(--cyn)',
    first_draft:'var(--amb)', pink_ready:'var(--pink)', pink_reviewed:'var(--pink)',
    red_ready:'var(--red)', red_reviewed:'var(--red)', gold_ready:'var(--gold)', final:'var(--grn)'
  };

  // View tabs — 4 views (compliance matrix and gap report deferred to V2)
  const views = [['responses','Response Requirements'],['pipeline','Production Pipeline'],['winthemes','Win Themes'],['quality','Quality Overview']];
  const tabHtml = `<div class="view-tabs">${views.map(([id,l]) =>
    `<button class="view-tab ${ROUTER.subView===id?'on':''}" onclick="ROUTER.setSubView('${id}')">${l}</button>`
  ).join('')}</div>`;

  // Reference ribbon — only shown on Response Requirements tab
  const isRefTab = ROUTER.subView === 'responses' || (!ROUTER.subView);
  const ribbonHtml = isRefTab ? _renderReferenceRibbon(bid) : '';

  // Production ribbon — shown on Pipeline tab
  const isPipelineTab = ROUTER.subView === 'pipeline';
  const prodRibbonHtml = isPipelineTab ? _renderProductionRibbon(bid, respComp, PIPELINE_COLORS, _statusMeta) : '';

  // Hard gate warnings — shown on production-related tabs
  let gateHtml = '';
  if ((isPipelineTab || ROUTER.subView === 'quality') && compCov.hasNonCompliant) {
    gateHtml = `<div class="co co-r" style="margin-bottom:10px;"><div class="co-l">Hard Gate</div><div class="co-t">${compCov.nonCompliant} non-compliant declaration${compCov.nonCompliant!==1?'s':''}. Readiness capped at 30%.</div></div>`;
  }

  let bodyHtml = '';
  if (ROUTER.subView === 'pipeline') bodyHtml = _renderProductionPipeline(bid, respComp, _statusMeta, PIPELINE_COLORS);
  else if (ROUTER.subView === 'winthemes') bodyHtml = _renderWinThemes(bid);
  else if (ROUTER.subView === 'quality') bodyHtml = _renderQualityOverview(bid);
  else bodyHtml = _renderResponseRegister(bid);

  // Slideout — reference or production depending on type
  let slideoutHtml = '';
  if (ROUTER._slideout && ROUTER._slideout.type === 'response') {
    slideoutHtml = _renderResponseSlideout(bid, ROUTER._slideout.id);
  } else if (ROUTER._slideout && ROUTER._slideout.type === 'production') {
    slideoutHtml = _renderProductionSlideout(bid, ROUTER._slideout.id);
  }

  return `<div class="sl">Module M5</div>
    <div class="pg-title">Submissions</div>
    <div class="pg-desc">${ROUTER.subView === 'responses' ? 'What the client has released for submission — structured by evaluation category.' : 'Track submission deliverables through the 10-stage production lifecycle, win themes, and quality dimensions.'}</div>
    ${ribbonHtml}
    ${prodRibbonHtml}
    ${gateHtml}
    ${tabHtml}
    ${bodyHtml}
    ${ROUTER.subView !== 'pipeline' ? `<div style="margin-top:16px;display:flex;gap:8px;flex-wrap:wrap;">
      ${ROUTER.subView === 'responses' ? `<button class="btn" onclick="handleResponseCsvImport()">Import Sections CSV</button>` : ''}
      ${ROUTER.subView === 'winthemes' ? `<button class="btn" onclick="handleAddWinThemeModal()">+ Win Theme</button>` : ''}
    </div>` : ''}
    ${slideoutHtml}`;
}

function _renderProductionRibbon(bid, respComp, PIPELINE_COLORS, _statusMeta) {
  const sections = bid.responseSections || [];
  const items = bid.responseItems || [];
  if (sections.length === 0 && items.length === 0) return '';

  const today = new Date().toISOString().split('T')[0];

  // ── Progress vs Time ──
  const progressPct = respComp.progress || 0;
  let timeElapsedPct = 0;
  let progressStatus = 'on_track'; // on_track | at_risk | behind
  let progressColor = 'var(--grn)';
  let progressLabel = 'On Track';

  if (bid.ittIssueDate && bid.submissionDeadline) {
    const issueMs = new Date(bid.ittIssueDate).getTime();
    const deadlineMs = new Date(bid.submissionDeadline).getTime();
    const nowMs = new Date(today).getTime();
    const totalSpan = deadlineMs - issueMs;
    if (totalSpan > 0) {
      timeElapsedPct = Math.min(100, Math.max(0, Math.round((nowMs - issueMs) / totalSpan * 100)));
      const gap = progressPct - timeElapsedPct;
      if (gap < -20) { progressStatus = 'behind'; progressColor = 'var(--red)'; progressLabel = 'Behind'; }
      else if (gap < -5) { progressStatus = 'at_risk'; progressColor = 'var(--amb)'; progressLabel = 'At Risk'; }
      else { progressStatus = 'on_track'; progressColor = 'var(--grn)'; progressLabel = 'On Track'; }
    }
  }

  // ── Coverage ──
  const coveragePct = respComp.productionCoverage || 0;
  const coverageColor = coveragePct >= 80 ? 'var(--grn)' : coveragePct >= 50 ? 'var(--amb)' : 'var(--red)';

  // ── Overdue ──
  const overdueItems = items.filter(r => r.dueDate && r.dueDate < today && (r.status||'not_started') !== 'final');
  const overdueCount = overdueItems.length;
  const overdueColor = overdueCount > 0 ? 'var(--red)' : 'var(--grn)';

  // ── Effort Remaining ──
  const effortRemaining = items.reduce((s, r) => {
    if ((r.status||'not_started') === 'final') return s;
    return s + (r.effortDays || 0);
  }, 0);

  // ── Unassigned ──
  const unassigned = items.filter(r => !r.owner && (r.status||'not_started') !== 'final').length +
    sections.filter(sec => !sec.linkedResponseItemId).length;
  const unassignedColor = unassigned > 0 ? 'var(--red)' : 'var(--grn)';

  // ── Stage Distribution Bar ──
  const stages = Object.keys(COMPLIANCE.STAGE_WEIGHTS);
  const total = respComp.total || 1;
  const distSegs = stages.map(s => {
    let count = respComp.pipeline[s] || 0;
    if (count === 0) return '';
    const color = PIPELINE_COLORS[s] || 'var(--t4)';
    const label = ((_statusMeta||{})[s]||{}).label || s.replace(/_/g,' ');
    return `<div class="pr-dist-seg" style="flex:${count};background:${color};" title="${label}: ${count}">${count > 1 ? count : ''}</div>`;
  }).join('');

  const legendItems = stages.filter(s => (respComp.pipeline[s]||0) > 0).map(s => {
    const color = PIPELINE_COLORS[s] || 'var(--t4)';
    const label = ((_statusMeta||{})[s]||{}).label || s.replace(/_/g,' ');
    const count = respComp.pipeline[s] || 0;
    return `<div class="pr-dist-leg-item"><div class="pr-dist-leg-pip" style="background:${color};"></div>${label} (${count})</div>`;
  }).join('');

  return `<div class="pr-ribbon">
    <div class="pr-cards">
      <div class="pr-card">
        <div class="pr-card-val" style="color:${progressColor};">${progressPct}%</div>
        <div class="pr-card-lbl">Progress</div>
        <div class="pr-card-sub" style="color:${progressColor};">${progressLabel}</div>
        ${timeElapsedPct > 0 ? `<div class="pr-card-sub" style="color:var(--t4);">${timeElapsedPct}% of time elapsed</div>` : ''}
      </div>
      <div class="pr-card">
        <div class="pr-card-val" style="color:${coverageColor};">${respComp.totalItems}/${respComp.totalSections || items.length}</div>
        <div class="pr-card-lbl">Coverage</div>
        <div class="pr-card-sub" style="color:${coverageColor};">${coveragePct}% started</div>
      </div>
      <div class="pr-card">
        <div class="pr-card-val" style="color:${overdueColor};">${overdueCount}</div>
        <div class="pr-card-lbl">Overdue</div>
        <div class="pr-card-sub" style="color:${overdueCount > 0 ? 'var(--red)' : 'var(--t3)'};">${overdueCount > 0 ? 'action required' : 'all on track'}</div>
      </div>
      <div class="pr-card">
        <div class="pr-card-val" style="color:var(--gold);">${effortRemaining || '\u2014'}</div>
        <div class="pr-card-lbl">Effort Left</div>
        <div class="pr-card-sub" style="color:var(--t3);">person-days remaining</div>
      </div>
      <div class="pr-card">
        <div class="pr-card-val" style="color:${unassignedColor};">${unassigned}</div>
        <div class="pr-card-lbl">Unassigned</div>
        <div class="pr-card-sub" style="color:${unassigned > 0 ? 'var(--red)' : 'var(--t3)'};">${unassigned > 0 ? 'no owner' : 'all assigned'}</div>
      </div>
    </div>
    <div class="pr-dist">
      <div class="pr-dist-title">Stage Distribution</div>
      <div class="pr-dist-bar">${distSegs}</div>
      <div class="pr-dist-legend">${legendItems}</div>
    </div>
  </div>`;
}

function _renderReferenceRibbon(bid) {
  const sections = bid.responseSections || [];
  const ef = bid.evaluationFramework || {};
  if (sections.length === 0) return '';

  // ── Panel 1: Evaluation Split Bar ──
  const catColors = { quality:'var(--gold)', price:'var(--blu)', social_value:'var(--cyn)', pass_fail:'var(--t3)', unscored:'var(--t4)' };
  const catLabels = { quality:'Quality', price:'Price', social_value:'Social Value', pass_fail:'Pass/Fail', unscored:'Unscored' };
  const weights = [];
  if (ef.qualityWeightPct) weights.push({ cat:'quality', w:ef.qualityWeightPct });
  if (ef.priceWeightPct) weights.push({ cat:'price', w:ef.priceWeightPct });
  if (ef.socialValueWeightPct) weights.push({ cat:'social_value', w:ef.socialValueWeightPct });
  if (ef.otherWeightPct) weights.push({ cat: ef.otherWeightLabel||'other', w:ef.otherWeightPct });
  const totalWeight = weights.reduce((s,x) => s + x.w, 0);

  let evalBarHtml = '';
  if (weights.length > 0) {
    const segs = weights.map(x =>
      `<div class="sr-eval-seg" style="flex:${x.w};background:${catColors[x.cat]||'var(--t3)'};">${x.w}%</div>`
    ).join('');
    const labels = weights.map(x =>
      `<div class="sr-eval-lbl" style="flex:${x.w};">${catLabels[x.cat]||x.cat}</div>`
    ).join('');
    evalBarHtml = `<div class="sr-eval-bar">
      <div class="sr-eval-bar-title">Evaluation Split</div>
      <div class="sr-eval-segments">${segs}</div>
      <div class="sr-eval-labels">${labels}</div>
    </div>`;
  }

  // ── Panel 2: Total Pages + Total Effort ──
  const totalPages = sections.reduce((s, sec) => s + (sec.pageLimit || 0), 0);
  const totalEffort = sections.reduce((s, sec) => {
    // Derive effort from page count using effort baseline (2 person-days per page for qualitative)
    if (sec.evaluationCategory === 'quality' && sec.responseType === 'written_question') {
      return s + (sec.pageLimit || Math.ceil((sec.wordLimit || 0) / 500) || 0) * 2;
    }
    return s;
  }, 0);

  const statsHtml = `
    <div class="sr-stat">
      <div class="sr-stat-val">${totalPages || '\u2014'}</div>
      <div class="sr-stat-lbl">Total Pages</div>
    </div>
    <div class="sr-stat">
      <div class="sr-stat-val">${totalEffort || '\u2014'}</div>
      <div class="sr-stat-lbl">Est. Effort (days)</div>
    </div>`;

  // ── Panel 3: Submission Inventory ──
  const typeConfig = {
    written_question: { label:'Written Responses', color:'var(--gold)', showPages:true },
    pricing_schedule: { label:'Pricing', color:'var(--blu)', showPages:false },
    document_upload:  { label:'Documents', color:'var(--cyn)', showPages:false },
    certificate:      { label:'Certificates', color:'var(--grn)', showPages:false },
    cv:               { label:'CVs', color:'var(--pink)', showPages:false },
    case_study:       { label:'Case Studies', color:'var(--amb)', showPages:false },
    presentation:     { label:'Presentations', color:'var(--red)', showPages:false },
    form:             { label:'Forms', color:'var(--t2)', showPages:false },
    data_return:      { label:'Data Returns', color:'var(--t2)', showPages:false },
    other:            { label:'Other', color:'var(--t3)', showPages:false },
  };

  // Group sections by responseType
  const byType = {};
  sections.forEach(sec => {
    const t = sec.responseType || 'other';
    if (!byType[t]) byType[t] = [];
    byType[t].push(sec);
  });

  // Render order: written first, then by count
  const typeOrder = ['written_question','pricing_schedule','document_upload','certificate','cv','case_study','presentation','form','data_return','other'];
  const invCards = typeOrder.filter(t => byType[t] && byType[t].length > 0).map(t => {
    const items = byType[t];
    const cfg = typeConfig[t] || { label:t.replace(/_/g,' '), color:'var(--t3)', showPages:false };
    const count = items.length;
    const pages = cfg.showPages ? items.reduce((s,x) => s + (x.pageLimit || Math.ceil((x.wordLimit||0)/500) || 0), 0) : 0;

    // For non-written types, list individual item names
    const showItemNames = !cfg.showPages && count <= 8;
    const itemsHtml = showItemNames ? `<div class="sr-inv-items">${items.map(x =>
      `<div class="sr-inv-item">${(x.title||x.reference||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')}</div>`
    ).join('')}</div>` : '';

    const subText = cfg.showPages && pages ? `${pages} pages` : count === 1 ? '1 required' : `${count} required`;

    return `<div class="sr-inv-card">
      <div class="sr-inv-hdr"><div class="sr-inv-pip" style="background:${cfg.color};"></div><div class="sr-inv-type">${cfg.label}</div></div>
      <div class="sr-inv-count">${count}</div>
      <div class="sr-inv-sub">${subText}</div>
      ${itemsHtml}
    </div>`;
  }).join('');

  return `<div class="sr-ribbon">
    <div class="sr-row1">
      ${evalBarHtml}
      ${statsHtml}
    </div>
    <div class="sr-inventory">${invCards}</div>
  </div>`;
}

function _renderResponseRegister(bid) {
  const sections = bid.responseSections || [];
  const items = bid.responseItems || [];
  const ef = bid.evaluationFramework || {};

  if (sections.length === 0 && items.length === 0) return '<div style="padding:32px;text-align:center;color:var(--t3);font-size:12px;">No response sections yet. Import the exam paper via CSV or add sections manually.</div>';

  // Category display order and weight % from EvaluationFramework
  const categoryOrder = ['quality','price','social_value','pass_fail','unscored'];
  const categoryLabels = { quality:'Quality', price:'Price / Commercial', social_value:'Social Value', pass_fail:'Pass / Fail', unscored:'Unscored' };
  const categoryWeights = {
    quality: ef.qualityWeightPct || null,
    price: ef.priceWeightPct || null,
    social_value: ef.socialValueWeightPct || null,
  };
  if (ef.otherWeightPct) { categoryWeights[ef.otherWeightLabel || 'other'] = ef.otherWeightPct; }

  // Build rows from sections, sorted by client document structure (sortOrder)
  let allRows;
  if (sections.length > 0) {
    allRows = sections.map(sec => ({ section: sec, ref: sec.reference, title: sec.title, sortOrder: sec.sortOrder || 0 }));
    allRows.sort((a,b) => a.sortOrder - b.sortOrder);
  } else {
    // Legacy mode: no sections, use items directly — flat list
    allRows = items.map(r => ({
      section: { id: r.linkedResponseSectionId || r.id, reference: r.reference, title: r.title || r.questionText || '',
        responseType: r.responseType, evaluationCategory: r.evaluationCategory || 'quality',
        evaluationMaxScore: r.evaluationMaxScore, wordLimit: r.wordLimit, pageLimit: r.pageLimit,
        hurdleScore: r.hurdleScore, questionText: r.questionText, evaluationCriteria: r.evaluationCriteria,
        sectionNumber: r.sectionNumber, sortOrder: 0 },
      ref: r.reference, title: r.title || r.questionText || '', sortOrder: 0
    }));
  }

  // Group by evaluationCategory
  const groups = {};
  allRows.forEach(row => {
    const cat = (row.section && row.section.evaluationCategory) || 'unscored';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(row);
  });

  // Render each category group in prescribed order
  const _collapsedSections = window._rrCollapsed || (window._rrCollapsed = {});
  let html = '';
  categoryOrder.forEach(cat => {
    if (!groups[cat] || groups[cat].length === 0) return;
    const rows = groups[cat];
    const weight = categoryWeights[cat];
    const label = categoryLabels[cat] || cat.replace(/_/g,' ');
    const isCollapsed = _collapsedSections[cat] === true;

    html += `<div class="ri-section-hdr" onclick="window._rrCollapsed=window._rrCollapsed||{};window._rrCollapsed['${cat}']=!window._rrCollapsed['${cat}'];renderApp();">
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="ri-section-toggle ${isCollapsed ? 'collapsed' : ''}">&#9660;</span>
        <span class="ri-section-name">${h(label)}</span>
      </div>
      ${weight != null ? `<span class="ri-section-weight" onclick="event.stopPropagation();handleEditSectionWeight('${cat}')" title="Click to edit">${weight}%</span>` : ''}
    </div>`;

    if (!isCollapsed) {
      html += `<div class="ri-section-body">`;
      html += `<div class="ri-hdr"><span>Ref</span><span>Deliverable</span><span>Type</span><span>Output</span><span>Marks</span><span>Hurdle</span></div>`;
      rows.forEach((row, i) => {
        const sec = row.section;
        const wordLimit = sec.wordLimit;
        const pageLimit = sec.pageLimit;
        const marks = sec.evaluationMaxScore;
        const hasHurdle = sec.hurdleScore != null;
        const responseType = (sec.responseType || '').replace(/_/g, ' ');
        const sectionId = sec.id || '';
        const outputParts = [];
        if (wordLimit) outputParts.push(`${wordLimit.toLocaleString()} words`);
        if (pageLimit) outputParts.push(`${pageLimit} pg`);

        html += `<div class="ri-row" onclick="ROUTER.openSlideout('response','${sectionId}')">
          <div class="ri-ref">${h(row.ref || '')}</div>
          <div><div class="ri-title">${h(row.title)}</div></div>
          <div class="ri-title-sub">${h(responseType)}</div>
          <div class="ri-words">${outputParts.length ? outputParts.join(' / ') : '\u2014'}</div>
          <div class="ri-marks">${marks != null ? marks : '\u2014'}</div>
          <div class="ri-hurdle">${hasHurdle ? `<span class="fe fe-r">Yes</span>` : `<span style="color:var(--t4);">\u2014</span>`}</div>
        </div>`;
      });
      html += `</div>`;
    }
  });

  return `<div style="background:var(--bg2);border:1px solid var(--bdr);overflow-x:auto;">${html}</div>`;
}

function _renderProductionPipeline(bid, respComp, _statusMeta, PIPELINE_COLORS) {
  const total = respComp.total || 0;
  if (total === 0) return '<div style="padding:32px;text-align:center;color:var(--t3);font-size:12px;">No response sections or items yet.</div>';

  const stages = Object.keys(COMPLIANCE.STAGE_WEIGHTS);
  const items = bid.responseItems || [];
  const sections = bid.responseSections || [];

  // ── Stage Flow Diagram ── labelled 10-stage lifecycle
  const flowHtml = stages.map((s, i) => {
    const count = respComp.pipeline[s] || 0;
    // For not_started, include unstarted sections
    const extra = s === 'not_started' ? sections.filter(sec => !sec.linkedResponseItemId).length : 0;
    const displayCount = count + extra;
    const meta = _statusMeta[s] || { label: s.replace(/_/g,' ') };
    const color = PIPELINE_COLORS[s] || 'var(--t4)';
    return `<div class="pp-stage">
      <div class="pp-stage-num">${i+1}</div>
      <div class="pp-stage-count" style="color:${displayCount > 0 ? color : 'var(--t4)'};">${displayCount}</div>
      <div class="pp-stage-label">${meta.label}</div>
      <div class="pp-stage-pip" style="background:${color};"></div>
    </div>`;
  }).join('');

  // ── Collapsible Stage Groups ──
  const _ppCollapsed = window._ppCollapsed || (window._ppCollapsed = {});
  const groupedHtml = stages.map(s => {
    const stageItems = items.filter(r => (r.status||'not_started') === s);
    let unstartedSections = [];
    if (s === 'not_started') {
      unstartedSections = sections.filter(sec => !sec.linkedResponseItemId);
    }
    const totalCount = stageItems.length + unstartedSections.length;
    if (totalCount === 0) return '';

    const meta = _statusMeta[s] || { cls:'fe-mute', label: s.replace(/_/g,' ') };
    const color = PIPELINE_COLORS[s] || 'var(--t4)';
    const isCollapsed = _ppCollapsed[s] === true;

    const today = new Date().toISOString().split('T')[0];
    // Item rows — display only, click opens production slideout
    const itemRows = stageItems.map(r => {
      const sec = COMPLIANCE.resolveSection(r, bid);
      const sectionId = r.linkedResponseSectionId || sec.id || '';
      const marks = sec.evaluationMaxScore;
      const responseType = (sec.responseType || '').replace(/_/g, ' ');
      const statusLabel = ((_statusMeta||{})[r.status||'not_started']||{}).label || (r.status||'not_started').replace(/_/g,' ');
      // Schedule indicator: days ahead/behind based on dueDate
      let schedHtml = '<span style="color:var(--t4);">\u2014</span>';
      if (r.dueDate) {
        const due = new Date(r.dueDate); const now = new Date(today);
        const diffDays = Math.round((due - now) / 86400000);
        if (diffDays < 0) schedHtml = `<span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--red);font-weight:600;">${Math.abs(diffDays)}d behind</span>`;
        else if (diffDays === 0) schedHtml = `<span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--amb);">Due today</span>`;
        else if (diffDays <= 3) schedHtml = `<span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--amb);">${diffDays}d left</span>`;
        else schedHtml = `<span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--grn);">${diffDays}d left</span>`;
      }
      return `<div style="padding:8px 14px;border-bottom:1px solid var(--bdr-s);display:grid;grid-template-columns:50px 1fr 80px 45px 80px 80px 70px;gap:8px;align-items:center;cursor:pointer;" onclick="ROUTER.openSlideout('production','${sectionId}')">
        <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--gold);">${h(r.reference||sec.reference||'')}</span>
        <span style="font-size:12px;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${h(r.title||sec.title||'')}</span>
        <span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--t3);">${h(responseType)}</span>
        <span style="font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:700;color:var(--t1);text-align:center;">${marks != null ? marks : '\u2014'}</span>
        <span style="font-size:11px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${h(r.owner||'\u2014')}</span>
        <span class="fe ${((_statusMeta||{})[r.status||'not_started']||{}).cls||'fe-mute'}" style="font-size:9px;">${statusLabel}</span>
        ${schedHtml}
      </div>`;
    }).join('');

    const unstartedRows = unstartedSections.map(sec => {
      const marks = sec.evaluationMaxScore;
      const responseType = (sec.responseType || '').replace(/_/g, ' ');
      return `<div style="padding:8px 14px;border-bottom:1px solid var(--bdr-s);display:grid;grid-template-columns:50px 1fr 80px 45px 80px 80px 70px;gap:8px;align-items:center;opacity:0.6;">
        <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--gold);">${h(sec.reference||'')}</span>
        <span style="font-size:12px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${h(sec.title||'')}</span>
        <span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--t4);">${h(responseType)}</span>
        <span style="font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:700;color:var(--t4);text-align:center;">${marks != null ? marks : '\u2014'}</span>
        <span style="color:var(--t4);">\u2014</span>
        <span class="fe fe-mute" style="font-size:9px;">Not Started</span>
        <span style="color:var(--t4);">\u2014</span>
      </div>`;
    }).join('');

    return `<div class="pp-group-hdr" onclick="window._ppCollapsed=window._ppCollapsed||{};window._ppCollapsed['${s}']=!window._ppCollapsed['${s}'];renderApp();">
      <div class="pp-group-pip" style="background:${color};"></div>
      <span class="pp-group-toggle ${isCollapsed ? 'collapsed' : ''}">&#9660;</span>
      <span class="pp-group-label">${meta.label}</span>
      <span class="pp-group-count">${totalCount} item${totalCount!==1?'s':''}</span>
    </div>
    ${!isCollapsed ? `<div class="pp-group-body">
      <div style="background:var(--bg2);border:1px solid var(--bdr);border-radius:0 0 8px 8px;margin-bottom:4px;">
        <div style="display:grid;grid-template-columns:50px 1fr 80px 45px 80px 80px 70px;gap:8px;padding:4px 14px;font-family:'DM Mono',monospace;font-size:7px;letter-spacing:.06em;text-transform:uppercase;color:var(--t4);border-bottom:1px solid var(--bdr);">
          <span>Ref</span><span>Deliverable</span><span>Type</span><span>Marks</span><span>Owner</span><span>Status</span><span>Schedule</span>
        </div>
        ${itemRows}${unstartedRows}
      </div>
    </div>` : ''}`;
  }).join('');

  return `<div class="pp-flow">${flowHtml}</div>${groupedHtml}`;
}

// _renderComplianceMatrix removed — compliance matrix UX deferred to V2 (managed externally via AI + Excel in V1)

function _renderWinThemes(bid) {
  const themes = bid.winThemes || [];
  const responseItems = bid.responseItems || [];

  // Summary metrics
  const confirmed = themes.filter(t => t.status === 'confirmed').length;
  let totalLinked = 0, totalIntegrated = 0;
  themes.forEach(t => {
    const linked = responseItems.filter(r => (r.qualityWinThemeAssessments||[]).some(a => a.themeId === t.id));
    totalLinked += linked.length;
    totalIntegrated += linked.filter(r => (r.qualityWinThemeAssessments||[]).find(a => a.themeId === t.id && a.integrated)).length;
  });
  const integrationPct = totalLinked > 0 ? Math.round(totalIntegrated / totalLinked * 100) : 0;

  const metricsHtml = `<div class="cg c4" style="margin-bottom:14px;">
    <div class="metric"><div class="metric-val" style="color:var(--t1);">${themes.length}</div><div class="metric-lbl">Total Themes</div></div>
    <div class="metric"><div class="metric-val" style="color:var(--grn);">${confirmed}</div><div class="metric-lbl">Confirmed</div></div>
    <div class="metric"><div class="metric-val" style="color:var(--blu);">${totalLinked}</div><div class="metric-lbl">Linked Responses</div></div>
    <div class="metric"><div class="metric-val" style="color:${integrationPct>=80?'var(--grn)':integrationPct>=40?'var(--amb)':'var(--red)'};">${integrationPct}%</div><div class="metric-lbl">Integration</div></div>
  </div>`;

  if (themes.length === 0) {
    return `${metricsHtml}<div style="padding:32px;text-align:center;color:var(--t3);font-size:12px;">
      No win themes defined. Win themes articulate why the client should choose you.
      <br><br><button class="btn btn-primary" onclick="handleAddWinThemeModal()">+ Add Win Theme</button>
    </div>`;
  }

  const _wtStatus = s => {
    const m = { draft:'fe-mute', proposed:'fe-b', confirmed:'fe-g', retired:'fe-r' };
    return `<span class="fe ${m[s]||'fe-mute'}">${(s||'draft').replace(/_/g,' ')}</span>`;
  };

  const rows = themes.map((t, i) => {
    const linked = responseItems.filter(r => (r.qualityWinThemeAssessments||[]).some(a => a.themeId === t.id));
    const integrated = linked.filter(r => (r.qualityWinThemeAssessments||[]).find(a => a.themeId === t.id && a.integrated)).length;
    const iPct = linked.length > 0 ? Math.round(integrated / linked.length * 100) : 0;
    return `<div class="wt-row">
      <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--gold);">${h(t.reference||'WT'+(i+1))}</div>
      <div style="font-size:12px;color:var(--t1);line-height:1.4;">${h(t.statement||'')}${t.rationale ? `<div style="font-size:10px;color:var(--t3);margin-top:1px;">${h(t.rationale)}</div>` : ''}</div>
      <div>${_wtStatus(t.status)}</div>
      <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--t2);text-align:center;">${linked.length}</div>
      <div style="font-family:'DM Mono',monospace;font-size:10px;color:${iPct>=80?'var(--grn)':iPct>=40?'var(--amb)':'var(--t3)'};text-align:center;">${iPct}%</div>
    </div>`;
  }).join('');

  return `${metricsHtml}
    <div style="background:var(--bg2);border:1px solid var(--bdr);overflow-x:auto;">
      <div class="wt-hdr"><span>Ref</span><span>Statement</span><span>Status</span><span>Linked</span><span>Intg %</span></div>
      ${rows}
    </div>`;
}

function _renderQualityOverview(bid) {
  const items = bid.responseItems || [];
  if (items.length === 0) return '<div style="padding:32px;text-align:center;color:var(--t3);font-size:12px;">No response items to assess quality against.</div>';

  // Aggregate quality dimensions
  let aqY=0, aqP=0, aqN=0, aqNA=0;
  let fsY=0, fsP=0, fsN=0, fsNA=0;
  let credY=0, credP=0, credN=0, credNA=0;
  let selfScoreSum=0, selfScoreCount=0;
  items.forEach(r => {
    const aq = r.qualityAnswersQuestion || 'not_assessed';
    if (aq === 'yes') aqY++; else if (aq === 'partial') aqP++; else if (aq === 'no') aqN++; else aqNA++;
    const fs = r.qualityFollowsStructure || 'not_assessed';
    if (fs === 'yes') fsY++; else if (fs === 'partial') fsP++; else if (fs === 'no') fsN++; else fsNA++;
    const cr = r.qualityCredentials || 'not_assessed';
    if (cr === 'yes') credY++; else if (cr === 'partial') credP++; else if (cr === 'no') credN++; else credNA++;
    if (r.qualityScoreSelfAssessment != null) { selfScoreSum += r.qualityScoreSelfAssessment; selfScoreCount++; }
  });
  const tot = items.length;
  const avgScore = selfScoreCount > 0 ? Math.round(selfScoreSum / selfScoreCount * 10) / 10 : 'N/A';

  const metricsHtml = `<div class="cg c5" style="margin-bottom:14px;">
    <div class="qual-card"><div class="qual-val" style="color:${aqY/tot>=.8?'var(--grn)':'var(--amb)'};">${Math.round(aqY/tot*100)}%</div><div class="qual-lbl">Answers Question</div></div>
    <div class="qual-card"><div class="qual-val" style="color:${fsY/tot>=.8?'var(--grn)':'var(--amb)'};">${Math.round(fsY/tot*100)}%</div><div class="qual-lbl">Follows Structure</div></div>
    <div class="qual-card"><div class="qual-val" style="color:var(--cyn);">${avgScore}</div><div class="qual-lbl">Avg Self Score</div></div>
    <div class="qual-card"><div class="qual-val" style="color:${credY/tot>=.8?'var(--grn)':'var(--amb)'};">${Math.round(credY/tot*100)}%</div><div class="qual-lbl">Credentials Used</div></div>
    <div class="qual-card"><div class="qual-val" style="color:var(--t1);">${Math.round((tot-aqNA)/tot*100)}%</div><div class="qual-lbl">Quality Assessed</div></div>
  </div>`;

  // Quality dimension detail breakdown
  const dimRow = (label, y, p, n, na) => `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bg4);">
    <span style="flex:1;font-size:12px;color:var(--t1);">${label}</span>
    <span class="fe fe-g">${y} yes</span>
    <span class="fe fe-a">${p} partial</span>
    <span class="fe fe-r">${n} no</span>
    <span class="fe fe-mute">${na} n/a</span>
  </div>`;

  const detailHtml = `<div class="sh2">Quality Dimension Breakdown</div>
    <div style="background:var(--bg2);border:1px solid var(--bdr);padding:10px 14px;margin-bottom:14px;">
      ${dimRow('Answers the Question', aqY, aqP, aqN, aqNA)}
      ${dimRow('Follows Required Structure', fsY, fsP, fsN, fsNA)}
      ${dimRow('Credentials Incorporated', credY, credP, credN, credNA)}
    </div>`;

  // Items with quality gaps
  const gapItems = items.filter(r =>
    r.qualityAnswersQuestion === 'no' || r.qualityAnswersQuestion === 'partial' ||
    r.qualityFollowsStructure === 'no' || r.qualityFollowsStructure === 'partial' ||
    r.qualityCredentials === 'no' || r.qualityCredentials === 'partial'
  ).sort((a,b) => (b.evaluationWeightPct||0) - (a.evaluationWeightPct||0));

  let gapHtml = '';
  if (gapItems.length > 0) {
    gapHtml = `<div class="sh2">Items with Quality Gaps (${gapItems.length})</div>
