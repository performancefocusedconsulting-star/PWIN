    addReq(r)     { _d.requirements.push(r); _persist(); },
    removeReq(i)  { _d.requirements.splice(i,1); _persist(); },
    addResponseSection(r)  { _d.responseSections.push(r); _persist(); },
    removeResponseSection(i){ _d.responseSections.splice(i,1); _persist(); },
    addResponseItem(r)     { _d.responseItems.push(r); _persist(); },
    removeResponseItem(i)  { _d.responseItems.splice(i,1); _persist(); },
    addCompReq(r)          { _d.complianceRequirements.push(r); _persist(); },
    removeCompReq(i)       { _d.complianceRequirements.splice(i,1); _persist(); },
    addITTDocument(r)      { _d.ittDocuments.push(r); _persist(); },
    removeITTDocument(i)   { _d.ittDocuments.splice(i,1); _persist(); },
    addHoliday(d) { if (!_d.publicHolidays.includes(d)) { _d.publicHolidays.push(d); _d.publicHolidays.sort(); _persist(); } },
    removeHoliday(i){ _d.publicHolidays.splice(i,1); _persist(); },
    setMilestoneDate(i, date) { _d.milestones[i].date = date; _persist(); },
    addMilestone(type, label) { _d.milestones.push({type, label, date:'', required:false}); _persist(); },
    removeMilestone(i) { if (_d.milestones[i] && !_d.milestones[i].required) { _d.milestones.splice(i,1); _persist(); } },
    abandon() { localStorage.removeItem('pwin:wizard:draft'); _d = null; },
  };
})();


/* ════════════════════════════════════════════════════════════
   SCHED — Scheduling Engine
   Calendar utilities, backward scheduling, buffer analysis.
   Rules: bid_execution_rules.html §1.1–1.7, §10.1
════════════════════════════════════════════════════════════ */
const SCHED = (() => {

  // ── Date helpers ──────────────────────────────────────────
  // All dates as 'YYYY-MM-DD' strings; parsed at noon to avoid TZ shift.
  function _d(s) { return new Date(s + 'T12:00:00'); }
  function _fmt(dt) {
    const y = dt.getFullYear();
    const m = String(dt.getMonth() + 1).padStart(2, '0');
    const d = String(dt.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }
  function _addDays(s, n) {
    const dt = _d(s);
    dt.setDate(dt.getDate() + n);
    return _fmt(dt);
  }

  // ── Rule 1.1: Elapsed duration ────────────────────────────
  // Coordination overhead: 20% per additional person
  function elapsedDays(effortDays, teamSize) {
    if (!effortDays || effortDays <= 0) return 0;
    if (teamSize <= 0) return effortDays;
    if (teamSize === 1) return effortDays;
    const coordFactor = 1 + ((teamSize - 1) * 0.20);
    return Math.ceil((effortDays / teamSize) * coordFactor);
  }

  // ── Rule 1.2: Working day check ──────────────────────────
  function isWorkingDay(dateStr, cal) {
    const dt = _d(dateStr);
    const dow = dt.getDay(); // 0=Sun, 1=Mon ... 6=Sat
    // Convert JS dow (0=Sun) to ISO dow (1=Mon..7=Sun)
    const isoDow = dow === 0 ? 7 : dow;

    // Weekend working overrides (forced working day)
    if (cal.weekendWorking && cal.weekendWorking.length) {
      for (const range of cal.weekendWorking) {
        if (dateStr >= range.from && dateStr <= range.to) return true;
      }
    }

    // Check standard working days
    if (!cal.workingDays.includes(isoDow)) return false;

    // Public holidays
    if (cal.publicHolidays && cal.publicHolidays.includes(dateStr)) return false;

    return true;
  }

  // ── Rule 1.3: Add working days ────────────────────────────
  function addWorkingDays(startDate, numDays, cal) {
    let current = startDate;
    let added = 0;
    while (added < numDays) {
      current = _addDays(current, 1);
      if (isWorkingDay(current, cal)) added++;
    }
    return current;
  }

  // ── Subtract working days (inverse of 1.3) ───────────────
  function subtractWorkingDays(startDate, numDays, cal) {
    let current = startDate;
    let removed = 0;
    while (removed < numDays) {
      current = _addDays(current, -1);
      if (isWorkingDay(current, cal)) removed++;
    }
    return current;
  }

  // ── Rule 1.4: Count working days between ──────────────────
  function countWorkingDays(startDate, endDate, cal) {
    if (startDate >= endDate) return 0;
    let count = 0;
    let current = startDate;
    while (current < endDate) {
      current = _addDays(current, 1);
      if (isWorkingDay(current, cal)) count++;
    }
    return count;
  }

  // ── Rule 1.7: Buffer between two activities ───────────────
  function calculateBuffer(actA, actB, cal) {
    if (!actA.plannedEnd || !actB.plannedStart) return null;
    const days = countWorkingDays(actA.plannedEnd, actB.plannedStart, cal);
    let status = 'healthy';
    if (days <= 0) status = 'critical';
    else if (days < 5) status = 'compressed';
    return { days, status };
  }

  // ── Rule 1.5: Backward schedule ───────────────────────────
  // Schedules active activities backward from submission deadline.
  // Returns a Map: activityId → { plannedStart, plannedEnd }
  function backwardSchedule(activities, submissionDeadline, cal) {
    const active = activities.filter(a => a.active !== false && a.status !== 'deactivated');
    const activeIds = new Set(active.map(a => a.id));
    const byId = {};
    active.forEach(a => { byId[a.id] = a; });

    // Build reverse dependency graph: for each activity, which active activities depend on it
    const dependents = {}; // actId → Set of dependent actIds
    active.forEach(a => { dependents[a.id] = new Set(); });
    active.forEach(a => {
      (a.dependencies || []).forEach(depId => {
        if (activeIds.has(depId) && dependents[depId]) {
          dependents[depId].add(a.id);
        }
      });
    });

    const scheduled = {};

    // Find leaf activities (no active dependents — they finish at deadline)
    const leaves = active.filter(a => dependents[a.id].size === 0);

    // Schedule leaves: they end at submission deadline
    leaves.forEach(a => {
      const elapsed = elapsedDays(a.effortDays, a.teamSize);
      const plannedEnd = submissionDeadline;
      const plannedStart = elapsed > 0
        ? subtractWorkingDays(submissionDeadline, elapsed, cal)
        : submissionDeadline;
      scheduled[a.id] = { plannedStart, plannedEnd };
    });

    // Iteratively schedule remaining activities (work backward through deps)
    let maxIter = active.length * active.length; // safety limit
    while (Object.keys(scheduled).length < active.length && maxIter-- > 0) {
      for (const a of active) {
        if (scheduled[a.id]) continue;
        // Can schedule if ALL dependents are scheduled
        const deps = dependents[a.id];
        const allDepsScheduled = [...deps].every(dId => scheduled[dId]);
        if (!allDepsScheduled) continue;

        // End before earliest dependent start (minus 1 working day gap)
        let earliestDepStart = null;
        for (const dId of deps) {
          const ds = scheduled[dId].plannedStart;
          if (!earliestDepStart || ds < earliestDepStart) earliestDepStart = ds;
        }

        const plannedEnd = subtractWorkingDays(earliestDepStart, 1, cal);
        const elapsed = elapsedDays(a.effortDays, a.teamSize);
        const plannedStart = elapsed > 0
          ? subtractWorkingDays(plannedEnd, elapsed, cal)
          : plannedEnd;
        scheduled[a.id] = { plannedStart, plannedEnd };
      }
    }

    // Handle any activities with zero active dependents that weren't leaves
    // (circular deps fallback — schedule at deadline)
    active.forEach(a => {
      if (!scheduled[a.id]) {
        scheduled[a.id] = { plannedStart: submissionDeadline, plannedEnd: submissionDeadline };
      }
    });

    // Step 5: Adjust for team unavailability
    if (cal.teamUnavailability && cal.teamUnavailability.length) {
      active.forEach(a => {
        if (!a.owner || !scheduled[a.id]) return;
        const sched = scheduled[a.id];
        let overlapDays = 0;
        for (const u of cal.teamUnavailability) {
          // Match by owner name (case-insensitive)
          if (u.name && a.owner && u.name.toLowerCase() === a.owner.toLowerCase()) {
            // Count overlap working days
            const oStart = u.from > sched.plannedStart ? u.from : sched.plannedStart;
            const oEnd   = u.to < sched.plannedEnd ? u.to : sched.plannedEnd;
            if (oStart <= oEnd) {
              overlapDays += countWorkingDays(oStart, oEnd, cal);
            }
          }
        }
        if (overlapDays > 0) {
          sched.plannedStart = subtractWorkingDays(sched.plannedStart, overlapDays, cal);
        }
      });
    }

    return scheduled;
  }

  // ── Critical path finder ─────────────────────────────────
  // Finds the longest chain (by elapsed days) through the dependency graph.
  function findCriticalPath(activities, schedule) {
    const active = activities.filter(a => a.active !== false && a.status !== 'deactivated');
    const byId = {};
    active.forEach(a => { byId[a.id] = a; });

    // Build adjacency: activity → its dependencies (predecessors)
    const deps = {};
    active.forEach(a => { deps[a.id] = (a.dependencies || []).filter(d => byId[d]); });

    // Memoised longest-path-to from each node
    const memo = {};
    function longest(id) {
      if (memo[id] !== undefined) return memo[id];
      const el = elapsedDays(byId[id].effortDays, byId[id].teamSize);
      if (!deps[id] || deps[id].length === 0) {
        memo[id] = { len: el, path: [id] };
        return memo[id];
      }
      let best = { len: 0, path: [] };
      for (const pid of deps[id]) {
        const sub = longest(pid);
        if (sub.len > best.len) best = sub;
      }
      memo[id] = { len: best.len + el, path: [...best.path, id] };
      return memo[id];
    }

    let overall = { len: 0, path: [] };
    active.forEach(a => {
      const r = longest(a.id);
      if (r.len > overall.len) overall = r;
    });

    return overall.path.map(id => byId[id]);
  }

  // ── Rule 10.1: Feasibility check ──────────────────────────
  function runFeasibilityCheck(bid, activities, cal) {
    const ittDate = bid.ittIssueDate || bid.submissionDeadline;
    const availableDays = countWorkingDays(ittDate, bid.submissionDeadline, cal);

    // Run backward scheduler
    const schedule = backwardSchedule(activities, bid.submissionDeadline, cal);

    // Critical path
    const criticalPath = findCriticalPath(activities, schedule);
    const criticalPathDays = criticalPath.reduce((s, a) => s + elapsedDays(a.effortDays, a.teamSize), 0);
    const criticalPathBuffer = availableDays - criticalPathDays;

    // Earliest start check
    let earliestStart = bid.submissionDeadline;
    for (const id of Object.keys(schedule)) {
      if (schedule[id].plannedStart < earliestStart) earliestStart = schedule[id].plannedStart;
    }
    const startsBeforeITT = earliestStart < ittDate;

    // Per-workstream analysis
    const active = activities.filter(a => a.active !== false && a.status !== 'deactivated');
    const wsMap = {};
    active.forEach(a => {
      const wsId = a.workstreamId;
      if (!wsMap[wsId]) wsMap[wsId] = { id: wsId, activities: [], totalEffort: 0 };
      wsMap[wsId].activities.push(a);
      wsMap[wsId].totalEffort += elapsedDays(a.effortDays, a.teamSize);
    });
    const workstreamAnalysis = Object.values(wsMap).map(ws => {
      // Window = earliest start to latest end within this workstream
      let wsStart = bid.submissionDeadline, wsEnd = ittDate;
      ws.activities.forEach(a => {
        const s = schedule[a.id];
        if (s) {
          if (s.plannedStart < wsStart) wsStart = s.plannedStart;
          if (s.plannedEnd > wsEnd) wsEnd = s.plannedEnd;
        }
      });
      const availableWindow = countWorkingDays(wsStart, wsEnd, cal);
      const surplus = availableWindow - ws.totalEffort;
      const health = surplus < 0 ? 'critical' : surplus < 3 ? 'compressed' : 'healthy';
      return { id: ws.id, totalEffort: ws.totalEffort, availableWindow, surplus, health };
    });

    // Resource conflicts (same owner with overlapping scheduled activities)
    const conflicts = [];
    const ownerActs = {};
    active.forEach(a => {
      if (!a.owner) return;
      const o = a.owner.toLowerCase();
      if (!ownerActs[o]) ownerActs[o] = [];
      ownerActs[o].push(a);
    });
    for (const [owner, acts] of Object.entries(ownerActs)) {
      for (let i = 0; i < acts.length; i++) {
        for (let j = i + 1; j < acts.length; j++) {
          const sA = schedule[acts[i].id], sB = schedule[acts[j].id];
          if (sA && sB && sA.plannedStart <= sB.plannedEnd && sB.plannedStart <= sA.plannedEnd) {
            conflicts.push({ owner, actA: acts[i].id, actB: acts[j].id });
          }
        }
      }
    }

    // Calendar conflicts (unavailability overlapping scheduled activities)
    const calendarConflicts = [];
    if (cal.teamUnavailability) {
      active.forEach(a => {
        if (!a.owner) return;
        const s = schedule[a.id];
        if (!s) return;
        cal.teamUnavailability.forEach(u => {
          if (u.name && a.owner && u.name.toLowerCase() === a.owner.toLowerCase()) {
            if (u.from <= s.plannedEnd && u.to >= s.plannedStart) {
              calendarConflicts.push({ owner: a.owner, activity: a.id, from: u.from, to: u.to });
            }
          }
        });
      });
    }

    // Verdict
    let verdict, deficit = 0;
    if (startsBeforeITT || criticalPathBuffer < 0) {
      verdict = 'infeasible';
      deficit = startsBeforeITT
        ? countWorkingDays(earliestStart, ittDate, cal)
        : Math.abs(criticalPathBuffer);
    } else if (criticalPathBuffer < 3) {
      verdict = 'tight';
      deficit = 3 - criticalPathBuffer;
    } else {
      verdict = 'feasible';
    }

    return {
      verdict, availableDays, criticalPathDays, criticalPathBuffer,
      criticalPath, schedule, workstreamAnalysis,
      conflicts, calendarConflicts, deficit,
      earliestStart, startsBeforeITT,
    };
  }

  // ── Rule 10.2: Recommendations ─────────────────────────────
  function generateRecommendations(result, activities) {
    if (result.verdict === 'feasible') return [];
    const recs = [];
    const cpIds = new Set(result.criticalPath.map(a => a.id));
    const deficit = result.deficit || (3 - result.criticalPathBuffer);

    // Rec 1: Add resource to parallelisable critical-path activities
    result.criticalPath.forEach(a => {
      if (a.parallelisationType !== 'P') return;
      const cur = elapsedDays(a.effortDays, a.teamSize);
      const next = elapsedDays(a.effortDays, a.teamSize + 1);
      const saving = cur - next;
      if (saving >= 1) {
        recs.push({
          type: 'add_resource', activity: a.id, saving,
          description: `Add 1 person to ${a.name} (${a.id})`,
          detail: `Saves ${saving} days. New elapsed: ${next} days (from ${cur}).`,
          risk: 'Coordination overhead increases — 20% per additional person',
        });
      }
    });

    // Rec 2: Early start (loosen dependency threshold)
    const byId = {};
    activities.forEach(a => { byId[a.id] = a; });
    result.criticalPath.forEach(a => {
      (a.dependencies || []).forEach(depId => {
        if (cpIds.has(depId)) {
          recs.push({
            type: 'early_start', activity: a.id, saving: 0,
            description: `Allow ${a.id} to start when ${depId} reaches 'in_progress'`,
            detail: 'Process change — no additional cost.',
            risk: 'Downstream work may need revision if upstream changes after early start',
          });
        }
      });
    });

    // Rec 3: Negotiate timeline (deficit > 10)
    if (deficit > 10) {
      recs.push({
        type: 'negotiate_timeline', saving: deficit,
        description: `Request ${deficit + 5} additional calendar days from client`,
        detail: `Eliminates ${deficit}-day deficit.`,
        risk: 'Client may decline. Raises question about capability.',
      });
      recs.push({
        type: 'reduce_scope', saving: 0,
        description: 'Deactivate non-critical activities to reduce workload',
        detail: 'Review critical path for lower-priority activities.',
        risk: 'Reduces bid quality in deactivated areas',
      });
    }

    // Sort: highest saving first
    recs.sort((a, b) => (b.saving || 0) - (a.saving || 0));
    return recs;
  }

  // ── Public API ────────────────────────────────────────────
  return {
    elapsedDays,
    isWorkingDay,
    addWorkingDays,
    subtractWorkingDays,
    countWorkingDays,
    calculateBuffer,
    backwardSchedule,
    findCriticalPath,
    runFeasibilityCheck,
    generateRecommendations,
  };
})();


/* ════════════════════════════════════════════════════════════
   TRANSITIONS — State Machine Enforcement (Rule Set 2)
════════════════════════════════════════════════════════════ */
const TRANSITIONS = (() => {

  // Rule 2.1: Valid activity status transitions
  const _actValid = {
    not_started:    ['in_progress', 'deactivated'],
    in_progress:    ['draft_complete', 'not_started'],
    draft_complete: ['final', 'in_progress'],
    final:          ['draft_complete'],
    deactivated:    ['not_started'],
  };

  // Rule 2.2: Valid output assurance transitions
  const _assValid = {
    unassured:        ['under_review'],
    under_review:     ['assured', 'unassured'],
    assured:          ['accepted_at_gate', 'under_review'],
    accepted_at_gate: ['assured'],
  };

  // Rule 2.5: Valid ResponseItem status transitions
  const _respValid = {
    not_started:        ['storyboard'],
    storyboard:         ['storyboard_approved', 'not_started'],
    storyboard_approved:['first_draft', 'storyboard'],
    first_draft:        ['pink_ready', 'storyboard_approved'],
    pink_ready:         ['pink_reviewed'],           // auto-advance on review closure
    pink_reviewed:      ['red_ready', 'first_draft'],
    red_ready:          ['red_reviewed'],             // auto-advance on review closure
    red_reviewed:       ['gold_ready', 'pink_reviewed'],
    gold_ready:         ['final'],                    // auto-advance on review closure
    final:              [],
  };

  // Rule 2.6: Valid ComplianceRequirement status transitions
  const _compValid = {
    not_assessed:         ['compliant', 'partially_compliant', 'non_compliant', 'not_applicable'],
    compliant:            ['partially_compliant', 'non_compliant', 'not_assessed'],
    partially_compliant:  ['compliant', 'non_compliant', 'not_assessed'],
    non_compliant:        ['partially_compliant', 'compliant', 'not_assessed'],
    not_applicable:       ['not_assessed'],
  };

  // Legacy coverage transitions (kept for backward compat during migration)
  const _covValid = {
    unmapped:          ['mapped', 'gap'],
    mapped:            ['draft_in_progress', 'gap'],
    draft_in_progress: ['reviewed', 'gap'],
    reviewed:          ['approved', 'gap'],
    approved:          ['gap'],
    gap:               ['mapped'],
  };

  function canTransition(from, to, table) {
    return (table[from] || []).includes(to);
  }

  // Attempt status change — returns { ok, error? }
  function changeActivityStatus(activity, newStatus) {
    const from = activity.status || 'not_started';
    if (from === newStatus) return { ok: true };
    if (!canTransition(from, newStatus, _actValid)) {
      return { ok: false, error: `Cannot move from "${from}" to "${newStatus}"` };
    }
    activity.status = newStatus;
    activity.lastUpdated = new Date().toISOString();
    // Rule 2.1 side effects
    if (newStatus === 'in_progress' && !activity.actualStart) {
      activity.actualStart = STORE.today();
    }
    if (newStatus === 'final') {
      activity.actualEnd = STORE.today();
    }
    if (newStatus === 'deactivated') {
      activity.active = false;
    }
    if (newStatus === 'not_started' && from === 'deactivated') {
      activity.active = true;
    }
    return { ok: true };
  }

  function changeAssurance(activity, newAssurance) {
    const from = activity.assurance || 'unassured';
    // Map legacy 'none' to 'unassured'
    const fromNorm = from === 'none' ? 'unassured' : from;
    if (fromNorm === newAssurance) return { ok: true };
    if (!canTransition(fromNorm, newAssurance, _assValid)) {
      return { ok: false, error: `Cannot move assurance from "${fromNorm}" to "${newAssurance}"` };
    }
    activity.assurance = newAssurance;
    activity.lastUpdated = new Date().toISOString();
    return { ok: true };
  }

  // Rule 2.5: ResponseItem status change
  function changeResponseItemStatus(item, newStatus) {
    const from = item.status || 'not_started';
    if (from === newStatus) return { ok: true };
    if (!canTransition(from, newStatus, _respValid)) {
      return { ok: false, error: `Cannot move response item from "${from}" to "${newStatus}"` };
    }
    item.status = newStatus;
    item.lastUpdated = new Date().toISOString();
    return { ok: true };
  }

  // Rule 2.6: ComplianceRequirement status change
  function changeComplianceStatus(req, newStatus) {
    const from = req.complianceStatus || 'not_assessed';
    if (from === newStatus) return { ok: true };
    if (!canTransition(from, newStatus, _compValid)) {
      return { ok: false, error: `Cannot move compliance from "${from}" to "${newStatus}"` };
    }
    // Rule 2.6: explanation required for partial/non-compliant
    if ((newStatus === 'partially_compliant' || newStatus === 'non_compliant') && !req.complianceExplanation) {
      return { ok: false, error: `Explanation required when setting status to "${newStatus.replace(/_/g,' ')}"` };
    }
    req.complianceStatus = newStatus;
    req.lastUpdated = new Date().toISOString();
    return { ok: true };
  }

  // Legacy: Auto-update requirement coverage based on linked activity
  function autoUpdateCoverage(requirement, activity) {
    if (!activity) return;
    const s = activity.status;
    const a = activity.assurance || 'none';
    let target = requirement.coverageStatus || 'unmapped';
    if (a === 'assured' || a === 'accepted_at_gate') target = 'approved';
    else if (a === 'under_review')                    target = 'reviewed';
    else if (s === 'in_progress' || s === 'draft_complete' || s === 'final') target = 'draft_in_progress';
    if (target !== requirement.coverageStatus && canTransition(requirement.coverageStatus, target, _covValid)) {
      requirement.coverageStatus = target;
    }
  }

  function validNextStatuses(current) { return _actValid[current] || []; }
  function validNextAssurances(current) {
    const norm = (!current || current === 'none') ? 'unassured' : current;
    return _assValid[norm] || [];
  }
  function validNextResponseStatuses(current) { return _respValid[current || 'not_started'] || []; }
  function validNextComplianceStatuses(current) { return _compValid[current || 'not_assessed'] || []; }

  return {
    canTransition, changeActivityStatus, changeAssurance,
    changeResponseItemStatus, changeComplianceStatus,
    autoUpdateCoverage, validNextStatuses, validNextAssurances,
    validNextResponseStatuses, validNextComplianceStatuses,
    _actValid, _assValid, _covValid, _respValid, _compValid,
  };
})();


/* ════════════════════════════════════════════════════════════
   NUDGE — Smart Nudging Engine (Rule Set 4)
════════════════════════════════════════════════════════════ */
const NUDGE = (() => {

  // Stale thresholds by phase (working days)
  const _thresholds = { DEV: 3, PRD: 3, POST: 2, CONT: 5 };

  function _daysSince(isoStr) {
    if (!isoStr) return 999;
    const then = new Date(isoStr); const now = new Date();
    then.setHours(0,0,0,0); now.setHours(0,0,0,0);
    return Math.floor((now - then) / 86400000);
  }

  function generateNudges(bid) {
    const nudges = [];
    const acts = bid.activities || [];
    const byId = {};
    acts.forEach(a => { byId[a.id] = a; });

    acts.forEach(a => {
      if (!a.active || a.status === 'deactivated') return;

      // 4.1: Stale activity
      if (a.status === 'in_progress' || a.status === 'draft_complete') {
        const ws = (bid.workstreams || []).find(w => w.id === a.workstreamId);
        const ph = ws ? ws.phase : 'DEV';
        const threshold = _thresholds[ph] || 3;
        const days = _daysSince(a.lastUpdated);
        if (days >= threshold) {
          nudges.push({
            type: 'stale', severity: 'amber', activityId: a.id,
            message: `${a.id} (${a.name}) not updated in ${days} days \u2014 still ${a.status.replace('_',' ')}?`,
          });
        }
      }

      // 4.2: Unblocked item
      if (a.status === 'not_started' && a.dependencies && a.dependencies.length > 0) {
        const allMet = a.dependencies.every(depId => {
          const dep = byId[depId];
          if (!dep || !dep.active || dep.status === 'deactivated') return true;
          // Default threshold: draft_complete
          const threshold = a.dependencyThreshold || 'draft_complete';
          const rank = { not_started: 0, in_progress: 1, draft_complete: 2, final: 3 };
          return (rank[dep.status] || 0) >= (rank[threshold] || 2);
        });
        if (allMet) {
          nudges.push({
            type: 'unblocked', severity: 'green', activityId: a.id,
            message: `${a.id} is now unblocked \u2014 all dependencies met. Ready to start?`,
          });
        }
      }

      // 4.3: Approaching deadline
      if (a.plannedEnd && a.status !== 'final') {
        const daysLeft = daysUntil(a.plannedEnd);
        if (daysLeft !== null && daysLeft <= 5 && daysLeft >= 0) {
          nudges.push({
            type: 'deadline', severity: 'red', activityId: a.id,
            message: `${a.id} due in ${daysLeft} day${daysLeft!==1?'s':''} \u2014 currently ${a.status.replace('_',' ')}. On track?`,
          });
        }
      }
    });

    return nudges;
  }

  return { generateNudges };
})();


/* ════════════════════════════════════════════════════════════
   COMPLIANCE — Dual-Register Engine (Rule Set 6)
   Register 1: Submission Requirements (ResponseItems)
   Register 2: Compliance Matrix (ComplianceRequirements) — optional
════════════════════════════════════════════════════════════ */
const COMPLIANCE = (() => {

  // ── ResponseSection resolver ────────────────────────────
  // Resolves question-definition fields from the linked ResponseSection
  function resolveSection(item, bid) {
    if (!bid || !bid.responseSections) return {};
    const sid = item.linkedResponseSectionId;
    if (!sid) return item; // legacy item, fields still inline
    return bid.responseSections.find(s => s.id === sid) || {};
  }

  // ── Effort derivation (Rule 6.1) ────────────────────────
  // Days per page by complexity tier (page = ~500 words)
  const _daysPerPage = { low: 0.5, medium: 1.0, high: 2.0, very_high: 3.0 };

  function deriveEffort(item, bid) {
    if (item.effortDays != null && item.effortDays > 0) return item.effortDays; // manual override
    const sec = resolveSection(item, bid);
    const wl = sec.wordLimit || item.wordLimit || 0;
    if (wl <= 0) return 0;
    const pages = wl / 500;
    const complexity = item.complexityEstimate || 'high';
    return Math.round(pages * (_daysPerPage[complexity] || 2.0) * 10) / 10;
  }

  // ── Rule 6.1: Response completion calculations ──────────
  const STAGE_WEIGHTS = {
    not_started: 0, storyboard: 10, storyboard_approved: 20,
    first_draft: 35, pink_ready: 45, pink_reviewed: 55,
    red_ready: 65, red_reviewed: 75, gold_ready: 85, final: 100
  };

  function calculateResponseCompletion(responseItems, bid) {
    const sections = (bid && bid.responseSections) || [];
    const totalSections = sections.length;
    const denominator = totalSections > 0 ? totalSections : (responseItems ? responseItems.length : 0);
    if (denominator === 0) {
      return { total: 0, totalSections: 0, totalItems: 0, productionCoverage: 0, completion: 0, progress: 0, pipeline: {}, byStatus: {}, totalMarks: 0, totalEffortDays: 0, qualityCoverage: 0 };
    }
    const pipeline = {};
    Object.keys(STAGE_WEIGHTS).forEach(s => pipeline[s] = 0);
    let totalMarks = 0, totalEffortDays = 0, qualityAssessed = 0;
    let progressSum = 0;
    // Count production status from ResponseItems
    (responseItems || []).forEach(r => {
      const st = r.status || 'not_started';
      pipeline[st] = (pipeline[st] || 0) + 1;
      const sec = resolveSection(r, bid);
      totalMarks += sec.evaluationMaxScore || r.evaluationMaxScore || 0;
      totalEffortDays += deriveEffort(r, bid);
      progressSum += STAGE_WEIGHTS[st] || 0;
      if (r.qualityAnswersQuestion && r.qualityAnswersQuestion !== 'not_assessed') qualityAssessed++;
    });
    // Sections without linked ResponseItems count as not_started
    const unstarted = denominator - (responseItems ? responseItems.length : 0);
    if (unstarted > 0) pipeline.not_started = (pipeline.not_started || 0) + unstarted;
    // Add marks from unlinked sections
    if (totalSections > 0) {
      sections.forEach(s => {
        if (!s.linkedResponseItemId) totalMarks += s.evaluationMaxScore || 0;
      });
    }
    const itemCount = responseItems ? responseItems.length : 0;
    const completion = Math.round((pipeline.final || 0) / denominator * 1000) / 10;
    const progress = Math.round(progressSum / (denominator * 100) * 1000) / 10;
    const productionCoverage = totalSections > 0 ? Math.round(itemCount / totalSections * 1000) / 10 : 100;
    const qDenom = itemCount > 0 ? itemCount : 1;
    return { total: denominator, totalSections, totalItems: itemCount, productionCoverage, completion, progress, pipeline, byStatus: pipeline, totalMarks, totalEffortDays, qualityCoverage: Math.round(qualityAssessed / qDenom * 1000) / 10 };
  }

  // ── Rule 6.2: Compliance coverage calculations ──────────
  function calculateComplianceCoverage(complianceReqs) {
    if (!complianceReqs || complianceReqs.length === 0) {
      return { total: 0, assessed: 0, compliant: 0, partial: 0, nonCompliant: 0, notApplicable: 0, completion: 0, hasNonCompliant: false };
    }
    let assessed = 0, compliant = 0, partial = 0, nonCompliant = 0, notApplicable = 0;
    complianceReqs.forEach(r => {
      const s = r.complianceStatus || 'not_assessed';
      if (s !== 'not_assessed') assessed++;
      if (s === 'compliant') compliant++;
      else if (s === 'partially_compliant') partial++;
      else if (s === 'non_compliant') nonCompliant++;
      else if (s === 'not_applicable') notApplicable++;
    });
    const denominator = complianceReqs.length - notApplicable;
    const completion = denominator > 0 ? Math.round((assessed / complianceReqs.length) * 1000) / 10 : 0;
    return { total: complianceReqs.length, assessed, compliant, partial, nonCompliant, notApplicable, completion, hasNonCompliant: nonCompliant > 0 };
  }

  // ── Legacy: old coverage calculation (for backward compat) ──
  function calculateCoverage(requirements) {
    if (!requirements || requirements.length === 0) {
      return { mandatoryCoverage: 0, scoredCoverage: 0, overallCoverage: 0, mandatoryGaps: 0, totalGaps: 0 };
    }
    const mandatory = requirements.filter(r => r.classification === 'mandatory');
    const scored = requirements.filter(r => r.classification === 'scored');
    const mandatoryCoverage = mandatory.length === 0 ? 0
      : (mandatory.filter(r => r.coverageStatus === 'approved').length / mandatory.length) * 100;
    const scoredCoverage = scored.length === 0 ? 0
      : (scored.filter(r => ['reviewed','approved'].includes(r.coverageStatus)).length / scored.length) * 100;
    const all = requirements.filter(r => r.classification);
    const overallCoverage = all.length === 0 ? 0
      : (all.filter(r => !['unmapped','gap'].includes(r.coverageStatus)).length / all.length) * 100;
    const mandatoryGaps = mandatory.filter(r => ['unmapped','gap'].includes(r.coverageStatus)).length;
    const totalGaps = all.filter(r => ['unmapped','gap'].includes(r.coverageStatus)).length;
    return {
      mandatoryCoverage: Math.round(mandatoryCoverage * 10) / 10,
      scoredCoverage: Math.round(scoredCoverage * 10) / 10,
      overallCoverage: Math.round(overallCoverage * 10) / 10,
      mandatoryGaps, totalGaps,
    };
  }

  return { resolveSection, deriveEffort, calculateResponseCompletion, calculateComplianceCoverage, calculateCoverage, STAGE_WEIGHTS };
})();


/* ════════════════════════════════════════════════════════════
   REVIEWS — Review Governance Engine (Rule Sets 2.2, 2.6, 7)
════════════════════════════════════════════════════════════ */
const REVIEWS = (() => {

  // Rule 7.1: Valid review cycle status transitions
  const _cycleValid = {
    scheduled:    ['in_progress'],
    in_progress:  ['actions_open'],
    actions_open: ['closed'],
    closed:       [],               // terminal
  };

  // Rule 2.6: Valid review action status transitions
  const _actionValid = {
    open:        ['in_progress', 'disputed'],
    in_progress: ['resolved'],
    resolved:    ['accepted', 'open'],
    accepted:    [],                // terminal
    disputed:    ['open'],
  };

  // Rule 7.2: Default criteria by review type
  const _devCriteria = ['compliance','feasibility','risk','evidence','differentiation'];
  const _prodCriteria = ['compliance','responsiveness','evidence','differentiation','readability'];

  function criteriaForType(type) {
    if (['pink','red','gold'].includes(type)) return _prodCriteria;
    if (['solution_review','pricing_review','risk_review'].includes(type)) return _devCriteria;
    return _prodCriteria; // adhoc defaults to production
  }

  // Rule 7.2: Pass thresholds
  const _passThresholds = { pink: 2.0, red: 3.0, gold: 3.5 };
  function passThreshold(type) { return _passThresholds[type] || 3.0; }

  // Rule 7.3: Default resolution deadlines (working days)
  const _deadlineDays = { critical: 2, major: 3, minor: 5 };
  function defaultDeadlineDays(severity) { return _deadlineDays[severity] || 3; }

  // Transition helpers
  function canCycleTransition(from, to) {
    return (_cycleValid[from] || []).includes(to);
  }

  function canActionTransition(from, to) {
    return (_actionValid[from] || []).includes(to);
  }

  // Rule 7.1: Attempt cycle status change
  function changeCycleStatus(cycle, newStatus) {
    const from = cycle.status || 'scheduled';
    if (from === newStatus) return { ok: true };
    if (!canCycleTransition(from, newStatus)) {
      return { ok: false, error: `Cannot move cycle from "${from}" to "${newStatus}"` };
    }
    // Rule 7.1: Gate check — actions_open → closed requires 0 open/ip critical
    if (newStatus === 'closed') {
      const critOpen = (cycle.actions || []).filter(a =>
        a.severity === 'critical' && ['open','in_progress'].includes(a.status)
      ).length;
      if (critOpen > 0) {
        return { ok: false, error: `${critOpen} critical action(s) must be resolved before closing` };
      }
    }
    cycle.status = newStatus;
    return { ok: true };
  }

  // Rule 2.6: Attempt action status change
  function changeActionStatus(action, newStatus) {
    const from = action.status || 'open';
    if (from === newStatus) return { ok: true };
    if (!canActionTransition(from, newStatus)) {
      return { ok: false, error: `Cannot move action from "${from}" to "${newStatus}"` };
    }
    action.status = newStatus;
    return { ok: true };
  }

  // Rule 7.1: On cycle close, promote linked activity assurance
  function onCycleClose(cycle, activities) {
    if (cycle.status !== 'closed') return;
    (cycle.targetActivities || []).forEach(actId => {
      const act = activities.find(a => a.id === actId);
      if (act && (act.assurance === 'under_review' || act.assurance === 'none' || !act.assurance)) {
        // Only promote to 'assured' if currently under_review
        if (act.assurance === 'under_review') {
          act.assurance = 'assured';
          act.lastUpdated = new Date().toISOString();
        }
      }
    });
  }

  // Rule 7.2: Calculate scorecard summary for a cycle
  function scorecardSummary(cycle) {
    const criteria = criteriaForType(cycle.type);
    const scores = cycle.scores || [];
    const threshold = passThreshold(cycle.type);
    const result = {};
    let totalSum = 0, totalCount = 0;

    criteria.forEach(c => {
      const vals = scores
        .map(s => s[c])
        .filter(v => typeof v === 'number' && v >= 1 && v <= 5);
      const avg = vals.length > 0 ? vals.reduce((a,b) => a + b, 0) / vals.length : 0;
      const rounded = Math.round(avg * 10) / 10;
      result[c] = {
        avg: rounded,
        count: vals.length,
        pass: vals.length > 0 && rounded >= threshold,
      };
      totalSum += vals.reduce((a,b) => a + b, 0);
      totalCount += vals.length;
    });

    const overall = totalCount > 0 ? Math.round((totalSum / totalCount) * 10) / 10 : 0;
    return { criteria: result, overall, threshold, totalScores: scores.length };
  }

  // Rule 7.1: Count critical actions open
  function criticalOpenCount(cycle) {
    return (cycle.actions || []).filter(a =>
      a.severity === 'critical' && ['open','in_progress'].includes(a.status)
    ).length;
  }

  // Cross-review analytics
  function crossReviewStats(cycles) {
    let totalActions = 0, resolvedActions = 0;
    const bySeverity = { critical: 0, major: 0, minor: 0 };
    const bySection = {};

    cycles.forEach(c => {
      (c.actions || []).forEach(a => {
        totalActions++;
        bySeverity[a.severity] = (bySeverity[a.severity] || 0) + 1;
        if (['resolved','accepted'].includes(a.status)) resolvedActions++;
        const sec = a.activityCode || 'unassigned';
        bySection[sec] = (bySection[sec] || 0) + 1;
      });
    });

    const resolutionRate = totalActions > 0 ? Math.round((resolvedActions / totalActions) * 100) : 0;
    // Top hotspots (sections with most actions)
    const hotspots = Object.entries(bySection)
      .sort((a,b) => b[1] - a[1])
      .slice(0, 5)
      .map(([section, count]) => ({ section, count }));

    return { totalActions, resolvedActions, resolutionRate, bySeverity, hotspots };
  }

  return {
    canCycleTransition, canActionTransition,
    changeCycleStatus, changeActionStatus,
    onCycleClose, scorecardSummary, criticalOpenCount,
    crossReviewStats, criteriaForType, passThreshold,
    defaultDeadlineDays,
    _cycleValid, _actionValid,
  };
})();


/* ════════════════════════════════════════════════════════════
   GOVERNANCE — Gate Pipeline Engine (Rule Sets 2.3, 5.1–5.3)
════════════════════════════════════════════════════════════ */
const GOVERNANCE = (() => {

  // Rule 2.3: Valid gate status transitions
  const _gateValid = {
    upcoming:    ['ready', 'deferred'],
    ready:       ['in_progress'],
    in_progress: ['passed', 'failed', 'deferred'],
    passed:      [],
    failed:      [],
    deferred:    ['upcoming'],
  };

  // Assurance ordinals for Rule 5.1
  const _assuranceOrd = { none: 0, unassured: 0, under_review: 1, assured: 2, accepted_at_gate: 3 };

  function assuranceOrdinal(level) {
    return _assuranceOrd[level] || 0;
  }

  function canGateTransition(from, to) {
    return (_gateValid[from] || []).includes(to);
  }

  // Rule 5.1: Evaluate entry criteria against activity assurance levels
  function evaluateEntryCriteria(gate, activities) {
    let metCount = 0;
    (gate.entryCriteria || []).forEach(ec => {
      if (ec.activityCode) {
        const act = activities.find(a => a.id === ec.activityCode);
        if (act) {
          ec.currentAssurance = act.assurance || 'none';
          ec.met = assuranceOrdinal(ec.currentAssurance) >= assuranceOrdinal(ec.requiredAssurance || 'assured');
        } else {
          ec.met = false;
          ec.currentAssurance = 'none';
        }
      }
      // Text-only criteria remain manually checked
      if (ec.met) metCount++;
    });
    gate.criteriaMetCount = metCount;
    gate.criteriaTotalCount = (gate.entryCriteria || []).length;
    gate.allCriteriaMet = metCount === gate.criteriaTotalCount;

    // Auto-promote upcoming → ready if all criteria met
    if (gate.status === 'upcoming' && gate.allCriteriaMet) {
      gate.status = 'ready';
    }
    // Revert ready → upcoming if criteria regressed
    if (gate.status === 'ready' && !gate.allCriteriaMet) {
      gate.status = 'upcoming';
    }
    return gate;
  }

  // Rule 2.3: Attempt gate status change
  function changeGateStatus(gate, newStatus) {
    const from = gate.status || 'upcoming';
    if (from === newStatus) return { ok: true };

    // "pending" from wizard maps to "upcoming"
    const normFrom = from === 'pending' ? 'upcoming' : from;
    if (!canGateTransition(normFrom, newStatus)) {
      return { ok: false, error: `Cannot move gate from "${from}" to "${newStatus}"` };
    }
    gate.status = newStatus;
    return { ok: true };
  }

  // Rule 2.3: On gate passed, promote linked activity assurance to accepted_at_gate
  function onGatePassed(gate, activities) {
    if (gate.status !== 'passed') return;
    (gate.entryCriteria || []).forEach(ec => {
      if (ec.activityCode) {
        const act = activities.find(a => a.id === ec.activityCode);
        if (act && (act.assurance === 'assured' || act.assurance === 'under_review')) {
          act.assurance = 'accepted_at_gate';
          act.lastUpdated = new Date().toISOString();
        }
      }
    });
  }

  // Rule 5.2: Generate preparation standup actions for a gate
  function generatePrepActions(gate, bidCalendar) {
    if (gate.prepActionsGenerated) return [];
    if (!gate.plannedDate) return [];

    const lib = GATE_LIB.find(g => g.id === gate.templateId);
    if (!lib || !lib.prepTemplate) return [];

    const actions = lib.prepTemplate.map(step => {
      const dueDate = _offsetDate(gate.plannedDate, step.offset, bidCalendar);
      return {
        id: STORE.uuid(),
        parentGateId: gate.id,
        description: step.action.replace('{gate.name}', gate.name),
        output: step.output,
        owner: '',
        dueDate,
        status: 'open',
        source: 'gate_preparation',
        offset: step.offset,
        createdDate: new Date().toISOString(),
        completedDate: null,
      };
    });

    gate.prepActionsGenerated = true;
    gate.prepActions = actions;
    return actions;
  }

  // Simple date offset (working days if calendar provided, else calendar days)
  function _offsetDate(baseDateStr, offsetDays, calendar) {
    const d = new Date(baseDateStr);
    if (offsetDays === 0) return baseDateStr;

    const direction = offsetDays > 0 ? 1 : -1;
    let remaining = Math.abs(offsetDays);

    while (remaining > 0) {
      d.setDate(d.getDate() + direction);
      // Skip weekends
      const dow = d.getDay();
      if (dow === 0 || dow === 6) continue;
      // Skip public holidays if calendar provided
      if (calendar && calendar.publicHolidays) {
        const iso = d.toISOString().slice(0, 10);
        if (calendar.publicHolidays.includes(iso)) continue;
      }
      remaining--;
    }
    return d.toISOString().slice(0, 10);
  }

  // Rule 5.3: Calculate risk premium impact
  function riskPremiumSummary(gates, tcv) {
    const entries = [];
    let totalPct = 0;

    (gates || []).forEach(g => {
      const pct = parseFloat(g.riskPremium) || 0;
      if (pct > 0) {
        const value = tcv * (pct / 100);
        entries.push({
          gateId: g.id,
          gateName: g.name,
          premiumPct: pct,
          premiumValue: value,
          cause: (g.entryCriteria || []).filter(ec => !ec.met).map(ec => ec.text),
          approver: g.approvingBody || '',
          date: g.actualDate,
        });
        totalPct += pct;
      }
    });

    const totalValue = tcv * (totalPct / 100);
    return { entries, totalPct, totalValue };
  }

  // Prep action status summary for a gate
  function prepStatus(gate) {
    const actions = gate.prepActions || [];
    if (actions.length === 0) return { total: 0, done: 0, overdue: 0, inProgress: 0 };
    const today = new Date().toISOString().slice(0, 10);
    let done = 0, overdue = 0, inProgress = 0;
    actions.forEach(a => {
      if (a.status === 'done') done++;
      else if (a.status === 'in_progress') inProgress++;
      else if (a.dueDate && a.dueDate < today && a.status === 'open') overdue++;
    });
    return { total: actions.length, done, overdue, inProgress };
  }

  return {
    canGateTransition, changeGateStatus, evaluateEntryCriteria,
    onGatePassed, generatePrepActions, riskPremiumSummary,
    prepStatus, assuranceOrdinal, _gateValid, _offsetDate,
  };
})();


/* ════════════════════════════════════════════════════════════
   READINESS — Dual-track readiness scoring (Rule Set 3)
════════════════════════════════════════════════════════════ */
const READINESS = (() => {

  // ── Progress helper ──────────────────────────────────────
  const _statusProg = { not_started: 0, in_progress: 25, draft_complete: 60, final: 100, deactivated: null };

  function avgProgress(activities) {
    const active = activities.filter(a => a.status !== 'deactivated' && a.active !== false);
    if (active.length === 0) return 0;
    const sum = active.reduce((s, a) => s + (_statusProg[a.status] || 0), 0);
    return sum / active.length;
  }

  // ── Rule 3.2: Development readiness signals ──────────────
  function developmentReadiness(bid) {
    const acts = bid.activities || [];
    const gates = bid.governanceGates || [];
    const signals = [];

    // 1. Win strategy locked & assured (15%) — SAL-06
    const sal06 = acts.find(a => a.id === 'SAL-06');
    let winScore = 0;
    if (sal06) {
      if (GOVERNANCE.assuranceOrdinal(sal06.assurance) >= GOVERNANCE.assuranceOrdinal('assured')) winScore = 100;
      else if (sal06.status === 'final') winScore = 60;
      else if (sal06.status === 'draft_complete') winScore = 30;
    }
    signals.push({ name: 'Win strategy locked & assured', weight: 15, score: winScore, source: 'SAL-06', target: 'assured' });

    // 2. Solution design locked & assured (25%) — SOL-11
    const sol11 = acts.find(a => a.id === 'SOL-11');
    let solScore = 0;
    if (sol11) {
      if (GOVERNANCE.assuranceOrdinal(sol11.assurance) >= GOVERNANCE.assuranceOrdinal('assured')) solScore = 100;
      else if (sol11.status === 'final') solScore = 60;
      else solScore = avgProgress(acts.filter(a => a.workstreamId === 'SOL')) * 0.6;
    }
    signals.push({ name: 'Solution design locked & assured', weight: 25, score: Math.round(solScore * 10) / 10, source: 'SOL-11', target: 'assured' });

    // 3. Pricing model locked & assured (20%) — COM-06
    const com06 = acts.find(a => a.id === 'COM-06');
    let priceScore = 0;
    if (com06) {
      if (GOVERNANCE.assuranceOrdinal(com06.assurance) >= GOVERNANCE.assuranceOrdinal('assured')) priceScore = 100;
      else if (com06.status === 'final') priceScore = 60;
      else priceScore = avgProgress(acts.filter(a => a.workstreamId === 'COM')) * 0.6;
    }
    signals.push({ name: 'Pricing model locked & assured', weight: 20, score: Math.round(priceScore * 10) / 10, source: 'COM-06', target: 'assured' });

    // 4. Risk register mitigated & assured (15%) — DEL-06 / DEL-01
    const del06 = acts.find(a => a.id === 'DEL-06');
    const del01 = acts.find(a => a.id === 'DEL-01');
    let riskScore = 0;
    if (del06 && GOVERNANCE.assuranceOrdinal(del06.assurance) >= GOVERNANCE.assuranceOrdinal('assured')) riskScore = 100;
    else if (del01) {
      if (del01.status === 'final' || del01.status === 'draft_complete') riskScore = 50;
      else if (del01.status === 'in_progress') riskScore = 20;
    }
    signals.push({ name: 'Risk register mitigated & assured', weight: 15, score: riskScore, source: 'DEL-06', target: 'assured' });

    // 5. Partner agreements signed (10%) — SUP-03
    const supActs = acts.filter(a => a.workstreamId === 'SUP');
    const allSupDeactivated = supActs.length === 0 || supActs.every(a => a.status === 'deactivated' || a.active === false);
    let partnerScore = 0;
    if (allSupDeactivated) { partnerScore = 100; }
    else {
      const sup03 = acts.find(a => a.id === 'SUP-03');
      if (sup03) {
        if (sup03.status === 'final') partnerScore = 100;
        else if (sup03.status === 'draft_complete') partnerScore = 50;
      }
    }
    signals.push({ name: 'Partner agreements signed', weight: 10, score: partnerScore, source: 'SUP-03', target: 'final' });

    // 6. Governance gates passed (15%)
    const totalGates = gates.length;
    const passedGates = gates.filter(g => g.status === 'passed').length;
    const gateScore = totalGates > 0 ? (passedGates / totalGates) * 100 : 100;
    signals.push({ name: 'Governance gates passed', weight: 15, score: Math.round(gateScore * 10) / 10, source: `${passedGates}/${totalGates}`, target: 'all passed' });

    // Weighted average
    const total = signals.reduce((s, sig) => s + sig.score * (sig.weight / 100), 0);
    return { score: Math.round(total * 10) / 10, signals };
  }

  // ── Rule 3.3: Production readiness signals ───────────────
  function productionReadiness(bid) {
    const acts = bid.activities || [];
    const responseItems = bid.responseItems || [];
    const compReqs = bid.complianceRequirements || [];
    const cycles = bid.reviewCycles || [];
    const artefacts = bid.artefacts || [];
    const gates = bid.governanceGates || [];
    const signals = [];

    // 1. Response item completion (25%) — hollow-score guard: 0% when empty
    const respComp = COMPLIANCE.calculateResponseCompletion(responseItems, bid);
    const respScore = respComp.total > 0 ? respComp.progress : 0;
    signals.push({ name: 'Response item completion', weight: 25, score: Math.round(respScore * 10) / 10, source: respComp.total > 0 ? `${(respComp.byStatus.final||0)}/${respComp.total} final` : 'none', target: 'all complete' });

    // 2. Compliance declarations complete (25%) — hollow-score guard: 0% when empty
    const compCov = COMPLIANCE.calculateComplianceCoverage(compReqs);
    let compScore = compReqs.length > 0 ? compCov.completion : 0;
    // Hard gate: mandatory non-compliance caps at 30%
    if (compCov.hasNonCompliant && compScore > 30) compScore = 30;
    signals.push({ name: 'Compliance declarations complete', weight: 25, score: Math.round(compScore * 10) / 10, source: compReqs.length > 0 ? `${compCov.assessed}/${compReqs.length}` : 'none', target: 'all assessed', hardGate: compCov.hasNonCompliant });

    // 3. Review actions resolved critical (20%)
    const allActions = [];
    cycles.forEach(c => (c.actions || []).forEach(a => allActions.push(a)));
    const critActions = allActions.filter(a => a.severity === 'critical');
    const critResolved = critActions.filter(a => a.status === 'resolved' || a.status === 'accepted').length;
    const critScore = critActions.length > 0 ? (critResolved / critActions.length) * 100 : 0;
    const hasCritOpen = critActions.some(a => a.status === 'open');
    signals.push({ name: 'Review actions resolved (critical)', weight: 20, score: Math.round(critScore * 10) / 10, source: `${critResolved}/${critActions.length}`, target: 'all resolved', hardGate: hasCritOpen });

    // 4. Approvals obtained (15%) — governance gates
    const approvalGates = gates.filter(g => g.type === 'executive' || g.type === 'submission_authority' || g.type === 'bafo_authority');
    const approvedCount = approvalGates.filter(g => g.status === 'passed').length;
    const anyRejected = approvalGates.some(g => g.status === 'failed');
    let approvalScore = approvalGates.length > 0 ? (approvedCount / approvalGates.length) * 100 : 0;
    if (anyRejected) approvalScore = 0;
    signals.push({ name: 'Approvals obtained', weight: 15, score: Math.round(approvalScore * 10) / 10, source: `${approvedCount}/${approvalGates.length}`, target: 'all approved', hardGate: anyRejected });

    // 5. Artefact checklist (10%) — hollow-score guard: 0% when empty
    const artTotal = artefacts.length;
    const artDone = artefacts.filter(a => ['final','uploaded','confirmed'].includes(a.status)).length;
    const artScore = artTotal > 0 ? (artDone / artTotal) * 100 : 0;
    signals.push({ name: 'Artefact checklist', weight: 10, score: Math.round(artScore * 10) / 10, source: `${artDone}/${artTotal}`, target: 'all complete' });

    // 6. Workstream timing health (5%)
    const compression = detectCompression(bid);
    let timingScore = 100;
    if (compression.some(c => c.severity === 'critical')) timingScore = 0;
    else if (compression.some(c => c.severity === 'compressed')) timingScore = 50;
    signals.push({ name: 'Workstream timing health', weight: 5, score: timingScore, source: compression.length > 0 ? `${compression.length} alerts` : 'healthy', target: 'no compression' });

    const total = signals.reduce((s, sig) => s + sig.score * (sig.weight / 100), 0);

    // Hard gate: zero ResponseItems past 50% timeline caps at 40%
    let capped = Math.round(total * 10) / 10;
    if (responseItems.length === 0 && bid.submissionDeadline) {
      const now = new Date(); const sd = new Date(bid.submissionDeadline);
      const itt = bid.ittIssueDate ? new Date(bid.ittIssueDate) : new Date(bid.createdAt);
      const totalDur = sd - itt; const elapsed = now - itt;
      if (totalDur > 0 && elapsed / totalDur > 0.5 && capped > 40) capped = 40;
    }

    return { score: capped, signals };
  }

  // ── Rule 3.1: Overall readiness ──────────────────────────
  function overallReadiness(bid) {
    const dev = developmentReadiness(bid);
    const prod = productionReadiness(bid);

    let overall = (dev.score * 0.60) + (prod.score * 0.40);

    // Hard gates (Rule 3.3)
    const hardGates = [];
    const compReqs = bid.complianceRequirements || [];
    if (compReqs.some(r => r.complianceStatus === 'non_compliant')) {
      hardGates.push({ type: 'non_compliant', cap: 30, message: 'Non-compliant declaration exists — readiness capped' });
      if (overall > 30) overall = 30;
    }

    const responseItems = bid.responseItems || [];
    if (responseItems.length === 0 && bid.submissionDeadline) {
      const now = new Date(); const sd = new Date(bid.submissionDeadline);
      const itt = bid.ittIssueDate ? new Date(bid.ittIssueDate) : new Date(bid.createdAt);
      const totalDur = sd - itt; const elapsed = now - itt;
      if (totalDur > 0 && elapsed / totalDur > 0.5) {
        hardGates.push({ type: 'no_response_items', cap: 40, message: 'No response items defined past 50% of timeline' });
        if (overall > 40) overall = 40;
      }
    }

    const allActions = [];
    (bid.reviewCycles || []).forEach(c => (c.actions || []).forEach(a => allActions.push(a)));
    if (allActions.some(a => a.severity === 'critical' && a.status === 'open')) {
      hardGates.push({ type: 'critical_action', cap: 60, message: 'Critical review action is still open' });
      if (overall > 60) overall = 60;
    }

    overall = Math.round(overall * 10) / 10;
    const health = deriveHealth(overall);
    const trend = calculateTrend(bid);

    return { overall, dev, prod, health, hardGates, trend };
  }

  // ── Rule 3.4: Health status derivation ───────────────────
  function deriveHealth(score) {
    if (score >= 70) return 'green';
    if (score >= 40) return 'amber';
    return 'red';
  }

  // ── Health trend ─────────────────────────────────────────
  function calculateTrend(bid) {
    const history = bid.readinessHistory || [];
    if (history.length < 3) return 'insufficient';
    const recent = history.slice(-3);
    if (recent[2].score > recent[1].score && recent[1].score > recent[0].score) return 'improving';
    if (recent[2].score < recent[1].score && recent[1].score < recent[0].score) return 'deteriorating';
    return 'stable';
  }

  // ── Snapshot readiness for trend tracking ────────────────
  function snapshotReadiness(bid) {
    const r = overallReadiness(bid);
    if (!bid.readinessHistory) bid.readinessHistory = [];
    bid.readinessHistory.push({ score: r.overall, dev: r.dev.score, prod: r.prod.score, date: new Date().toISOString().slice(0, 10), ts: Date.now() });
    // Keep max 100 entries
    if (bid.readinessHistory.length > 100) bid.readinessHistory = bid.readinessHistory.slice(-100);
    return r;
  }

  // ── Compression detection ────────────────────────────────
  function detectCompression(bid) {
    const acts = bid.activities || [];
    const cal = bid.calendar;
    if (!cal || !bid.submissionDeadline) return [];

    const alerts = [];
    const schedule = SCHED.backwardSchedule(acts, bid.submissionDeadline, cal);

    // Check buffers between dependent activities
    const active = acts.filter(a => a.active !== false && a.status !== 'deactivated');
    active.forEach(a => {
      const sA = schedule[a.id];
      if (!sA) return;
      (a.dependencies || []).forEach(depId => {
        const dep = acts.find(d => d.id === depId);
        if (!dep) return;
        const sD = schedule[depId];
        if (!sD) return;
        const buf = SCHED.countWorkingDays(sD.plannedEnd, sA.plannedStart, cal);
        let severity = null;
        if (buf <= 0) severity = 'critical';
        else if (buf < 5) severity = 'compressed';
        if (severity) {
          alerts.push({
            from: depId, to: a.id, bufferDays: buf, severity,
            chain: `${depId} → ${a.id}`,
            impact: buf <= 0
              ? `${depId} completion overlaps ${a.id} start — no buffer`
              : `Only ${buf} working day${buf === 1 ? '' : 's'} buffer between ${depId} and ${a.id}`,
            suggestion: buf <= 0
              ? `Escalate ${depId} completion; consider parallel review`
              : `Monitor closely — minimal buffer remaining`,
          });
        }
      });
    });

    return alerts;
  }

  // ── Rule 3.5: Post-submission readiness ──────────────────
  function postSubmissionReadiness(bid) {
    const acts = bid.activities || [];
    const postActs = acts.filter(a => a.workstreamId === 'POST' && a.active !== false && a.status !== 'deactivated');
    if (postActs.length === 0) return null;

    const signals = [];
    const _prog = a => a ? (_statusProg[a.status] || 0) : 0;

    const post02 = acts.find(a => a.id === 'POST-02');
    if (post02 && post02.active !== false) {
      signals.push({ name: 'Presentation prepared & rehearsed', score: post02.status === 'final' ? 100 : _prog(post02), source: 'POST-02' });
    }
    const post04 = acts.find(a => a.id === 'POST-04');
    if (post04 && post04.active !== false) {
      signals.push({ name: 'Clarifications responded', score: post04.status === 'final' ? 100 : _prog(post04), source: 'POST-04' });
    }
    const post06 = acts.find(a => a.id === 'POST-06');
    if (post06 && post06.active !== false) {
      signals.push({ name: 'BAFO prepared & approved', score: post06.status === 'final' ? 100 : _prog(post06), source: 'POST-06' });
    }
    const post07 = acts.find(a => a.id === 'POST-07');
    if (post07 && post07.active !== false) {
      signals.push({ name: 'Negotiations progressing', score: ['in_progress','draft_complete','final'].includes(post07.status) ? (post07.status === 'final' ? 100 : 50) : 0, source: 'POST-07' });
    }

    if (signals.length === 0) return null;
    const avg = signals.reduce((s, sig) => s + sig.score, 0) / signals.length;
    return { score: Math.round(avg * 10) / 10, signals };
  }

  // ── Executive verdict ────────────────────────────────────
  function executiveVerdict(overall) {
    if (overall >= 70) return 'ready';
    if (overall >= 40) return 'conditional';
    return 'not ready';
  }

  return {
    avgProgress, developmentReadiness, productionReadiness,
    overallReadiness, deriveHealth, calculateTrend,
    snapshotReadiness, detectCompression, postSubmissionReadiness,
    executiveVerdict,
  };
})();

    const dl = daysUntil(b.submissionDeadline);

      dl <= 5 ? `<span style="color:var(--red);">${dl}d</span>` :

    return `<tr class="clickable" onclick="ROUTER.goBid('${b.id}')">
      <td>${dot}</td>

      <td>${daysCell}</td>
      <td>${status}</td>
      <td>${b.devReadiness!=null?b.devReadiness+'%':'—'}</td>
      <td>${b.prodReadiness!=null?b.prodReadiness+'%':'—'}</td>
      <td>${STORE.fmtCurrency(b.winFeeValue)}</td>
      <td class="mono">${h(b.bidManager||'—')}</td>
      <td style="text-align:center;"><button class="btn btn-sm" style="color:var(--red);border-color:var(--red);padding:2px 8px;font-size:9px;" onclick="event.stopPropagation();handleDeleteBid('${b.id}','${h(b.name||'').replace(/'/g,"\\'")}')">Delete</button></td>
    </tr>`;
  }).join('');

  return `<table class="tb">
    <thead><tr>
      <th>Health</th><th>Client</th><th>Bid Name</th><th>Deadline</th>
      <th>Days Left</th><th>Status</th><th>Dev %</th><th>Prod %</th>
      <th>Win Fee</th><th>Bid Manager</th><th></th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}


/* ════════════════════════════════════════════════════════════
   RENDER — Setup Wizard
════════════════════════════════════════════════════════════ */
function renderWizardView() {
  const d = WIZARD.draft;
  const step = WIZARD.step;
  const labels = ['Bid Identity','Activities & Gates','Calendar','Team','Requirements','Feasibility'];
  const steps = labels.map((l,i) => {
    const n = i+1;
    const cls = n < step ? 'done' : n === step ? 'active' : '';
    const num = n < step ? '✓' : n;
    return (i > 0 ? '<div class="wiz-sl"></div>' : '') +
      `<div class="wiz-si ${cls}"><div class="wiz-si-num">${num}</div><div class="wiz-si-lbl">${l}</div></div>`;
  }).join('');

  const stages = [renderWizS1, renderWizS2, renderWizS3, renderWizS4, renderWizS5, renderWizS6];
  const content = stages[step-1](d);
  const isFirst = step === 1;
  const isLast  = step === 6;

  return `
    <div class="hdr">
      <div class="hdr-l">
        <button class="back-link" onclick="handleWizAbandon()">← Cancel</button>
        <div class="hdr-divider"></div>
        <span class="hdr-brand">PWIN Architect</span>
        <span class="hdr-sub">New Bid Setup</span>
      </div>
      <div class="hdr-r">
        <span class="fe fe-mute">Stage ${step} of 6</span>
        <button class="btn btn-sm" onclick="handleWizSaveDraft()">Save Draft</button>
      </div>
    </div>
    <div class="wiz-progress">${steps}</div>
    <div class="ct">
      ${content}
      <div class="wiz-nav">
        ${isFirst
          ? `<button class="btn" onclick="handleWizAbandon()">Cancel</button>`
          : `<button class="btn" onclick="wizBack()">← Back</button>`}
        <div style="flex:1;"></div>
        ${isLast
          ? `<button class="btn btn-primary" id="wiz-confirm-btn" onclick="confirmWizard()"${_wizFeasibility && _wizFeasibility.verdict==='infeasible'?' disabled':''}>Confirm & Create Bid →</button>`
          : `<button class="btn btn-primary" onclick="wizNext()">Next →</button>`}
      </div>
    </div>`;
}

/* ── Stage 2: Archetype, Activities, Complexity & Gates ── */
function renderWizS2(d) {
  const complexity = d.complexity;

  function effTs(act) {
    const cfg = d.activityConfig[act.id] || {};
    return WIZARD.effTs(act, complexity, cfg.ts != null ? cfg.ts : null);
  }
  function elapsed(act) {
    const cfg = d.activityConfig[act.id] || {};
    const dur = cfg.dur != null ? cfg.dur : act.dur;
    return WIZARD.elapsed(dur, effTs(act));
  }

  const panels = WS.map(ws => {
    const open = WIZARD.panelOpen(ws.id);
    const activeCount = ws.acts.filter(a => {
      const cfg = d.activityConfig[a.id] || {};
      return cfg.active !== false;
    }).length;
    const wsTotal = ws.acts.reduce((s,a) => {
      const cfg = d.activityConfig[a.id] || {};
      if (cfg.active === false) return s;
      return s + elapsed(a);
    }, 0);
    const clsMap = {sales:'gold',solution:'blu',commercial:'grn',legal:'pink',delivery:'amb',supply:'cyn',bidmgmt:'lime',governance:'pur',production:'red',postsub:'pink'};
    const col = `var(--${clsMap[ws.cls]||'t2'})`;

    const rows = !open ? '' : ws.acts.map(act => {
      const cfg = d.activityConfig[act.id] || {};
      const active = cfg.active !== false;
      const dur = cfg.dur != null ? cfg.dur : act.dur;
      const ts  = effTs(act);
      const el  = WIZARD.elapsed(dur, ts);
      return `<div class="act-row ${active?'':'off'}">
        <input type="checkbox" ${active?'checked':''} onchange="WIZARD.setActCfg('${act.id}','active',this.checked);renderApp();" title="Include activity">
        <div><div class="act-row-name"><span style="font-family:'DM Mono',monospace;font-size:10px;color:${col};">${act.id}</span> ${h(act.n)}</div><div class="act-row-out">${h(act.o)}</div></div>
        <input class="act-inp" type="number" value="${dur||''}" min="0" placeholder="${act.dur||'—'}" title="Effort (person-days)" onchange="WIZARD.setActCfg('${act.id}','dur',+this.value||act.dur);renderApp();">
        <input class="act-inp" type="number" value="${ts}" min="1" title="Team size" onchange="WIZARD.setActCfg('${act.id}','ts',Math.max(1,+this.value||1));renderApp();">
        <div class="act-elapsed">${el || '—'}d<br><span style="font-size:9px;color:var(--t4);">${act.pt==='P'?'parallel':act.pt==='S'?'specialist':'coord'}</span></div>
      </div>`;
    }).join('');

    return `<div class="act-panel">
      <div class="act-panel-hdr" onclick="WIZARD.togglePanel('${ws.id}');renderApp();">
        <span class="tog ${open?'op':''}">▸</span>
        <span style="font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:${col};">${ws.id}</span>
        <span style="font-size:12.5px;color:var(--t1);flex:1;">${h(ws.name)}</span>
        <span class="fe fe-mute">${activeCount}/${ws.acts.length} active</span>
        <span class="fe fe-b" style="margin-left:4px;">${wsTotal}d elapsed</span>
      </div>
      ${open ? `<div class="act-col-hdr"><span></span><span>Activity</span><span style="text-align:center;">Effort</span><span style="text-align:center;">Team</span><span style="text-align:center;">Elapsed</span></div>${rows}` : ''}
    </div>`;
  }).join('');

  const gates = GATE_LIB.map(g => {
    const sel = d.gateSelection[g.id] !== false && (d.gateSelection[g.id] === true || g.defaultFor === 'all');
    const tcvM = parseFloat(d.tcv) || 0;
    const auto = g.defaultFor === 'all' ? 'All bids'
      : g.defaultFor === 'tcv_threshold' ? `TCV ≥ £${g.tcvThreshold}m ${tcvM >= g.tcvThreshold ? '✓' : '(below threshold)'}`
      : 'BAFO only';
    return `<div class="gate-check-row">
      <input type="checkbox" ${sel?'checked':''} onchange="WIZARD.setGate('${g.id}',this.checked);renderApp();">
      <div class="gate-check-info">
        <div class="gate-check-name">${h(g.name)}</div>
        <div class="gate-check-meta">${g.type.charAt(0).toUpperCase()+g.type.slice(1)} gate &nbsp;·&nbsp; ${auto} &nbsp;·&nbsp; T-${g.defaultLeadDays} lead time</div>
      </div>
    </div>`;
  }).join('');

  return `
    <div class="sl">Stage 2 of 6</div>
    <div class="pg-title">Archetype, Activities & Governance Gates</div>
    <div class="pg-desc">Review the ${WS_TOTALS.acts} activities and deactivate any that don't apply. Adjust effort or team size if needed. Select which governance gates apply to this bid.</div>

    <div class="sh2">Bid Complexity</div>
    <div class="bt">Sets default team sizes for parallelisable (P-type) activities. Standard = template defaults. Complex ≈ 2× team. Major ≈ 3× team.</div>
    <div class="comp-sel">
      ${[['standard','Standard (8–12 team)'],['complex','Complex (15–25 team)'],['major','Major (25–40 team)']].map(([v,l])=>`<button class="comp-btn ${complexity===v?'on':''}" onclick="WIZARD.set('complexity','${v}');renderApp();">${l}</button>`).join('')}
    </div>

    <div class="sh2">Activities <span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--t3);margin-left:8px;">click workstream to expand</span></div>
    ${panels}

    <div class="sh2" style="margin-top:24px;">Governance Gates</div>
    <div class="bt">Select which gates apply. Gates marked for "All bids" are pre-selected. TCV-threshold gates are auto-selected based on the TCV entered in Stage 1.</div>
    <div style="background:var(--bg2);border:1px solid var(--bdr);padding:4px 14px;">${gates}</div>`;
}

    <div class="sh2" style="margin-top:20px;">Team Unavailability</div>

    ${unavail}
    <div class="co co-b" style="margin-top:14px;">
      <div class="co-l">Add Unavailability</div>
      <div class="form-row" style="margin-top:8px;margin-bottom:0;">
        <div class="form-col">
          <label class="form-label">Name</label>

          <input class="inp" type="date" id="unavail-from">

          <label class="form-label">To</label>
          <input class="inp" type="date" id="unavail-to">
        </div>
        <div class="form-col">
          <label class="form-label">Notes</label>
          <input class="inp" id="unavail-notes" placeholder="e.g. Annual leave">
        </div>
        <div class="form-col" style="display:flex;align-items:flex-end;">
          <button class="btn" onclick="wizAddUnavail()">+ Add</button>
        </div>
      </div>
    </div>
    <div class="co co-g" style="margin-top:8px;">
      <div class="co-l">CSV Upload</div>
      <div class="co-t" style="margin-bottom:8px;">Columns: <span class="mono" style="font-size:10px;">name, from, to, notes</span> &nbsp;·&nbsp; Dates as YYYY-MM-DD &nbsp;·&nbsp; Header row optional. Rows appended to any existing entries.</div>

/* ── Stage 6: Feasibility Check ──────────────────────────── */
let _wizFeasibility = null; // cached feasibility result for current wizard session

function _runWizFeasibility(d) {
  // Build a temporary bid + activities structure from wizard draft
  const cal = {
    workingDays: d.workingDays,
    publicHolidays: [...d.publicHolidays],
    weekendWorking: [],
    teamUnavailability: [...d.teamUnavailability],
    clientBlackouts: [],
  };
  const _mDate = t => ((d.milestones||[]).find(m=>m.type===t)||{}).date || null;
  const bid = {
    ittIssueDate: _mDate('tender_commencement'),
    submissionDeadline: _mDate('submission_deadline'),
    bidManager: d.team.bidManager,
  };
  const activities = [];
  WS.forEach(ws => {
    ws.acts.forEach(tmpl => {
      const cfg  = d.activityConfig[tmpl.id] || {};
      const active = cfg.active !== false;
      const dur  = cfg.dur != null ? cfg.dur : tmpl.dur;
      const ts   = WIZARD.effTs(tmpl, d.complexity, cfg.ts != null ? cfg.ts : null);
      activities.push({
        id: tmpl.id, workstreamId: ws.id, name: tmpl.n,
        parallelisationType: tmpl.pt, dependencies: [...tmpl.d],
        effortDays: dur, teamSize: ts, active,
        status: active ? 'not_started' : 'deactivated',
        owner: _activityOwner(tmpl.id, ws.id, d.team),
      });
    });
  });
  _wizFeasibility = SCHED.runFeasibilityCheck(bid, activities, cal);
  _wizFeasibility._recs = SCHED.generateRecommendations(_wizFeasibility, activities);
  return _wizFeasibility;
}

function renderWizS6(d) {
  // Run feasibility check
  const f = _runWizFeasibility(d);
  const recs = f._recs || [];

  // Verdict badge
  const vColor = f.verdict === 'feasible' ? 'var(--grn)' : f.verdict === 'tight' ? 'var(--amb)' : 'var(--red)';
  const vBg    = f.verdict === 'feasible' ? 'var(--grn-d)' : f.verdict === 'tight' ? 'var(--amb-d)' : 'var(--red-d)';
  const vIcon  = f.verdict === 'feasible' ? '✓' : f.verdict === 'tight' ? '▲' : '✕';
  const vLabel = f.verdict === 'feasible'
    ? `Feasible — ${f.criticalPathBuffer} days buffer`
    : f.verdict === 'tight'
      ? `Tight Schedule — ${f.criticalPathBuffer} days buffer (< 3)`
      : `Infeasible — ${f.deficit} days deficit`;

  // Summary metrics
  const metrics = `
    <div class="cg c4" style="margin:16px 0;">
      <div class="metric">
        <div class="metric-val" style="color:var(--blu);">${f.availableDays}</div>
        <div class="metric-lbl">Available Working Days</div>
      </div>
      <div class="metric">
        <div class="metric-val" style="color:var(--gold);">${f.criticalPathDays}</div>
        <div class="metric-lbl">Critical Path Days</div>
      </div>
      <div class="metric">
        <div class="metric-val" style="color:${vColor};">${f.criticalPathBuffer}</div>
        <div class="metric-lbl">Buffer Days</div>
      </div>
      <div class="metric">
        <div class="metric-val" style="color:var(--t1);">${f.criticalPath.length}</div>
        <div class="metric-lbl">Critical Path Activities</div>
      </div>
    </div>`;

  // Critical path chain
  const cpChain = f.criticalPath.map(a => {
    const el = SCHED.elapsedDays(a.effortDays, a.teamSize);
    const s = f.schedule[a.id];
    return `<div class="tag-row" style="gap:10px;">
      <span class="mono" style="font-size:10px;color:var(--gold);min-width:52px;">${a.id}</span>
      <span style="flex:1;font-size:11.5px;">${h(a.name)}</span>
      <span class="fe fe-gl">${el}d</span>
      <span class="fe fe-mute">${s ? s.plannedStart : '—'} → ${s ? s.plannedEnd : '—'}</span>
    </div>`;
  }).join('');

  // Workstream analysis table
  const wsNames = {};
  WS.forEach(ws => { wsNames[ws.id] = ws.name; });
  const wsRows = f.workstreamAnalysis.map(ws => {
    const hCol = ws.health === 'critical' ? 'var(--red)' : ws.health === 'compressed' ? 'var(--amb)' : 'var(--grn)';
    const hDot = ws.health === 'critical' ? 'h-red' : ws.health === 'compressed' ? 'h-amb' : 'h-grn';
    return `<tr>
      <td class="mono">${ws.id}</td>
      <td>${h(wsNames[ws.id] || ws.id)}</td>
      <td style="text-align:center;">${ws.totalEffort}</td>
      <td style="text-align:center;">${ws.availableWindow}</td>
      <td style="text-align:center;color:${hCol};font-weight:600;">${ws.surplus >= 0 ? '+' : ''}${ws.surplus}</td>
      <td><span class="hdot ${hDot}"></span></td>
    </tr>`;
  }).join('');

  const wsTable = `
    <table class="tb">
      <thead><tr><th>WS</th><th>Workstream</th><th style="text-align:center;">Effort (d)</th><th style="text-align:center;">Window (d)</th><th style="text-align:center;">Surplus</th><th>Health</th></tr></thead>
      <tbody>${wsRows}</tbody>
    </table>`;

  // Conflicts
  const conflictHtml = f.conflicts.length > 0
    ? `<div class="co co-r" style="margin-top:12px;">
        <div class="co-l">Resource Conflicts (${f.conflicts.length})</div>
        <div class="co-t">${f.conflicts.map(c => `<strong>${h(c.owner)}</strong> overlaps on ${c.actA} and ${c.actB}`).join('<br>')}</div>
      </div>`
    : '';

  const calConflictHtml = f.calendarConflicts.length > 0
    ? `<div class="co co-r" style="margin-top:8px;">
        <div class="co-l">Calendar Conflicts (${f.calendarConflicts.length})</div>
        <div class="co-t">${f.calendarConflicts.map(c => `<strong>${h(c.owner)}</strong> unavailable ${c.from} → ${c.to}, overlaps ${c.activity}`).join('<br>')}</div>
      </div>`
    : '';

  // Recommendations
  const recTypeLabel = { add_resource:'Add Resource', early_start:'Early Start', negotiate_timeline:'Negotiate', reduce_scope:'Reduce Scope' };
  const recTypeColor = { add_resource:'fe-b', early_start:'fe-p', negotiate_timeline:'fe-a', reduce_scope:'fe-r' };
  const recsHtml = recs.length > 0
    ? `<div class="sh2" style="margin-top:20px;">Recommendations</div>
       <div class="bt">Sorted by potential time saving — highest first.</div>
       ${recs.map(r => `<div class="co co-b" style="margin:6px 0;">
         <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
           <span class="fe ${recTypeColor[r.type] || 'fe-mute'}">${recTypeLabel[r.type] || r.type}</span>
           ${r.saving ? `<span class="fe fe-g">saves ${r.saving}d</span>` : ''}
           ${r.activity ? `<span class="fe fe-gl">${r.activity}</span>` : ''}
         </div>
         <div style="font-size:12.5px;color:var(--t1);margin-bottom:2px;">${h(r.description)}</div>
         <div style="font-size:11px;color:var(--t3);">${h(r.detail || '')}</div>
         <div style="font-size:10px;color:var(--red);margin-top:2px;">Risk: ${h(r.risk)}</div>
       </div>`).join('')}`
    : '';

  // Infeasible acknowledgment
  const ackHtml = f.verdict === 'infeasible'
    ? `<div class="co co-r" style="margin-top:16px;">
        <div class="co-l">Timeline Risk Warning</div>
        <div class="co-t" style="margin-bottom:10px;">This bid cannot be completed within the available timeline using the current configuration. <strong>Deficit: ${f.deficit} working days.</strong></div>
        <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:12px;color:var(--t1);">
          <input type="checkbox" id="wiz-ack-check" onchange="document.getElementById('wiz-confirm-btn').disabled=!this.checked;">
          I acknowledge the timeline risk and choose to proceed.
        </label>
      </div>`
    : '';

  // Adjust button
  const adjustBtn = f.verdict !== 'feasible'
    ? `<button class="btn" onclick="WIZARD.setStep(2);renderApp();" style="margin-top:12px;">← Adjust Activities & Recheck</button>`
    : '';

  return `
    <div class="sl">Stage 6 of 6</div>
    <div class="pg-title">Feasibility Check</div>
    <div class="pg-desc">The scheduler has backward-planned all active activities from the submission deadline. Review the verdict, critical path, and workstream analysis below.</div>

    <div style="text-align:center;padding:20px;margin:12px 0;background:${vBg};border:2px solid ${vColor};">
      <div style="font-size:36px;margin-bottom:4px;">${vIcon}</div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;color:${vColor};text-transform:uppercase;">${f.verdict}</div>
      <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--t2);margin-top:4px;">${vLabel}</div>
    </div>

    ${metrics}

    <div class="sh2">Critical Path</div>
    <div class="bt">The longest dependency chain through the schedule — any delay here directly delays submission.</div>
    ${cpChain}

    <div class="sh2" style="margin-top:20px;">Workstream Analysis</div>
    <div class="bt">Effort vs. available window per workstream. Negative surplus = deficit.</div>
    ${wsTable}

    ${conflictHtml}
    ${calConflictHtml}
    ${recsHtml}
    ${ackHtml}
    ${adjustBtn}`;
}

function renderBidView(bid) {

  return `

        <span class="hdr-sub">Bid Execution</span>
        <div class="hdr-bid-name">${h(bid.name||'Untitled Bid')}</div>
      </div>
      <div class="hdr-r">
        <span class="fe ${
          bid.status==='active'?'fe-b':bid.status==='submitted'?'fe-a':
          bid.status==='won'?'fe-g':bid.status==='lost'?'fe-r':'fe-mute'

function renderModule(bid) {
  switch(ROUTER.bidTab) {
    case 'workspace':   return renderWorkspace(bid);
    case 'activities':  return renderActivities(bid);
    case 'submissions': return renderSubmissions(bid);
    case 'reviews':     return renderReviews(bid);
    case 'governance':  return renderGovernance(bid);
    case 'readiness':   return renderReadiness(bid);
    case 'submission':  return renderSubmission(bid);
    case 'team':        return renderTeam(bid);
    default:            return renderWorkspace(bid);
  }
}

function _placeholder(code, title, desc, color, sprint) {
  return `<div class="placeholder">
    <div class="placeholder-badge" style="border-color:${color};background:${color}1a;">
      <span style="font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:${color};">${code}</span>
    </div>
