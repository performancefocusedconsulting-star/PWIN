        {id:'SAL-02.1',n:'Incumbent Service Delivery & Performance Assessment',t:[
          {id:'SAL-02.1.1',n:'Review incumbent service delivery against contractual SLAs and performance framework -- met, exceeded, or fallen short',raci:{r:'Capture Lead',a:'Bid Director',c:'Account Manager / Delivery Director',i:'Solution Architect'},e:'Medium',tp:'Sequential',o:[{n:'Incumbent performance summary',f:'Structured assessment',q:['Contractual SLAs and KPIs identified with incumbent performance against each (met / exceeded / failed)','Evidence basis cited for every performance claim -- not opinion','Performance trajectory noted -- improving, stable, or declining','Distinguishes between our own data (if incumbent) and external evidence (if challenger)']}]},
          {id:'SAL-02.1.2',n:'Assess incumbent behaviour, culture, and partnership quality -- does the client like working with them?',raci:{r:'Capture Lead',a:'Bid Director',c:'Account Manager',i:'Commercial Lead'},e:'Medium',tp:'Sequential',o:[{n:'Incumbent relationship & culture assessment',f:'Structured assessment',q:['Assessment covers: partnership behaviours, responsiveness, transparency, cultural fit with client','Client satisfaction signals captured -- are they looking for continuity or change?','Assessment distinguishes between contractual delivery (task SAL-02.1.1) and relationship quality','Evidence basis cited -- not speculation about client sentiment']}]},
          {id:'SAL-02.1.3',n:'Assess incumbent innovation, continuous improvement, and value-add beyond the contract',raci:{r:'Capture Lead',a:'Bid Director',c:'Solution Architect / SME',i:'Commercial Lead'},e:'Low',tp:'Parallel',o:[{n:'Incumbent innovation & value-add assessment',f:'Structured assessment',q:['Specific innovations or improvements delivered by incumbent identified (not vague "they innovated")','Assessment of whether incumbent has invested beyond contractual obligations','Gaps identified -- areas where client expected innovation but incumbent did not deliver','Implication for our bid: where can we differentiate on innovation and investment?']}]}
        ]},
        {id:'SAL-02.2',n:'Incumbent Stickiness & Competitive Risk Assessment',t:[
          {id:'SAL-02.2.1',n:'Assess incumbent price competitiveness -- is the current price point one we can compete against, or must we differentiate elsewhere?',raci:{r:'Capture Lead',a:'Bid Director',c:'Commercial Lead',i:'Partner Lead'},e:'Medium',tp:'Sequential',o:[{n:'Incumbent price position assessment',f:'Structured assessment',q:['Known or estimated incumbent price position documented with evidence basis','Assessment of whether price competition is viable or differentiation is required','Contract value trajectory noted -- has price grown, shrunk, or remained stable through extensions?','Implication for our commercial strategy identified -- compete on price, value, or both']}]},
          {id:'SAL-02.2.2',n:'Assess transition stickiness -- TUPE complexity, asset transfer, knowledge transfer burden, client switching cost',raci:{r:'Capture Lead',a:'Bid Director',c:'Commercial Lead / HR / Legal',i:'Solution Architect'},e:'Medium',tp:'Sequential',o:[{n:'Transition risk assessment',f:'Structured assessment',q:['TUPE scale and complexity assessed -- workforce size, terms, pension implications','Asset transfer requirements identified -- property, equipment, IP, systems','Knowledge transfer risk assessed -- how dependent is service continuity on incumbent-specific knowledge?','Client switching cost estimated -- what disruption does changing supplier cause the client?','Overall stickiness rating with rationale -- how hard is this incumbent to unseat?']}]}
        ]},
        {id:'SAL-02.3',n:'Transformational Disruption & Innovation Opportunity Assessment',t:[
          {id:'SAL-02.3.1',n:'Identify transformational opportunities -- where can emerging technology, new delivery models, or fundamentally different approaches disrupt the incumbent\'s current operating model?',raci:{r:'Capture Lead',a:'Bid Director',c:'Solution Architect / CTO / Innovation Lead',i:'Commercial Lead'},e:'Medium',tp:'Sequential',o:[{n:'Transformational opportunity register',f:'Structured register',q:['Each opportunity identifies a specific area where the incumbent\'s operating model can be disrupted','Technology or approach is named and specific -- not vague "we\'ll use AI"','Expected impact quantified or estimated -- cost reduction, service improvement, outcome transformation','Feasibility assessed -- is this proven, emerging, or speculative?','Link to incumbent weakness explicit -- which gap or stagnation does this exploit?']}]},
          {id:'SAL-02.3.2',n:'Assess alignment to evaluation framework and client appetite -- will the procurement reward transformational approaches or penalise non-compliance with a prescriptive specification?',raci:{r:'Capture Lead',a:'Bid Director',c:'Bid Manager / Commercial Lead',i:'Solution Architect'},e:'Medium',tp:'Sequential',o:[{n:'Evaluation alignment assessment',f:'Structured assessment per opportunity',q:['Each transformational opportunity assessed against the evaluation framework -- will it score or be penalised?','Specification type characterised -- prescriptive (must comply) vs outcome-based (can innovate)','Client appetite for change assessed -- do they want continuity or transformation?','Risk of non-compliance identified for each opportunity -- can we propose this within the rules?','Clear recommendation: pursue, park, or reframe each opportunity']}]},
          {id:'SAL-02.3.3',n:'Assess our organisational capability to deliver the disruption -- do we have the technology, skills, partners, and track record to credibly propose this?',raci:{r:'Capture Lead',a:'Bid Director',c:'Solution Architect / CTO / Delivery Director',i:'Partner Lead'},e:'Medium',tp:'Sequential',o:[{n:'Capability gap assessment',f:'Structured assessment per opportunity',q:['Each viable opportunity assessed for our readiness to deliver -- technology, skills, capacity','Credibility test applied -- do we have track record or evidence to back this claim?','Capability gaps identified with mitigation -- partner, recruit, develop, or acquire','Opportunities with no credible delivery path flagged for rejection -- not proposed on aspiration alone']}]},
          {id:'SAL-02.3.4',n:'Model the commercial impact -- does the transformational approach drive a fundamentally different cost base and price point?',raci:{r:'Commercial Lead',a:'Bid Director',c:'Capture Lead / Solution Architect',i:'Partner Lead'},e:'Medium',tp:'Sequential',o:[{n:'Commercial disruption model',f:'Structured financial assessment',q:['Each viable opportunity modelled for cost impact -- what does it do to the delivery cost base?','Investment requirement estimated -- what upfront investment is needed and over what payback period?','Price point implication assessed -- does this create a competitive price advantage or require gain-share/partnership model?','Comparison to incumbent price position -- does this change the commercial competitive dynamic?','Risk/reward balance stated -- is the investment case credible and proportionate?']}]},
          {id:'SAL-02.3.5',n:'Synthesise incumbent performance assessment -- consolidated view across all three dimensions informing competitive strategy, win approach, and go/no-go',raci:{r:'Capture Lead',a:'Bid Director',c:'',i:'Bid Manager'},e:'Low',tp:'Sequential',o:[{n:'Incumbent performance assessment (activity primary output)',f:'Document / structured assessment',q:['All nine upstream assessments consolidated into single authoritative view','Clear statement of incumbent strengths we must counter or match','Clear statement of incumbent weaknesses we can exploit','Stickiness rating with evidence -- can this incumbent realistically be unseated?','Transformational disruption potential assessed -- can we leapfrog, and will the procurement reward it?','Commercial disruption impact quantified -- does innovation change the price dynamic?','Go/no-go implications stated -- does the combined picture support pursuit?','Implications for win strategy and differentiation approach identified','Reviewed by Bid Director -- not single-author opinion']}]}
        ]}
      ],
      outs:[{n:'Incumbent performance assessment',f:'Document / structured assessment',q:['Service delivery performance assessed against contractual SLAs with evidence','Client relationship quality and partnership behaviours assessed','Innovation and value-add beyond contract assessed','Incumbent price competitiveness assessed with commercial implications','Transition stickiness assessed -- TUPE, assets, knowledge, switching cost','Overall stickiness rating with rationale','Transformational disruption opportunities identified, evaluation-aligned, capability-assessed, and commercially modelled','Go/no-go implications stated -- does the combined picture support pursuit?','Implications for win strategy and differentiation explicitly stated','Validated by Bid Director -- not single-author opinion']}]},
    {id:'SAL-03',n:'Competitor analysis & positioning',o:'Competitive landscape assessment',d:['SAL-01','SAL-02'],dur:5,ts:1,pt:'S',rl:'Capture Lead',
      subs:[
        {id:'SAL-03.1',n:'Competitive Intelligence Gathering',t:[
          {id:'SAL-03.1.1',n:'Identify credible competitors from procurement history and market intelligence',raci:{r:'Capture Lead',a:'Bid Director',c:'Market Intelligence / Partners',i:'Commercial Lead'},e:'Low',tp:'Sequential',o:[{n:'Competitor long list',f:'Structured register',q:['Every competitor has an evidence basis for inclusion (not guesswork)','Sources cited for each entry (award notice, market intel, client mention)','Covers incumbents, known bidders, and plausible new entrants']}]},
          {id:'SAL-03.1.2',n:'Categorise competitors: Incumbent / Contender / Dark Horse / Opportunist',raci:{r:'Capture Lead',a:'Bid Director',c:'Market Intelligence',i:'Partner Lead'},e:'Low',tp:'Sequential',o:[{n:'Competitive landscape map (categorised)',f:'Matrix / visual map',q:['Every identified competitor is categorised','Category rationale documented for each (not just a label)','Incumbent strengths and vulnerabilities explicitly captured','Assessment distinguishes between known facts and assumptions']}]},
          {id:'SAL-03.1.3',n:'Profile each credible competitor -- likely strategy, strengths, weaknesses, price position',raci:{r:'Capture Lead',a:'Bid Director',c:'Solution Architect / SMEs',i:'Commercial Lead'},e:'Medium',tp:'Parallel',o:[{n:'Competitor profiles',f:'Per-competitor structured profile',q:['Each profile covers: likely bid strategy, key strengths, exploitable weaknesses, likely price position','Profiles are specific to this opportunity (not generic company summaries)','Confidence level stated for each assessment (known / inferred / assumed)','Top 2-3 competitors identified for detailed counter-strategy']}]}
        ]},
        {id:'SAL-03.2',n:'Competitive Positioning & Counter-Strategy',t:[
          {id:'SAL-03.2.1',n:'Develop counter-strategies and ghost themes for top 2-3 competitors',raci:{r:'Capture Lead',a:'Bid Director',c:'Solution Architect',i:'Commercial Lead'},e:'High',tp:'Sequential',o:[{n:'Counter-strategy register',f:'Structured register',q:['Each counter-strategy is actionable -- maps to a specific response tactic or solution feature','Ghost themes are phrased from the evaluator perspective (what the competitor will claim)','Counter-narratives prepared for each ghost theme','Strategies are differentiated per competitor (not one generic approach)']},{n:'Ghost themes',f:'Structured list',q:['Each ghost theme identifies: which competitor, what they will claim, why it resonates with the buyer','Corresponding counter-position defined for each','Usable by proposal authors without further interpretation']}]},
          {id:'SAL-03.2.2',n:'Validate competitive positioning with bid team and adjust',raci:{r:'Capture Lead',a:'Bid Director',c:'Bid Team (collective)',i:''},e:'Low',tp:'Sequential',o:[{n:'Competitive landscape assessment (validated -- activity primary output)',f:'Document / structured register',q:['Bid team has reviewed and challenged -- not single-author opinion','Adjustments from validation captured and incorporated','Final assessment is the authoritative competitive view for the bid','Downstream consumers identified: SAL-04 (win themes), COM-02 (price-to-win)']}]}
        ]}
      ],
      outs:[{n:'Competitive landscape assessment',f:'Document / structured register',q:['All credible competitors identified with evidence basis','Each competitor categorised (Incumbent / Contender / Dark Horse / Opportunist)','Top 2-3 competitors profiled: strategy, strengths, weaknesses, price position','Counter-strategies are actionable -- each maps to a specific response tactic','Ghost themes defined and usable by proposal authors','Validated by bid team -- not single-author opinion']}]},
    {id:'SAL-04',n:'Win theme development & refinement',o:'Win theme document',d:['SAL-01','SAL-03'],dur:5,ts:1,pt:'S',rl:'Capture Lead',
      subs:[
        {id:'SAL-04.1',n:'Win Theme Identification & Development',t:[
          {id:'SAL-04.1.1',n:'Import or develop initial win themes -- from Win Strategy product (capture-informed) or from scratch using buyer values, competitive positioning, and disruption opportunities (cold-start)',raci:{r:'Capture Lead',a:'Bid Director',c:'Account Manager',i:'Solution Architect'},e:'Medium',tp:'Sequential',o:[{n:'Draft win themes register (3–5 themes)',f:'Structured register',q:['Each theme is a written statement -- substantive, not just a label','Each theme identifies a specific differentiator or value driver','Themes cover the breadth of the opportunity -- not all clustered in one dimension','Source identified for each theme -- capture phase, buyer values, competitive gap, or disruption opportunity']}]},
          {id:'SAL-04.1.2',n:'Test each theme against buyer values -- does this resonate with what the client actually cares about?',raci:{r:'Capture Lead',a:'Bid Director',c:'Account Manager',i:'Commercial Lead'},e:'Low',tp:'Sequential',o:[{n:'Buyer values alignment assessment per theme',f:'Matrix (themes × buyer values)',q:['Every theme mapped to at least one buyer value -- orphan themes flagged','Alignment strength rated (strong / moderate / weak) with rationale','Buyer values without a corresponding theme identified -- coverage gap','Themes that don\'t resonate with any buyer value challenged or removed']}]},
          {id:'SAL-04.1.3',n:'Test each theme against competitive positioning -- does this differentiate us from the incumbent and key competitors?',raci:{r:'Capture Lead',a:'Bid Director',c:'Solution Architect',i:'Commercial Lead'},e:'Medium',tp:'Sequential',o:[{n:'Competitive differentiation assessment per theme',f:'Structured assessment',q:['Each theme assessed: can competitors credibly claim the same thing?','Themes that are genuinely differentiating identified vs those that are table stakes','Counter-strategies and ghost themes (from SAL-03) cross-referenced -- do our themes neutralise competitor claims?','Transformational disruption themes explicitly tested -- do they create clear competitive separation?']}]},
          {id:'SAL-04.1.4',n:'Ensure each theme is evidence-backed -- do we have credentials, case studies, or demonstrable capability to substantiate this claim?',raci:{r:'Capture Lead',a:'Bid Director',c:'Bid Manager / SMEs',i:'Bid Coordinator'},e:'Low',tp:'Parallel',o:[{n:'Evidence substantiation assessment per theme',f:'Structured assessment',q:['Each theme assessed for evidence strength -- proven, partial, or aspirational','Specific evidence items identified or flagged as gaps for each theme','Themes with no credible evidence basis challenged -- can we stand this up in a proposal?','Evidence gaps fed forward to SOL-10 (evidence strategy) for resolution']}]}
        ]},
        {id:'SAL-04.2',n:'Win Theme Refinement & Messaging',t:[
          {id:'SAL-04.2.1',n:'Refine themes against ITT documentation -- align language, scope, and emphasis to the actual requirement and specification',raci:{r:'Capture Lead',a:'Bid Director',c:'Bid Manager',i:'Solution Architect'},e:'Medium',tp:'Sequential',o:[{n:'Refined win themes with ITT alignment',f:'Structured register (updated)',q:['Themes rewritten in language that mirrors ITT terminology and client vocabulary','Each theme scoped to the actual requirement -- not broader than what the bid covers','Themes prioritised based on testing (buyer values, differentiation, evidence) -- not all equal weight','Themes that failed testing removed or substantially reworked']}]},
          {id:'SAL-04.2.2',n:'Develop clear messaging per theme -- concise statements that inform solution design, commercial proposition, and storyboard structure',raci:{r:'Capture Lead',a:'Bid Director',c:'Solution Architect / Commercial Lead',i:'Bid Manager'},e:'Medium',tp:'Sequential',o:[{n:'Win theme messaging pack',f:'Structured messaging document',q:['Each theme has a clear, concise headline message usable by proposal authors','Supporting narrative for each theme -- what it means, why it matters to the client, how we deliver it','Messaging links to solution design implications -- what must the solution demonstrate to support this theme?','Messaging links to commercial proposition -- what must the pricing approach reflect?','Messages are written for the evaluator -- not internal shorthand']}]},
          {id:'SAL-04.2.3',n:'Validate win themes and messaging with bid team -- confirm for capture plan lock',raci:{r:'Capture Lead',a:'Bid Director',c:'Bid Team (collective)',i:''},e:'Low',tp:'Sequential',o:[{n:'Win theme document (validated -- activity primary output)',f:'Document / structured register with messaging',q:['Bid team has reviewed and challenged -- not single-author opinion','Each theme confirmed as differentiated, buyer-relevant, evidence-backed, and ITT-aligned','Messaging confirmed as clear and usable by solution architects, commercial leads, and proposal authors','Themes prioritised -- primary vs secondary -- to guide emphasis in the response','Downstream consumers identified and briefed: SAL-05 (scoring strategy), SAL-06 (capture plan lock), BM-10 (storyboard), SOL-03 (solution design)']}]}
        ]}
      ],
      outs:[{n:'Win theme document',f:'Document / structured register with messaging',q:['Win themes identified (3–5), tested, and prioritised','Each theme tested against buyer values, competitive positioning, and evidence availability','Themes refined against ITT documentation -- language, scope, and emphasis aligned','Clear messaging per theme -- headline, narrative, solution implications, commercial implications','Themes validated by bid team -- not single-author opinion','Messaging usable by solution architects, commercial leads, and proposal authors without further interpretation']}]},
    {id:'SAL-05',n:'Evaluation criteria mapping & scoring strategy',o:'Evaluation criteria matrix with scoring approach',d:['SAL-04'],dur:3,ts:1,pt:'S',rl:'Bid Manager',
      subs:[
        {id:'SAL-05.1',n:'Evaluation Framework Analysis',t:[
          {id:'SAL-05.1.1',n:'Deconstruct the ITT evaluation methodology -- criteria, weightings, scoring model, pass/fail thresholds, hurdle marks, moderation process',raci:{r:'Bid Manager',a:'Bid Director',c:'Capture Lead',i:'Commercial Lead'},e:'Medium',tp:'Sequential',o:[{n:'Evaluation methodology breakdown',f:'Structured analysis',q:['All evaluation criteria identified with published weightings','Scoring model documented -- percentage, points, banded, ranked, or hybrid','Pass/fail thresholds and hurdle marks identified per section (if any)','Quality/price split documented with calculation methodology','Moderation and consensus process noted (if published)','Ambiguities or gaps in the published methodology flagged for clarification (feeds SAL-07)']}]},
          {id:'SAL-05.1.2',n:'Map evaluation criteria to response sections -- which question is worth how many marks, and what proportion of the total?',raci:{r:'Bid Manager',a:'Bid Director',c:'Capture Lead',i:'Solution Architect'},e:'Medium',tp:'Sequential',o:[{n:'Evaluation criteria matrix',f:'Matrix (response sections × criteria × weightings)',q:['Every response section mapped to its evaluation criteria and weighting','Mark value calculated per section -- absolute points and percentage of total quality score','Word/page limits mapped against marks available -- marks-per-page ratio identified','Sections ranked by marks concentration -- where the outcome will be decided','Any sections with disproportionate effort-to-marks ratio flagged']}]},
          {id:'SAL-05.1.3',n:'Where client marking scheme exists, analyse granular scoring guidance -- what does a top-scoring response look like per criterion?',raci:{r:'Bid Manager',a:'Bid Director',c:'Capture Lead / Solution Architect',i:'Writers'},e:'Medium',tp:'Sequential',o:[{n:'Scoring guidance analysis per section',f:'Per-section structured analysis',q:['Where marking scheme exists: grade descriptors analysed -- what distinguishes "outstanding" from "good" from "acceptable"?','Key differentiating phrases and expectations extracted per grade band','Where no marking scheme: evaluation criteria interpreted to infer what evaluators will look for','Actionable guidance for writers: what must each response demonstrate to achieve maximum marks']}]}
        ]},
        {id:'SAL-05.2',n:'Scoring Optimisation Strategy',t:[
          {id:'SAL-05.2.1',n:'Analyse marks concentration -- identify the high-value sections that disproportionately drive the outcome',raci:{r:'Bid Manager',a:'Bid Director',c:'Capture Lead',i:'Commercial Lead'},e:'Medium',tp:'Sequential',o:[{n:'Marks concentration analysis',f:'Prioritised assessment',q:['Sections categorised by strategic importance -- high-value (must win), medium (must be strong), low (must pass)','Effort allocation guidance -- where to invest disproportionate writing and review effort','Hurdle risk sections identified -- where failure to meet threshold eliminates regardless of total score','Quality/price interaction modelled -- what quality score do we need to win at our expected price point?']}]},
          {id:'SAL-05.2.2',n:'Conduct score gap analysis -- can we realistically score 100% in each section, and if not, why not, and what is the mitigation?',raci:{r:'Bid Manager',a:'Bid Director',c:'Capture Lead / Solution Architect / Commercial Lead',i:'Partner Lead'},e:'High',tp:'Sequential',o:[{n:'Score gap analysis',f:'Per-section structured assessment',q:['Each section assessed: can we credibly score maximum marks? (yes / partial / no)','Where gaps exist: root cause identified -- missing credentials, capability gap, lack of track record, compliance limitation','Mitigation strategy per gap -- partnering, subcontracting, recruitment, capability development, alternative evidence','Residual risk after mitigation assessed -- can the gap be fully closed or must we accept a scoring deficit?','Impact quantified -- what is the points cost of each unmitigated gap on total score?','Critical gaps escalated -- any that fundamentally threaten competitiveness flagged for go/no-go consideration']}]},
          {id:'SAL-05.2.3',n:'Develop scoring strategy per section -- what must each response demonstrate to achieve maximum marks, incorporating gap mitigations',raci:{r:'Bid Manager',a:'Bid Director',c:'Capture Lead / Solution Architect',i:'Writers'},e:'Medium',tp:'Sequential',o:[{n:'Per-section scoring strategy',f:'Structured strategy per response section',q:['Each section has a clear scoring objective -- target grade band and rationale','Key content requirements identified per section to achieve target score','Gap mitigations incorporated -- where we cannot score maximum, the alternative approach is specified','Win theme integration points identified -- which themes to emphasise in which sections']}]},
          {id:'SAL-05.2.4',n:'Align win themes to evaluation sections -- ensure our differentiators land where the marks are',raci:{r:'Bid Manager',a:'Bid Director',c:'Capture Lead',i:'Solution Architect'},e:'Low',tp:'Sequential',o:[{n:'Win theme integration map',f:'Matrix (themes × response sections)',q:['Every win theme mapped to the response sections where it will be articulated','High-value sections have at least one primary win theme assigned','Theme coverage is balanced -- no theme orphaned from high-scoring sections','Feeds directly into BM-10 storyboard structure and the win theme integration heatmap in the product']}]},
          {id:'SAL-05.2.5',n:'Confirm scoring strategy with bid team for capture plan lock',raci:{r:'Bid Manager',a:'Bid Director',c:'Bid Team (collective)',i:''},e:'Low',tp:'Sequential',o:[{n:'Evaluation criteria matrix with scoring approach (validated -- activity primary output)',f:'Document / structured matrix with strategy',q:['Bid team has reviewed and challenged -- not single-author opinion','Score gap mitigations accepted or escalated -- no unaddressed critical gaps','Scoring strategy aligned with win themes and commercial approach','Effort allocation confirmed -- team understands where to concentrate','Downstream consumers briefed: BM-07 (quality management), BM-10 (storyboard), writers']}]}
        ]}
      ],
      outs:[{n:'Evaluation criteria matrix with scoring approach',f:'Document / structured matrix with strategy',q:['Evaluation methodology fully deconstructed -- criteria, weightings, scoring model, thresholds','Every response section mapped to criteria and marks value','Scoring guidance analysed -- what top-scoring responses look like per section','Marks concentration identified -- high-value sections prioritised','Score gap analysis complete -- gaps identified, root-caused, and mitigated','Per-section scoring strategy with target grade bands and content requirements','Win themes aligned to evaluation sections -- differentiators land where marks are','Validated by bid team -- not single-author opinion']}]},
    {id:'SAL-06',n:'Capture plan finalisation & win strategy lock',o:'Capture plan (locked) -- METHODOLOGY GATE',d:['SAL-04','SAL-05','SAL-10'],dur:3,ts:1,pt:'S',rl:'Bid Director',
      subs:[
        {id:'SAL-06.1',n:'Capture Effectiveness & ITT Alignment Assessment',t:[
          {id:'SAL-06.1.1',n:'Assess capture effectiveness -- how well does the ITT align to what our capture activity was trying to influence? Evaluation criteria, solution scope, commercial terms, transition approach',raci:{r:'Capture Lead',a:'Bid Director',c:'Account Manager',i:'Solution Architect'},e:'Medium',tp:'Sequential',o:[{n:'Capture effectiveness assessment',f:'Structured assessment',q:['Each area of capture influence assessed: evaluation criteria, solution scope, commercial terms, transition provisions','Alignment rated per area -- strong (ITT reflects our influence), partial (some alignment), weak (ITT went a different direction)','Surprises and deviations from expectations identified -- what did the client do that we didn\'t expect?','Implications for win strategy -- where must we adapt vs where can we proceed as planned?']}]},
          {id:'SAL-06.1.2',n:'Conduct rapid ITT documentation analysis -- requirements breakdown, contract red lines, payment mechanism, SLA framework, transition provisions',raci:{r:'Bid Manager',a:'Bid Director',c:'Commercial Lead / Legal / Solution Architect',i:'Capture Lead'},e:'High',tp:'Sequential',o:[{n:'ITT documentation analysis summary',f:'Structured briefing',q:['Requirements scope and complexity characterised -- what is being asked for at a strategic level?','Contract red lines and non-negotiable terms identified','Payment mechanism and financial model characterised -- fixed price, cost-plus, gain share, payment profile','SLA framework and performance regime characterised -- severity, consequences, earn-back provisions','Transition and mobilisation expectations identified -- timeline, TUPE obligations, asset transfer','Key risks and showstoppers flagged for qualification assessment']}]}
        ]},
        {id:'SAL-06.2',n:'Full Pursuit Qualification & PWIN Scoring',t:[
          {id:'SAL-06.2.1',n:'Complete Deal Qualification Checklist (DQC) -- attractiveness, deliverability, risk, win likelihood, informed by ITT documentation analysis',raci:{r:'Bid Director',a:'Senior Responsible Executive',c:'Commercial Lead / Solution Architect / Legal',i:'Bid Board'},e:'High',tp:'Sequential',o:[{n:'Deal Qualification Checklist (DQC)',f:'Structured checklist with commentary',q:['Attractiveness assessed -- strategic value, margin potential, pipeline fit, growth opportunity','Deliverability assessed -- solution feasibility, resource availability, capability, partner readiness','Risk assessed -- contract terms, commercial risk, transition complexity, legal exposure','Win likelihood assessed -- competitive position, stakeholder alignment, scoring gaps, incumbent stickiness','Each dimension scored with evidence basis -- not gut feel','Showstoppers explicitly called out -- any single dimension that makes this unwinnable or undeliverable']}]},
          {id:'SAL-06.2.2',n:'Assess strategic fit against sector portfolio and growth plan -- is this the right opportunity for us right now?',raci:{r:'Bid Director',a:'Partner / Senior Responsible Executive',c:'Capture Lead',i:'Account Manager'},e:'Low',tp:'Sequential',o:[{n:'Strategic fit assessment',f:'Structured assessment',q:['Fit against sector portfolio assessed -- does this opportunity strengthen our market position?','Resource opportunity cost considered -- what else could this team be working on?','Pipeline balance assessed -- does this create over-concentration in one sector or client?','Reputational risk considered -- is this an opportunity that enhances or risks our brand?']}]},
          {id:'SAL-06.2.3',n:'Score PWIN against all dimensions -- competitive position, stakeholder relationships, solution readiness, scoring landscape, transition risk, transformational opportunity',raci:{r:'Bid Director',a:'Partner / Senior Responsible Executive',c:'Capture Lead / Commercial Lead',i:'Bid Manager'},e:'Medium',tp:'Sequential',o:[{n:'PWIN score and rationale',f:'Quantified score with structured rationale',q:['PWIN score calculated (%) with confidence band','Score broken down by dimension -- competitive, relationship, solution, commercial, delivery','Each dimension has evidence basis from upstream activities -- not estimated from experience alone','Comparison to PWIN Coach baseline score (if available) -- has our position improved or deteriorated since qualification?','Key swing factors identified -- what would move PWIN up or down most?']}]},
          {id:'SAL-06.2.4',n:'Synthesise win strategy -- the integrated narrative tying win themes, scoring strategy, competitive positioning, stakeholder engagement, and transformational approach into a coherent plan',raci:{r:'Bid Director',a:'Partner / Senior Responsible Executive',c:'Capture Lead / Solution Architect / Commercial Lead',i:'Bid Manager'},e:'High',tp:'Sequential',o:[{n:'Win strategy narrative',f:'Structured strategy document',q:['Winning approach articulated -- full frontal on price + solution, differentiation play, defensive rebid, or transformational disruption','Win themes integrated with scoring strategy -- how each theme lands in the evaluation framework','Competitive counter-strategy embedded -- how we neutralise each key competitor','Stakeholder engagement strategy aligned -- messaging and approach per key stakeholder','Transformation and innovation strategy incorporated where applicable','Strategy is coherent -- no contradictions between commercial approach, solution, and win themes']}]}
        ]},
        {id:'SAL-06.3',n:'Consortium Design & Partnership Strategy',t:[
          {id:'SAL-06.3.1',n:'Define the consortium strategy -- prime/sub, JV, SPV, or sole bidder -- with rationale tied to win strategy and competitive positioning',raci:{r:'Bid Director',a:'Senior Responsible Executive',c:'Commercial Lead / Capture Lead',i:'Legal'},e:'Medium',tp:'Sequential',o:[{n:'Consortium strategy',f:'Structured strategy paper',q:['Consortium model defined -- prime/sub, JV, SPV, or sole bidder -- with rationale','Strategic rationale for the model linked to win strategy -- how this structure creates competitive advantage','Client perception considered -- does this model signal the right things to the evaluators?','Risk and governance implications of the model assessed -- JV/SPV complexity vs prime/sub simplicity','Alignment to procurement requirements confirmed -- some procurements mandate or restrict certain models']}]},
          {id:'SAL-06.3.2',n:'Identify required partner capabilities -- mapped to score gaps, capability gaps, and solution components that we cannot deliver alone',raci:{r:'Capture Lead',a:'Bid Director',c:'Solution Architect / Commercial Lead',i:'Partner Lead'},e:'Medium',tp:'Sequential',o:[{n:'Partner capability requirements',f:'Structured requirements register',q:['Every capability gap that requires a partner is documented -- what we need and why','Each requirement linked to the scoring or solution gap it addresses','Target partner profile defined per requirement -- type of organisation, scale, credentials, track record','Priority ranked -- critical partners (without whom we cannot bid) vs valuable partners (who strengthen the bid)']}]},
          {id:'SAL-06.3.3',n:'Define the target delivery model across the consortium -- who owns what scope, high-level work breakdown, accountability structure',raci:{r:'Bid Director',a:'Senior Responsible Executive',c:'Solution Architect / Commercial Lead',i:'Delivery Director'},e:'Medium',tp:'Sequential',o:[{n:'Consortium delivery model and work breakdown',f:'High-level work breakdown with accountability map',q:['Scope allocation defined per delivery agent -- who owns which solution components and service lines','Accountability and interface model defined -- who is responsible to the client for what','Dependencies between consortium members identified -- where integration risk exists','High-level enough to brief potential partners -- not so detailed it constrains partner creativity','Feeds SUP-01 (partner identification brief) and COM-03 (commercial structure and pricing requests)']}]}
        ]},
        {id:'SAL-06.4',n:'Capture Plan Assembly & Bid Mandate Lock',t:[

    {id:'SAL-07',n:'Pre-submission clarification strategy & drafting',o:'Clarification question register (prioritised)',d:['SAL-04','SOL-01'],dur:3,ts:2,pt:'P',rl:'Capture Lead',

          {id:'SAL-07.1.2',n:'Harvest clarification needs from solution and commercial workstreams -- technical ambiguity, contractual risk, pricing assumptions that block progress',raci:{r:'Bid Manager',a:'Bid Director',c:'Solution Architect / Commercial Lead / Legal',i:'Workstream Leads'},e:'Medium',tp:'Parallel',o:[{n:'Workstream-driven clarification needs',f:'Structured register',q:['Technical ambiguities from requirements analysis captured -- what blocks solution design?','Commercial and pricing assumptions that need client confirmation identified','Legal and contractual questions from contract review captured','Each need linked to the workstream and activity it impacts -- machine-traversable for impact analysis']}]},
          {id:'SAL-07.1.3',n:'Develop competitive clarification strategy -- how to exploit the clarification process as a strategic weapon based on our position (incumbent vs challenger)',raci:{r:'Capture Lead',a:'Bid Director',c:'Account Manager / Commercial Lead',i:'Bid Manager'},e:'High',tp:'Parallel',o:[{n:'Competitive clarification strategy',f:'Structured strategy with question register',q:['Position-specific playbook defined -- incumbent (minimise disclosure, delay information) or challenger (maximise exposure of incumbent weaknesses)','Strategic questions identified -- questions that influence interpretation, test appetite for innovation, or create competitive advantage','Information disclosure strategy defined -- what information we will provide, when, and in what form (especially TUPE data, CHEAPY lists, performance records if incumbent)','Timing strategy defined -- when to submit information or responses for maximum competitive disruption','Questions that probe score gap mitigations -- can the client confirm acceptable alternatives?','Counter-intelligence assessed -- what do competitors learn from our questions and what do we learn from theirs?','What NOT to ask explicitly considered -- questions we deliberately withhold to avoid revealing our approach or aiding competitors']}]}
