key_concepts_to_remember:

  - concept: PGO is multi-stage with structured residual risk
    detail: Pre-publication 30-60% / post-publication-pre-evaluation 70-85% /
            post-evaluation-pre-award 85-95%. Late-stage residual is named
            failure modes, not random noise.

  - concept: PGO and PWIN have asymmetric precision
    detail: PGO trustworthy early (anchored in history), PWIN guesswork early.
            PGO becomes residual late, PWIN becomes well-evidenced late.
            Therefore lead with PGO early, lead with PWIN late.

  - concept: Forward-looking ROI vs total ROI
    detail: At each stage gate, the decision is "is the REMAINING spend worth
            the CURRENT expected return?" — not "was the total worth it".
            Total ROI is a retrospective Verdict measure.

  - concept: Pursuit ROI most useful in early stages
    detail: This is where money gets wasted on phantom opportunities. By
            Stage 5, sunk cost dominates and only PWIN matters. PGO
            inclusion in ROI is therefore most valuable early.

