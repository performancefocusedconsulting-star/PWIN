# Session Handoff — Procurement Intelligence Analytics
# =====================================================
# Purpose: Pick this up in a Claude Code session on your laptop and continue
# the procurement intelligence analytics work without re-explaining context.
#
# Recommended kickoff prompt for the next session:
#   "Read pwin-competitive-intel/docs/session-handoff-2026-04-27.yaml and
#    pwin-competitive-intel/docs/buyer-behaviour-analytics-v1.md. We are
#    picking up the procurement intelligence analytics work. Start by
#    answering the open_questions in the v1 scoping doc, then begin the
#    v1 build per the actions list."

session:
  date: 2026-04-27
  branch: claude/procurement-intelligence-analytics-MOWqZ
  topic: Procurement intelligence analytics — buyer behaviour, PGO, Pursuit ROI
  surface_used: Claude Code on the web (cloud sandbox — no access to bid_intel.db)
  next_surface: Claude Code on laptop terminal (database in reach)

context_arc:
  - Question opened with the FTS database — could it surface slippage,
    conversion rates, notice-to-award timelines, CPV benchmarks?
  - Scope evolved to a buyer-focused PGO (Probability of Going Out) module
    intended to give Win Strategy and Qualify a defensible empirical
    PGO number, not a consultant guess.
  - Realisation that the database already merges three sources
    (Find a Tender, Contracts Finder, Companies House) — README is stale
    on Contracts Finder.
  - Brought in Pursuit ROI as the headline BidEquity KPI, with the
    standard formula TCV × Margin × PGO × PWIN ÷ Pursuit Cost.
  - User pushed back on simplistic stage-by-stage PGO numbers — late-stage
    cancellation is real, weighting between PGO and PWIN matters, joint
    multiplication washes out signal.
  - User introduced the Five Case Model business case maturity as a
    foundational PGO factor — Gate 2 (OBC) approval is effectively a
    pre-requisite for major procurements going to market.
  - Three-tier PGO factor model emerged — observable in our database,
    observable from external public data, structured judgement.

key_decisions:

  - id: D1
    decision: Build buyer behaviour analytics v1 first, refine theory after
    rationale: Empirical foundation must come before further design.
                The v1 build will tell us which factors actually matter.
    document: pwin-competitive-intel/docs/buyer-behaviour-analytics-v1.md

  - id: D2
    decision: Data foundation is FTS + Contracts Finder + Companies House from day one
    rationale: agent/ingest_cf.py is operational, schema has data_source column,
                CF rows tagged 'cf'. README incorrectly says CF "not yet integrated".
    follow_up: README needs updating (action A1).

  - id: D3
    decision: Pursuit ROI is the headline BidEquity KPI
    formula: "Pursuit ROI = (TCV × Margin × PGO × PWIN) ÷ Pursuit Cost"
    rationale: PWIN is the headline for PWIN-the-product. Different products,
                different audiences. BidEquity converts the inputs into a money
                decision; that is the differentiated layer.

  - id: D4
    decision: Always show PGO and PWIN as components, never the joint alone
    rationale: Multiplication treats two numbers of asymmetric precision as
                equal-status. PGO is anchored in history; PWIN is judgement
                early, evidenced late. Components are diagnostic; joint feeds
                ROI calculation only.

  - id: D5
    decision: PGO is a failure-mode decomposition, not a single percentage
    rationale: Late-stage residual risk is structured (cancellation /
                no-compliant-bid / dormant / insourcing / budget-cut /
                policy-pull), not random. Decomposition makes the number
                transparent and lets the consultant see which mode dominates.
    failure_modes_observable_in_data:
      - explicit cancellation (tender_status / latest_tag)
      - no compliant bid (awards.status = 'unsuccessful')
      - dormant past category benchmark
    failure_modes_external_or_judgement:
      - policy refocus
      - insourcing decision
      - budget cut mid-process
      - legal challenge
      - award-stage withdrawal

  - id: D6
    decision: Three-tier PGO factor model
    tier_1_observable_in_database:
      - historical cancellation rate by buyer × category
      - schedule adherence (planned vs actual timelines)
      - competition intensity (bid count history)
      - amendment behaviour (indecision signal)
      - outcome mix patterns
      - incumbent distress (Companies House status)
    tier_2_external_public_data:
      - IPA Government Major Projects Portfolio (delivery confidence RAG)
      - council s.114 notices (DLUHC)
      - NHS trust deficit positions
      - Cabinet Office commercial pipeline
      - departmental business plans / Spending Review allocations
      - NAO and PAC procurement audit reports
    tier_3_structured_judgement:
      - strategic fit with departmental priorities
      - procurement capability (people and skills)
      - business case gate status (where not public)
      - political / ministerial risk
    combination_model: "PGO = base_rate (Tier 1) × observable_modifier (Tier 2) × judgement_overlay (Tier 3)"

  - id: D7
    decision: Pursuit cost model extends the existing CFO model — do not rebuild
    existing_files:
      - pwin-competitive-intel/bidequity-cfo-model.html
      - pwin-competitive-intel/docs/strategic-supplier-pursuit-spend-methodology-2026-04-25.md
      - pwin-bid-execution/docs/website_value_messaging.md (£100m worked example)
    existing_parameters:
      - contract value (6 tiers)
      - bid type (7 types with multipliers)
      - sector profile (1.4-2.5% of revenue)
      - win rate
    proposed_extensions:
      - stage at engagement (planning / pre-publication / post-publication / late capture)
      - defended vs attack bid (incumbent typically 30-50% cheaper)
      - number of lots (sub-linear scaling, ~1.4× for 2 lots)
      - capture period length
      - pricing complexity (fixed / open-book / variable)

  - id: D8
    decision: Margin defaults sourced from Companies House accounts of public-sector contractors
    rationale: CH integration already exists. Sector defaults from real
                contractor accounts more defensible than guesses.
    proposed_sector_defaults:
      bpo_outsourcing: 4-7%
      it_services: 3-6%
      facilities_management: 5-8%
      construction_civils: 1-3%
      defence: 7-10%
      consulting_advisory: 15-25%
    user_override: yes, per pursuit, with default visible to consultant

  - id: D9
    decision: Pursuit ROI placement is all three (Qualify, Portfolio, Verdict) but as derived output
    primacy: components (PWIN, PGO, margin, cost) are entry points;
              ROI is calculated rendering, not a primary input
    framing_per_product:
      qualify: "Given latest PGO and PWIN, here is what this pursuit is worth"
      portfolio: "BidEquity-branded leadership lens across all pursuits"
      verdict: "Was the pursuit spend defensible given what was knowable?"

  - id: D10
    decision: V1 build happens in a laptop-side Claude Code session
    rationale: bid_intel.db (570MB) is gitignored; not present in cloud sandbox.
                Iterative query-validate-refine loop needs the live database.
    cloud_sandbox_role: design, scoping, factor model — what we did this session
    laptop_role: build, query, validate against real data

  - id: D11
    decision: Tussell positioning is complementary, not competitive
    tussell_strengths: descriptive market intelligence, entity resolution,
                        framework holdings, sector reports
    bidequity_differentiator: predictive PGO layer, behavioural pattern analysis,
                              conditional ROI calculation
    do_not: rebuild Tussell's descriptive layer

